<script type="module">
import { JB01Engine } from '/jb01/dist/machines/jb01/engine.js';

// ══════════════════════════════════════════
// TRACK DATA
// ══════════════════════════════════════════
const BPM = 133;
const STEP_DUR = 60 / BPM / 4;

const kickLevel = Math.pow(10, -13 / 20);
const clapLevel = Math.pow(10, -15 / 20);

function d(v) { return v / 50; }
function t(v) { return v / 100; }

const patterns = {
  A: {
    voices: { kick: [0,4,8,12], ch: [0,2,4,6,8,10,12,14] },
    automation: {},
    params: { kick: { decay: d(10), level: kickLevel } }
  },
  B: {
    voices: { kick: [0,4,8,12], ch: [0,2,4,6,8,10,12,14], oh: [2,10] },
    automation: {

      'ch.tone':  [25,85,40,80,30,85,45,75,25,90,35,80,50,70,30,85].map(t),
    },
    params: { kick: { decay: d(10), level: kickLevel } }
  },
  D: {
    voices: { ch: [0,2,4,6,8,10,12,14], oh: [2,6,10,14] },
    automation: {
      'ch.decay': [20,25,30,35,40,50,60,70,75,80,85,88,90,92,95,95].map(d),
      'ch.tone':  [80,75,70,65,60,55,50,45,40,35,30,25,20,15,15,10].map(t),
    },
    params: { kick: { decay: d(10), level: 0 } }
  },
  C: {
    voices: { kick: [0,4,8,12], ch: [0,2,4,6,8,10,12,14], oh: [2,10] },
    automation: {
      'ch.decay': [95,5,90,5,95,10,85,5,95,5,80,15,95,5,90,10].map(d),
      'ch.tone':  [10,90,15,90,10,85,20,90,10,90,25,80,10,90,15,85].map(t),
    },
    params: { kick: { decay: d(10), level: kickLevel } }
  },
  E: {
    voices: { kick: [0,4,8,12], clap: [4,12], ch: [0,2,4,6,8,10,12,14], oh: [2,10] },
    automation: {
      'ch.decay': [95,95,95,95,5,5,5,5,95,95,95,95,5,5,5,5].map(d),
      'ch.tone':  [10,10,10,10,90,90,90,90,10,10,10,10,90,90,90,90].map(t),
    },
    params: { kick: { decay: d(10), level: kickLevel }, clap: { level: clapLevel } }
  },
  F: {
    voices: { kick: [0,4,8,12], clap: [4,12], ch: [0,2,4,6,8,10,12,14], oh: [2,10] },
    automation: {
      'ch.decay': [95,5,90,5,95,10,85,5,95,5,80,15,95,5,90,10].map(d),
      'ch.tone':  [10,90,15,90,10,85,20,90,10,90,25,80,10,90,15,85].map(t),
    },
    params: { kick: { decay: d(10), level: kickLevel }, clap: { level: clapLevel } }
  },
  G: {
    voices: { kick: [0,4,8,12], ch: [0,2,4,6,8,10,12,14] },
    automation: {
      'ch.decay': [80,70,65,55,50,45,40,35,30,25,20,20,15,15,10,10].map(d),
      'ch.tone':  [30,35,40,45,50,55,60,65,70,72,75,78,80,82,85,85].map(t),
    },
    params: { kick: { decay: d(10), level: kickLevel } }
  },
};

// Raw automation for viz (producer scale 0-100)
const autoRaw = {
  A: { decay: null, tone: null },
  B: { decay: [75,15,60,20,70,15,55,25,75,10,65,20,50,30,70,15], tone: [25,85,40,80,30,85,45,75,25,90,35,80,50,70,30,85] },
  D: { decay: [20,25,30,35,40,50,60,70,75,80,85,88,90,92,95,95], tone: [80,75,70,65,60,55,50,45,40,35,30,25,20,15,15,10] },
  C: { decay: [95,5,90,5,95,10,85,5,95,5,80,15,95,5,90,10], tone: [10,90,15,90,10,85,20,90,10,90,25,80,10,90,15,85] },
  E: { decay: [95,95,95,95,5,5,5,5,95,95,95,95,5,5,5,5], tone: [10,10,10,10,90,90,90,90,10,10,10,10,90,90,90,90] },
  F: { decay: [95,5,90,5,95,10,85,5,95,5,80,15,95,5,90,10], tone: [10,90,15,90,10,85,20,90,10,90,25,80,10,90,15,85] },
  G: { decay: [80,70,65,55,50,45,40,35,30,25,20,20,15,15,10,10], tone: [30,35,40,45,50,55,60,65,70,72,75,78,80,82,85,85] },
};

const arrangement = [
  { bars: 4, pattern: 'A', label: 'INTRO',          energy: 0.08 },
  { bars: 4, pattern: 'B', label: 'BUILD',           energy: 0.4  },
  { bars: 2, pattern: 'D', label: 'BRIDGE',          energy: 0.2  },
  { bars: 4, pattern: 'E', label: 'PEAK',            energy: 1.0  },
  { bars: 4, pattern: 'C', label: 'TRIBAL',          energy: 0.85 },
  { bars: 2, pattern: 'D', label: 'BRIDGE',          energy: 0.2  },
  { bars: 4, pattern: 'F', label: 'PEAK II',         energy: 1.0  },
  { bars: 4, pattern: 'E', label: 'RELENTLESS',      energy: 0.95 },
  { bars: 4, pattern: 'B', label: 'PULL BACK',       energy: 0.35 },
  { bars: 4, pattern: 'G', label: 'OUTRO',           energy: 0.1  },
];

// ══════════════════════════════════════════
// CANVAS
// ══════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cx, cy, diag;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
  diag = Math.sqrt(W * W + H * H);
}
resize();
window.addEventListener('resize', resize);

// ══════════════════════════════════════════
// COLOR ENGINE
// ══════════════════════════════════════════
// Tone 0 (dark hat) → deep blood red / dark amber
// Tone 100 (bright hat) → searing white-gold
// Decay controls saturation & brightness spread

function toneToRGB(tone01, brightness) {
  // tone 0 = deep crimson (180, 20, 10)
  // tone 0.5 = hot amber (255, 120, 20)
  // tone 1 = white-gold (255, 240, 200)
  const b = brightness || 1;
  let r, g, bl;
  if (tone01 < 0.5) {
    const t2 = tone01 * 2;
    r = (140 + t2 * 115) * b;
    g = (12 + t2 * 108) * b;
    bl = (8 + t2 * 12) * b;
  } else {
    const t2 = (tone01 - 0.5) * 2;
    r = (255) * b;
    g = (120 + t2 * 120) * b;
    bl = (20 + t2 * 180) * b;
  }
  return [Math.min(255, Math.floor(r)), Math.min(255, Math.floor(g)), Math.min(255, Math.floor(bl))];
}

// ══════════════════════════════════════════
// VISUAL STATE
// ══════════════════════════════════════════
const V = {
  decay: 0, tone: 50,           // raw 0-100
  smoothDecay: 0, smoothTone: 50,
  prevDecay: 0,
  kickHit: 0, clapHit: 0, ohHit: 0, chHit: 0,
  energy: 0.08, targetEnergy: 0.08,
  noKick: false,
  playing: false,
  step: 0,
  globalStep: 0,
  sectionPattern: 'A',
};

// ══════════════════════════════════════════
// GEOMETRY SYSTEMS
// ══════════════════════════════════════════

// ── 1. RADIAL FIELD: concentric rings that expand with decay ──
// The whole screen pulses with these
function drawRadialField() {
  const decay01 = V.smoothDecay / 100;
  const tone01 = V.smoothTone / 100;
  const [r, g, b] = toneToRGB(tone01);
  const energy = V.energy;

  // Number of rings scales with energy
  const ringCount = 3 + Math.floor(energy * 12);
  const maxRadius = diag * (0.2 + decay01 * 0.5);

  for (let i = 0; i < ringCount; i++) {
    const t = i / ringCount;
    const radius = maxRadius * t;
    if (radius < 2) continue;

    // Ring alpha — outer rings fainter
    const alpha = (1 - t) * (0.04 + decay01 * 0.12) * energy;
    if (alpha < 0.005) continue;

    // Ring width — thicker at high decay
    const lw = 0.5 + decay01 * 3 * (1 - t * 0.5);

    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
    ctx.lineWidth = lw;
    ctx.stroke();
  }
}

// ── 2. STARBURST: radial lines from center, length = decay ──
function drawStarburst() {
  const decay01 = V.smoothDecay / 100;
  const tone01 = V.smoothTone / 100;
  const [r, g, b] = toneToRGB(tone01, 0.8);
  const energy = V.energy;

  const count = 16 + Math.floor(energy * 32);
  const len = 20 + decay01 * decay01 * diag * 0.45;
  const baseAngle = V.globalStep * 0.02; // slow rotation

  for (let i = 0; i < count; i++) {
    const angle = baseAngle + (i / count) * Math.PI * 2;
    const wobble = Math.sin(i * 7.3 + V.globalStep * 0.1) * 0.03;
    const a = angle + wobble;

    const innerR = 10 + decay01 * 30;
    const outerR = innerR + len;

    const x1 = cx + Math.cos(a) * innerR;
    const y1 = cy + Math.sin(a) * innerR;
    const x2 = cx + Math.cos(a) * outerR;
    const y2 = cy + Math.sin(a) * outerR;

    // Vary alpha per ray — breathing effect
    const rayAlpha = (0.02 + decay01 * 0.06) * energy * (0.5 + Math.sin(i * 3.1 + V.globalStep * 0.05) * 0.5);
    if (rayAlpha < 0.003) continue;

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = `rgba(${r},${g},${b},${rayAlpha})`;
    ctx.lineWidth = 0.5 + decay01 * 1.5;
    ctx.stroke();
  }
}

// ── 3. FULL-SCREEN WASH: the entire bg shifts color with tone ──
function drawWash() {
  const decay01 = V.smoothDecay / 100;
  const tone01 = V.smoothTone / 100;
  const [r, g, b] = toneToRGB(tone01);
  const energy = V.energy;

  // Radial gradient from center — intensity based on decay & energy
  const radius = diag * (0.3 + decay01 * 0.4);
  const alpha = (0.03 + decay01 * 0.1) * energy;

  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
  grad.addColorStop(0, `rgba(${r},${g},${b},${alpha})`);
  grad.addColorStop(0.6, `rgba(${r},${g},${b},${alpha * 0.4})`);
  grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

// ── 4. BLOCK SLAM COLUMNS: vertical bands for pattern E ──
// When decay slams between 95 and 5, fill the screen in columns
const slamState = { alpha: 0, wide: false };

function drawBlockSlam() {
  if (slamState.alpha < 0.01) return;

  const tone01 = V.smoothTone / 100;
  const [r, g, b] = toneToRGB(tone01, 1.2);

  if (slamState.wide) {
    // WIDE — screen floods with color in vertical bands
    const bandCount = 8;
    const bandW = W / bandCount;
    for (let i = 0; i < bandCount; i++) {
      const bandAlpha = slamState.alpha * (0.15 + Math.sin(i * 1.7) * 0.08);
      ctx.fillStyle = `rgba(${r},${g},${b},${bandAlpha})`;
      ctx.fillRect(i * bandW, 0, bandW * 0.85, H);
    }
  } else {
    // TIGHT — sharp thin vertical slits
    const slitCount = 16;
    const gap = W / slitCount;
    for (let i = 0; i < slitCount; i++) {
      const x = gap * i + gap / 2;
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, H);
      ctx.strokeStyle = `rgba(255,240,220,${slamState.alpha * 0.2})`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }
}

// ── 5. KICK SHOCKWAVE: full-screen expanding ring ──
const kickWaves = [];
class KickWave {
  constructor() {
    this.r = 0;
    this.life = 1;
  }
  update() {
    this.r += (diag * 0.4 - this.r) * 0.06 + 4;
    this.life *= 0.94;
    return this.life > 0.01;
  }
  draw() {
    const tone01 = V.smoothTone / 100;
    const [r, g, b] = toneToRGB(tone01, 0.5);
    ctx.beginPath();
    ctx.arc(cx, cy, this.r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(${r},${g},${b},${this.life * 0.12})`;
    ctx.lineWidth = 2 + this.life * 4;
    ctx.stroke();
  }
}

// ── 6. CLAP CRACK: diagonal slash across the full screen ──
const clapCracks = [];
class ClapCrack {
  constructor() {
    this.life = 1;
    this.angle = (Math.random() - 0.5) * 0.6;
    this.y = cy + (Math.random() - 0.5) * H * 0.4;
  }
  update() {
    this.life *= 0.82;
    return this.life > 0.01;
  }
  draw() {
    const len = W * 0.8;
    const dx = Math.cos(this.angle) * len / 2;
    const dy = Math.sin(this.angle) * len / 2;

    // Main crack
    ctx.beginPath();
    ctx.moveTo(cx - dx, this.y - dy);
    ctx.lineTo(cx + dx, this.y + dy);
    ctx.strokeStyle = `rgba(255,250,240,${this.life * 0.7})`;
    ctx.lineWidth = 1 + this.life * 3;
    ctx.stroke();

    // Glow
    ctx.strokeStyle = `rgba(255,200,100,${this.life * 0.15})`;
    ctx.lineWidth = 8 + this.life * 20;
    ctx.stroke();
  }
}

// ── 7. OPEN HAT HALOS: large soft expanding circles ──
const ohHalos = [];
class OHHalo {
  constructor() {
    this.x = cx + (Math.random() - 0.5) * W * 0.4;
    this.y = cy + (Math.random() - 0.5) * H * 0.4;
    this.r = 20;
    this.maxR = 100 + Math.random() * 200;
    this.life = 1;
  }
  update() {
    this.r += (this.maxR - this.r) * 0.04;
    this.life *= 0.97;
    if (V.noKick) { this.y -= 0.8; this.r *= 1.002; } // float & expand in bridges
    return this.life > 0.01;
  }
  draw() {
    const tone01 = V.smoothTone / 100;
    const [r, g, b] = toneToRGB(tone01, 0.7);
    const grad = ctx.createRadialGradient(this.x, this.y, this.r * 0.4, this.x, this.y, this.r);
    grad.addColorStop(0, `rgba(${r},${g},${b},${this.life * 0.08})`);
    grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ── 8. HAT SCATTER: marks that fly outward, density = energy ──
const hatMarks = [];
class HatMark {
  constructor(decay01, tone01) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 20 + Math.random() * diag * 0.15;
    this.x = cx + Math.cos(angle) * dist;
    this.y = cy + Math.sin(angle) * dist;
    this.vx = Math.cos(angle) * (1 + decay01 * 4);
    this.vy = Math.sin(angle) * (1 + decay01 * 4);
    this.len = 3 + decay01 * 30;
    this.angle = angle + (Math.random() - 0.5) * 0.5;
    this.life = 1;
    this.decay01 = decay01;
    this.tone01 = tone01;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= 0.96;
    this.vy *= 0.96;
    if (V.noKick) this.vy -= 0.3;
    this.life *= (0.90 + this.decay01 * 0.06);
    return this.life > 0.02;
  }
  draw() {
    const [r, g, b] = toneToRGB(this.tone01);
    const ex = this.x + Math.cos(this.angle) * this.len;
    const ey = this.y + Math.sin(this.angle) * this.len;
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(ex, ey);
    ctx.strokeStyle = `rgba(${r},${g},${b},${this.life * 0.5})`;
    ctx.lineWidth = this.decay01 > 0.5 ? 1.5 : 0.7;
    ctx.stroke();
  }
}

// ── 9. BRIDGE DRIFT: floating embers when kick is gone ──
const embers = [];
class Ember {
  constructor() {
    this.x = Math.random() * W;
    this.y = H + 10;
    this.vy = -(0.5 + Math.random() * 1.5);
    this.vx = (Math.random() - 0.5) * 0.5;
    this.size = 1 + Math.random() * 3;
    this.life = 1;
  }
  update() {
    this.x += this.vx + Math.sin(this.y * 0.01) * 0.3;
    this.y += this.vy;
    this.life -= 0.005;
    return this.life > 0 && this.y > -20;
  }
  draw() {
    const tone01 = V.smoothTone / 100;
    const [r, g, b] = toneToRGB(tone01, 0.6);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r},${g},${b},${this.life * 0.3})`;
    ctx.fill();
  }
}

// ══════════════════════════════════════════
// STEP DOTS
// ══════════════════════════════════════════
const railEl = document.getElementById('step-rail');
for (let i = 0; i < 16; i++) {
  const s = document.createElement('div');
  s.className = 's';
  railEl.appendChild(s);
}
const stepDots = railEl.querySelectorAll('.s');

function updateDots(stepIdx, decayRaw) {
  stepDots.forEach((dot, i) => {
    if (i === stepIdx) {
      const n = decayRaw / 100;
      const [r, g, b] = toneToRGB(1 - n); // invert: high decay = warm, low = bright
      const size = 6 + n * 10;
      const alpha = 0.4 + n * 0.6;
      dot.style.width = size + 'px';
      dot.style.height = size + 'px';
      dot.style.background = `rgba(${r},${g},${b},${alpha})`;
      dot.style.boxShadow = n > 0.4 ? `0 0 ${6 + n * 12}px rgba(${r},${g},${b},${alpha * 0.6})` : 'none';
    } else {
      dot.style.width = '10px';
      dot.style.height = '10px';
      dot.style.background = 'rgba(255,255,255,0.04)';
      dot.style.boxShadow = 'none';
    }
  });
}

// ══════════════════════════════════════════
// RENDER LOOP
// ══════════════════════════════════════════
let frame = 0;

function render() {
  requestAnimationFrame(render);
  frame++;

  // Smooth values
  V.energy += (V.targetEnergy - V.energy) * 0.025;
  V.smoothDecay += (V.decay - V.smoothDecay) * 0.35;
  V.smoothTone += (V.tone - V.smoothTone) * 0.35;

  // Decay impulses
  V.kickHit *= 0.88;
  V.clapHit *= 0.82;
  V.ohHit *= 0.93;
  V.chHit *= 0.88;
  slamState.alpha *= 0.9;

  // ── BACKGROUND FADE ──
  // Longer trails in high energy, shorter in calm
  const fade = V.noKick ? 0.04 : (0.08 + (1 - V.energy) * 0.08);
  ctx.fillStyle = `rgba(10,6,8,${fade})`;
  ctx.fillRect(0, 0, W, H);

  if (!V.playing) {
    // Idle: dim breathing center
    const breath = Math.sin(frame * 0.012) * 0.5 + 0.5;
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 80);
    grad.addColorStop(0, `rgba(140,20,10,${0.03 + breath * 0.02})`);
    grad.addColorStop(1, 'rgba(140,20,10,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(cx - 80, cy - 80, 160, 160);
    return;
  }

  // ═══ LAYER ORDER (back to front) ═══

  // 1. Full-screen color wash
  drawWash();

  // 2. Block slam bands (pattern E/F)
  drawBlockSlam();

  // 3. Kick shockwave
  if (V.kickHit > 0.15) {
    // Subtle screen throb
    const [kr, kg, kb] = toneToRGB(V.smoothTone / 100, 0.3);
    ctx.fillStyle = `rgba(${kr},${kg},${kb},${V.kickHit * 0.05})`;
    ctx.fillRect(0, 0, W, H);
  }

  // 4. Kick waves
  for (let i = kickWaves.length - 1; i >= 0; i--) {
    kickWaves[i].draw();
    if (!kickWaves[i].update()) kickWaves.splice(i, 1);
  }

  // 5. Radial field
  drawRadialField();

  // 6. Starburst rays
  drawStarburst();

  // 7. OH halos
  for (let i = ohHalos.length - 1; i >= 0; i--) {
    ohHalos[i].draw();
    if (!ohHalos[i].update()) ohHalos.splice(i, 1);
  }

  // 8. Hat scatter marks
  for (let i = hatMarks.length - 1; i >= 0; i--) {
    hatMarks[i].draw();
    if (!hatMarks[i].update()) hatMarks.splice(i, 1);
  }

  // 9. Bridge embers
  if (V.noKick && frame % 2 === 0) {
    embers.push(new Ember());
  }
  for (let i = embers.length - 1; i >= 0; i--) {
    embers[i].draw();
    if (!embers[i].update()) embers.splice(i, 1);
  }

  // 10. Clap cracks (on top of everything)
  for (let i = clapCracks.length - 1; i >= 0; i--) {
    clapCracks[i].draw();
    if (!clapCracks[i].update()) clapCracks.splice(i, 1);
  }

  // 11. Clap full-screen flash
  if (V.clapHit > 0.2) {
    ctx.fillStyle = `rgba(255,240,200,${V.clapHit * 0.1})`;
    ctx.fillRect(0, 0, W, H);
  }
}

render();

// ══════════════════════════════════════════
// PLAYBACK ENGINE
// ══════════════════════════════════════════
let audioCtx = null;
let engine = null;
let playing = false;
let nextStepTime = 0;
let currentStep = 0;
let currentSectionIdx = 0;
let currentBar = 0;
let schedulerTimer = null;

const SCHEDULE_AHEAD = 0.1;
const LOOKAHEAD = 25;

function getSection() { return arrangement[currentSectionIdx]; }
function getPattern() { return patterns[getSection().pattern]; }

function applyParams(pat) {
  for (const [voice, params] of Object.entries(pat.params || {})) {
    for (const [param, value] of Object.entries(params)) {
      engine.setVoiceParam(voice, param, value);
    }
  }
}

function applyAutomation(pat, stepIdx) {
  for (const [path, values] of Object.entries(pat.automation || {})) {
    const [voiceId, paramId] = path.split('.');
    const val = values[stepIdx % values.length];
    if (val !== null && val !== undefined) {
      engine.setVoiceParam(voiceId, paramId, val);
    }
  }
}

function scheduleStep(time) {
  const pat = getPattern();
  const stepInPattern = currentStep % 16;
  const section = getSection();
  const patKey = section.pattern;

  applyAutomation(pat, stepInPattern);

  // Get raw viz values
  const src = autoRaw[patKey];
  const decayRaw = src.decay ? src.decay[stepInPattern % 16] : 0;
  const toneRaw = src.tone ? src.tone[stepInPattern % 16] : 50;

  // Trigger voices
  for (const [voiceId, steps] of Object.entries(pat.voices)) {
    if (steps.includes(stepInPattern)) {
      engine.trigger(voiceId, 1, time);
    }
  }

  // Schedule visual update synced to audio
  const delay = Math.max(0, (time - audioCtx.currentTime) * 1000);
  setTimeout(() => {
    V.decay = decayRaw;
    V.tone = toneRaw;
    V.step = stepInPattern;
    V.globalStep++;
    V.noKick = !pat.voices.kick || pat.voices.kick.length === 0;
    V.targetEnergy = section.energy;
    V.sectionPattern = patKey;

    // Block slam detection
    if (Math.abs(decayRaw - V.prevDecay) > 50) {
      slamState.alpha = 1;
      slamState.wide = decayRaw > V.prevDecay;
    }
    V.prevDecay = decayRaw;

    const decay01 = decayRaw / 100;
    const tone01 = toneRaw / 100;

    // Kick
    if (pat.voices.kick && pat.voices.kick.includes(stepInPattern)) {
      V.kickHit = 1;
      kickWaves.push(new KickWave());
    }

    // Clap
    if (pat.voices.clap && pat.voices.clap.includes(stepInPattern)) {
      V.clapHit = 1;
      clapCracks.push(new ClapCrack());
      clapCracks.push(new ClapCrack()); // always double
    }

    // Open hat
    if (pat.voices.oh && pat.voices.oh.includes(stepInPattern)) {
      V.ohHit = 1;
      ohHalos.push(new OHHalo());
      if (V.energy > 0.5) ohHalos.push(new OHHalo());
    }

    // Closed hat — scatter marks
    if (pat.voices.ch && pat.voices.ch.includes(stepInPattern)) {
      V.chHit = 1;
      const count = 2 + Math.floor(V.energy * 8);
      for (let i = 0; i < count; i++) {
        hatMarks.push(new HatMark(decay01, tone01));
      }
    }

    // Update HUD
    updateDots(stepInPattern, decayRaw);
    document.getElementById('section-label').textContent = section.label;
    document.getElementById('bar-count').textContent =
      `${currentBar + 1} / ${arrangement.reduce((s, a) => s + a.bars, 0)}`;
  }, delay);
}

function advanceStep() {
  currentStep++;
  if (currentStep % 16 === 0) {
    currentBar++;
    let barsBeforeSection = 0;
    for (let i = 0; i < currentSectionIdx; i++) barsBeforeSection += arrangement[i].bars;
    if (currentBar - barsBeforeSection >= getSection().bars) {
      currentSectionIdx++;
      if (currentSectionIdx >= arrangement.length) { stop(); return false; }
      applyParams(getPattern());
    }
  }
  return true;
}

function scheduler() {
  while (nextStepTime < audioCtx.currentTime + SCHEDULE_AHEAD) {
    scheduleStep(nextStepTime);
    nextStepTime += STEP_DUR;
    if (!advanceStep()) return;
  }
  schedulerTimer = setTimeout(scheduler, LOOKAHEAD);
}

function start() {
  if (!audioCtx) {
    audioCtx = new AudioContext({ sampleRate: 44100 });
    engine = new JB01Engine({ context: audioCtx, bpm: BPM });
    engine.output.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();

  currentStep = 0; currentSectionIdx = 0; currentBar = 0;
  V.prevDecay = 0; V.decay = 0; V.tone = 50;
  V.smoothDecay = 0; V.smoothTone = 50;
  V.playing = true; V.globalStep = 0;

  // Clear leftover elements
  kickWaves.length = 0; clapCracks.length = 0;
  ohHalos.length = 0; hatMarks.length = 0; embers.length = 0;

  applyParams(getPattern());
  nextStepTime = audioCtx.currentTime + 0.05;
  playing = true;
  document.getElementById('play-btn').classList.add('playing');
  document.getElementById('restart-zone').style.display = 'none';
  scheduler();
}

function stop() {
  playing = false; V.playing = false; V.targetEnergy = 0;
  if (schedulerTimer) clearTimeout(schedulerTimer);
  document.getElementById('play-btn').classList.remove('playing');
  document.getElementById('section-label').textContent = '';
  document.getElementById('bar-count').textContent = '';
  document.getElementById('restart-zone').style.display = 'block';
  stepDots.forEach(d => {
    d.style.width = '10px'; d.style.height = '10px';
    d.style.background = 'rgba(255,255,255,0.04)';
    d.style.boxShadow = 'none';
  });
}

document.getElementById('play-btn').addEventListener('click', () => {
  if (playing) stop(); else start();
});
document.getElementById('restart-zone').addEventListener('click', () => {
  start();
});
</script>
</body>
</html>
