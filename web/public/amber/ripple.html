<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RIPPLE - Water Ripple Music Machine</title>
  
  <!-- OG tags -->
  <meta property="og:title" content="RIPPLE - Water Ripple Music Machine" />
  <meta property="og:description" content="Tap to create ripples. When they collide or hit edges, they sing." />
  <meta property="og:image" content="https://intheamber.com/amber/ripple-og.png" />
  <meta property="og:url" content="https://intheamber.com/amber/ripple.html" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="RIPPLE - Water Ripple Music Machine" />
  <meta name="twitter:description" content="Tap to create ripples. When they collide or hit edges, they sing." />
  <meta name="twitter:image" content="https://intheamber.com/amber/ripple-og.png" />
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #0D0D0D;
      color: #D4A574;
      font-family: 'Space Mono', monospace;
      overflow: hidden;
      touch-action: none;
      user-select: none;
    }
    
    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: pointer;
    }
    
    #ui {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 10;
      pointer-events: none;
    }
    
    h1 {
      font-size: 32px;
      font-weight: 700;
      color: #D4A574;
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(212, 165, 116, 0.6);
    }
    
    .subtitle {
      font-size: 14px;
      color: #2D9596;
      margin-bottom: 20px;
    }
    
    .stats {
      font-size: 12px;
      color: #D4A574;
      opacity: 0.7;
      line-height: 1.6;
    }
    
    #hint {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      color: #2D9596;
      opacity: 0;
      animation: breathe 3s ease-in-out infinite;
      pointer-events: none;
    }
    
    @keyframes breathe {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }
    
    @media (max-width: 768px) {
      h1 { font-size: 24px; }
      .subtitle { font-size: 12px; }
      .stats { font-size: 11px; }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  
  <div id="ui">
    <h1>RIPPLE</h1>
    <div class="subtitle">Water Ripple Music Machine</div>
    <div class="stats">
      <div>RIPPLES: <span id="rippleCount">0</span></div>
      <div>NOTES: <span id="noteCount">0</span></div>
    </div>
  </div>
  
  <div id="hint">Tap anywhere to create ripples</div>
  
  <script type="module">
    import { SH101Controller } from '/101/dist/api/index.js';
    
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;
    
    let audioStarted = false;
    let audioCtx;
    let synth;
    let ripples = [];
    let noteCount = 0;
    
    // E minor pentatonic scale
    const scale = [
      { note: 'E3', freq: 164.81 },
      { note: 'G3', freq: 196.00 },
      { note: 'A3', freq: 220.00 },
      { note: 'B3', freq: 246.94 },
      { note: 'D4', freq: 293.66 },
      { note: 'E4', freq: 329.63 },
      { note: 'G4', freq: 392.00 },
      { note: 'A4', freq: 440.00 }
    ];
    
    class Ripple {
      constructor(x, y, speed) {
        this.x = x;
        this.y = y;
        this.radius = 0;
        this.speed = speed;
        this.maxRadius = Math.max(width, height) * 0.8;
        this.life = 1.0;
        this.hitEdge = false;
        this.collidedWith = new Set();
        this.hue = Math.random() * 60 + 30; // Gold to amber range
      }
      
      update() {
        this.radius += this.speed;
        this.life = 1 - (this.radius / this.maxRadius);
        
        // Check edge collision
        if (!this.hitEdge && (
          this.radius >= Math.max(
            this.x, 
            this.y, 
            width - this.x, 
            height - this.y
          )
        )) {
          this.hitEdge = true;
          playNote(this.speed);
        }
        
        return this.radius < this.maxRadius;
      }
      
      draw() {
const alpha = this.life * 0.8;
        
        // Multiple concentric rings for depth
        for (let i = 0; i < 3; i++) {
          const offset = i * 8;
          const ringAlpha = alpha * (1 - i * 0.3);
          
          // Outer glow
          ctx.strokeStyle = `hsla(${this.hue}, 70%, 60%, ${ringAlpha * 0.3})`;
          ctx.lineWidth = 4;
          ctx.shadowBlur = 20;
          ctx.shadowColor = `hsla(${this.hue}, 70%, 60%, ${ringAlpha})`;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius - offset, 0, Math.PI * 2);
          ctx.stroke();
          
          // Inner ring
          ctx.strokeStyle = `hsla(${this.hue}, 80%, 70%, ${ringAlpha})`;
          ctx.lineWidth = 2;
          ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius - offset, 0, Math.PI * 2);
          ctx.stroke();
        }
        
        ctx.shadowBlur = 0;
      }
      
      intersects(other) {
        const dx = this.x - other.x;
        const dy = this.y - other.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        return Math.abs(this.radius - other.radius) < 20 && dist < Math.max(this.radius, other.radius);
      }
    }
    
    async function initAudio() {
      if (audioStarted) return;
      audioStarted = true;
      
      synth = new SH101Controller();
      
      // Ensure AudioContext is resumed (required for iOS Safari)
      audioCtx = synth.engine.context;
      if (audioCtx.state === 'suspended') {
        await audioCtx.resume();
      }
      
      // Spawn initial ripples for ambient activity
      for (let i = 0; i < 3; i++) {
        setTimeout(() => {
          createRipple(
            Math.random() * width,
            Math.random() * height,
            Math.random() * 1.5 + 1.5
          );
        }, i * 800);
      }
      
      // Auto-spawn ripples periodically
      setInterval(() => {
        if (ripples.length < 15) {
          createRipple(
            Math.random() * width,
            Math.random() * height,
            Math.random() * 1.5 + 1.5
          );
        }
      }, 2500);
      
      document.getElementById('hint').style.opacity = 0;
    }
    
    function createRipple(x, y, speed = null) {
      if (!speed) {
        speed = Math.random() * 2 + 1; // 1-3 px per frame
      }
      
      const ripple = new Ripple(x, y, speed);
      ripples.push(ripple);
      
      // Spawn particles at touch point
      spawnParticles(x, y, 12);
      
      updateStats();
    }
    
    function playNote(speed) {
      if (!audioStarted || !synth) return;
      
      // Resume context if suspended (iOS can re-suspend)
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      
      // Map speed to scale index (faster = higher pitch)
      const index = Math.floor((speed - 1) / 2 * scale.length);
      const note = scale[Math.min(index, scale.length - 1)];
      
      // Set synth parameters before playing
      synth.engine.setParameter('cutoff', 0.6 + speed * 0.1);
      synth.engine.setParameter('resonance', 0.3);
      synth.engine.setParameter('envMod', 0.4);
      synth.engine.setParameter('decay', 0.3);
      
      synth.playNote(note.note, 0.7);
      
      // Auto note-off after duration
      setTimeout(() => {
        try { synth.noteOff(); } catch(e) {}
      }, 400);
      
      noteCount++;
      updateStats();
    }
    
    const particles = [];
    
    function spawnParticles(x, y, count) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 2 + 1;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1.0,
          hue: Math.random() * 60 + 30
        });
      }
    }
    
    function updateStats() {
      document.getElementById('rippleCount').textContent = ripples.length;
      document.getElementById('noteCount').textContent = noteCount;
    }
    
    function animate() {
      // Dark fade for trails
      ctx.fillStyle = 'rgba(13, 13, 13, 0.15)';
      ctx.fillRect(0, 0, width, height);
      
      // Update and draw ripples
      ripples = ripples.filter(ripple => {
        const alive = ripple.update();
        if (alive) ripple.draw();
        return alive;
      });
      
      // Check ripple intersections
      for (let i = 0; i < ripples.length; i++) {
        for (let j = i + 1; j < ripples.length; j++) {
          const r1 = ripples[i];
          const r2 = ripples[j];
          
          if (r1.intersects(r2) && !r1.collidedWith.has(r2)) {
            r1.collidedWith.add(r2);
            r2.collidedWith.add(r1);
            
            // Play note on collision
            const avgSpeed = (r1.speed + r2.speed) / 2;
            playNote(avgSpeed);
            
            // Spawn particles at intersection
            const ix = (r1.x + r2.x) / 2;
            const iy = (r1.y + r2.y) / 2;
            spawnParticles(ix, iy, 8);
          }
        }
      }
      
      // Update and draw particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.02;
        p.vy += 0.1; // Gravity
        
        if (p.life <= 0) {
          particles.splice(i, 1);
          continue;
        }
        
        const alpha = p.life;
        ctx.fillStyle = `hsla(${p.hue}, 80%, 70%, ${alpha})`;
        ctx.shadowBlur = 8;
        ctx.shadowColor = `hsla(${p.hue}, 80%, 70%, ${alpha})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fill();
      }
      
      ctx.shadowBlur = 0;
      
      updateStats();
      requestAnimationFrame(animate);
    }
    
    // Event listeners
    canvas.addEventListener('click', (e) => {
      initAudio();
      createRipple(e.clientX, e.clientY);
    });
    
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      initAudio();
      const touch = e.touches[0];
      createRipple(touch.clientX, touch.clientY);
    });
    
    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    });
    
    // Start animation
    animate();
  </script>
</body>
</html>
