<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AUTOCOMPLETE — Amber</title>
  <link rel="icon" type="image/svg+xml" href="/amber/favicon.svg">
  
  <!-- OpenGraph -->
  <meta property="og:title" content="AUTOCOMPLETE — Amber">
  <meta property="og:description" content="Search suggestions that know you too well">
  <meta property="og:image" content="https://intheamber.com/amber/autocomplete-og.png">
  <meta property="og:url" content="https://intheamber.com/amber/autocomplete.html">
  <meta property="og:type" content="website">
  
  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="AUTOCOMPLETE — Amber">
  <meta name="twitter:description" content="Search suggestions that know you too well">
  <meta name="twitter:image" content="https://intheamber.com/amber/autocomplete-og.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #000;
      color: #fff;
      overflow: hidden;
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .logo {
      font-size: 48px;
      font-weight: 300;
      letter-spacing: -1px;
      margin-bottom: 30px;
      background: linear-gradient(135deg, #D4A574 0%, #FFD700 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .search-container {
      position: relative;
      width: 100%;
      max-width: 600px;
    }
    
    .search-box {
      width: 100%;
      padding: 16px 50px 16px 20px;
      font-size: 18px;
      border: 2px solid #333;
      border-radius: 24px;
      background: #0D0D0D;
      color: #fff;
      outline: none;
      transition: all 0.3s ease;
      font-family: inherit;
    }
    
    .search-box:focus {
      border-color: #D4A574;
      box-shadow: 0 0 20px rgba(212, 165, 116, 0.3);
    }
    
    .search-icon {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      color: #D4A574;
      pointer-events: none;
    }
    
    .autocomplete {
      position: absolute;
      top: calc(100% + 10px);
      left: 0;
      right: 0;
      background: #0D0D0D;
      border: 2px solid #333;
      border-radius: 12px;
      overflow: hidden;
      opacity: 0;
      transform: translateY(-10px);
      transition: all 0.3s ease;
      pointer-events: none;
      max-height: 400px;
      overflow-y: auto;
    }
    
    .autocomplete.active {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }
    
    .autocomplete-item {
      padding: 14px 20px;
      cursor: pointer;
      border-bottom: 1px solid #1a1a1a;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideIn 0.3s ease forwards;
      opacity: 0;
    }
    
    @keyframes slideIn {
      to {
        opacity: 1;
      }
    }
    
    .autocomplete-item:last-child {
      border-bottom: none;
    }
    
    .autocomplete-item:hover {
      background: #1a1a1a;
    }
    
    .autocomplete-item:active {
      background: #222;
    }
    
    .search-icon-small {
      color: #666;
      font-size: 14px;
      flex-shrink: 0;
    }
    
    .autocomplete-text {
      flex: 1;
      font-size: 16px;
    }
    
    .prefix {
      color: #D4A574;
    }
    
    .suffix {
      color: #999;
    }
    
    .prompts {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .prompt-btn {
      padding: 10px 20px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 20px;
      color: #D4A574;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s ease;
      font-family: inherit;
      white-space: nowrap;
    }
    
    .prompt-btn:hover {
      background: #222;
      border-color: #D4A574;
    }
    
    .prompt-btn:active {
      transform: scale(0.95);
    }
    
    .stats {
      position: absolute;
      bottom: 20px;
      font-size: 12px;
      color: #666;
      text-align: center;
    }
    
    .result-screen {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
      padding: 40px;
      text-align: center;
    }
    
    .result-screen.active {
      opacity: 1;
      pointer-events: all;
    }
    
    .result-query {
      font-size: 24px;
      color: #D4A574;
      margin-bottom: 20px;
    }
    
    .result-count {
      font-size: 14px;
      color: #666;
      margin-bottom: 30px;
    }
    
    .result-answer {
      font-size: 18px;
      line-height: 1.6;
      max-width: 500px;
      color: #999;
      margin-bottom: 40px;
    }
    
    .back-btn {
      padding: 12px 30px;
      background: #1a1a1a;
      border: 1px solid #D4A574;
      border-radius: 24px;
      color: #D4A574;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    
    .back-btn:hover {
      background: #222;
      box-shadow: 0 0 20px rgba(212, 165, 116, 0.2);
    }
    
    .back-btn:active {
      transform: scale(0.95);
    }
    
    @media (max-width: 600px) {
      .logo {
        font-size: 36px;
        margin-bottom: 20px;
      }
      
      .search-box {
        font-size: 16px;
        padding: 14px 45px 14px 16px;
      }
      
      .prompt-btn {
        font-size: 13px;
        padding: 8px 16px;
      }
      
      .autocomplete-item {
        padding: 12px 16px;
      }
      
      .autocomplete-text {
        font-size: 15px;
      }
      
      .result-query {
        font-size: 20px;
      }
      
      .result-answer {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="logo">Search</div>
  
  <div class="search-container">
    <input type="text" class="search-box" placeholder="Search your feelings..." readonly>
    <div class="search-icon">🔍</div>
    
    <div class="autocomplete">
      <!-- Items inserted here -->
    </div>
  </div>
  
  <div class="prompts">
    <button class="prompt-btn" data-prefix="why do I">why do I...</button>
    <button class="prompt-btn" data-prefix="how to stop">how to stop...</button>
    <button class="prompt-btn" data-prefix="am I the only one who">am I the only one who...</button>
    <button class="prompt-btn" data-prefix="is it normal to">is it normal to...</button>
  </div>
  
  <div class="stats">
    <span id="searchCount">0</span> uncomfortable truths discovered
  </div>
  
  <div class="result-screen">
    <div class="result-query"></div>
    <div class="result-count">About 8,000,000,000 results (0.01 seconds)</div>
    <div class="result-answer"></div>
    <button class="back-btn">Search Again</button>
  </div>

  <script>
    const searchBox = document.querySelector('.search-box');
    const autocomplete = document.querySelector('.autocomplete');
    const promptBtns = document.querySelectorAll('.prompt-btn');
    const searchCount = document.getElementById('searchCount');
    const resultScreen = document.querySelector('.result-screen');
    const resultQuery = document.querySelector('.result-query');
    const resultAnswer = document.querySelector('.result-answer');
    const backBtn = document.querySelector('.back-btn');
    
    let count = 0;
    let audioContext;
    let currentPrefix = '';
    
    const suggestions = {
      'why do I': [
        'feel like I\'m wasting my life',
        'say yes when I mean no',
        'scroll when I should sleep',
        'feel lonely in a crowd',
        'keep checking if they replied',
        'overthink everything I said',
        'compare myself to strangers',
        'feel like everyone else has it figured out'
      ],
      'how to stop': [
        'overthinking everything',
        'caring what they think',
        'comparing myself to others',
        'refreshing the same three apps',
        'hoping it will be different',
        'feeling like an imposter',
        'apologizing for existing',
        'looking for external validation'
      ],
      'am I the only one who': [
        'feels like everyone else has it figured out',
        'rehearses conversations that never happen',
        'lies about being busy',
        'forgets why I walked into this room',
        'feels tired even after sleeping',
        'doesn\'t know what to do with my life',
        'feels fake when trying to be authentic',
        'wants to disappear for a while'
      ],
      'is it normal to': [
        'feel nothing and everything at once',
        'miss someone you\'ve never met',
        'feel like you\'re watching your own life',
        'want to disappear for a while',
        'not know what you want',
        'feel lonely when surrounded by people',
        'be afraid of being happy',
        'question if you\'re a good person'
      ]
    };
    
    const answers = [
      'Yes. Everyone. All 8 billion of us.\n\nBut knowing that doesn\'t make it easier, does it?',
      'You\'re not broken. You\'re human.\n\nWhich sometimes feels like the same thing.',
      'The algorithm knows. Your friends know.\n\nYou know.\n\nBut you searched it anyway.',
      'Statistically: extremely common.\nEmotionally: feels like you\'re the only one.',
      'This is what the human condition looks like from inside.\n\nThere\'s no cure. Just company.',
      'Everyone feels this way.\n\nMost people just don\'t search for it at 2am.',
    ];
    
    function initAudio() {
      if (!audioContext) {
        audioContext = new AudioContext();
      }
    }
    
    function playTone(freq, duration = 100) {
      if (!audioContext) return;
      
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      
      osc.connect(gain);
      gain.connect(audioContext.destination);
      
      osc.frequency.value = freq;
      osc.type = 'sine';
      
      gain.gain.setValueAtTime(0.1, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration / 1000);
      
      osc.start(audioContext.currentTime);
      osc.stop(audioContext.currentTime + duration / 1000);
    }
    
    function showAutocomplete(prefix) {
      initAudio();
      currentPrefix = prefix;
      searchBox.value = prefix + ' ';
      
      const items = suggestions[prefix];
      autocomplete.innerHTML = '';
      
      items.forEach((suffix, index) => {
        const item = document.createElement('div');
        item.className = 'autocomplete-item';
        item.style.animationDelay = `${index * 0.05}s`;
        item.innerHTML = `
          <div class="search-icon-small">🔍</div>
          <div class="autocomplete-text">
            <span class="prefix">${prefix}</span>
            <span class="suffix"> ${suffix}</span>
          </div>
        `;
        
        item.addEventListener('click', () => selectItem(prefix, suffix));
        autocomplete.appendChild(item);
      });
      
      autocomplete.classList.add('active');
      playTone(400);
    }
    
    function selectItem(prefix, suffix) {
      initAudio();
      count++;
      searchCount.textContent = count;
      
      const fullQuery = prefix + ' ' + suffix;
      resultQuery.textContent = fullQuery;
      resultAnswer.textContent = answers[Math.floor(Math.random() * answers.length)];
      
      autocomplete.classList.remove('active');
      resultScreen.classList.add('active');
      
      playTone(600, 150);
    }
    
    promptBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const prefix = btn.dataset.prefix;
        showAutocomplete(prefix);
      });
    });
    
    backBtn.addEventListener('click', () => {
      initAudio();
      resultScreen.classList.remove('active');
      autocomplete.classList.remove('active');
      searchBox.value = '';
      playTone(300);
    });
    
    // Close autocomplete if clicking outside
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-container') && !e.target.closest('.prompt-btn')) {
        autocomplete.classList.remove('active');
      }
    });
  </script>
</body>
</html>
