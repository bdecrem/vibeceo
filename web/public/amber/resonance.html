<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RESONANCE — Bell tones expanding</title>

  <!-- Open Graph -->
  <meta property="og:title" content="RESONANCE">
  <meta property="og:description" content="Bell tones expanding — Amber Art">
  <meta property="og:image" content="https://intheamber.com/amber/resonance-og.png">
  <meta property="og:url" content="https://intheamber.com/amber/resonance.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Space Mono', 'Courier New', monospace;
      color: #D4A574;
      touch-action: none;
    }

    canvas {
      display: block;
      cursor: crosshair;
    }

    #info {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-size: 14px;
      color: #D4A574;
      opacity: 0.7;
      pointer-events: none;
      z-index: 10;
    }

    #title {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 36px;
      font-weight: bold;
      color: #FFD700;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
      letter-spacing: 8px;
      pointer-events: none;
      z-index: 10;
    }

    #stats {
      position: absolute;
      top: 90px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: #2D9596;
      opacity: 0.6;
      pointer-events: none;
      z-index: 10;
    }

    @media (max-width: 768px) {
      #title {
        font-size: 24px;
        top: 20px;
        letter-spacing: 4px;
      }
      #info {
        font-size: 12px;
        bottom: 10px;
      }
      #stats {
        font-size: 10px;
        top: 60px;
      }
    }
  </style>
</head>
<body>
  <div id="title">RESONANCE</div>
  <div id="stats">active rings: <span id="ringCount">0</span> • bells rung: <span id="bellCount">0</span></div>
  <canvas id="canvas"></canvas>
  <div id="info">tap anywhere to ring a bell</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Bell definitions (color, frequency, name)
    const bells = [
      { color: '#FFD700', freq: 440, name: 'GOLD' },      // A4
      { color: '#ec4899', freq: 523, name: 'PINK' },      // C5
      { color: '#3b82f6', freq: 587, name: 'BLUE' },      // D5
      { color: '#2D9596', freq: 659, name: 'TEAL' },      // E5
      { color: '#f97316', freq: 698, name: 'CORAL' },     // F5
      { color: '#8b5cf6', freq: 784, name: 'PURPLE' },    // G5
      { color: '#D4A574', freq: 880, name: 'AMBER' }      // A5
    ];

    let currentBellIndex = 0;
    let rings = [];
    let particles = [];
    let audioContext;
    let bellsRung = 0;

    // Ring class
    class Ring {
      constructor(x, y, color, maxRadius) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.radius = 0;
        this.maxRadius = maxRadius;
        this.opacity = 1;
        this.speed = 2 + Math.random() * 2; // 2-4 pixels per frame
        this.thickness = 3 + Math.random() * 3; // 3-6px thick
        this.alive = true;
      }

      update() {
        this.radius += this.speed;
        this.opacity = 1 - (this.radius / this.maxRadius);

        if (this.radius >= this.maxRadius || this.opacity <= 0) {
          this.alive = false;
        }
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.opacity;
        ctx.strokeStyle = this.color;
        ctx.lineWidth = this.thickness;
        ctx.shadowBlur = 20;
        ctx.shadowColor = this.color;

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.stroke();

        ctx.restore();
      }
    }

    // Particle class
    class Particle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.vx = (Math.random() - 0.5) * 4;
        this.vy = (Math.random() - 0.5) * 4;
        this.size = 2 + Math.random() * 3;
        this.opacity = 1;
        this.life = 1;
        this.decay = 0.02;
        this.alive = true;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= 0.98; // damping
        this.vy *= 0.98;
        this.life -= this.decay;
        this.opacity = this.life;

        if (this.life <= 0) {
          this.alive = false;
        }
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.opacity;
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.color;

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }
    }

    // Initialize audio context
    function initAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    // Play bell tone
    function playBell(frequency) {
      if (!audioContext) return;

      const now = audioContext.currentTime;

      // Triangle wave for bell-like tone
      const osc = audioContext.createOscillator();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(frequency, now);

      // Add a second oscillator for richness
      const osc2 = audioContext.createOscillator();
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(frequency * 2.01, now); // slight detune

      // Envelope for bell decay
      const gain = audioContext.createGain();
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 3); // 3 second decay

      const gain2 = audioContext.createGain();
      gain2.gain.setValueAtTime(0.1, now);
      gain2.gain.exponentialRampToValueAtTime(0.01, now + 2);

      // Filter for brightness
      const filter = audioContext.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(3000, now);
      filter.Q.setValueAtTime(1, now);

      osc.connect(gain);
      osc2.connect(gain2);
      gain.connect(filter);
      gain2.connect(filter);
      filter.connect(audioContext.destination);

      osc.start(now);
      osc2.start(now);
      osc.stop(now + 3);
      osc2.stop(now + 2);
    }

    // Ring a bell at position
    function ringBell(x, y) {
      initAudio();

      const bell = bells[currentBellIndex];

      // Create 5-7 expanding rings
      const numRings = 5 + Math.floor(Math.random() * 3);
      for (let i = 0; i < numRings; i++) {
        setTimeout(() => {
          const maxRadius = 200 + Math.random() * 300;
          rings.push(new Ring(x, y, bell.color, maxRadius));
        }, i * 100); // stagger the rings
      }

      // Create particle burst
      for (let i = 0; i < 20; i++) {
        particles.push(new Particle(x, y, bell.color));
      }

      // Play sound
      playBell(bell.freq);

      // Cycle to next bell
      currentBellIndex = (currentBellIndex + 1) % bells.length;
      bellsRung++;

      document.getElementById('bellCount').textContent = bellsRung;
    }

    // Handle interaction
    function handleInteraction(e) {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
      const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;

      ringBell(x, y);
    }

    canvas.addEventListener('mousedown', handleInteraction);
    canvas.addEventListener('touchstart', handleInteraction);

    // Animation loop
    function animate() {
      // Fade trail effect
      ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Update and draw rings
      for (let i = rings.length - 1; i >= 0; i--) {
        rings[i].update();
        rings[i].draw();

        if (!rings[i].alive) {
          rings.splice(i, 1);
        }
      }

      // Update and draw particles
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();

        if (!particles[i].alive) {
          particles.splice(i, 1);
        }
      }

      document.getElementById('ringCount').textContent = rings.length;

      requestAnimationFrame(animate);
    }

    // Handle resize
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    // Start animation
    animate();

    // Ring a few bells on load for visual interest
    setTimeout(() => ringBell(canvas.width / 2, canvas.height / 2), 500);
    setTimeout(() => ringBell(canvas.width * 0.3, canvas.height * 0.6), 1000);
    setTimeout(() => ringBell(canvas.width * 0.7, canvas.height * 0.4), 1500);
  </script>
</body>
</html>
