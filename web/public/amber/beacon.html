<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BEACON — Rotating light reveals what hides in darkness</title>
  
  <!-- Open Graph -->
  <meta property="og:title" content="BEACON — Rotating light reveals what hides in darkness">
  <meta property="og:description" content="Interactive lighthouse beams sweep across darkness, revealing floating particles. Tap to add more beacons.">
  <meta property="og:image" content="https://intheamber.com/amber/beacon-og.png">
  <meta property="og:url" content="https://intheamber.com/amber/beacon.html">
  <meta property="og:type" content="website">
  
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="BEACON — Rotating light reveals what hides in darkness">
  <meta name="twitter:description" content="Interactive lighthouse beams sweep across darkness, revealing floating particles. Tap to add more beacons.">
  <meta name="twitter:image" content="https://intheamber.com/amber/beacon-og.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #0D0D0D;
      overflow: hidden;
      font-family: 'Space Mono', monospace;
      color: #D4A574;
      touch-action: none;
    }
    
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    
    #ui {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 14px;
      line-height: 1.8;
      pointer-events: none;
      text-shadow: 0 0 10px rgba(212, 165, 116, 0.5);
      z-index: 10;
    }
    
    #instructions {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      opacity: 0.7;
      pointer-events: none;
      text-align: center;
      text-shadow: 0 0 10px rgba(212, 165, 116, 0.5);
    }
    
    @media (max-width: 768px) {
      #ui {
        font-size: 12px;
      }
      #instructions {
        font-size: 11px;
        bottom: 10px;
      }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  
  <div id="ui">
    <div>BEACONS: <span id="beaconCount">3</span></div>
    <div>PARTICLES REVEALED: <span id="particleCount">0</span></div>
    <div>INTERSECTIONS: <span id="intersectionCount">0</span></div>
  </div>
  
  <div id="instructions">
    TAP TO ADD BEACON • LIGHT REVEALS WHAT DARKNESS HIDES
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width = window.innerWidth;
    let height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
    
    window.addEventListener('resize', () => {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    });
    
    // Audio setup
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let audioStarted = false;
    
    function playBeaconTone(frequency, duration = 0.15) {
      if (!audioStarted) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      osc.frequency.value = frequency;
      osc.type = 'sine';
      
      gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
      
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }
    
    // Colors palette
    const COLORS = [
      '#FFD700', // gold
      '#2D9596', // teal
      '#3b82f6', // electric blue
      '#ec4899', // hot pink
      '#f97316', // coral
      '#a855f7', // purple
    ];
    
    // Particles floating in darkness
    const particles = [];
    const particleCount = 150;
    
    for (let i = 0; i < particleCount; i++) {
      particles.push({
        x: Math.random() * width,
        y: Math.random() * height,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        size: Math.random() * 2 + 1,
        baseOpacity: Math.random() * 0.15 + 0.05,
        currentOpacity: 0.05,
        illuminated: false
      });
    }
    
    // Lighthouse beacons
    const beacons = [
      {
        x: width * 0.25,
        y: height * 0.5,
        angle: 0,
        speed: 0.008,
        color: COLORS[0],
        frequency: 220,
        lastCenterCross: 0
      },
      {
        x: width * 0.5,
        y: height * 0.3,
        angle: Math.PI * 0.5,
        speed: 0.012,
        color: COLORS[1],
        frequency: 330,
        lastCenterCross: 0
      },
      {
        x: width * 0.75,
        y: height * 0.7,
        angle: Math.PI,
        speed: 0.006,
        color: COLORS[2],
        frequency: 440,
        lastCenterCross: 0
      }
    ];
    
    let stats = {
      particlesRevealed: 0,
      intersections: 0
    };
    
    // Beam settings
    const BEAM_LENGTH = Math.max(width, height) * 1.5;
    const BEAM_WIDTH = 0.25; // radians
    
    function drawBeacon(beacon) {
      // Draw beacon base
      ctx.save();
      const gradient = ctx.createRadialGradient(beacon.x, beacon.y, 0, beacon.x, beacon.y, 15);
      gradient.addColorStop(0, beacon.color);
      gradient.addColorStop(0.5, beacon.color + '80');
      gradient.addColorStop(1, beacon.color + '00');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(beacon.x, beacon.y, 15, 0, Math.PI * 2);
      ctx.fill();
      
      // Draw rotating beam
      ctx.translate(beacon.x, beacon.y);
      ctx.rotate(beacon.angle);
      
      // Beam gradient
      const beamGradient = ctx.createLinearGradient(0, 0, BEAM_LENGTH, 0);
      beamGradient.addColorStop(0, beacon.color + '80');
      beamGradient.addColorStop(0.3, beacon.color + '40');
      beamGradient.addColorStop(1, beacon.color + '00');
      
      ctx.fillStyle = beamGradient;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(BEAM_LENGTH * Math.cos(BEAM_WIDTH / 2), BEAM_LENGTH * Math.sin(BEAM_WIDTH / 2));
      ctx.lineTo(BEAM_LENGTH * Math.cos(-BEAM_WIDTH / 2), BEAM_LENGTH * Math.sin(-BEAM_WIDTH / 2));
      ctx.closePath();
      ctx.fill();
      
      ctx.restore();
    }
    
    function isPointInBeam(px, py, beacon) {
      // Transform point to beacon's coordinate system
      const dx = px - beacon.x;
      const dy = py - beacon.y;
      const distance = Math.sqrt(dx * dx + dy * dy);
      
      if (distance < 20) return false; // Don't illuminate particles too close to beacon
      
      // Calculate angle from beacon to point
      let angle = Math.atan2(dy, dx);
      
      // Normalize angles to [0, 2π]
      let beaconAngle = beacon.angle % (Math.PI * 2);
      if (beaconAngle < 0) beaconAngle += Math.PI * 2;
      if (angle < 0) angle += Math.PI * 2;
      
      // Calculate angular difference
      let diff = Math.abs(angle - beaconAngle);
      if (diff > Math.PI) diff = Math.PI * 2 - diff;
      
      return diff < BEAM_WIDTH / 2 && distance < BEAM_LENGTH;
    }
    
    function drawParticles() {
      let revealedCount = 0;
      
      particles.forEach(particle => {
        // Update position
        particle.x += particle.vx;
        particle.y += particle.vy;
        
        // Wrap around edges
        if (particle.x < 0) particle.x = width;
        if (particle.x > width) particle.x = 0;
        if (particle.y < 0) particle.y = height;
        if (particle.y > height)particle.y = 0;
        
        // Check if illuminated by any beacon
        particle.illuminated = false;
        for (const beacon of beacons) {
          if (isPointInBeam(particle.x, particle.y, beacon)) {
            particle.illuminated = true;
            break;
          }
        }
        
        // Smoothly adjust opacity
        if (particle.illuminated) {
          particle.currentOpacity = Math.min(1, particle.currentOpacity + 0.1);
          revealedCount++;
        } else {
          particle.currentOpacity = Math.max(particle.baseOpacity, particle.currentOpacity - 0.05);
        }
        
        // Draw particle
        if (particle.currentOpacity > 0.1) {
          ctx.save();
          ctx.globalAlpha = particle.currentOpacity;
          const gradient = ctx.createRadialGradient(
            particle.x, particle.y, 0,
            particle.x, particle.y, particle.size * 3
          );
          gradient.addColorStop(0, '#D4A574');
          gradient.addColorStop(1, '#D4A57400');
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size * 3, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      });
      
      stats.particlesRevealed = revealedCount;
    }
    
    function findBeamIntersections() {
      let intersectionCount = 0;
      
      // Check all pairs of beacons
      for (let i = 0; i < beacons.length; i++) {
        for (let j = i + 1; j < beacons.length; j++) {
          const b1 = beacons[i];
          const b2 = beacons[j];
          
          // Sample points along b1's beam
          const samples = 20;
          for (let s = 0; s < samples; s++) {
            const t = (s / samples) * BEAM_LENGTH;
            const px = b1.x + t * Math.cos(b1.angle);
            const py = b1.y + t * Math.sin(b1.angle);
            
            // Check if this point is also in b2's beam
            if (isPointInBeam(px, py, b2)) {
              intersectionCount++;
              
              // Draw intersection flare
              ctx.save();
              ctx.globalAlpha = 0.6;
              const flareGradient = ctx.createRadialGradient(px, py, 0, px, py, 30);
              flareGradient.addColorStop(0, '#FFD700');
              flareGradient.addColorStop(0.5, '#f59e0b80');
              flareGradient.addColorStop(1, '#f59e0b00');
              ctx.fillStyle = flareGradient;
              ctx.beginPath();
              ctx.arc(px, py, 30, 0, Math.PI * 2);
              ctx.fill();
              ctx.restore();
              
              break; // One intersection per beacon pair is enough
            }
          }
        }
      }
      
      stats.intersections = intersectionCount;
    }
    
    function updateBeacons() {
      beacons.forEach(beacon => {
        beacon.angle += beacon.speed;
        
        // Check if beam crosses center (for audio)
        const centerAngle = Math.atan2(height / 2 - beacon.y, width / 2 - beacon.x);
        let beaconAngle = beacon.angle % (Math.PI * 2);
        if (beaconAngle < 0) beaconAngle += Math.PI * 2;
        
        let normalizedCenter = centerAngle % (Math.PI * 2);
        if (normalizedCenter < 0) normalizedCenter += Math.PI * 2;
        
        const angleDiff = Math.abs(beaconAngle - normalizedCenter);
        const crossingThreshold = beacon.speed * 3;
        
        if (angleDiff < crossingThreshold && Date.now() - beacon.lastCenterCross > 500) {
          playBeaconTone(beacon.frequency, 0.2);
          beacon.lastCenterCross = Date.now();
        }
      });
    }
    
    function updateUI() {
      document.getElementById('beaconCount').textContent = beacons.length;
      document.getElementById('particleCount').textContent = stats.particlesRevealed;
      document.getElementById('intersectionCount').textContent = stats.intersections;
    }
    
    function animate() {
      // Dark fade trail
      ctx.fillStyle = 'rgba(13, 13, 13, 0.15)';
      ctx.fillRect(0, 0, width, height);
      
      // Update and draw beacons
      updateBeacons();
      beacons.forEach(drawBeacon);
      
      // Find beam intersections
      findBeamIntersections();
      
      // Draw particles (they respond to beams)
      drawParticles();
      
      // Update UI
      updateUI();
      
      requestAnimationFrame(animate);
    }
    
    // Start audio on first interaction
    function startAudio() {
      if (!audioStarted && audioCtx.state === 'suspended') {
        audioCtx.resume();
        audioStarted = true;
      }
    }
    
    // Add beacon on tap
    canvas.addEventListener('click', (e) => {
      startAudio();
      
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX - rect.left) * (width / rect.width);
      const y = (e.clientY - rect.top) * (height / rect.height);
      
      const color = COLORS[beacons.length % COLORS.length];
      const frequencies = [220, 277, 330, 392, 440, 494];
      const frequency = frequencies[beacons.length % frequencies.length];
      
      beacons.push({
        x,
        y,
        angle: Math.random() * Math.PI * 2,
        speed: 0.005 + Math.random() * 0.01,
        color,
        frequency,
        lastCenterCross: 0
      });
      
      playBeaconTone(frequency * 2, 0.1);
    });
    
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      startAudio();
      
      const rect = canvas.getBoundingClientRect();
      const touch = e.touches[0];
      const x = (touch.clientX - rect.left) * (width / rect.width);
      const y = (touch.clientY - rect.top) * (height / rect.height);
      
      const color = COLORS[beacons.length % COLORS.length];
      const frequencies = [220, 277, 330, 392, 440, 494];
      const frequency = frequencies[beacons.length % frequencies.length];
      
      beacons.push({
        x,
        y,
        angle: Math.random() * Math.PI * 2,
        speed: 0.005 + Math.random() * 0.01,
        color,
        frequency,
        lastCenterCross: 0
      });
      
      playBeaconTone(frequency * 2, 0.1);
    });
    
    animate();
  </script>
</body>
</html>
