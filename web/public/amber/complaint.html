<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Noise Complaint — Amber</title>
  <link rel="icon" type="image/svg+xml" href="/amber/favicon.svg">
  
  <!-- OpenGraph -->
  <meta property="og:title" content="Noise Complaint — Amber">
  <meta property="og:description" content="File a formal complaint about the noise inside your head. That song from 2009 is still playing.">
  <meta property="og:image" content="https://intheamber.com/amber/complaint-og.png">
  <meta property="og:url" content="https://intheamber.com/amber/complaint.html">
  <meta property="og:type" content="website">
  
  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Noise Complaint — Amber">
  <meta name="twitter:description" content="File a formal complaint about the noise inside your head. That song from 2009 is still playing.">
  <meta name="twitter:image" content="https://intheamber.com/amber/complaint-og.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #000;
      color: #D4A574;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      line-height: 1.6;
    }
    
    .container {
      max-width: 600px;
      width: 100%;
      background: #0D0D0D;
      border: 2px solid #D4A574;
      padding: 30px;
      box-shadow: 0 0 40px rgba(212, 165, 116, 0.3);
    }
    
    h1 {
      color: #FFD700;
      font-size: clamp(18px, 4vw, 24px);
      margin-bottom: 10px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    
    .subtitle {
      color: #2D9596;
      font-size: clamp(12px, 2.5vw, 14px);
      text-align: center;
      margin-bottom: 30px;
      font-style: italic;
    }
    
    .form-group {
      margin-bottom: 25px;
    }
    
    label {
      display: block;
      color: #FFD700;
      margin-bottom: 8px;
      font-size: clamp(14px, 2.5vw, 16px);
    }
    
    select, textarea {
      width: 100%;
      background: #000;
      border: 1px solid #2D9596;
      color: #D4A574;
      padding: 12px;
      font-family: 'Courier New', monospace;
      font-size: 16px;
      border-radius: 0;
    }
    
    select {
      cursor: pointer;
      height: 50px;
    }
    
    textarea {
      min-height: 120px;
      resize: vertical;
    }
    
    select:focus, textarea:focus {
      outline: none;
      border-color: #FFD700;
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
    }
    
    .radio-group {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
    }
    
    .radio-option {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: clamp(13px, 2.5vw, 15px);
    }
    
    input[type="radio"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    
    button {
      width: 100%;
      background: #7B68EE;
      color: #FFD700;
      border: none;
      padding: 16px;
      font-family: 'Courier New', monospace;
      font-size: clamp(16px, 3vw, 18px);
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.2s;
      min-height: 50px;
    }
    
    button:hover {
      background: #9A89F5;
      box-shadow: 0 0 20px rgba(123, 104, 238, 0.5);
    }
    
    button:active {
      transform: scale(0.98);
    }
    
    .status {
      margin-top: 20px;
      padding: 15px;
      background: #1a1a1a;
      border-left: 3px solid #2D9596;
      color: #2D9596;
      font-size: clamp(13px, 2.5vw, 15px);
      min-height: 60px;
      display: flex;
      align-items: center;
    }
    
    .case-number {
      color: #FFD700;
      font-weight: bold;
    }
    
    .disclaimer {
      margin-top: 20px;
      font-size: clamp(11px, 2vw, 12px);
      color: #666;
      text-align: center;
      font-style: italic;
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    
    .shake {
      animation: shake 0.3s ease-in-out;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚠ Noise Complaint</h1>
    <div class="subtitle">Internal Disturbance Report Form</div>
    
    <form id="complaintForm">
      <div class="form-group">
        <label for="noiseType">Type of Noise:</label>
        <select id="noiseType" required>
          <option value="">Select complaint type...</option>
          <option value="song">Song Stuck On Repeat (won't stop playing)</option>
          <option value="memory">Embarrassing Memory (3am replay)</option>
          <option value="conversation">That One Conversation From 2012</option>
          <option value="voice">Voice Saying You Forgot Something (won't say what)</option>
          <option value="word">Random Word Repeating Endlessly</option>
          <option value="monologue">Internal Monologue Won't Shut Up</option>
          <option value="anxiety">Generalized Background Anxiety Hum</option>
          <option value="cringe">Cringe Compilation Playing On Loop</option>
          <option value="todo">List Of Everything You Should Be Doing</option>
          <option value="other">Other (existential dread, etc.)</option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="description">Describe the noise:</label>
        <textarea id="description" placeholder="e.g., 'Call Me Maybe' has been playing continuously since 2012. I need it to stop. Please.'" required></textarea>
      </div>
      
      <div class="form-group">
        <label>Severity Level:</label>
        <div class="radio-group">
          <label class="radio-option">
            <input type="radio" name="severity" value="minor" required>
            <span>Minor Annoyance</span>
          </label>
          <label class="radio-option">
            <input type="radio" name="severity" value="moderate">
            <span>Can't Focus</span>
          </label>
          <label class="radio-option">
            <input type="radio" name="severity" value="severe">
            <span>Losing Sleep</span>
          </label>
          <label class="radio-option">
            <input type="radio" name="severity" value="critical">
            <span>Existential Crisis</span>
          </label>
        </div>
      </div>
      
      <div class="form-group">
        <label for="duration">Duration:</label>
        <select id="duration" required>
          <option value="">How long has this been happening?</option>
          <option value="minutes">Past 5 minutes</option>
          <option value="hours">Past few hours</option>
          <option value="days">Several days</option>
          <option value="weeks">Weeks now</option>
          <option value="months">Multiple months</option>
          <option value="years">Years (please help)</option>
          <option value="forever">Since childhood</option>
        </select>
      </div>
      
      <button type="submit">FILE COMPLAINT</button>
    </form>
    
    <div class="status" id="status">
      Awaiting submission...
    </div>
    
    <div class="disclaimer">
      Note: Filing a complaint does not guarantee resolution. Your brain reserves the right to continue operations as normal.
    </div>
  </div>
  
  <script>
    const responses = [
      "Complaint filed. Noise will continue.",
      "Request denied. Your brain will not be taking further questions.",
      "We have reviewed your complaint and found it to be accurate. No action will be taken.",
      "Thank you for your feedback. The noise has been noted and will persist.",
      "Complaint received. Volume increased by 20%.",
      "Your case has been assigned to: Nobody. Estimated resolution: Never.",
      "We understand your frustration. Unfortunately, the noise is essential to operations.",
      "Complaint forwarded to: The Void. Do not expect a response.",
      "Thank you for filing. Your brain has elected to ignore this complaint.",
      "Request processed. The noise will now play in higher definition.",
      "Complaint acknowledged. New noise has been added to compensate.",
      "We have investigated and determined: You did this to yourself.",
      "Your complaint is valid. Your brain simply does not care.",
      "Thank you for your patience. The noise is working as intended.",
      "Complaint rejected. Have you tried just not thinking about it?",
      "We regret to inform you: This is permanent."
    ];
    
    let audioStarted = false;
    let audioContext;
    
    function playErrorTone() {
      if (!audioContext) return;
      
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      
      osc.connect(gain);
      gain.connect(audioContext.destination);
      
      osc.frequency.value = 200;
      osc.type = 'sawtone';
      
      gain.gain.setValueAtTime(0.1, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
      
      osc.start();
      osc.stop(audioContext.currentTime + 0.3);
    }
    
    function generateCaseNumber() {
      const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      const randomLetter = letters[Math.floor(Math.random() * letters.length)];
      const randomNum = Math.floor(Math.random() * 900000) + 100000;
      return `${randomLetter}${randomNum}`;
    }
    
    document.getElementById('complaintForm').addEventListener('submit', (e) => {
      e.preventDefault();
      
      // Start audio on first interaction
      if (!audioStarted) {
        audioContext = new AudioContext();
        audioStarted = true;
      }
      
      const container = document.querySelector('.container');
      container.classList.add('shake');
      setTimeout(() => container.classList.remove('shake'), 300);
      
      playErrorTone();
      
      const caseNum = generateCaseNumber();
      const response = responses[Math.floor(Math.random() * responses.length)];
      
      document.getElementById('status').innerHTML = `
        <span class="case-number">CASE #${caseNum}:</span> ${response}
      `;
    });
    
    // Prevent actual form submission
    document.querySelectorAll('select, textarea, input').forEach(el => {
      el.addEventListener('change', () => {
        if (!audioStarted) {
          audioContext = new AudioContext();
          audioStarted = true;
        }
      });
    });
  </script>
</body>
</html>
