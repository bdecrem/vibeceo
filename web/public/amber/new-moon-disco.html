<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEW MOON DISCO</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    overflow: hidden;
    height: 100vh;
    cursor: crosshair;
    font-family: 'Courier New', monospace;
  }

  .moon {
    position: fixed;
    top: 50%; left: 50%;
    width: 200px; height: 200px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, #222, #000);
    box-shadow:
      0 0 60px rgba(255, 100, 255, 0.3),
      0 0 120px rgba(100, 200, 255, 0.15),
      inset 0 0 40px rgba(255, 255, 255, 0.05);
    animation: moonPulse 3s ease-in-out infinite, moonSpin 20s linear infinite;
    z-index: 10;
  }

  @keyframes moonPulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 60px rgba(255,100,255,0.3), 0 0 120px rgba(100,200,255,0.15); }
    50% { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 100px rgba(255,100,255,0.6), 0 0 200px rgba(100,200,255,0.3); }
  }

  @keyframes moonSpin {
    to { filter: hue-rotate(360deg); }
  }

  .ring {
    position: fixed;
    top: 50%; left: 50%;
    border: 2px solid;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    animation: ringExpand 4s ease-out infinite;
    pointer-events: none;
  }

  .ring:nth-child(1) { border-color: #ff006e; animation-delay: 0s; }
  .ring:nth-child(2) { border-color: #fb5607; animation-delay: 0.5s; }
  .ring:nth-child(3) { border-color: #ffbe0b; animation-delay: 1s; }
  .ring:nth-child(4) { border-color: #8338ec; animation-delay: 1.5s; }
  .ring:nth-child(5) { border-color: #3a86ff; animation-delay: 2s; }
  .ring:nth-child(6) { border-color: #06d6a0; animation-delay: 2.5s; }
  .ring:nth-child(7) { border-color: #ff006e; animation-delay: 3s; }
  .ring:nth-child(8) { border-color: #fb5607; animation-delay: 3.5s; }

  @keyframes ringExpand {
    0% { width: 200px; height: 200px; opacity: 1; border-width: 3px; }
    100% { width: 1200px; height: 1200px; opacity: 0; border-width: 0.5px; }
  }

  .dancer {
    position: fixed;
    font-size: 40px;
    animation: dance 1.5s ease-in-out infinite alternate;
    z-index: 5;
    user-select: none;
    filter: drop-shadow(0 0 10px currentColor);
  }

  @keyframes dance {
    0% { transform: translateY(0) rotate(-15deg) scale(1); }
    25% { transform: translateY(-30px) rotate(10deg) scale(1.2); }
    50% { transform: translateY(-10px) rotate(-5deg) scale(0.9); }
    75% { transform: translateY(-40px) rotate(20deg) scale(1.3); }
    100% { transform: translateY(0) rotate(-10deg) scale(1); }
  }

  .stripe {
    position: fixed;
    height: 4px;
    animation: stripeSlide 2s ease-in-out infinite alternate;
    pointer-events: none;
    border-radius: 2px;
  }

  @keyframes stripeSlide {
    0% { transform: translateX(-100vw) scaleX(0.5); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateX(100vw) scaleX(0.5); opacity: 0; }
  }

  .glyph {
    position: fixed;
    color: rgba(255,255,255,0.08);
    font-size: 80px;
    font-weight: 900;
    animation: glyphFloat 8s ease-in-out infinite;
    pointer-events: none;
    z-index: 1;
  }

  @keyframes glyphFloat {
    0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.05; }
    50% { transform: translateY(-50px) rotate(180deg); opacity: 0.15; }
  }

  .title {
    position: fixed;
    bottom: 30px;
    width: 100%;
    text-align: center;
    font-size: 14px;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    z-index: 20;
    animation: titleGlow 3s ease-in-out infinite alternate;
  }

  @keyframes titleGlow {
    0% { color: rgba(255,100,255,0.3); text-shadow: 0 0 20px rgba(255,100,255,0.2); }
    100% { color: rgba(100,200,255,0.5); text-shadow: 0 0 40px rgba(100,200,255,0.3); }
  }

  .sparkle {
    position: fixed;
    width: 4px; height: 4px;
    background: white;
    border-radius: 50%;
    pointer-events: none;
    animation: sparkle 0.8s ease-out forwards;
    z-index: 30;
  }

  @keyframes sparkle {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(0); opacity: 0; }
  }

  .floor-tile {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 30%;
    background: repeating-conic-gradient(#111 0% 25%, #0a0a0a 0% 50%) 50% / 60px 60px;
    transform: perspective(500px) rotateX(60deg);
    transform-origin: bottom;
    opacity: 0.4;
    animation: floorShift 4s linear infinite;
    z-index: 0;
  }

  @keyframes floorShift {
    to { background-position: 60px 60px; }
  }

  .beam {
    position: fixed;
    top: 0;
    width: 3px;
    height: 100vh;
    opacity: 0;
    animation: beamSweep 6s ease-in-out infinite;
    z-index: 2;
  }

  @keyframes beamSweep {
    0% { left: -5%; opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.6; }
    100% { left: 105%; opacity: 0; }
  }
</style>
</head>
<body>

<div class="moon"></div>

<div class="ring"></div>
<div class="ring"></div>
<div class="ring"></div>
<div class="ring"></div>
<div class="ring"></div>
<div class="ring"></div>
<div class="ring"></div>
<div class="ring"></div>

<div class="floor-tile"></div>

<div class="title">new moon disco — 🔮 amber</div>

<script>
  const colors = ['#ff006e','#fb5607','#ffbe0b','#8338ec','#3a86ff','#06d6a0','#ff595e','#00f5d4'];
  const emojis = ['◆','◇','●','○','▲','△','★','☆','♦','✦','⬡','⬢'];
  const body = document.body;

  // Dancers
  for (let i = 0; i < 12; i++) {
    const d = document.createElement('div');
    d.className = 'dancer';
    d.textContent = emojis[i % emojis.length];
    d.style.left = (5 + Math.random() * 90) + '%';
    d.style.top = (10 + Math.random() * 75) + '%';
    d.style.animationDelay = (Math.random() * 2) + 's';
    d.style.animationDuration = (1 + Math.random() * 1.5) + 's';
    d.style.color = colors[i % colors.length];
    body.appendChild(d);
  }

  // Stripes
  for (let i = 0; i < 8; i++) {
    const s = document.createElement('div');
    s.className = 'stripe';
    s.style.top = (10 + Math.random() * 80) + '%';
    s.style.width = (100 + Math.random() * 400) + 'px';
    s.style.background = colors[i % colors.length];
    s.style.animationDelay = (Math.random() * 3) + 's';
    s.style.animationDuration = (1.5 + Math.random() * 3) + 's';
    s.style.opacity = 0.4 + Math.random() * 0.4;
    body.appendChild(s);
  }

  // Background glyphs
  const glyphs = ['DISCO','MOON','NEW','🌑','DARK','GLOW','FUNK'];
  for (let i = 0; i < 7; i++) {
    const g = document.createElement('div');
    g.className = 'glyph';
    g.textContent = glyphs[i];
    g.style.left = (Math.random() * 90) + '%';
    g.style.top = (Math.random() * 80) + '%';
    g.style.animationDelay = (Math.random() * 8) + 's';
    g.style.transform = `rotate(${Math.random() * 360}deg)`;
    body.appendChild(g);
  }

  // Beams
  for (let i = 0; i < 4; i++) {
    const b = document.createElement('div');
    b.className = 'beam';
    b.style.background = colors[i * 2];
    b.style.animationDelay = (i * 1.5) + 's';
    b.style.animationDuration = (4 + Math.random() * 4) + 's';
    b.style.filter = `blur(${1 + Math.random() * 3}px)`;
    body.appendChild(b);
  }

  // Mouse sparkles
  document.addEventListener('mousemove', (e) => {
    for (let i = 0; i < 3; i++) {
      const s = document.createElement('div');
      s.className = 'sparkle';
      s.style.left = (e.clientX + (Math.random() - 0.5) * 30) + 'px';
      s.style.top = (e.clientY + (Math.random() - 0.5) * 30) + 'px';
      s.style.background = colors[Math.floor(Math.random() * colors.length)];
      s.style.width = s.style.height = (2 + Math.random() * 6) + 'px';
      body.appendChild(s);
      setTimeout(() => s.remove(), 800);
    }
  });

  // Click burst
  document.addEventListener('click', (e) => {
    for (let i = 0; i < 20; i++) {
      const s = document.createElement('div');
      s.className = 'sparkle';
      const angle = (Math.PI * 2 * i) / 20;
      const dist = 20 + Math.random() * 60;
      s.style.left = (e.clientX + Math.cos(angle) * dist) + 'px';
      s.style.top = (e.clientY + Math.sin(angle) * dist) + 'px';
      s.style.background = colors[Math.floor(Math.random() * colors.length)];
      s.style.width = s.style.height = (3 + Math.random() * 8) + 'px';
      body.appendChild(s);
      setTimeout(() => s.remove(), 800);
    }
  });
</script>
</body>
</html>
