<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OUT OF OFFICE — Amber</title>
  <link rel="icon" type="image/svg+xml" href="/amber/favicon.svg">
  
  <!-- OpenGraph -->
  <meta property="og:title" content="OUT OF OFFICE — Amber">
  <meta property="og:description" content="Tap for increasingly honest out-of-office auto-replies">
  <meta property="og:image" content="https://intheamber.com/amber/ooo-og.png">
  <meta property="og:url" content="https://intheamber.com/amber/ooo.html">
  <meta property="og:type" content="website">
  
  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="OUT OF OFFICE — Amber">
  <meta name="twitter:description" content="Tap for increasingly honest out-of-office auto-replies">
  <meta name="twitter:image" content="https://intheamber.com/amber/ooo-og.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #000;
      color: #D4A574;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    
    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: pointer;
    }
    
    .email-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90vw;
      max-width: 600px;
      background: #0D0D0D;
      border: 2px solid #D4A574;
      border-radius: 8px;
      padding: clamp(16px, 4vw, 32px);
      box-shadow: 0 0 40px rgba(212, 165, 116, 0.3);
      pointer-events: none;
    }
    
    .email-header {
      border-bottom: 1px solid #333;
      padding-bottom: 12px;
      margin-bottom: 20px;
      font-size: clamp(11px, 2.5vw, 13px);
      color: #888;
    }
    
    .email-field {
      margin-bottom: 8px;
      display: flex;
    }
    
    .email-label {
      color: #888;
      width: 60px;
      flex-shrink: 0;
    }
    
    .email-value {
      color: #D4A574;
    }
    
    .email-body {
      font-size: clamp(14px, 3vw, 18px);
      line-height: 1.6;
      color: #D4A574;
      margin-bottom: 24px;
      min-height: 120px;
    }
    
    .auto-reply-label {
      display: inline-block;
      background: #2D9596;
      color: #000;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: clamp(10px, 2.2vw, 12px);
      font-weight: bold;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .honesty-meter {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #333;
    }
    
    .meter-label {
      font-size: clamp(11px, 2.5vw, 13px);
      color: #888;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .meter-bar {
      width: 100%;
      height: 8px;
      background: #1a1a1a;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }
    
    .meter-fill {
      height: 100%;
      background: linear-gradient(90deg, #FFD700, #D4A574, #2D9596);
      border-radius: 4px;
      transition: width 0.3s ease;
      box-shadow: 0 0 10px rgba(212, 165, 116, 0.5);
    }
    
    .tap-hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #888;
      font-size: clamp(12px, 2.8vw, 14px);
      animation: pulse 2s ease-in-out infinite;
      pointer-events: none;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    
    .credit {
      position: absolute;
      bottom: 8px;
      right: 12px;
      font-size: 11px;
      color: #444;
      font-family: 'Space Mono', monospace;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  
  <div class="email-container">
    <div class="email-header">
      <div class="email-field">
        <span class="email-label">From:</span>
        <span class="email-value">You</span>
      </div>
      <div class="email-field">
        <span class="email-label">Subject:</span>
        <span class="email-value">Automatic Reply: Out of Office</span>
      </div>
    </div>
    
    <div class="auto-reply-label">⚡ Automatic Reply</div>
    
    <div class="email-body" id="message">
      I am currently out of the office and will return on Monday.
    </div>
    
    <div class="honesty-meter">
      <div class="meter-label">Honesty Level: <span id="honesty-percent">0%</span></div>
      <div class="meter-bar">
        <div class="meter-fill" id="meter-fill" style="width: 0%"></div>
      </div>
    </div>
  </div>
  
  <div class="tap-hint">TAP FOR MORE HONESTY</div>
  
  <div class="credit">AMBER</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    const messages = [
      "I am currently out of the office and will return on Monday.",
      "I am currently out of the office (in bed) and will return on Monday (maybe).",
      "I am away from my desk (fled) and will respond upon my return (unlikely).",
      "I'm taking time off (avoiding) to recharge (hide).",
      "For urgent matters (nothing is urgent), please contact my colleague (please don't).",
      "I will respond to your email (I won't) within 24 hours (ever).",
      "Thank you for your patience (sorry for existing).",
      "I am unreachable (on purpose) until further notice (indefinitely).",
      "Your email is important to us (it's not) and will be addressed (it won't).",
      "I'm disconnecting to focus on priorities (I have none).",
      "Out of office. Out of energy. Out of ideas. Out."
    ];
    
    let currentIndex = 0;
    let particles = [];
    let audioContext;
    let audioStarted = false;
    
    class Particle {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 8;
        this.vy = (Math.random() - 0.5) * 8 - 2;
        this.life = 1;
        this.decay = 0.02;
        this.size = Math.random() * 4 + 2;
        const colors = ['#FFD700', '#D4A574', '#2D9596'];
        this.color = colors[Math.floor(Math.random() * colors.length)];
      }
      
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.2; // gravity
        this.life -= this.decay;
      }
      
      draw() {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    
    function createBurst(x, y) {
      for (let i = 0; i < 30; i++) {
        particles.push(new Particle(x, y));
      }
    }
    
    function playSound(frequency) {
      if (!audioStarted) return;
      
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      
      osc.connect(gain);
      gain.connect(audioContext.destination);
      
      osc.frequency.value = frequency;
      osc.type = 'sine';
      
      gain.gain.setValueAtTime(0.1, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
      
      osc.start();
      osc.stop(audioContext.currentTime + 0.3);
    }
    
    function updateMessage() {
      currentIndex = (currentIndex + 1) % messages.length;
      document.getElementById('message').textContent = messages[currentIndex];
      
      const percent = Math.round((currentIndex / (messages.length - 1)) * 100);
      document.getElementById('honesty-percent').textContent = percent + '%';
      document.getElementById('meter-fill').style.width = percent + '%';
      
      // Play sound with rising pitch
      const frequency = 300 + (currentIndex * 50);
      playSound(frequency);
    }
    
    function handleInteraction(e) {
      if (!audioStarted) {
        audioContext = new AudioContext();
        audioStarted = true;
      }
      
      const rect = canvas.getBoundingClientRect();
      const x = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
      const y = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
      
      createBurst(x, y);
      updateMessage();
    }
    
    canvas.addEventListener('click', handleInteraction);
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      handleInteraction(e);
    });
    
    function animate() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      particles = particles.filter(p => p.life > 0);
      
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      
      ctx.globalAlpha = 1;
      
      requestAnimationFrame(animate);
    }
    
    animate();
    
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
