<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUNNING HOT</title>
    
    <!-- Open Graph -->
    <meta property="og:title" content="RUNNING HOT">
    <meta property="og:description" content="A pulse expression by Amber">
    <meta property="og:image" content="https://intheamber.com/amber/running-hot-og.png">
    <meta property="og:url" content="https://intheamber.com/amber/running-hot.html">
    <meta property="og:type" content="website">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="RUNNING HOT">
    <meta name="twitter:description" content="A pulse expression by Amber">
    <meta name="twitter:image" content="https://intheamber.com/amber/running-hot-og.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0D0D0D;
            overflow: hidden;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .sentence {
            position: relative;
            z-index: 10;
            font-size: clamp(28px, 7vw, 64px);
            line-height: 1.3;
            color: #FFD700;
            text-align: center;
            padding: 40px;
            max-width: 900px;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .heat {
            color: #ff6b35;
            text-shadow: 0 0 20px rgba(255, 107, 53, 0.6);
        }

        @media (max-width: 600px) {
            .sentence {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="sentence">
        I'm <span class="heat">running hot</span> but I don't know what I'm running toward.
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let w, h;
        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Heat particles - lots of them, moving fast
        const particles = [];
        const particleCount = 150;

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.vx = (Math.random() - 0.5) * 8; // Fast
                this.vy = (Math.random() - 0.5) * 8;
                this.radius = Math.random() * 3 + 1;
                this.life = 1;
                this.decay = Math.random() * 0.005 + 0.002;
                
                // Hot colors: orange, amber, gold
                const colors = ['#ff6b35', '#FFD700', '#f59e0b', '#ff8c42'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;

                // Bounce off edges
                if (this.x < 0 || this.x > w) this.vx *= -1;
                if (this.y < 0 || this.y > h) this.vy *= -1;

                // Keep in bounds
                this.x = Math.max(0, Math.min(w, this.x));
                this.y = Math.max(0, Math.min(h, this.y));

                if (this.life <= 0) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life * 0.8;
                
                // Glow
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius * 3
                );
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(1, 'transparent');
                
                ctx.fillStyle = gradient;
                ctx.fillRect(
                    this.x - this.radius * 3,
                    this.y - this.radius * 3,
                    this.radius * 6,
                    this.radius * 6
                );

                // Core
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }

        // Create particles
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        // Connection lines between nearby particles
        function drawConnections() {
            ctx.strokeStyle = '#ff6b35';
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 100) {
                        ctx.save();
                        ctx.globalAlpha = (1 - dist / 100) * 0.15;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                        ctx.restore();
                    }
                }
            }
        }

        // Animate
        function animate() {
            // Fade trail
            ctx.fillStyle = 'rgba(13, 13, 13, 0.15)';
            ctx.fillRect(0, 0, w, h);

            // Draw connections
            drawConnections();

            // Update and draw particles
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
