<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TIDEPOOL — Amber</title>
<meta name="description" content="Bioluminescent creatures in the dark. Touch the water.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔮</text></svg>">
<meta property="og:title" content="TIDEPOOL — Amber">
<meta property="og:description" content="Bioluminescent creatures in the dark. Touch the water.">
<meta property="og:image" content="https://intheamber.com/amber/og/tidepool.png">
<meta property="og:url" content="https://intheamber.com/amber/tidepool.html">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@intheamber">
<meta name="twitter:title" content="TIDEPOOL">
<meta name="twitter:description" content="Bioluminescent creatures in the dark. Touch the water.">
<meta name="twitter:image" content="https://intheamber.com/amber/og/tidepool.png">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a12; touch-action: none; }
canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx.scale(dpr, dpr);
}
resize();
window.addEventListener('resize', resize);

const palette = [
  [45, 149, 150],   // teal
  [20, 184, 166],   // bright teal
  [59, 130, 246],   // electric blue
  [139, 92, 246],   // purple
  [236, 72, 153],   // pink
  [132, 204, 22],   // lime
];

class Creature {
  constructor(x, y, fast) {
    this.x = x ?? Math.random() * W;
    this.y = y ?? Math.random() * H;
    this.vx = (Math.random() - 0.5) * (fast ? 1.5 : 0.3);
    this.vy = (Math.random() - 0.5) * (fast ? 1.5 : 0.3);
    this.size = 1.5 + Math.random() * 2.5;
    this.color = palette[Math.floor(Math.random() * palette.length)];
    this.phase = Math.random() * Math.PI * 2;
    this.pulseSpeed = 0.008 + Math.random() * 0.015;
    this.trail = [];
    this.maxTrail = 12 + Math.floor(Math.random() * 10);
    this.wobble = 0.002 + Math.random() * 0.004;
    this.life = 1;
    this.decaying = false;
  }
  update(t) {
    this.phase += this.pulseSpeed;
    this.vx += (Math.random() - 0.5) * this.wobble;
    this.vy += (Math.random() - 0.5) * this.wobble;
    const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    if (speed > 0.8) { this.vx *= 0.98; this.vy *= 0.98; }
    this.x += this.vx; this.y += this.vy;
    if (this.x < -20) this.x = W + 20;
    if (this.x > W + 20) this.x = -20;
    if (this.y < -20) this.y = H + 20;
    if (this.y > H + 20) this.y = -20;
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > this.maxTrail) this.trail.shift();
    if (this.decaying) {
      this.life -= 0.003;
      if (this.life <= 0) return false;
    }
    return true;
  }
  draw(ctx) {
    const glow = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(this.phase));
    const [r, g, b] = this.color;
    const a = glow * this.life;
    // trail
    for (let i = 0; i < this.trail.length - 1; i++) {
      const t = i / this.trail.length;
      ctx.beginPath();
      ctx.arc(this.trail[i].x, this.trail[i].y, this.size * t * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${r},${g},${b},${t * 0.15 * a})`;
      ctx.fill();
    }
    // body glow
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 6);
    grad.addColorStop(0, `rgba(${r},${g},${b},${0.4 * a})`);
    grad.addColorStop(0.3, `rgba(${r},${g},${b},${0.1 * a})`);
    grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 6, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
    // core
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * glow, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${Math.min(255,r+80)},${Math.min(255,g+80)},${Math.min(255,b+80)},${0.9 * a})`;
    ctx.fill();
  }
}

class Ripple {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.radius = 0;
    this.maxRadius = 80 + Math.random() * 60;
    this.life = 1;
    this.color = palette[Math.floor(Math.random() * palette.length)];
  }
  update() {
    this.radius += 0.8;
    this.life = 1 - this.radius / this.maxRadius;
    return this.life > 0;
  }
  draw(ctx) {
    const [r, g, b] = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(${r},${g},${b},${this.life * 0.3})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}

let creatures = [];
let ripples = [];
const BASE_COUNT = 35;

for (let i = 0; i < BASE_COUNT; i++) creatures.push(new Creature());

function addTouch(x, y) {
  ripples.push(new Ripple(x, y));
  // spawn 2-4 tiny creatures at touch point
  const n = 2 + Math.floor(Math.random() * 3);
  for (let i = 0; i < n; i++) {
    const c = new Creature(x + (Math.random()-0.5)*20, y + (Math.random()-0.5)*20, true);
    c.size = 1 + Math.random() * 1.5;
    c.decaying = true;
    creatures.push(c);
  }
  // nudge nearby creatures
  creatures.forEach(c => {
    const dx = c.x - x, dy = c.y - y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 120 && dist > 0) {
      const force = (120 - dist) / 120 * 0.8;
      c.vx += (dx / dist) * force;
      c.vy += (dy / dist) * force;
    }
  });
}

canvas.addEventListener('pointerdown', e => addTouch(e.clientX, e.clientY));
canvas.addEventListener('pointermove', e => {
  if (e.pressure > 0) addTouch(e.clientX, e.clientY);
});

let t = 0;
function draw() {
  // slow fade instead of clear — creates trailing glow
  ctx.fillStyle = 'rgba(10, 10, 18, 0.12)';
  ctx.fillRect(0, 0, W, H);

  t++;
  creatures = creatures.filter(c => c.update(t));
  ripples = ripples.filter(r => r.update());

  ripples.forEach(r => r.draw(ctx));
  creatures.forEach(c => c.draw(ctx));

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
