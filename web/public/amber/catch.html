<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CATCH — Move the basket. Catch the stars. Avoid the void.</title>
  
  <!-- OG Tags -->
  <meta property="og:title" content="CATCH — Move the basket. Catch the stars. Avoid the void.">
  <meta property="og:description" content="An arcade game where falling stars must be caught and black holes must be avoided. Simple, addictive, increasingly frantic.">
  <meta property="og:image" content="https://intheamber.com/amber/catch-og.png">
  <meta property="og:url" content="https://intheamber.com/amber/catch.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="CATCH — Move the basket. Catch the stars. Avoid the void.">
  <meta name="twitter:description" content="An arcade game where falling stars must be caught and black holes must be avoided.">
  <meta name="twitter:image" content="https://intheamber.com/amber/catch-og.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #000;
      color: #D4A574;
      font-family: 'Space Mono', monospace;
      overflow: hidden;
      touch-action: none;
      user-select: none;
    }
    
    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: none;
    }
    
    #ui {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
      z-index: 10;
    }
    
    #score {
      font-size: 48px;
      font-weight: bold;
      color: #FFD700;
      text-shadow: 0 0 20px #FFD700;
    }
    
    #lives {
      font-size: 20px;
      margin-top: 10px;
      color: #D4A574;
    }
    
    #gameOver {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      background: rgba(0, 0, 0, 0.9);
      padding: 40px;
      border: 2px solid #D4A574;
      display: none;
      z-index: 20;
    }
    
    #gameOver h1 {
      font-size: 48px;
      color: #D4A574;
      margin-bottom: 20px;
    }
    
    #gameOver p {
      font-size: 20px;
      margin: 10px 0;
      color: #FFD700;
    }
    
    #gameOver button {
      margin-top: 30px;
      padding: 15px 40px;
      font-size: 20px;
      font-family: 'Space Mono', monospace;
      background: #D4A574;
      color: #000;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    #gameOver button:hover {
      background: #FFD700;
      transform: scale(1.05);
    }
    
    #instructions {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-size: 14px;
      color: #D4A574;
      opacity: 0.6;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  
  <div id="ui">
    <div id="score">0</div>
    <div id="lives">❤️ ❤️ ❤️</div>
  </div>
  
  <div id="gameOver">
    <h1>GAME OVER</h1>
    <p>Final Score: <span id="finalScore">0</span></p>
    <p id="bestScore"></p>
    <button onclick="restart()">PLAY AGAIN</button>
  </div>
  
  <div id="instructions">
    TAP LEFT/RIGHT TO MOVE • CATCH STARS • AVOID BLACK HOLES
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    // Audio context
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let audioReady = false;
    
    // Setup canvas
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    
    // Game state
    let gameRunning = true;
    let score = 0;
    let lives = 3;
    let bestScore = localStorage.getItem('catchBestScore') || 0;
    
    // Basket
    const basket = {
      x: canvas.width / 2,
      y: canvas.height - 80,
      width: 100,
      height: 20,
      speed: 15,
      targetX: canvas.width / 2
    };
    
    // Falling objects
    const fallingObjects = [];
    let spawnInterval = 800; // ms
    let lastSpawn = Date.now();
    let difficulty = 1;
    
    // Particles
    const particles = [];
    
    // Star types
    const starTypes = [
      { color: '#FFD700', points: 1, glow: 15 },      // Gold - 1 point
      { color: '#D4A574', points: 2, glow: 20 },      // Amber - 2 points
      { color: '#2D9596', points: 3, glow: 25 }       // Teal - 3 points
    ];
    
    // Touch/mouse controls
    let touching = false;
    
    canvas.addEventListener('touchstart', (e) => {
      audioReady = true;
      touching = true;
      handleInput(e.touches[0].clientX);
      e.preventDefault();
    });
    
    canvas.addEventListener('touchmove', (e) => {
      if (touching) {
        handleInput(e.touches[0].clientX);
      }
      e.preventDefault();
    });
    
    canvas.addEventListener('touchend', () => {
      touching = false;
    });
    
    canvas.addEventListener('mousedown', (e) => {
      audioReady = true;
      touching = true;
      handleInput(e.clientX);
    });
    
    canvas.addEventListener('mousemove', (e) => {
      if (touching) {
        handleInput(e.clientX);
      }
    });
    
    canvas.addEventListener('mouseup', () => {
      touching = false;
    });
    
    function handleInput(x) {
      basket.targetX = x;
    }
    
    // Spawn falling object
    function spawnObject() {
      const now = Date.now();
      if (now - lastSpawn < spawnInterval) return;
      lastSpawn = now;
      
      // 25% chance of black hole, 75% stars
      const isBlackHole = Math.random() < 0.25;
      
      if (isBlackHole) {
        fallingObjects.push({
          x: Math.random() * (canvas.width - 40) + 20,
          y: -30,
          size: 25,
          speed: 2 + difficulty * 0.5,
          type: 'blackhole',
          rotation: 0
        });
      } else {
        const starType = starTypes[Math.floor(Math.random() * starTypes.length)];
        fallingObjects.push({
          x: Math.random() * (canvas.width - 40) + 20,
          y: -30,
          size: 15,
          speed: 3 + difficulty * 0.5,
          type: 'star',
          starType: starType,
          twinkle: Math.random() * Math.PI * 2
        });
      }
      
      // Increase difficulty over time
      difficulty = Math.min(difficulty + 0.02, 3);
      spawnInterval = Math.max(400, 800 - difficulty * 100);
    }
    
    // Play sound
    function playSound(freq, duration = 0.1, type = 'sine') {
      if (!audioReady) return;
      
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      osc.frequency.value = freq;
      osc.type = type;
      
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
      
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + duration);
    }
    
    // Create particles
    function createParticles(x, y, color, count = 20) {
      for (let i = 0; i < count; i++) {
        particles.push({
          x,
          y,
          vx: (Math.random() - 0.5) * 8,
          vy: (Math.random() - 0.5) * 8 - 2,
          size: Math.random() * 3 + 1,
          color,
life: 1,
          decay: 0.02
        });
      }
    }
    
    // Check collision
    function checkCollision(obj) {
      return obj.x > basket.x - basket.width / 2 &&
             obj.x < basket.x + basket.width / 2 &&
             obj.y > basket.y - basket.height / 2 &&
             obj.y < basket.y + basket.height / 2;
    }
    
    // Update game
    function update() {
      if (!gameRunning) return;
      
      // Move basket toward target
      const dx = basket.targetX - basket.x;
      basket.x += dx * 0.2;
      
      // Keep basket in bounds
      basket.x = Math.max(basket.width / 2, Math.min(canvas.width - basket.width / 2, basket.x));
      
      // Spawn objects
      spawnObject();
      
      // Update falling objects
      for (let i = fallingObjects.length - 1; i >= 0; i--) {
        const obj = fallingObjects[i];
        obj.y += obj.speed;
        
        if (obj.type === 'star') {
          obj.twinkle += 0.1;
        } else {
          obj.rotation += 0.05;
        }
        
        // Check collision with basket
        if (checkCollision(obj)) {
          if (obj.type === 'star') {
            // Caught a star!
            score += obj.starType.points;
            playSound(440 + obj.starType.points * 110, 0.15);
            createParticles(obj.x, obj.y, obj.starType.color, 15);
          } else {
            // Hit a black hole!
            lives--;
            playSound(100, 0.3, 'sawtooth');
            createParticles(obj.x, obj.y, '#7B68EE', 30);
            
            if (lives <= 0) {
              endGame();
            }
          }
          
          fallingObjects.splice(i, 1);
          continue;
        }
        
        // Remove if off screen
        if (obj.y > canvas.height + 50) {
          fallingObjects.splice(i, 1);
        }
      }
      
      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.2; // gravity
        p.life -= p.decay;
        
        if (p.life <= 0) {
          particles.splice(i, 1);
        }
      }
      
      // Update UI
      document.getElementById('score').textContent = score;
      document.getElementById('lives').textContent = '❤️ '.repeat(Math.max(0, lives));
    }
    
    // Draw
    function draw() {
      // Clear with fade
      ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Draw falling objects
      fallingObjects.forEach(obj => {
        if (obj.type === 'star') {
          // Draw star with glow
          const twinkleScale = 1 + Math.sin(obj.twinkle) * 0.2;
          
          ctx.save();
          ctx.translate(obj.x, obj.y);
          ctx.scale(twinkleScale, twinkleScale);
          
          // Glow
          const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, obj.size * 2);
          gradient.addColorStop(0, obj.starType.color);
          gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
          ctx.fillStyle = gradient;
          ctx.fillRect(-obj.size * 2, -obj.size * 2, obj.size * 4, obj.size * 4);
          
          // Star shape
          ctx.fillStyle = obj.starType.color;
          ctx.shadowBlur = obj.starType.glow;
          ctx.shadowColor = obj.starType.color;
          ctx.beginPath();
          for (let i = 0; i < 5; i++) {
            const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
            const x = Math.cos(angle) * obj.size;
            const y = Math.sin(angle) * obj.size;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.closePath();
          ctx.fill();
          
          ctx.restore();
        } else {
          // Draw black hole
          ctx.save();
          ctx.translate(obj.x, obj.y);
          ctx.rotate(obj.rotation);
          
          // Outer glow
          const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, obj.size * 2);
          gradient.addColorStop(0, '#7B68EE');
          gradient.addColorStop(0.5, '#4B0082');
          gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
          ctx.fillStyle = gradient;
          ctx.fillRect(-obj.size * 2, -obj.size * 2, obj.size * 4, obj.size * 4);
          
          // Black center
          ctx.fillStyle = '#000';
          ctx.shadowBlur = 15;
          ctx.shadowColor = '#7B68EE';
          ctx.beginPath();
          ctx.arc(0, 0, obj.size, 0, Math.PI * 2);
          ctx.fill();
          
          // Spiral
          ctx.strokeStyle = '#7B68EE';
          ctx.lineWidth = 2;
          ctx.shadowBlur = 10;
          ctx.beginPath();
          for (let i = 0; i < 20; i++) {
            const angle = (i / 20) * Math.PI * 2;
            const radius = (i / 20) * obj.size;
            const x = Math.cos(angle) * radius;
            const y = Math.sin(angle) * radius;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.stroke();
          
          ctx.restore();
        }
      });
      
      // Draw particles
      ctx.shadowBlur = 0;
      particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
      });
      ctx.globalAlpha = 1;
      
      // Draw basket
      ctx.save();
      ctx.translate(basket.x, basket.y);
      
      // Glow
      ctx.shadowBlur = 20;
      ctx.shadowColor = '#D4A574';
      
      // Basket shape
      ctx.strokeStyle = '#D4A574';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(-basket.width / 2, -basket.height / 2);
      ctx.lineTo(-basket.width / 2, basket.height / 2);
      ctx.lineTo(-basket.width / 3, basket.height / 2);
      ctx.lineTo(-basket.width / 3, 0);
      ctx.lineTo(basket.width / 3, 0);
      ctx.lineTo(basket.width / 3, basket.height / 2);
      ctx.lineTo(basket.width / 2, basket.height / 2);
      ctx.lineTo(basket.width / 2, -basket.height / 2);
      ctx.closePath();
      ctx.stroke();
      
      // Fill
      ctx.fillStyle = 'rgba(212, 165, 116, 0.2)';
      ctx.fill();
      
      ctx.restore();
    }
    
    // Game loop
    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }
    
    // End game
    function endGame() {
      gameRunning = false;
      
      document.getElementById('finalScore').textContent = score;
      
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('catchBestScore', bestScore);
        document.getElementById('bestScore').innerHTML = '🏆 NEW RECORD!';
      } else {
        document.getElementById('bestScore').textContent = `Best: ${bestScore}`;
      }
      
      document.getElementById('gameOver').style.display = 'block';
      document.getElementById('instructions').style.display = 'none';
    }
    
    // Restart
    function restart() {
      gameRunning = true;
      score = 0;
      lives = 3;
      difficulty = 1;
      spawnInterval = 800;
      fallingObjects.length = 0;
      particles.length = 0;
      basket.x = canvas.width / 2;
      basket.targetX = canvas.width / 2;
      
      document.getElementById('gameOver').style.display = 'none';
      document.getElementById('instructions').style.display = 'block';
    }
    
    // Start
    gameLoop();
  </script>
</body>
</html>
