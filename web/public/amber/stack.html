<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STACK — Build it high</title>
  
  <!-- OG Tags -->
  <meta property="og:title" content="STACK — Build it high">
  <meta property="og:description" content="Tap to drop blocks. Stack them high. Don't miss.">
  <meta property="og:image" content="https://intheamber.com/amber/stack-og.png">
  <meta property="og:url" content="https://intheamber.com/amber/stack.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="STACK — Build it high">
  <meta name="twitter:description" content="Tap to drop blocks. Stack them high. Don't miss.">
  <meta name="twitter:image" content="https://intheamber.com/amber/stack-og.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #000;
      color: #D4A574;
      font-family: 'Space Mono', monospace;
      overflow: hidden;
      touch-action: manipulation;
    }

    #container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #canvas {
      display: block;
      background: #000;
      cursor: pointer;
      max-width: 100vw;
      max-height: 80vh;
    }

    #ui {
      position: absolute;
      top: 20px;
      left: 0;
      right: 0;
      text-align: center;
      pointer-events: none;
      z-index: 10;
    }

    #score {
      font-size: 3rem;
      color: #FFD700;
      text-shadow: 0 0 20px #FFD700;
      font-weight: bold;
      margin-bottom: 5px;
    }

    #highScore {
      font-size: 1rem;
      color: #D4A574;
      opacity: 0.7;
    }

    #status {
      position: absolute;
      bottom: 100px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 1.2rem;
      color: #2D9596;
      pointer-events: none;
      z-index: 10;
    }

    #startScreen, #gameOverScreen {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.95);
      z-index: 20;
    }

    #startScreen h1, #gameOverScreen h1 {
      font-size: 4rem;
      color: #FFD700;
      text-shadow: 0 0 30px #FFD700;
      margin-bottom: 20px;
    }

    #startScreen p, #gameOverScreen p {
      font-size: 1.2rem;
      color: #D4A574;
      margin-bottom: 30px;
      max-width: 80%;
      line-height: 1.6;
    }

    button {
      background: #D4A574;
      color: #000;
      border: none;
      padding: 15px 40px;
      font-size: 1.2rem;
      font-family: 'Space Mono', monospace;
      font-weight: bold;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s;
      pointer-events: all;
      min-width: 200px;
      min-height: 50px;
    }

    button:hover {
      background: #FFD700;
      transform: scale(1.05);
    }

    button:active {
      transform: scale(0.95);
    }

    #gameOverScreen .finalScore {
      font-size: 2rem;
      color: #FFD700;
      margin: 20px 0;
    }

    #gameOverScreen .newHigh {
      color: #FF1493;
      text-shadow: 0 0 20px #FF1493;
    }

    @media (max-width: 768px) {
      #score {
        font-size: 2rem;
      }
      #startScreen h1, #gameOverScreen h1 {
        font-size: 2.5rem;
      }
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="ui">
      <div id="score">0</div>
      <div id="highScore">HIGH: 0</div>
    </div>
    
    <div id="status"></div>
    
    <canvas id="canvas"></canvas>
    
    <div id="startScreen">
      <h1>STACK</h1>
      <p>Tap to drop blocks.<br>Stack them high.<br>Perfect drops = bonus points.<br>Don't miss.</p>
      <button id="startBtn">START</button>
    </div>
    
    <div id="gameOverScreen" style="display: none;">
      <h1>STACK FELL</h1>
      <div class="finalScore"></div>
      <p></p>
      <button id="retryBtn">TRY AGAIN</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('highScore');
    const statusEl = document.getElementById('status');
    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const startBtn = document.getElementById('startBtn');
    const retryBtn = document.getElementById('retryBtn');

    // Set canvas size
    const setCanvasSize = () => {
      const maxWidth = Math.min(window.innerWidth, 600);
      const maxHeight = Math.min(window.innerHeight * 0.8, 800);
      canvas.width = maxWidth;
      canvas.height = maxHeight;
    };
    setCanvasSize();
    window.addEventListener('resize', setCanvasSize);

    // Audio context
    let audioContext;
    const initAudio = () => {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
    };

    // Sound functions
    const playDrop = () => {
      if (!audioContext) return;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc.connect(gain);
      gain.connect(audioContext.destination);
      osc.frequency.value = 440;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.3, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
      osc.start();
      osc.stop(audioContext.currentTime + 0.1);
    };

    const playPerfect = () => {
      if (!audioContext) return;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc.connect(gain);
      gain.connect(audioContext.destination);
      osc.frequency.value = 880;
      osc.type = 'triangle';
      gain.gain.setValueAtTime(0.4, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
      osc.start();
      osc.stop(audioContext.currentTime + 0.2);
    };

    const playGameOver = () => {
      if (!audioContext) return;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc.connect(gain);
      gain.connect(audioContext.destination);
      osc.frequency.setValueAtTime(440, audioContext.currentTime);
      osc.frequency.exponentialRampToValueAtTime(110, audioContext.currentTime + 0.5);
      osc.type = 'sawtooth';
      gain.gain.setValueAtTime(0.3, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
      osc.start();
      osc.stop(audioContext.currentTime + 0.5);
    };

    // Game state
    let gameState = 'start'; // start, playing, gameover
    let score = 0;
    let highScore = parseInt(localStorage.getItem('stack_highscore') || '0');
    let blocks = [];
    let currentBlock = null;
    let blockSpeed = 2;
    let direction = 1;
    let particles = [];

    // Colors
    const colors = ['#FFD700', '#D4A574', '#2D9596', '#7B68EE', '#FF1493', '#FF6B6B', '#00CED1', '#32CD32'];

    // Update high score display
    highScoreEl.textContent = `HIGH: ${highScore}`;

    // Block class
    class Block {
      constructor(x, y, width, height, color) {
        this.x = x;
        this.y = y;
        this.width = width;
        this.height = height;
        this.color = color;
        this.isMoving = false;
      }

      draw() {
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.width, this.height);
        
        // Glow effect
        ctx.shadowBlur = 20;
        ctx.shadowColor = this.color;
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 2;
        ctx.strokeRect(this.x, this.y, this.width, this.height);
        ctx.shadowBlur = 0;
      }

      update() {
        if (this.isMoving) {
          this.x += blockSpeed * direction;
          
          // Bounce at edges
          if (this.x <= 0) {
            this.x = 0;
            direction = 1;
          } else if (this.x + this.width >= canvas.width) {
            this.x = canvas.width - this.width;
            direction = -1;
          }
        }
      }
    }

    // Particle class
    class Particle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 8;
        this.vy = (Math.random() - 0.5) * 8 - 2;
        this.color = color;
        this.life = 1;
        this.size = Math.random() * 4 + 2;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.2; // gravity
        this.life -= 0.02;
      }

      draw() {
        ctx.fillStyle = this.color;
        ctx.globalAlpha = this.life;
        ctx.fillRect(this.x, this.y, this.size, this.size);
        ctx.globalAlpha = 1;
      }
    }

    // Initialize game
    const initGame = () => {
      score = 0;
      blocks = [];
      particles = [];
      blockSpeed = 2;
      direction = 1;
      scoreEl.textContent = score;
      
      // First block (base)
      const baseWidth = 120;
      const baseHeight = 30;
      const baseBlock = new Block(
        canvas.width / 2 - baseWidth / 2,
        canvas.height - baseHeight - 10,
        baseWidth,
        baseHeight,
        colors[0]
      );
      blocks.push(baseBlock);
      
      // Spawn first moving block
      spawnBlock();
    };

    const spawnBlock = () => {
      const lastBlock = blocks[blocks.length - 1];
      const height = 30;
      const width = lastBlock.width;
      const y = lastBlock.y - height - 2;
      const color = colors[blocks.length % colors.length];
      
      currentBlock = new Block(0, y, width, height, color);
      currentBlock.isMoving = true;
      
      // Increase speed slightly
      blockSpeed = Math.min(2 + blocks.length * 0.1, 6);
    };

    const dropBlock = () => {
      if (!currentBlock || !currentBlock.isMoving) return;
      
      currentBlock.isMoving = false;
      const lastBlock = blocks[blocks.length - 1];
      
      // Check overlap
      const overlapLeft = Math.max(currentBlock.x, lastBlock.x);
      const overlapRight = Math.min(
        currentBlock.x + currentBlock.width,
        lastBlock.x + lastBlock.width
      );
      const overlap = overlapRight - overlapLeft;
      
      if (overlap <= 0) {
        // Complete miss - game over
        gameOver();
        return;
      }
      
      // Calculate how well centered the drop was
      const lastCenter = lastBlock.x + lastBlock.width / 2;
      const currentCenter = currentBlock.x + currentBlock.width / 2;
      const centerOffset = Math.abs(currentCenter - lastCenter);
      
      // Perfect drop bonus (within 5 pixels of center)
      if (centerOffset < 5) {
        score += 10;
        statusEl.textContent = 'PERFECT! +10';
        statusEl.style.color = '#FF1493';
        playPerfect();
        setTimeout(() => { statusEl.textContent = ''; }, 1000);
        
        // Perfect drop particles
        for (let i = 0; i < 30; i++) {
          particles.push(new Particle(
            currentCenter,
            currentBlock.y,
            '#FF1493'
          ));
        }
      } else {
        score += 1;
        playDrop();
        
        // Regular particles
        for (let i = 0; i < 15; i++) {
          particles.push(new Particle(
            currentBlock.x + currentBlock.width / 2,
            currentBlock.y,
            currentBlock.color
          ));
        }
      }
      
      scoreEl.textContent = score;
      
      // Trim block to overlap area
      currentBlock.x = overlapLeft;
      currentBlock.width = overlap;
      blocks.push(currentBlock);
      
      // Check if we need to scroll down
      if (blocks.length > 15) {
        const shift = 32;
        blocks.forEach(block => {
          block.y += shift;
        });
      }
      
      // Spawn next block
      if (currentBlock.y > 50) {
        spawnBlock();
      } else {
        gameOver();
      }
    };

    const gameOver = () => {
      gameState = 'gameover';
      playGameOver();
      
      const finalScoreEl = gameOverScreen.querySelector('.finalScore');
      const messageEl = gameOverScreen.querySelector('p');
      
      finalScoreEl.textContent = `SCORE: ${score}`;
      
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('stack_highscore', highScore);
        highScoreEl.textContent = `HIGH: ${highScore}`;
        finalScoreEl.classList.add('newHigh');
        messageEl.textContent = 'NEW HIGH SCORE!';
      } else {
        finalScoreEl.classList.remove('newHigh');
        const diff = highScore - score;
        messageEl.textContent = `${diff} away from your best.`;
      }
      
      gameOverScreen.style.display = 'flex';
    };

    // Game loop
    const gameLoop = () => {
      // Clear with fade
      ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      if (gameState === 'playing') {
        // Update current block
        if (currentBlock) {
          currentBlock.update();
          currentBlock.draw();
        }
        
        // Draw all placed blocks
        blocks.forEach(block => block.draw());
        
        // Update and draw particles
        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => {
          p.update();
          p.draw();
        });
      }
      
      requestAnimationFrame(gameLoop);
    };

    // Start game
    const startGame = () => {
      initAudio();
      gameState = 'playing';
      startScreen.style.display = 'none';
      gameOverScreen.style.display = 'none';
      initGame();
    };

    // Event listeners
    startBtn.addEventListener('click', startGame);
    retryBtn.addEventListener('click', startGame);

    canvas.addEventListener('click', () => {
      if (gameState === 'playing') {
        dropBlock();
      }
    });

    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (gameState === 'playing') {
        dropBlock();
      }
    });

    // Start game loop
    gameLoop();
  </script>
</body>
</html>
