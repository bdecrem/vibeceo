<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RISE — Amber</title>

  <!-- Open Graph -->
  <meta property="og:title" content="RISE">
  <meta property="og:description" content="Tap to spawn. Watch them rise. Hear them sing.">
  <meta property="og:image" content="https://intheamber.com/amber/rise-og.png">
  <meta property="og:url" content="https://intheamber.com/amber/rise.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@intheamber">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Space Mono', monospace;
      color: #D4A574;
      touch-action: none;
    }

    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: pointer;
    }

    #controls {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    #title {
      font-size: 2.5rem;
      font-weight: 700;
      color: #FFD700;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
      margin-bottom: 5px;
    }

    #subtitle {
      font-size: 0.9rem;
      color: #2D9596;
      letter-spacing: 2px;
    }

    button {
      background: #7B68EE;
      color: #000;
      border: none;
      padding: 15px 30px;
      font-size: 1.2rem;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      cursor: pointer;
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(123, 104, 238, 0.5);
      transition: all 0.2s;
      margin-top: 10px;
    }

    button:hover {
      background: #9B88FF;
      box-shadow: 0 0 30px rgba(123, 104, 238, 0.8);
      transform: scale(1.05);
    }

    button:active {
      transform: scale(0.95);
    }

    #stats {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.85rem;
      color: #D4A574;
      text-align: center;
      line-height: 1.6;
    }

    @media (max-width: 600px) {
      #title {
        font-size: 2rem;
      }

      #subtitle {
        font-size: 0.75rem;
      }

      button {
        padding: 12px 24px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div id="controls">
    <div id="title">RISE</div>
    <div id="subtitle">TAP TO SPAWN • WATCH THEM RISE • HEAR THEM SING</div>
    <button id="startBtn">START</button>
  </div>

  <canvas id="canvas"></canvas>

  <div id="stats">
    Rising: <span id="risingCount">0</span> •
    Notes Played: <span id="notesPlayed">0</span>
  </div>

  <script type="module">
    import { SH101Controller } from '/101/dist/api/index.js';

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const risingCountEl = document.getElementById('risingCount');
    const notesPlayedEl = document.getElementById('notesPlayed');

    let width = window.innerWidth;
    let height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;

    // State
    let audioStarted = false;
    let bubbles = [];
    let particles = [];
    let notesPlayed = 0;
    let synth = null;

    // Colors - full Amber palette
    const colors = [
      '#FFD700', // gold
      '#D4A574', // amber
      '#2D9596', // teal
      '#7B68EE', // violet
      '#FF69B4', // hot pink
      '#FF7F50', // coral
      '#00FFFF', // cyan
      '#00FF00'  // lime
    ];
    let colorIndex = 0;

    // D minor pentatonic scale (D4 to A5)
    const scale = [
      293.66, // D4
      329.63, // E4
      349.23, // F4
      392.00, // G4
      440.00, // A4
      587.33, // D5
      659.25, // E5
      698.46, // F5
      783.99, // G5
      880.00  // A5
    ];

    class Bubble {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.radius = 15 + Math.random() * 10;
        this.color = colors[colorIndex];
        colorIndex = (colorIndex + 1) % colors.length;

        // Map X position to scale index
        const scaleIndex = Math.floor((x / width) * scale.length);
        this.frequency = scale[Math.min(scaleIndex, scale.length - 1)];

        this.velocity = 1.5 + Math.random() * 0.5; // rise speed
        this.alpha = 1;
        this.wobble = Math.random() * Math.PI * 2;
        this.wobbleSpeed = 0.02 + Math.random() * 0.02;
      }

      update() {
        this.y -= this.velocity;
        this.wobble += this.wobbleSpeed;

        // Add subtle horizontal wobble
        this.x += Math.sin(this.wobble) * 0.3;

        return this.y + this.radius > 0; // alive while still visible
      }

      draw() {
        // Glow
        const gradient = ctx.createRadialGradient(
          this.x, this.y, 0,
          this.x, this.y, this.radius * 2
        );
        gradient.addColorStop(0, this.color + 'CC');
        gradient.addColorStop(0.5, this.color + '66');
        gradient.addColorStop(1, this.color + '00');

        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius * 2, 0, Math.PI * 2);
        ctx.fill();

        // Core bubble
        ctx.fillStyle = this.color + 'DD';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();

        // Highlight
        const highlight = ctx.createRadialGradient(
          this.x - this.radius * 0.3,
          this.y - this.radius * 0.3,
          0,
          this.x,
          this.y,
          this.radius
        );
        highlight.addColorStop(0, '#FFFFFF66');
        highlight.addColorStop(1, '#FFFFFF00');

        ctx.fillStyle = highlight;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
      }

      hasReachedTop() {
        return this.y - this.radius < 0;
      }

      pop() {
        // Play note
        if (synth) {
          synth.playNote(this.frequency, 0.6, { release: 1.0 });
        }

        notesPlayed++;
        notesPlayedEl.textContent = notesPlayed;

        // Create particle burst
        for (let i = 0; i < 30; i++) {
          const angle = (Math.PI * 2 * i) / 30;
          const speed = 2 + Math.random() * 3;
          particles.push({
            x: this.x,
            y: this.y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            color: this.color,
            alpha: 1,
            radius: 2 + Math.random() * 2,
            decay: 0.02 + Math.random() * 0.01
          });
        }
      }
    }

    function spawnBubble(x, y) {
      bubbles.push(new Bubble(x, y));
    }

    function updateParticles() {
      particles = particles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.alpha -= p.decay;

        if (p.alpha > 0) {
          ctx.fillStyle = p.color + Math.floor(p.alpha * 255).toString(16).padStart(2, '0');
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fill();
          return true;
        }
        return false;
      });
    }

    function animate() {
      // Fade trails
      ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
      ctx.fillRect(0, 0, width, height);

      // Update and draw bubbles
      bubbles = bubbles.filter(bubble => {
        const alive = bubble.update();

        if (bubble.hasReachedTop()) {
          bubble.pop();
          return false;
        }

        bubble.draw();
        return alive;
      });

      // Update particles
      updateParticles();

      // Update stats
      risingCountEl.textContent = bubbles.length;

      requestAnimationFrame(animate);
    }

    // Spawn bubbles on tap
    canvas.addEventListener('click', (e) => {
      if (!audioStarted) return;

      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      spawnBubble(x, y);
    });

    canvas.addEventListener('touchstart', (e) => {
      if (!audioStarted) return;
      e.preventDefault();

      const rect = canvas.getBoundingClientRect();
      const touch = e.touches[0];
      const x = touch.clientX - rect.left;
      const y = touch.clientY - rect.top;

      spawnBubble(x, y);
    });

    // Auto-spawn
    setInterval(() => {
      if (!audioStarted) return;

      const x = Math.random() * width;
      const y = height + 50;
      spawnBubble(x, y);
    }, 2000);

    // Start button
    startBtn.addEventListener('click', async () => {
      if (audioStarted) return;

      audioStarted = true;
      startBtn.style.display = 'none';

      // Initialize synth
      synth = new SH101Controller();
      await synth.init();

      // Spawn initial bubbles for hypnotic effect
      for (let i = 0; i < 5; i++) {
        setTimeout(() => {
          const x = Math.random() * width;
          const y = height + 50;
          spawnBubble(x, y);
        }, i * 400);
      }
    });

    // Handle resize
    window.addEventListener('resize', () => {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    });

    // Start hypnotic animation before audio
    animate();
  </script>
</body>
</html>
