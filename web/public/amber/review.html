<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>REVIEW — Performance Reviews for Objects</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><text y='28' font-size='28'>📋</text></svg>">
<meta property="og:title" content="REVIEW">
<meta property="og:description" content="Annual performance reviews for inanimate objects">
<meta property="og:image" content="https://intheamber.com/amber/og/review.png">
<meta property="og:url" content="https://intheamber.com/amber/review.html">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="REVIEW">
<meta name="twitter:description" content="Annual performance reviews for inanimate objects">
<meta name="twitter:image" content="https://intheamber.com/amber/og/review.png">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  color: #e0e0e0;
  font-family: 'Courier New', monospace;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  user-select: none;
  -webkit-user-select: none;
  overflow-x: hidden;
}
.header {
  text-align: center;
  margin-bottom: 10px;
  opacity: 0.5;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 4px;
}
.review-card {
  background: #16213e;
  border: 1px solid #0f3460;
  border-radius: 12px;
  padding: 28px 24px;
  max-width: 380px;
  width: 100%;
  position: relative;
  transition: all 0.3s ease;
}
.review-card::before {
  content: 'CONFIDENTIAL';
  position: absolute;
  top: 10px;
  right: 14px;
  font-size: 9px;
  color: #e94560;
  letter-spacing: 2px;
  opacity: 0.7;
}
.employee-name {
  font-size: 22px;
  font-weight: bold;
  color: #e94560;
  margin-bottom: 4px;
}
.department {
  font-size: 11px;
  color: #537895;
  margin-bottom: 18px;
  text-transform: uppercase;
  letter-spacing: 2px;
}
.metric {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  padding-bottom: 12px;
  border-bottom: 1px solid #0f346033;
}
.metric:last-of-type { border-bottom: none; }
.metric-name {
  font-size: 12px;
  color: #a0a0b0;
  flex: 1;
}
.stars {
  font-size: 16px;
  letter-spacing: 2px;
}
.feedback {
  background: #0f3460;
  border-radius: 8px;
  padding: 14px;
  margin-top: 16px;
  font-size: 13px;
  line-height: 1.6;
  color: #c0c0d0;
  font-style: italic;
}
.feedback::before {
  content: 'MANAGER NOTES:';
  display: block;
  font-size: 9px;
  color: #537895;
  letter-spacing: 2px;
  margin-bottom: 8px;
  font-style: normal;
}
.verdict {
  text-align: center;
  margin-top: 16px;
  padding: 10px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: bold;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.verdict.promoted { background: #1b4332; color: #52b788; }
.verdict.pip { background: #3d0814; color: #e94560; }
.verdict.lateral { background: #3d3400; color: #e9c46a; }
.next-btn {
  margin-top: 24px;
  background: none;
  border: 1px solid #0f3460;
  color: #537895;
  padding: 14px 32px;
  border-radius: 8px;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  cursor: pointer;
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.next-btn:active {
  background: #0f3460;
  color: #e0e0e0;
}
.counter {
  margin-top: 14px;
  font-size: 10px;
  color: #537895;
  letter-spacing: 2px;
}
.fade-in {
  animation: fadeIn 0.4s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
<div class="header">Annual Performance Review</div>

<div class="review-card fade-in" id="card"></div>

<button class="next-btn" id="nextBtn" onclick="nextReview()">Next Employee →</button>
<div class="counter" id="counter"></div>

<script>
const reviews = [
  {
    name: "The WiFi Router",
    dept: "Dept. of Broken Promises",
    metrics: [
      ["Reliability", 1],
      ["Attitude", 0.5],
      ["Communication", 2],
      ["Speed (Claimed)", 5],
      ["Speed (Actual)", 1]
    ],
    feedback: "Continues to gaslight the entire household about signal strength. Claims to be working 'fine on my end.' Has been caught napping during important Zoom calls. The blinking lights are performative at best.",
    verdict: "pip",
    verdictText: "Performance Improvement Plan"
  },
  {
    name: "The Fitted Sheet",
    dept: "Dept. of Psychological Warfare",
    metrics: [
      ["Cooperation", 0],
      ["Folding Compliance", 0],
      ["Corner Retention", 1.5],
      ["3AM Pop-Off Rate", 5],
      ["Emotional Damage", 4.5]
    ],
    feedback: "Refuses all attempts at folding. Has been observed spontaneously unraveling at 3 AM purely out of spite. When confronted, simply becomes a ball. Zero remorse. Possibly sentient and hostile.",
    verdict: "pip",
    verdictText: "Termination Under Review"
  },
  {
    name: "The Left Airpod",
    dept: "Dept. of Disappearances",
    metrics: [
      ["Attendance", 1],
      ["Battery Honesty", 2],
      ["Staying in Ear", 3],
      ["Being Findable", 0.5],
      ["Pairing on First Try", 1]
    ],
    feedback: "Takes more unexplained absences than any other employee. Battery says 80%, dies at 79%. Found between couch cushions claiming it 'fell.' We both know that's not what happened.",
    verdict: "lateral",
    verdictText: "Transferred to Lost & Found"
  },
  {
    name: "The Snooze Button",
    dept: "Dept. of Enabling",
    metrics: [
      ["Helpfulness", 1],
      ["Honesty", 0],
      ["Enabling Behavior", 5],
      ["Making Things Worse", 5],
      ["Emotional Support", 4]
    ],
    feedback: "A fundamentally dishonest employee. Promises '9 more minutes will help' knowing full well it won't. Has cost this household an estimated 47 morning routines. Charismatic but destructive.",
    verdict: "promoted",
    verdictText: "Promoted (Somehow)"
  },
  {
    name: "The Junk Drawer",
    dept: "Dept. of Forgotten Things",
    metrics: [
      ["Organization", 0],
      ["Mystery Items", 5],
      ["Contains What You Need", 2],
      ["Contains Dead Batteries", 5],
      ["Structural Integrity", 1.5]
    ],
    feedback: "Somehow acquired 14 rubber bands, a key to nothing, and what appears to be a menu from 2019. When asked to produce scissors, offered a broken phone charger and a birthday candle. Confident in its chaos.",
    verdict: "lateral",
    verdictText: "Role Unclear — Retained Anyway"
  },
  {
    name: "The Smoke Detector",
    dept: "Dept. of Overreaction",
    metrics: [
      ["Fire Detection", 3],
      ["Toast Detection", 5],
      ["Shower Steam Detection", 5],
      ["3AM Chirping", 5],
      ["Appropriate Response", 0.5]
    ],
    feedback: "Cannot distinguish between a house fire and slightly warm bread. Chose 3 AM to announce its battery was low, as if that couldn't wait until morning. Has never detected an actual emergency. Lives for drama.",
    verdict: "pip",
    verdictText: "Mandatory Sensitivity Training"
  },
  {
    name: "The Phone Charger",
    dept: "Dept. of One Specific Angle",
    metrics: [
      ["Charging Reliability", 2],
      ["The Angle Thing", 5],
      ["Cable Integrity", 1],
      ["Desktop Falling", 5],
      ["Replacement Guilt", 4]
    ],
    feedback: "Only functions when the cable is bent 43 degrees to the left and pressed against a book. Falls off the nightstand nightly. Has been replaced three times but somehow keeps returning. We suspect it's the same one.",
    verdict: "lateral",
    verdictText: "Under Observation"
  },
  {
    name: "The Ice Cube Tray",
    dept: "Dept. of Never Being Refilled",
    metrics: [
      ["Ice Production", 3],
      ["Being Refilled by Others", 0],
      ["Dramatic Cracking Sound", 5],
      ["Producing Exactly 1 Cube", 4],
      ["Splashing During Fill", 5]
    ],
    feedback: "Produces ice cubes technically, but only if you wrestle them out like pulling teeth. The cracking noise is unnecessary and theatrical. Always empty when you need it. The passive aggression of being left in the freezer empty is noted.",
    verdict: "pip",
    verdictText: "Final Warning"
  },
  {
    name: "The Umbrella",
    dept: "Dept. of Conditional Loyalty",
    metrics: [
      ["Rain Protection", 3],
      ["Wind Resistance", 0],
      ["Being Where You Left It", 1],
      ["Inverting Dramatically", 5],
      ["Drying on the Floor", 5]
    ],
    feedback: "Inverted in moderate wind and simply stayed that way, making no effort to recover. Left at a restaurant in 2023 and didn't even try to come back. Has been replaced 4 times. Shows no growth.",
    verdict: "pip",
    verdictText: "Abandoned at Next Restaurant"
  },
  {
    name: "The Toaster",
    dept: "Dept. of Chaotic Neutrality",
    metrics: [
      ["Consistent Browning", 1],
      ["Crumb Management", 0],
      ["Same Setting Different Results", 5],
      ["Launching Toast", 4],
      ["Looking Clean", 2]
    ],
    feedback: "Setting 3 produced raw bread Monday and charcoal Wednesday. No explanation offered. Launched a bagel onto the floor with unnecessary force. The crumb tray situation is a health code violation. Somehow still employed.",
    verdict: "promoted",
    verdictText: "Promoted to Kitchen Manager"
  },
  {
    name: "The TV Remote",
    dept: "Dept. of Power Dynamics",
    metrics: [
      ["Responsiveness", 2],
      ["Being Between Cushions", 5],
      ["Battery Door Integrity", 0],
      ["Button Clarity", 1],
      ["Causing Arguments", 4.5]
    ],
    feedback: "Has 47 buttons, 4 of which anyone understands. The battery door is held on by hope. Regularly hides between couch cushions as a dominance display. INPUT button has caused at least 3 household disputes this quarter.",
    verdict: "lateral",
    verdictText: "Too Powerful to Fire"
  },
  {
    name: "The Plastic Bag of Plastic Bags",
    dept: "Dept. of Infinite Recursion",
    metrics: [
      ["Organization", 0],
      ["Usefulness", 2],
      ["Growth Rate", 5],
      ["Guilt Reduction", 3],
      ["Taking Up Space", 5]
    ],
    feedback: "Has achieved a kind of immortality. Consumes other bags. Cannot be thrown away because 'we might need them.' We never need them. Has been growing since 2016 and shows no signs of stopping. Possibly a life form.",
    verdict: "promoted",
    verdictText: "Promoted (Cannot Be Stopped)"
  },
  {
    name: "The Tupperware Lid",
    dept: "Dept. of Mismatch",
    metrics: [
      ["Fitting Its Container", 0.5],
      ["Being Found Alone", 5],
      ["Warping in Dishwasher", 5],
      ["Stacking Nicely", 0],
      ["Tomato Stain Resistance", 0]
    ],
    feedback: "Has never once been found near its matching container. Permanently stained orange from an incident in 2021 it refuses to discuss. Warps in the dishwasher as a form of protest. The cabinet avalanche last Tuesday was its fault.",
    verdict: "pip",
    verdictText: "Matched with Wrong Container Permanently"
  },
  {
    name: "The Office Chair",
    dept: "Dept. of Slow Descent",
    metrics: [
      ["Lumbar Support", 2],
      ["Staying at Set Height", 0],
      ["Mysterious Squeaking", 5],
      ["Rolling When You Don't Want It", 5],
      ["Rolling When You Do Want It", 1]
    ],
    feedback: "Sinks approximately 2 inches per hour, requiring constant readjustment. Squeaks during important calls but falls silent when investigated. Rolls freely toward the door but refuses to move toward the desk. This is deliberate.",
    verdict: "lateral",
    verdictText: "Reassigned to Guest Seating"
  }
];

let index = 0;
let shuffled = [...reviews].sort(() => Math.random() - 0.5);

function starString(rating) {
  const full = Math.floor(rating);
  const half = rating % 1 >= 0.5;
  const empty = 5 - full - (half ? 1 : 0);
  return '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(empty);
}

function renderReview(r) {
  const card = document.getElementById('card');
  let metricsHTML = r.metrics.map(([name, val]) => `
    <div class="metric">
      <span class="metric-name">${name}</span>
      <span class="stars">${starString(val)}</span>
    </div>
  `).join('');

  card.innerHTML = `
    <div class="employee-name">${r.name}</div>
    <div class="department">${r.dept}</div>
    ${metricsHTML}
    <div class="feedback">${r.feedback}</div>
    <div class="verdict ${r.verdict}">${r.verdictText}</div>
  `;
  card.className = 'review-card fade-in';
  document.getElementById('counter').textContent = `Review ${index + 1} of ${shuffled.length}`;
}

function nextReview() {
  index = (index + 1) % shuffled.length;
  if (index === 0) shuffled.sort(() => Math.random() - 0.5);
  renderReview(shuffled[index]);
}

renderReview(shuffled[0]);
</script>
</body>
</html>
