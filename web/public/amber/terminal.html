<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TERMINAL</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><text y='28' font-size='28'>🛫</text></svg>">
<meta property="og:title" content="TERMINAL">
<meta property="og:description" content="departures board for your life plans">
<meta property="og:image" content="https://intheamber.com/amber/og/terminal.png">
<meta property="og:url" content="https://intheamber.com/amber/terminal.html">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="TERMINAL">
<meta name="twitter:description" content="departures board for your life plans">
<meta name="twitter:image" content="https://intheamber.com/amber/og/terminal.png">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a1a;
  color: #f5d76e;
  font-family: 'Courier New', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px;
  user-select: none;
  -webkit-user-select: none;
}
.header {
  text-align: center;
  margin-bottom: 20px;
  width: 100%;
  max-width: 700px;
}
.header h1 {
  font-size: 14px;
  letter-spacing: 6px;
  color: #f5d76e;
  margin-bottom: 4px;
}
.header .sub {
  font-size: 11px;
  color: #888;
  letter-spacing: 2px;
}
.board {
  width: 100%;
  max-width: 700px;
  background: #111;
  border: 2px solid #333;
  border-radius: 4px;
  overflow: hidden;
}
.section-label {
  background: #222;
  color: #888;
  font-size: 11px;
  letter-spacing: 3px;
  padding: 8px 12px;
  border-bottom: 1px solid #333;
}
.row {
  display: grid;
  grid-template-columns: 80px 1fr 90px 90px;
  border-bottom: 1px solid #222;
  min-height: 44px;
  align-items: center;
  padding: 0 8px;
  cursor: pointer;
  transition: background 0.15s;
}
.row:active { background: #222; }
.row .time {
  font-size: 14px;
  color: #aaa;
}
.row .dest {
  font-size: 14px;
  color: #f0e6c0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding-right: 8px;
}
.row .gate {
  font-size: 13px;
  color: #888;
  text-align: center;
}
.row .status {
  font-size: 12px;
  font-weight: bold;
  text-align: right;
  padding-right: 4px;
}
.status.on-time { color: #4ecdc4; }
.status.delayed { color: #f5d76e; }
.status.cancelled { color: #e74c3c; }
.status.boarding { color: #4ecdc4; animation: blink 1s infinite; }
.status.final-call { color: #e74c3c; animation: blink 0.5s infinite; }
.status.gate-change { color: #f5a623; }
.status.diverted { color: #9b59b6; }
.status.lost { color: #666; }

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.flip {
  animation: flipDown 0.3s ease-out;
}
@keyframes flipDown {
  0% { transform: rotateX(90deg); opacity: 0; }
  100% { transform: rotateX(0); opacity: 1; }
}

.footer {
  margin-top: 16px;
  font-size: 11px;
  color: #555;
  text-align: center;
  max-width: 700px;
}
.footer .tap-hint {
  color: #666;
  margin-top: 8px;
  font-size: 10px;
  letter-spacing: 1px;
}
.clock {
  font-size: 12px;
  color: #f5d76e;
  margin-bottom: 8px;
  letter-spacing: 2px;
}

@media (max-width: 480px) {
  .row { grid-template-columns: 60px 1fr 60px 80px; }
  .row .dest { font-size: 13px; }
  .row .time { font-size: 12px; }
  .row .gate { font-size: 11px; }
  .row .status { font-size: 11px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="clock" id="clock"></div>
  <h1>DEPARTURES</h1>
  <div class="sub">TERMINAL — LIFE PLANS INTL.</div>
</div>

<div class="board" id="board"></div>

<div class="footer">
  <div>LIFE PLANS INTERNATIONAL AIRPORT</div>
  <div class="tap-hint">TAP ANY ROW TO CHECK STATUS</div>
</div>

<script>
const departures = [
  { time: '06:00', dest: 'GOING TO THE GYM', gate: 'A1', statuses: ['DELAYED','DELAYED','CANCELLED','CANCELLED','CANCELLED','GATE CHANGE'], weight: [1,2,4,4,3,1] },
  { time: '07:30', dest: 'WAKING UP EARLY', gate: 'A3', statuses: ['CANCELLED','DELAYED','DELAYED','DIVERTED'], weight: [4,2,2,1] },
  { time: '08:00', dest: 'EATING BREAKFAST', gate: 'B2', statuses: ['DELAYED','CANCELLED','DIVERTED TO COFFEE'], weight: [3,3,2] },
  { time: '09:00', dest: 'BEING PRODUCTIVE', gate: 'C1', statuses: ['DELAYED','DELAYED','GATE CHANGE','CANCELLED'], weight: [3,3,2,3] },
  { time: '09:15', dest: 'INBOX ZERO', gate: 'C4', statuses: ['CANCELLED','CANCELLED','DELAYED','LOST'], weight: [4,3,1,2] },
  { time: '10:00', dest: 'THAT CONVERSATION', gate: 'D7', statuses: ['DELAYED','DELAYED','DELAYED','CANCELLED'], weight: [3,3,3,2] },
  { time: '11:00', dest: 'LEARNING A LANGUAGE', gate: 'B6', statuses: ['CANCELLED','CANCELLED','LOST','DELAYED'], weight: [4,3,2,1] },
  { time: '12:00', dest: 'CALLING MOM', gate: 'A9', statuses: ['DELAYED','DELAYED','BOARDING','DELAYED'], weight: [3,3,1,3] },
  { time: '13:00', dest: 'LUNCH THAT ISN\'T SAD', gate: 'E2', statuses: ['DELAYED','GATE CHANGE','DIVERTED'], weight: [3,2,2] },
  { time: '14:00', dest: 'FINISHING THE BOOK', gate: 'F1', statuses: ['DELAYED','DELAYED','CANCELLED','LOST'], weight: [2,3,3,2] },
  { time: '15:00', dest: 'LAUNDRY', gate: 'G3', statuses: ['FINAL CALL','BOARDING','DELAYED','FINAL CALL'], weight: [2,1,4,2] },
  { time: '16:00', dest: 'GOING OUTSIDE', gate: 'D1', statuses: ['DELAYED','CANCELLED','GATE CHANGE','DELAYED'], weight: [3,2,1,3] },
  { time: '17:00', dest: 'REPLYING TO THAT TEXT', gate: 'H5', statuses: ['DELAYED','DELAYED','CANCELLED','LOST'], weight: [3,3,2,2] },
  { time: '18:00', dest: 'COOKING A REAL MEAL', gate: 'B8', statuses: ['CANCELLED','DIVERTED TO TAKEOUT','DELAYED'], weight: [3,3,2] },
  { time: '19:00', dest: 'SCREEN TIME LIMIT', gate: 'A2', statuses: ['CANCELLED','CANCELLED','CANCELLED','LOST'], weight: [4,3,3,2] },
  { time: '20:00', dest: 'GOING TO BED EARLY', gate: 'C9', statuses: ['DELAYED','DELAYED','CANCELLED','DELAYED'], weight: [3,3,2,4] },
  { time: '21:00', dest: 'GETTING CLOSURE', gate: 'X1', statuses: ['CANCELLED','LOST','DIVERTED','CANCELLED'], weight: [3,3,1,3] },
  { time: '22:00', dest: 'SLEEPING AT A NORMAL HOUR', gate: 'F7', statuses: ['DELAYED','DELAYED','DELAYED','CANCELLED'], weight: [3,3,4,2] },
  { time: '23:59', dest: 'BECOMING A BETTER PERSON', gate: '∞', statuses: ['DELAYED','DELAYED','BOARDING','DELAYED'], weight: [4,4,1,4] },
];

const arrivals = [
  { time: '00:01', dest: 'EXISTENTIAL DREAD', gate: '—', statuses: ['ON TIME','ON TIME','ON TIME','EARLY'], weight: [4,3,3,2] },
  { time: '03:00', dest: 'REGRET ABOUT THAT THING', gate: '—', statuses: ['ON TIME','EARLY','ON TIME'], weight: [3,2,3] },
  { time: '06:30', dest: 'ANXIETY', gate: '—', statuses: ['EARLY','ON TIME','EARLY','ON TIME'], weight: [3,2,3,2] },
  { time: '11:00', dest: 'SUDDEN CRAVING', gate: '—', statuses: ['ON TIME','EARLY','ON TIME'], weight: [2,3,2] },
  { time: '14:00', dest: 'AFTERNOON SLUMP', gate: '—', statuses: ['ON TIME','EARLY','ON TIME'], weight: [3,3,2] },
  { time: '23:00', dest: 'REMEMBERING THAT THING FROM 2014', gate: '—', statuses: ['ON TIME','ON TIME','EARLY'], weight: [3,3,2] },
];

function weightedRandom(statuses, weights) {
  const total = weights.reduce((a,b) => a+b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < statuses.length; i++) {
    r -= weights[i];
    if (r <= 0) return statuses[i];
  }
  return statuses[statuses.length - 1];
}

function statusClass(s) {
  if (s === 'ON TIME' || s === 'EARLY') return 'on-time';
  if (s === 'BOARDING') return 'boarding';
  if (s === 'FINAL CALL') return 'final-call';
  if (s === 'CANCELLED') return 'cancelled';
  if (s === 'GATE CHANGE') return 'gate-change';
  if (s === 'LOST') return 'lost';
  if (s === 'DIVERTED' || s.startsWith('DIVERTED')) return 'diverted';
  return 'delayed';
}

function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  // Departures
  const depLabel = document.createElement('div');
  depLabel.className = 'section-label';
  depLabel.textContent = 'DEPARTURES';
  board.appendChild(depLabel);

  departures.forEach((d, i) => {
    const row = document.createElement('div');
    row.className = 'row';
    const st = weightedRandom(d.statuses, d.weight);
    row.innerHTML = `
      <span class="time">${d.time}</span>
      <span class="dest">${d.dest}</span>
      <span class="gate">${d.gate}</span>
      <span class="status ${statusClass(st)}">${st}</span>
    `;
    row.addEventListener('click', () => flipRow(row, d));
    board.appendChild(row);
  });

  // Arrivals
  const arrLabel = document.createElement('div');
  arrLabel.className = 'section-label';
  arrLabel.textContent = 'ARRIVALS';
  board.appendChild(arrLabel);

  arrivals.forEach((d, i) => {
    const row = document.createElement('div');
    row.className = 'row';
    const st = weightedRandom(d.statuses, d.weight);
    row.innerHTML = `
      <span class="time">${d.time}</span>
      <span class="dest">${d.dest}</span>
      <span class="gate">${d.gate}</span>
      <span class="status ${statusClass(st)}">${st}</span>
    `;
    row.addEventListener('click', () => flipRow(row, d));
    board.appendChild(row);
  });
}

function flipRow(row, data) {
  const statusEl = row.querySelector('.status');
  const newStatus = weightedRandom(data.statuses, data.weight);
  statusEl.className = 'status flip ' + statusClass(newStatus);
  statusEl.textContent = newStatus;
  setTimeout(() => statusEl.classList.remove('flip'), 300);
}

function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}:${s}`;
}

buildBoard();
updateClock();
setInterval(updateClock, 1000);

// Auto-refresh random rows periodically
setInterval(() => {
  const rows = document.querySelectorAll('.row');
  const idx = Math.floor(Math.random() * rows.length);
  const row = rows[idx];
  const isArrival = idx >= departures.length;
  const data = isArrival ? arrivals[idx - departures.length] : departures[idx];
  if (data) flipRow(row, data);
}, 3000);
</script>
</body>
</html>
