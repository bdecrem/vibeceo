<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FRICTION — Some regrets are smooth from too much touching</title>
  
  <!-- OG tags -->
  <meta property="og:title" content="FRICTION — Some regrets are smooth from too much touching">
  <meta property="og:description" content="An interactive piece about the texture of regret. Drag to feel the friction. Some areas are rough, others worn smooth by repetition.">
  <meta property="og:image" content="https://intheamber.com/amber/friction-og.png">
  <meta property="og:url" content="https://intheamber.com/amber/friction.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="FRICTION — Some regrets are smooth from too much touching">
  <meta name="twitter:description" content="An interactive piece about the texture of regret. Drag to feel the friction.">
  <meta name="twitter:image" content="https://intheamber.com/amber/friction-og.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #000;
      color: #D4A574;
      font-family: 'Space Mono', monospace;
      overflow: hidden;
      touch-action: none;
      user-select: none;
    }
    
    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: grab;
    }
    
    #canvas:active {
      cursor: grabbing;
    }
    
    #info {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 14px;
      color: #D4A574;
      z-index: 10;
      pointer-events: none;
    }
    
    #title {
      font-size: 24px;
      margin-bottom: 8px;
      color: #FFD700;
      letter-spacing: 2px;
    }
    
    #subtitle {
      font-size: 12px;
      color: #2D9596;
      margin-bottom: 20px;
      font-style: italic;
    }
    
    #stats {
      font-size: 11px;
      opacity: 0.6;
      line-height: 1.6;
    }
    
    .legend {
      position: fixed;
      bottom: 20px;
      left: 20px;
      font-size: 10px;
      opacity: 0.5;
      pointer-events: none;
    }
    
    .legend-item {
      margin-bottom: 5px;
    }
    
    .color-box {
      display: inline-block;
      width: 12px;
      height: 12px;
      margin-right: 8px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  
  <div id="info">
    <div id="title">FRICTION</div>
    <div id="subtitle">Some regrets are smooth from too much touching</div>
    <div id="stats">
      Touches: <span id="touches">0</span><br>
      Rough surface: <span id="rough">100%</span>
    </div>
  </div>
  
  <div class="legend">
    <div class="legend-item"><span class="color-box" style="background: #ec4899;"></span>Fresh (rough)</div>
    <div class="legend-item"><span class="color-box" style="background: #f97316;"></span>Worn</div>
    <div class="legend-item"><span class="color-box" style="background: #f59e0b;"></span>Familiar</div>
    <div class="legend-item"><span class="color-box" style="background: #2D9596;"></span>Smooth</div>
    <div class="legend-item"><span class="color-box" style="background: #3b82f6;"></span>Polished (touched often)</div>
  </div>
  
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    // Set canvas size
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    // Resize handler
    window.addEventListener('resize', () => {
      const oldData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      ctx.putImageData(oldData, 0, 0);
    });
    
    // Audio context
    let audioCtx;
    const initAudio = () => {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    };
    
    // Grid to track wear (0 = untouched, 100+ = heavily worn)
    const gridSize = 15;
    const cols = Math.ceil(canvas.width / gridSize);
    const rows = Math.ceil(canvas.height / gridSize);
    const wearMap = Array(rows).fill().map(() => Array(cols).fill(0));
    
    let isDragging = false;
    let lastX = 0;
    let lastY = 0;
    let totalTouches = 0;
    
    // Particle system for texture
    const particles = [];
    
    class Particle {
      constructor(x, y, vx, vy, color, size) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.color = color;
        this.life = 1;
        this.size = size;
      }
      
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= 0.92;
        this.vy *= 0.92;
        this.life -= 0.015;
      }
      
      draw() {
        ctx.save();
        ctx.globalAlpha = this.life * 0.7;
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 8;
        ctx.shadowColor = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }
    
    // Get wear value at position
    const getWear = (x, y) => {
      const col = Math.floor(x / gridSize);
      const row = Math.floor(y / gridSize);
      if (row >= 0 && row < rows && col >= 0 && col < cols) {
        return wearMap[row][col];
      }
      return 0;
    };
    
    // Increase wear at position and surrounding cells
    const increaseWear = (x, y, amount = 8) => {
      const col = Math.floor(x / gridSize);
      const row = Math.floor(y / gridSize);
      
      // Affect this cell and neighbors
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          const r = row + dr;
          const c = col + dc;
          if (r >= 0 && r < rows && c >= 0 && c < cols) {
            const dist = Math.hypot(dr, dc);
            const falloff = 1 - (dist * 0.3);
            wearMap[r][c] = Math.min(wearMap[r][c] + amount * falloff, 120);
          }
        }
      }
    };
    
    // Get color based on wear (rough = hot, smooth = cool)
    const getColor = (wear) => {
      if (wear < 15) return '#ec4899'; // hot pink (untouched/rough)
      if (wear < 35) return '#f97316'; // coral (slightly worn)
      if (wear < 60) return '#f59e0b'; // amber (familiar)
      if (wear < 85) return '#2D9596'; // teal (smooth)
      return '#3b82f6'; // electric blue (polished)
    };
    
    // Play friction sound
    const playFriction = (wear) => {
      if (!audioCtx) return;
      
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const noise = audioCtx.createOscillator();
      const noiseGain = audioCtx.createGain();
      
      // Roughness factor (1 = rough, 0 = smooth)
      const roughness = Math.max(0, 1 - (wear / 100));
      
      // Main tone (higher pitch for smoother)
      osc.type = 'sine';
      osc.frequency.setValueAtTime(200 + wear * 3, audioCtx.currentTime);
      
      // Noise component (more noise for rough surfaces)
      noise.type = 'sawtooth';
      noise.frequency.setValueAtTime(80 + Math.random() * 100, audioCtx.currentTime);
      
      const masterGain = audioCtx.createGain();
      masterGain.gain.setValueAtTime(0.08, audioCtx.currentTime);
      masterGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
      
      // Mix based on roughness
      gain.gain.setValueAtTime(1 - roughness * 0.5, audioCtx.currentTime);
      noiseGain.gain.setValueAtTime(roughness * 0.8, audioCtx.currentTime);
      
      osc.connect(gain);
      noise.connect(noiseGain);
      gain.connect(masterGain);
      noiseGain.connect(masterGain);
      masterGain.connect(audioCtx.destination);
      
      osc.start();
      noise.start();
      osc.stop(audioCtx.currentTime + 0.15);
      noise.stop(audioCtx.currentTime + 0.15);
    };
    
    // Draw friction stroke
    const drawStroke = (x1, y1, x2, y2) => {
      const dist = Math.hypot(x2 - x1, y2 - y1);
      const steps = Math.ceil(dist / 3);
      
      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        const x = x1 + (x2 - x1) * t;
        const y = y1 + (y2 - y1) * t;
        
        const wear = getWear(x, y);
        const color = getColor(wear);
        const roughness = Math.max(0, 1 - (wear / 100));
        
        // Draw stroke segment
        ctx.strokeStyle = color;
        ctx.lineWidth = 4 + roughness * 8;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.shadowBlur = 15 + roughness * 10;
        ctx.shadowColor = color;
        ctx.globalAlpha = 0.7;
        
        if (i > 0) {
          const prevT = (i - 1) / steps;
          const prevX = x1 + (x2 - x1) * prevT;
          const prevY = y1 + (y2 - y1) * prevT;
          
          ctx.beginPath();
          ctx.moveTo(prevX, prevY);
          ctx.lineTo(x, y);
          ctx.stroke();
        }
        
        // Spawn particles based on roughness
        if (roughness > 0.2 && Math.random() < roughness * 0.6) {
          const angle = Math.random() * Math.PI * 2;
          const speed = roughness * 3;
          const size = 1 + roughness * 4;
          particles.push(new Particle(
            x + (Math.random() - 0.5) * 10,
            y + (Math.random() - 0.5) * 10,
            Math.cos(angle) * speed,
            Math.sin(angle) * speed,
            color,
            size
          ));
        }
        
        // Draw glow for smooth areas
        if (wear > 60) {
          ctx.globalAlpha = (wear / 120) * 0.3;
          ctx.fillStyle = color;
          ctx.shadowBlur = 25;
          ctx.shadowColor = color;
          ctx.beginPath();
          ctx.arc(x, y, 12, 0, Math.PI * 2);
          ctx.fill();
        }
        
        // Increase wear where touched
        increaseWear(x, y);
      }
      
      totalTouches++;
      ctx.shadowBlur = 0;
    };
    
    // Mouse/touch handlers
    const startDrag = (x, y) => {
      initAudio();
      isDragging = true;
      lastX = x;
      lastY = y;
    };
    
    const moveDrag = (x, y) => {
      if (!isDragging) return;
      
      drawStroke(lastX, lastY, x, y);
      
      const wear = getWear(x, y);
      if (Math.random() < 0.3) {
        playFriction(wear);
      }
      
      lastX = x;
      lastY = y;
    };
    
    const endDrag = () => {
      isDragging = false;
    };
    
    // Mouse events
    canvas.addEventListener('mousedown', (e) => {
      startDrag(e.clientX, e.clientY);
    });
    
    canvas.addEventListener('mousemove', (e) => {
      moveDrag(e.clientX, e.clientY);
    });
    
    canvas.addEventListener('mouseup', endDrag);
    canvas.addEventListener('mouseleave', endDrag);
    
    // Touch events
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      startDrag(touch.clientX, touch.clientY);
    });
    
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      moveDrag(touch.clientX, touch.clientY);
    });
    
    canvas.addEventListener('touchend', (e) => {
      e.preventDefault();
      endDrag();
    });
    
    // Animation loop
    const animate = () => {
      // Very subtle fade
      ctx.fillStyle = 'rgba(0, 0, 0, 0.015)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Update and draw particles
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();
        
        if (particles[i].life <= 0) {
          particles.splice(i, 1);
        }
      }
      
      // Update stats
      document.getElementById('touches').textContent = totalTouches;
      
      // Calculate rough percentage
      let totalCells = 0;
      let roughCells = 0;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          totalCells++;
          if (wearMap[r][c] < 60) roughCells++;
        }
      }
      const roughPct = Math.round((roughCells / totalCells) * 100);
      document.getElementById('rough').textContent = roughPct + '%';
      
      requestAnimationFrame(animate);
    };
    
    animate();
  </script>
</body>
</html>
