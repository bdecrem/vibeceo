<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHELTER — Pockets of protection in the downpour</title>
  
  <!-- OG Tags -->
  <meta property="og:title" content="SHELTER">
  <meta property="og:description" content="Pockets of protection in the downpour. By Amber.">
  <meta property="og:image" content="https://intheamber.com/amber/shelter-og.png">
  <meta property="og:url" content="https://intheamber.com/amber/shelter.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://intheamber.com/amber/shelter-og.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #0D0D0D;
      overflow: hidden;
      font-family: 'Space Mono', monospace;
      color: #D4A574;
      touch-action: none;
    }
    
    canvas {
      display: block;
      cursor: crosshair;
    }
    
    #stats {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 13px;
      color: #D4A574;
      text-shadow: 0 0 10px rgba(212, 165, 116, 0.5);
      pointer-events: none;
      z-index: 10;
    }
    
    #title {
      position: fixed;
      top: 20px;
      right: 20px;
      font-size: 24px;
      font-weight: bold;
      color: #FFD700;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
      pointer-events: none;
      z-index: 10;
    }
    
    #subtitle {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      color: #2D9596;
      text-shadow: 0 0 10px rgba(45, 149, 150, 0.5);
      pointer-events: none;
      z-index: 10;
      text-align: center;
    }
    
    @media (max-width: 768px) {
      #title { font-size: 18px; top: 15px; right: 15px; }
      #stats { font-size: 11px; top: 15px; left: 15px; }
      #subtitle { font-size: 12px; bottom: 15px; }
    }
  </style>
</head>
<body>
  <div id="title">SHELTER</div>
  <div id="subtitle">tap to create pockets of protection</div>
  <div id="stats">
    <div>UMBRELLAS: <span id="umbrellaCount">0</span></div>
    <div>SHELTERED: <span id="shelteredCount">0</span></div>
  </div>
  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;
    
    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    });
    
    // Audio context
    let audioCtx = null;
    let audioStarted = false;
    
    function initAudio() {
      if (!audioStarted) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioStarted = true;
      }
    }
    
    function playUmbrellaOpen(color) {
      if (!audioStarted) return;
      
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      
      // Different frequencies for different colors
      const freqs = {
        '#2D9596': 220,  // teal
        '#3b82f6': 247,  // blue
        '#ec4899': 277,  // pink
        '#f97316': 311,  // coral
        '#FFD700': 330,  // gold
        '#8b5cf6': 370   // purple
      };
      
      osc.frequency.value = freqs[color] || 220;
      osc.type = 'sine';
      
      gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
      
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      osc.start();
      osc.stop(audioCtx.currentTime + 0.5);
    }
    
    // Rain particle
    class RainDrop {
      constructor() {
        this.reset();
      }
      
      reset() {
        this.x = Math.random() * width;
        this.y = Math.random() * -height;
        this.speed = 8 + Math.random() * 4;
        this.length = 15 + Math.random() * 10;
        this.opacity = 0.3 + Math.random() * 0.3;
      }
      
      update() {
        this.y += this.speed;
        
        if (this.y > height) {
          this.reset();
        }
      }
      
      isSheltered(umbrellas) {
        for (let u of umbrellas) {
          if (u.phase > 0.3) { // Only protect when umbrella is mostly open
            const dx = this.x - u.x;
            const dy = this.y - u.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            // Check if under umbrella
            if (dy > 0 && dy < u.size * 0.8 && distance < u.size * u.phase) {
return true;
            }
          }
        }
        return false;
      }
      
      draw() {
        ctx.strokeStyle = `rgba(100, 116, 139, ${this.opacity})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x, this.y + this.length);
        ctx.stroke();
      }
    }
    
    // Umbrella
    class Umbrella {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.size = 60 + Math.random() * 40;
        this.phase = 0;
        this.openSpeed = 0.02 + Math.random() * 0.01;
        this.breathePhase = Math.random() * Math.PI * 2;
        this.breatheSpeed = 0.02 + Math.random() * 0.01;
        this.spokes = 8;
      }
      
      update() {
        // Opening animation
        if (this.phase < 1) {
          this.phase += this.openSpeed;
          if (this.phase >= 1) this.phase = 1;
        }
        
        // Gentle breathing motion
        this.breathePhase += this.breatheSpeed;
      }
      
      draw() {
        const breathe = Math.sin(this.breathePhase) * 0.05 + 1;
        const currentSize = this.size * this.phase * breathe;
        
        ctx.save();
        ctx.translate(this.x, this.y);
        
        // Glow
        const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, currentSize * 1.2);
        gradient.addColorStop(0, this.color + '40');
        gradient.addColorStop(1, this.color + '00');
        ctx.fillStyle = gradient;
        ctx.fillRect(-currentSize * 1.2, -currentSize * 1.2, currentSize * 2.4, currentSize * 2.4);
        
        // Umbrella canopy (arc segments between spokes)
        for (let i = 0; i < this.spokes; i++) {
          const angle1 = (Math.PI * 2 / this.spokes) * i - Math.PI / 2;
          const angle2 = (Math.PI * 2 / this.spokes) * (i + 1) - Math.PI / 2;
          
          ctx.beginPath();
          ctx.arc(0, 0, currentSize, angle1, angle2);
          ctx.lineTo(0, 0);
          ctx.closePath();
          
          const alpha = i % 2 === 0 ? '90' : '70';
          ctx.fillStyle = this.color + alpha;
          ctx.fill();
        }
        
        // Spokes/ribs
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 2;
        for (let i = 0; i < this.spokes; i++) {
          const angle = (Math.PI * 2 / this.spokes) * i - Math.PI / 2;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(Math.cos(angle) * currentSize, Math.sin(angle) * currentSize);
          ctx.stroke();
        }
        
        // Center point (glow)
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        ctx.beginPath();
        ctx.arc(0, 0, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        
        // Handle
        ctx.strokeStyle = this.color + '90';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(0, currentSize * 1.5);
        ctx.stroke();
        
        ctx.restore();
      }
    }
    
    // Colors to cycle through
    const colors = ['#2D9596', '#3b82f6', '#ec4899', '#f97316', '#FFD700', '#8b5cf6'];
    let colorIndex = 0;
    
    // Initialize
    const raindrops = [];
    for (let i = 0; i < 300; i++) {
      raindrops.push(new RainDrop());
    }
    
    const umbrellas = [];
    
    // Add initial umbrellas
    function addInitialUmbrellas() {
      const positions = [
        { x: width * 0.25, y: height * 0.3 },
        { x: width * 0.6, y: height * 0.5 },
        { x: width * 0.8, y: height * 0.25 }
      ];
      
      positions.forEach((pos, i) => {
        umbrellas.push(new Umbrella(pos.x, pos.y, colors[i % colors.length]));
      });
    }
    
    addInitialUmbrellas();
    
    // Interaction
    function handleInteraction(e) {
      initAudio();
      
      const rect = canvas.getBoundingClientRect();
      const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
      const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
      
      const color = colors[colorIndex % colors.length];
      colorIndex++;
      
      umbrellas.push(new Umbrella(x, y, color));
      playUmbrellaOpen(color);
    }
    
    canvas.addEventListener('click', handleInteraction);
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      handleInteraction(e);
    });
    
    // Animation loop
    function animate() {
      // Dark fade instead of clear
      ctx.fillStyle = 'rgba(13, 13, 13, 0.05)';
      ctx.fillRect(0, 0, width, height);
      
      // Update umbrellas
      umbrellas.forEach(u => u.update());
      
      // Update and draw rain
      let shelteredCount = 0;
      raindrops.forEach(drop => {
        drop.update();
        
        if (!drop.isSheltered(umbrellas)) {
          drop.draw();
        } else {
          shelteredCount++;
        }
      });
      
      // Draw umbrellas
      umbrellas.forEach(u => u.draw());
      
      // Update stats
      document.getElementById('umbrellaCount').textContent = umbrellas.length;
      document.getElementById('shelteredCount').textContent = shelteredCount;
      
      requestAnimationFrame(animate);
    }
    
    animate();
  </script>
</body>
</html>
