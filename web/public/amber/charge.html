<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHARGE — Hold to fill. Release at the right moment.</title>
    <meta name="description" content="Hold to charge the power meter. Release in the green zone to score. Too early = weak. Too late = explosion.">
    
    <!-- OG tags -->
    <meta property="og:title" content="CHARGE — Hold to fill. Release at the right moment.">
    <meta property="og:description" content="A long-press toy where timing is everything. Hold to charge, release at peak power, watch the explosion.">
    <meta property="og:image" content="https://intheamber.com/amber/charge-og.png">
    <meta property="og:url" content="https://intheamber.com/amber/charge.html">
    <meta property="og:type" content="website">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            font-family: 'Space Mono', monospace;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #canvas {
            display: block;
            cursor: pointer;
        }

        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #D4A574;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            pointer-events: none;
        }

        .score {
            position: absolute;
            top: 20px;
            right: 20px;
            text-align: right;
            pointer-events: none;
        }

        .score-label {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-value {
            color: #FFD700;
            font-size: 28px;
            font-weight: bold;
            margin-top: 5px;
        }

        .instruction {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #D4A574;
            font-size: 16px;
            text-align: center;
            pointer-events: none;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: all;
            z-index: 100;
        }

        .game-over h1 {
            color: #FFD700;
            font-size: 48px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .game-over p {
            color: #D4A574;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .game-over button {
            background: #D4A574;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-family: 'Space Mono', monospace;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .game-over button:hover {
            background: #FFD700;
            transform: scale(1.05);
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="ui">
        <div>CHARGE</div>
    </div>

    <div class="score">
        <div class="score-label">Score</div>
        <div class="score-value" id="scoreDisplay">0</div>
    </div>

    <div class="instruction" id="instruction">
        HOLD TO CHARGE<br>
        <span style="font-size: 12px; opacity: 0.5; margin-top: 10px; display: block;">Release in the green zone</span>
    </div>

    <div class="game-over hidden" id="gameOver">
        <h1>OVERLOAD</h1>
        <p id="finalScore">Final Score: 0</p>
        <button id="restart">CHARGE AGAIN</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const instruction = document.getElementById('instruction');
        const gameOverScreen = document.getElementById('gameOver');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const finalScoreDisplay = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restart');

        let W, H;
        let audioCtx;
        
        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Game state
        let charging = false;
        let charge = 0; // 0 to 1
        let chargeSpeed = 0.006; // Per frame
        let score = 0;
        let round = 0;
        let gameOver = false;
        let particles = [];

        // Zones
        const WEAK_ZONE = 0.3;
        const GOOD_ZONE = 0.5;
        const PERFECT_ZONE = 0.7;
        const DANGER_ZONE = 0.85;
        const OVERLOAD_ZONE = 1.0;

        class Particle {
            constructor(x, y, vx, vy, color, size) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.size = size;
                this.life = 1;
                this.decay = Math.random() * 0.02 + 0.01;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2; // gravity
                this.life -= this.decay;
            }

            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
                ctx.globalAlpha = 1;
            }
        }

        function spawnParticles(x, y, count, color) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 2;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed;
                const size = Math.random() * 8 + 4;
                particles.push(new Particle(x, y, vx, vy, color, size));
            }
        }

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playTone(freq, duration = 0.1, type = 'sine') {
            if (!audioCtx) return;
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = type;
            osc.frequency.value = freq;
            
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function getZoneColor(charge) {
            if (charge < WEAK_ZONE) return '#666';
            if (charge < GOOD_ZONE) return '#2D9596'; // teal
            if (charge < PERFECT_ZONE) return '#FFD700'; // gold
            if (charge < DANGER_ZONE) return '#D4A574'; // amber - perfect zone
            if (charge < OVERLOAD_ZONE) return '#FF4500'; // danger
            return '#FF0000'; // overload
        }

        function getScoreForCharge(charge) {
            if (charge < WEAK_ZONE) return Math.floor(charge * 100);
            if (charge < GOOD_ZONE) return Math.floor(100 + (charge - WEAK_ZONE) * 500);
            if (charge < PERFECT_ZONE) return Math.floor(200 + (charge - GOOD_ZONE) * 800);
            if (charge < DANGER_ZONE) return Math.floor(400 + (charge - PERFECT_ZONE) * 1500); // PERFECT ZONE
            if (charge < OVERLOAD_ZONE) return Math.floor(600 + (charge - DANGER_ZONE) * 500);
            return 0; // Overload
        }

        function handleStart(e) {
            e.preventDefault();
            if (gameOver) return;
            
            initAudio();
            charging = true;
            instruction.style.opacity = '0';
        }

        function handleEnd(e) {
            e.preventDefault();
            if (!charging || gameOver) return;
            
            charging = false;
            
            // Check if overload
            if (charge >= OVERLOAD_ZONE) {
                // GAME OVER
                gameOver = true;
                playTone(100, 0.5, 'sawtooth');
                spawnParticles(W/2, H/2, 100, '#FF0000');
                
                gameOverScreen.classList.remove('hidden');
                finalScoreDisplay.textContent = `Final Score: ${score}`;
                return;
            }
            
            // Score the charge
            const points = getScoreForCharge(charge);
            score += points;
            scoreDisplay.textContent = score;
            
            // Play tone based on score
            const freq = 200 + charge * 600;
            playTone(freq, 0.2);
            
            // Spawn particles
            const color = getZoneColor(charge);
            const particleCount = Math.floor(charge * 50) + 10;
            spawnParticles(W/2, H/2, particleCount, color);
            
            // Reset charge
            charge = 0;
            round++;
            
            // Increase difficulty
            chargeSpeed = 0.006 + (round * 0.0005);
        }

        // Touch/mouse events
        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('touchstart', handleStart);
        canvas.addEventListener('touchend', handleEnd);

        restartBtn.addEventListener('click', () => {
            gameOver = false;
            charging = false;
            charge = 0;
            score = 0;
            round = 0;
            chargeSpeed = 0.006;
            particles = [];
            scoreDisplay.textContent = '0';
            gameOverScreen.classList.add('hidden');
            instruction.style.opacity = '0.6';
        });

        function draw() {
            // Clear with fade trail
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, W, H);

            // Update charge
            if (charging && !gameOver) {
                charge += chargeSpeed;
                charge = Math.min(charge, 1.05); // Allow slight overcharge
                
                // Play charging sound
                if (Math.random() < 0.1) {
                    playTone(200 + charge * 800, 0.05);
                }
            }

            // Draw charge meter (vertical bar in center)
            const barWidth = 100;
            const barHeight = H * 0.6;
            const barX = W/2 - barWidth/2;
            const barY = H/2 - barHeight/2;

            // Draw background bar
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(barX, barY, barWidth, barHeight);

            // Draw zone markers
            const zones = [
                { y: WEAK_ZONE, color: '#666', label: 'WEAK' },
                { y: GOOD_ZONE, color: '#2D9596', label: 'GOOD' },
                { y: PERFECT_ZONE, color: '#FFD700', label: 'GREAT' },
                { y: DANGER_ZONE, color: '#D4A574', label: 'PERFECT' },
                { y: OVERLOAD_ZONE, color: '#FF4500', label: 'DANGER' }
            ];

            zones.forEach(zone => {
                const zoneY = barY + barHeight - (zone.y * barHeight);
                ctx.strokeStyle = zone.color;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(barX, zoneY);
                ctx.lineTo(barX + barWidth, zoneY);
                ctx.stroke();

                // Label
                ctx.fillStyle = zone.color;
                ctx.font = '10px Space Mono';
                ctx.textAlign = 'left';
                ctx.fillText(zone.label, barX + barWidth + 10, zoneY + 4);
            });

            // Draw charge fill
            if (charge > 0) {
                const fillHeight = charge * barHeight;
                const fillY = barY + barHeight - fillHeight;
                const fillColor = getZoneColor(charge);
                
                ctx.fillStyle = fillColor;
                ctx.fillRect(barX, fillY, barWidth, fillHeight);
                
                // Glow effect
                ctx.shadowBlur = 20;
                ctx.shadowColor = fillColor;
                ctx.fillRect(barX, fillY, barWidth, fillHeight);
                ctx.shadowBlur = 0;

                // Pulse effect when near perfect zone
                if (charge >= PERFECT_ZONE - 0.05 && charge < DANGER_ZONE) {
                    const pulse = Math.sin(Date.now() * 0.01) * 0.5 + 0.5;
                    ctx.strokeStyle = fillColor;
                    ctx.lineWidth = 3;
                    ctx.globalAlpha = pulse;
                    ctx.strokeRect(barX - 5, barY - 5, barWidth + 10, barHeight + 10);
                    ctx.globalAlpha = 1;
                }

                // Warning pulse when near overload
                if (charge >= DANGER_ZONE) {
                    const pulse = Math.sin(Date.now() * 0.02) * 0.5 + 0.5;
                    ctx.strokeStyle = '#FF0000';
                    ctx.lineWidth = 5;
                    ctx.globalAlpha = pulse;
                    ctx.strokeRect(barX - 10, barY - 10, barWidth + 20, barHeight + 20);
                    ctx.globalAlpha = 1;
                }
            }

            // Draw border
            ctx.strokeStyle = '#D4A574';
            ctx.lineWidth = 2;
            ctx.strokeRect(barX, barY, barWidth, barHeight);

            // Update and draw particles
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // Show current potential score while charging
            if (charging && charge > 0) {
                const potentialScore = getScoreForCharge(charge);
                ctx.fillStyle = getZoneColor(charge);
                ctx.font = 'bold 36px Space Mono';
                ctx.textAlign = 'center';
                ctx.fillText(`+${potentialScore}`, W/2, barY - 30);
            }

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
