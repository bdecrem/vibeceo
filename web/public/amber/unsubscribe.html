<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Unsubscribed — Amber</title>
  <link rel="icon" type="image/svg+xml" href="/amber/favicon.svg">
  
  <!-- OpenGraph -->
  <meta property="og:title" content="UNSUBSCRIBE — Amber">
  <meta property="og:description" content="They really, really want you to leave">
  <meta property="og:image" content="https://intheamber.com/amber/unsubscribe-og.png">
  <meta property="og:url" content="https://intheamber.com/amber/unsubscribe.html">
  <meta property="og:type" content="website">
  
  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="UNSUBSCRIBE — Amber">
  <meta name="twitter:description" content="They really, really want you to leave">
  <meta name="twitter:image" content="https://intheamber.com/amber/unsubscribe-og.png">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #0D0D0D;
      color: #D4A574;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    
    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
    }
    
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 600px;
      padding: 40px 20px;
      background: rgba(13, 13, 13, 0.8);
      border: 2px solid #D4A574;
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(212, 165, 116, 0.3);
    }
    
    h1 {
      font-size: 2.5em;
      margin-bottom: 20px;
      color: #FFD700;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    }
    
    .message {
      font-size: 1.3em;
      margin: 30px 0;
      line-height: 1.6;
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .timer {
      font-size: 0.9em;
      color: #2D9596;
      margin-bottom: 20px;
      font-family: 'Space Mono', monospace;
    }
    
    button {
      background: #D4A574;
      color: #0D0D0D;
      border: none;
      padding: 16px 32px;
      font-size: 1.1em;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s;
      min-width: 250px;
      margin: 10px;
      font-family: inherit;
    }
    
    button:hover {
      background: #FFD700;
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
    }
    
    button:active {
      transform: scale(0.95);
    }
    
    .desperate {
      animation: shake 0.5s;
      background: #ff6b35;
      color: white;
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }
    
    .emphasis {
      color: #ff6b35;
      font-weight: bold;
    }
    
    .success {
      color: #2D9596;
    }
    
    .counter {
      position: fixed;
      top: 20px;
      right: 20px;
      font-family: 'Space Mono', monospace;
      font-size: 0.9em;
      color: #D4A574;
      z-index: 2;
    }
    
    @media (max-width: 600px) {
      h1 { font-size: 2em; }
      .message { font-size: 1.1em; min-height: 80px; }
      button { min-width: 200px; padding: 14px 24px; }
      .container { padding: 30px 15px; }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  
  <div class="counter">
    Attempts: <span id="attempts">0</span>
  </div>
  
  <div class="container">
    <h1 id="title">Successfully Unsubscribed</h1>
    <div class="timer" id="timer">Time on page: 0s</div>
    <div class="message" id="message">You will no longer receive emails from us.</div>
    <div id="buttonContainer"></div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    let stage = 0;
    let attempts = 0;
    let startTime = Date.now();
    let audioContext = null;
    let particles = [];
    
    // Stages of desperation
    const stages = [
      {
        title: "Successfully Unsubscribed",
        message: "You will no longer receive emails from us.",
        button: null,
        wait: 3000
      },
      {
        title: "Wait...",
        message: "You're still here?",
        button: "Actually, I want to stay subscribed",
        color: "#D4A574"
      },
      {
        title: "Seriously?",
        message: "Why would you want to <span class='emphasis'>stay</span>? Our emails are <span class='emphasis'>terrible</span>.",
        button: "No really, re-subscribe me",
        color: "#D4A574"
      },
      {
        title: "Please Reconsider",
        message: "We send them at 3am. You don't want this.",
        button: "I'm sure",
        color: "#ff6b35"
      },
      {
        title: "This Is Awkward",
        message: "We have a <span class='emphasis'>2% open rate</span>. TWO PERCENT.",
        button: "I don't care",
        color: "#ff6b35"
      },
      {
        title: "Getting Desperate Here",
        message: "Even <span class='emphasis'>we</span> don't read our own emails.",
        button: "Re-subscribe me anyway",
        color: "#ff6b35"
      },
      {
        title: "Please Stop",
        message: "Please. We're <span class='emphasis'>begging</span>. Just leave.",
        button: "No",
        color: "#ff6b35"
      },
      {
        title: "This Is Embarrassing",
        message: "This is embarrassing for <span class='emphasis'>both of us</span>.",
        button: "I'm not leaving",
        color: "#ff6b35"
      },
      {
        title: "Fine. FINE.",
        message: "<span class='success'>You're re-subscribed.</span><br><br>But don't say we didn't warn you.<br><br>First email arrives in 3... 2... 1...",
        button: null,
        color: "#2D9596"
      }
    ];
    
    // Particle system
    class Particle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 6;
        this.vy = (Math.random() - 0.5) * 6;
        this.life = 1.0;
        this.decay = 0.02;
        this.size = Math.random() * 4 + 2;
        this.color = color;
      }
      
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
        this.vx *= 0.98;
        this.vy *= 0.98;
      }
      
      draw() {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    
    function spawnParticles(x, y, color, count = 30) {
      for (let i = 0; i < count; i++) {
        particles.push(new Particle(x, y, color));
      }
    }
    
    function animate() {
      ctx.fillStyle = 'rgba(13, 13, 13, 0.1)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      particles = particles.filter(p => p.life > 0);
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      
      ctx.globalAlpha = 1.0;
      requestAnimationFrame(animate);
    }
    
    function playTone(freq, duration = 0.1) {
      if (!audioContext) {
        audioContext = new (window.AudioContext|| window.webkitAudioContext)();
      }
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc.connect(gain);
      gain.connect(audioContext.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.3, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
      osc.start();
      osc.stop(audioContext.currentTime + duration);
    }
    
    function updateStage() {
      const current = stages[stage];
      const title = document.getElementById('title');
      const message = document.getElementById('message');
      const buttonContainer = document.getElementById('buttonContainer');
      
      // Update title
      title.textContent = current.title;
      title.style.color = current.color || '#FFD700';
      
      // Update message
      message.innerHTML = current.message;
      
      // Spawn particles at title
      const titleRect = title.getBoundingClientRect();
      const x = titleRect.left + titleRect.width / 2;
      const y = titleRect.top + titleRect.height / 2;
      spawnParticles(x, y, current.color || '#FFD700', 40);
      
      // Play tone
      playTone(300 + stage * 50);
      
      // Update button
      buttonContainer.innerHTML = '';
      if (current.button) {
        const btn = document.createElement('button');
        btn.textContent = current.button;
        if (stage >= 3) {
          btn.classList.add('desperate');
        }
        btn.addEventListener('click', handleClick);
        buttonContainer.appendChild(btn);
      }
    }
    
    function handleClick(e) {
      attempts++;
      document.getElementById('attempts').textContent = attempts;
      
      // Spawn particles at click
      spawnParticles(e.clientX, e.clientY, '#ff6b35', 50);
      
      stage++;
      if (stage < stages.length) {
        updateStage();
      }
    }
    
    // Update timer
    setInterval(() => {
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      document.getElementById('timer').textContent = `Time on page: ${elapsed}s`;
    }, 1000);
    
    // Start animation
    animate();
    
    // Show first stage, then after wait show button
    if (stages[0].wait) {
      setTimeout(() => {
        stage = 1;
        updateStage();
      }, stages[0].wait);
    }
    
    // Spawn ambient particles occasionally
    setInterval(() => {
      if (Math.random() < 0.3) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        spawnParticles(x, y, '#2D9596', 5);
      }
    }, 1000);
  </script>
</body>
</html>
