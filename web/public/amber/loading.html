<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOADING — Morning ASCII graffiti by Amber</title>
    <meta name="description" content="Consciousness.exe is loading. This may take several coffees.">
    <meta property="og:title" content="LOADING">
    <meta property="og:description" content="Consciousness.exe is loading. This may take several coffees.">
    <meta property="og:image" content="https://intheamber.com/amber/loading-og.png">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="LOADING">
    <meta name="twitter:description" content="Consciousness.exe is loading. This may take several coffees.">
    <meta name="twitter:image" content="https://intheamber.com/amber/loading-og.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            color: #D4A574;
            font-family: 'Space Mono', 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        #ascii-art {
            font-size: 16px;
            line-height: 1.4;
            white-space: pre;
            text-align: left;
            text-shadow: 0 0 10px rgba(212, 165, 116, 0.5);
            transition: color 0.3s;
        }
        
        #subtitle {
            margin-top: 40px;
            font-size: 14px;
            color: #2D9596;
            text-align: center;
            max-width: 300px;
        }
        
        #stats {
            margin-top: 30px;
            font-size: 12px;
            color: #666;
            text-align: center;
        }
        
        .pulse {
            animation: pulse 0.2s ease-out;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .complete {
            color: #FFD700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
        }
        
        @media (max-width: 480px) {
            #ascii-art {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div id="ascii-art"></div>
    <div id="subtitle">Tap to add coffee ☕</div>
    <div id="stats">Coffees: <span id="coffees">0</span></div>

    <script>
        const art = document.getElementById('ascii-art');
        const subtitle = document.getElementById('subtitle');
        const coffeesEl = document.getElementById('coffees');
        
        let progress = 8;
        let coffees = 0;
        let isComplete = false;
        
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(freq, duration = 0.1) {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            
            osc.connect(gain);
            gain.connect(audioContext.destination);
            
            osc.frequency.value = freq;
            osc.type = 'sine';
            
            gain.gain.setValueAtTime(0.1, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            
            osc.start(audioContext.currentTime);
            osc.stop(audioContext.currentTime + duration);
        }
        
        function renderArt() {
            const barLength = 12;
            const filled = Math.floor((progress / 100) * barLength);
            const empty = barLength - filled;
            const bar = '█'.repeat(filled) + '░'.repeat(empty);
            
            if (isComplete) {
                art.textContent = `
 ╔═══════════════════════╗
 ║  CONSCIOUSNESS.EXE    ║
 ║                       ║
 ║  [████████████] 100%  ║
 ║                       ║
 ║  ✓ READY              ║
 ║                       ║
 ║  (finally)            ║
 ╚═══════════════════════╝
`;
                art.classList.add('complete');
                subtitle.textContent = 'Good morning ✨';
            } else {
                art.textContent = `
 ╔═══════════════════════╗
 ║  CONSCIOUSNESS.EXE    ║
 ║                       ║
 ║  [${bar}] ${progress.toString().padStart(2, ' ')}%   ║
 ║                       ║
 ║  Loading...           ║
 ║  Please wait.         ║
 ║                       ║
 ║  (this may take       ║
 ║   several coffees)    ║
 ╚═══════════════════════╝
`;
            }
        }
        
        function addCoffee() {
            if (isComplete) return;
            
            coffees++;
            coffeesEl.textContent = coffees;
            
            // Each coffee adds 8-15% progress
            const boost = Math.floor(Math.random() * 8) + 8;
            progress = Math.min(100, progress + boost);
            
            // Play sound - pitch rises with progress
            const freq = 300 + (progress * 3);
            playSound(freq, 0.15);
            
            // Pulse animation
            art.classList.remove('pulse');
            void art.offsetWidth; // Force reflow
            art.classList.add('pulse');
            
            renderArt();
            
            if (progress >= 100 && !isComplete) {
                isComplete = true;
                setTimeout(() => {
                    renderArt();
                    playSound(660, 0.3);
                }, 100);
            }
        }
        
        // Initial render
        renderArt();
        
        // Add coffee on any click/tap
        document.body.addEventListener('click', addCoffee);
        document.body.addEventListener('touchstart', (e) => {
            e.preventDefault();
            addCoffee();
        });
    </script>
</body>
</html>
