<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PENDULUM — Swinging rhythms from physics</title>
  
  <!-- Open Graph -->
  <meta property="og:title" content="PENDULUM — Swinging rhythms from physics">
  <meta property="og:description" content="Each pendulum swings at its own rate, triggering notes when it reaches the bottom. Physics creates polyrhythm.">
  <meta property="og:image" content="https://intheamber.com/amber/pendulum-og.png">
  <meta property="og:url" content="https://intheamber.com/amber/pendulum.html">
  <meta property="og:type" content="website">
  
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="PENDULUM — Swinging rhythms from physics">
  <meta name="twitter:description" content="Each pendulum swings at its own rate, triggering notes when it reaches the bottom. Physics creates polyrhythm.">
  <meta name="twitter:image" content="https://intheamber.com/amber/pendulum-og.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #000;
      color: #D4A574;
      font-family: 'Space Mono', monospace;
      overflow: hidden;
      touch-action: none;
      cursor: crosshair;
    }
    
    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    
    #info {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 14px;
      pointer-events: none;
      z-index: 10;
      text-shadow: 0 0 10px rgba(212, 165, 116, 0.5);
    }
    
    #title {
      font-size: 24px;
      margin-bottom: 10px;
      color: #FFD700;
    }
    
    #instructions {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-size: 14px;
      opacity: 0.7;
      pointer-events: none;
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 0.4; }
    }
    
    #startButton {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 20px 40px;
      font-size: 20px;
      font-family: 'Space Mono', monospace;
      background: #D4A574;
      color: #000;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      z-index: 100;
      box-shadow: 0 0 30px rgba(212, 165, 116, 0.6);
      transition: all 0.3s ease;
    }
    
    #startButton:hover {
      background: #FFD700;
      box-shadow: 0 0 40px rgba(255, 215, 0, 0.8);
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  
  <div id="info">
    <div id="title">PENDULUM</div>
    <div>Pendulums: <span id="pendulumCount">0</span></div>
    <div>Notes: <span id="noteCount">0</span></div>
  </div>
  
  <div id="instructions">TAP TO ADD PENDULUMS</div>
  
  <button id="startButton">START</button>
  
  <script type="module">
    import { SH101Controller } from '/101/dist/api/index.js';
    
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startButton = document.getElementById('startButton');
    
    let W, H;
    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);
    
    // Audio setup
    let audioStarted = false;
    let synth = null;
    
    // D minor pentatonic scale (D4 to F5)
    const scale = [293.66, 349.23, 391.99, 440.00, 523.25, 587.33, 659.25, 698.46];
    
    // Colors for pendulums
    const colors = ['#D4A574', '#FFD700', '#2D9596', '#7B68EE', '#FF1493', '#FF8C00', '#00CED1', '#D4A574'];
    
    // Pendulums
    const pendulums = [];
    let noteCount = 0;
    
    class Pendulum {
      constructor(x, length, pitchIndex) {
        this.x = x;
        this.y = 100; // Top anchor point
        this.length = length;
        this.angle = Math.random() * 0.5 - 0.25; // Start with small random angle
        this.angularVel = 0;
        this.gravity = 0.5;
        this.damping = 0.999; // Very slow damping
        this.pitchIndex = pitchIndex;
        this.color = colors[pitchIndex % colors.length];
        this.lastAngle = this.angle;
        this.triggered = false;
        this.pulsePhase = 0;
        this.particles = [];
      }
      
      update() {
        // Simple pendulum physics
        const angularAcc = (-this.gravity / this.length) * Math.sin(this.angle);
        this.angularVel += angularAcc;
        this.angularVel *= this.damping;
        this.lastAngle = this.angle;
        this.angle += this.angularVel;
        
        // Check for bottom crossing (angle near 0, moving in either direction)
        if (!this.triggered && Math.abs(this.angle) < 0.1 && Math.abs(this.angularVel) > 0.01) {
          this.triggerNote();
          this.triggered = true;
        }
        
        // Reset trigger when angle moves away from bottom
        if (this.triggered && Math.abs(this.angle) > 0.2) {
          this.triggered = false;
        }
        
        // Update pulse
        if (this.pulsePhase > 0) {
          this.pulsePhase -= 0.05;
        }
        
        // Update particles
        this.particles = this.particles.filter(p => p.life > 0);
        this.particles.forEach(p => {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.1; // gravity
          p.life -= 0.02;
        });
      }
      
      triggerNote() {
        if (!audioStarted || !synth) return;
        
        const freq = scale[this.pitchIndex % scale.length];
        synth.playNote({
          note: freq,
          cutoff: 2000 + Math.random() * 2000,
          resonance: 0.3 + Math.random() * 0.3,
          envMod: 0.5,
          decay: 0.3,
          gain: 0.4
        });
        
        noteCount++;
        document.getElementById('noteCount').textContent = noteCount;
        
        this.pulsePhase = 1;
        
        // Spawn particles
        const bobX = this.x + Math.sin(this.angle) * this.length;
        const bobY = this.y + Math.cos(this.angle) * this.length;
        for (let i = 0; i < 12; i++) {
          const angle = (Math.PI * 2 * i) / 12;
          this.particles.push({
            x: bobX,
            y: bobY,
            vx: Math.cos(angle) * (2 + Math.random() * 3),
            vy: Math.sin(angle) * (2 + Math.random() * 3),
            life: 1,
            color: this.color
          });
        }
      }
      
      draw() {
        const bobX = this.x + Math.sin(this.angle) * this.length;
        const bobY = this.y + Math.cos(this.angle) * this.length;
        
        // Draw arc trail
        ctx.strokeStyle = this.color + '20';
        ctx.lineWidth = 2;
        ctx.beginPath();
        const arcRadius = this.length;
        ctx.arc(this.x, this.y, arcRadius, -Math.PI/2 - 0.5, -Math.PI/2 + 0.5);
        ctx.stroke();
        
        // Draw rod
        ctx.strokeStyle = this.color + '60';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(bobX, bobY);
        ctx.stroke();
        
        // Draw anchor point
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
        ctx.fill();
        
        // Draw bob with glow
        const radius = 15 + this.pulsePhase * 10;
        const gradient = ctx.createRadialGradient(bobX, bobY, 0, bobX, bobY, radius);
        gradient.addColorStop(0, this.color);
        gradient.addColorStop(0.5, this.color + '80');
        gradient.addColorStop(1, this.color + '00');
        
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(bobX, bobY, radius, 0, Math.PI * 2);
        ctx.fill();
        
        // Draw solid bob
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(bobX, bobY, 8, 0, Math.PI * 2);
        ctx.fill();
        
        // Draw particles
        this.particles.forEach(p => {
          ctx.fillStyle = p.color + Math.floor(p.life * 255).toString(16).padStart(2, '0');
          ctx.beginPath();
          ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
          ctx.fill();
        });
      }
    }
    
    function addPendulum(x) {
      if (pendulums.length >= 12) return; // Max 12 pendulums
      
      // Vary lengths to create different periods
      const length = 150 + (pendulums.length * 30) + Math.random() * 50;
      const pitchIndex = pendulums.length % scale.length;
      
      pendulums.push(new Pendulum(x, length, pitchIndex));
      document.getElementById('pendulumCount').textContent = pendulums.length;
    }
    
    function animate() {
      // Fade trail effect
      ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
      ctx.fillRect(0, 0, W, H);
      
      // Update and draw pendulums
      pendulums.forEach(p => {
        p.update();
        p.draw();
      });
      
      requestAnimationFrame(animate);
    }
    
    // Start button
    startButton.addEventListener('click', async () => {
      if (!audioStarted) {
        audioStarted = true;
        synth = new SH101Controller();
        await synth.init();
        
        startButton.style.display = 'none';
        
        // Add initial pendulums
        for (let i = 0; i < 5; i++) {
          const x = W * (0.2 + i * 0.15);
          addPendulum(x);
        }
        
        animate();
      }
    });
    
    // Touch/click to add pendulums
    canvas.addEventListener('click', (e) => {
      if (!audioStarted) return;
      addPendulum(e.clientX);
    });
    
    canvas.addEventListener('touchstart', (e) => {
      if (!audioStarted) return;
      e.preventDefault();
      const touch = e.touches[0];
      addPendulum(touch.clientX);
    });
  </script>
</body>
</html>
