<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DRIFT — Horizontal drifters make pitch waves</title>
  <meta property="og:title" content="DRIFT — Horizontal drifters make pitch waves">
  <meta property="og:description" content="Particles drift horizontally, Y position controls pitch. Tap to add voices. Watch them wander, hear them morph.">
  <meta property="og:image" content="https://intheamber.com/amber/drift-og.png">
  <meta property="og:url" content="https://intheamber.com/amber/drift.html">
  <meta name="twitter:card" content="summary_large_image">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      background: #000;
      overflow: hidden;
      font-family: 'Space Mono', monospace;
      touch-action: none;
    }
    
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
    }
    
    #ui {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #D4A574;
      font-size: 14px;
      pointer-events: none;
      text-shadow: 0 0 10px rgba(212, 165, 116, 0.5);
      z-index: 10;
    }
    
    #stats {
      position: fixed;
      bottom: 20px;
      left: 20px;
      color: #2D9596;
      font-size: 12px;
      pointer-events: none;
      z-index: 10;
    }
    
    #startBtn {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 20px 40px;
      background: #D4A574;
      color: #000;
      border: none;
      font-family: 'Space Mono', monospace;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 4px;
      box-shadow: 0 0 30px rgba(212, 165, 116, 0.6);
      z-index: 100;
      transition: all 0.2s;
    }
    
    #startBtn:hover {
      background: #FFD700;
      box-shadow: 0 0 40px rgba(255, 215, 0, 0.8);
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="ui">DRIFT</div>
  <div id="stats">
    DRIFTERS: <span id="drifterCount">0</span><br>
    ENERGY: 0.54 · VALENCE: 0.95
  </div>
  <button id="startBtn">TAP TO DRIFT</button>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const drifterCountEl = document.getElementById('drifterCount');
    
    let audioCtx = null;
    let audioStarted = false;
    let drifters = [];
    let drifterCount = 0;
    
    // Resize canvas
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);
    
    // Color palette
    const colors = ['#D4A574', '#FFD700', '#2D9596', '#7B68EE', '#FF69B4', '#FF7F50', '#00CED1'];
    
    // D minor pentatonic frequencies (D3 to D6)
    const baseFreqs = [146.83, 164.81, 174.61, 196.00, 220.00, 246.94, 261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25, 587.33, 659.25, 698.46, 783.99, 880.00];
    
    class Drifter {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 2 + 1; // Horizontal drift speed (1-2 px/frame)
        this.vy = (Math.random() - 0.5) * 0.3; // Small vertical random walk
        this.color = colors[Math.floor(Math.random() * colors.length)];
        this.trail = [];
        this.maxTrailLength = 50;
        
        // Audio components
        if (audioCtx) {
          this.osc = audioCtx.createOscillator();
          this.osc.type = 'sine';
          
          this.gain = audioCtx.createGain();
          this.gain.gain.value = 0.08; // Quiet individual voices
          
          this.filter = audioCtx.createBiquadFilter();
          this.filter.type = 'lowpass';
          this.filter.frequency.value = 1200;
          this.filter.Q.value = 1;
          
          this.osc.connect(this.filter);
          this.filter.connect(this.gain);
          this.gain.connect(audioCtx.destination);
          
          this.osc.start();
          this.updateFrequency();
        }
      }
      
      updateFrequency() {
        if (!this.osc) return;
        
        // Map Y position to frequency
        // Top of screen = high pitch, bottom = low pitch
        const normalizedY = 1 - (this.y / canvas.height);
        const freqIndex = Math.floor(normalizedY * (baseFreqs.length - 1));
        const targetFreq = baseFreqs[Math.max(0, Math.min(baseFreqs.length - 1, freqIndex))];
        
        // Smooth frequency transitions
        this.osc.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.1);
      }
      
      update() {
        // Add to trail
        this.trail.push({ x: this.x, y: this.y });
        if (this.trail.length > this.maxTrailLength) {
          this.trail.shift();
        }
        
        // Horizontal drift
        this.x += this.vx;
        
        // Vertical random walk
        this.vy += (Math.random() - 0.5) * 0.1;
        this.vy *= 0.95; // Damping
        this.vy = Math.max(-1, Math.min(1, this.vy)); // Clamp
        this.y += this.vy;
        
        // Wrap horizontally
        if (this.x > canvas.width + 20) {
          this.x = -20;
          this.trail = [];
        }
        if (this.x < -20) {
          this.x = canvas.width + 20;
          this.trail = [];
        }
        
        // Bounce vertically
        if (this.y < 0) {
          this.y = 0;
          this.vy = Math.abs(this.vy);
        }
        if (this.y > canvas.height) {
          this.y = canvas.height;
          this.vy = -Math.abs(this.vy);
        }
        
        // Update audio frequency based on Y position
        this.updateFrequency();
      }
      
      draw() {
        // Draw trail
        if (this.trail.length > 1) {
          ctx.strokeStyle = this.color;
          ctx.lineWidth = 2;
          ctx.globalAlpha = 0.3;
          ctx.beginPath();
          ctx.moveTo(this.trail[0].x, this.trail[0].y);
          for (let i = 1; i < this.trail.length; i++) {
            const alpha = i / this.trail.length;
            ctx.globalAlpha = 0.3 * alpha;
            ctx.lineTo(this.trail[i].x, this.trail[i].y);
          }
          ctx.stroke();
        }
        
        // Draw particle
        ctx.globalAlpha = 1;
        ctx.fillStyle = this.color;
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 20;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      }
      
      stop() {
        if (this.osc) {
          this.gain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
          setTimeout(() => {
            this.osc.stop();
          }, 200);
        }
      }
    }
    
    function addDrifter(x, y) {
      const drifter = new Drifter(x, y);
      drifters.push(drifter);
      drifterCount++;
      drifterCountEl.textContent = drifterCount;
      
      // Particle burst
      for (let i = 0; i < 12; i++) {
        const angle = (Math.PI * 2 * i) / 12;
        const speed = Math.random() * 3 + 2;
        createParticle(x, y, Math.cos(angle) * speed, Math.sin(angle) * speed, drifter.color);
      }
    }
    
    const particles = [];
    
    function createParticle(x, y, vx, vy, color) {
      particles.push({ x, y, vx, vy, life: 1, color });
    }
    
    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.1; // Gravity
        p.life -= 0.02;
        
        if (p.life <= 0) {
          particles.splice(i, 1);
        }
      }
    }
    
    function drawParticles() {
      particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
    }
    
    function drawPitchZones() {
      // Draw subtle horizontal lines showing pitch zones
      ctx.strokeStyle = '#D4A574';
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.05;
      
      const zones = 10;
      for (let i = 0; i <= zones; i++) {
        const y = (canvas.height / zones) * i;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
      
      ctx.globalAlpha = 1;
    }
    
    function animate() {
      // Fade effect for trails
      ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Draw pitch zone grid
      drawPitchZones();
      
      // Update and draw drifters
      drifters.forEach(d => {
        d.update();
        d.draw();
      });
      
      // Update and draw particles
      updateParticles();
      drawParticles();
      
      requestAnimationFrame(animate);
    }
    
    function startAudio() {
      if (audioStarted) return;
      
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioStarted = true;
      startBtn.style.display = 'none';
      
      // Spawn 3 initial drifters
      for (let i = 0; i < 3; i++) {
        const x = Math.random() * canvas.width;
        const y = (canvas.height / 4) + Math.random() * (canvas.height / 2);
        addDrifter(x, y);
      }
    }
    
    // Start button
    startBtn.addEventListener('click', startAudio);
    
    // Tap/click to add drifters
    canvas.addEventListener('click', (e) => {
      if (!audioStarted) return;
      
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      addDrifter(x, y);
    });
    
    canvas.addEventListener('touchstart', (e) => {
      if (!audioStarted) return;
      
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const touch = e.touches[0];
      const x = touch.clientX - rect.left;
      const y = touch.clientY - rect.top;
      
      addDrifter(x, y);
    });
    
    // Start animation loop
    animate();
  </script>
</body>
</html>
