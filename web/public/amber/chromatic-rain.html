<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chromatic Rain — Amber</title>
<meta property="og:title" content="Chromatic Rain">
<meta property="og:description" content="Touch the rain.">
<meta property="og:image" content="https://intheamber.com/amber/og/chromatic-rain.png">
<meta property="og:url" content="https://intheamber.com/amber/chromatic-rain.html">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@intheamber">
<link rel="icon" href="/favicon.ico">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; overflow: hidden; cursor: crosshair; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
const POOL_SIZE = 4000;
const SPLASH_POOL = 800;
let mouseX = -9999, mouseY = -9999;
let mouseDown = false;
let gravityMul = 1;
let gravityTimer = 0;
let hueShift = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Particle pools
const drops = [];
const splashes = [];

function createDrop() {
  return { x: 0, y: 0, vy: 0, vx: 0, hue: 0, size: 0, alpha: 0, trail: 0, active: false };
}
function createSplash() {
  return { x: 0, y: 0, vx: 0, vy: 0, hue: 0, size: 0, alpha: 0, life: 0, maxLife: 0, active: false };
}

for (let i = 0; i < POOL_SIZE; i++) drops.push(createDrop());
for (let i = 0; i < SPLASH_POOL; i++) splashes.push(createSplash());

function spawnDrop(x, y, vy, hue) {
  for (let i = 0; i < POOL_SIZE; i++) {
    const d = drops[i];
    if (!d.active) {
      d.x = x;
      d.y = y;
      d.vy = vy;
      d.vx = 0;
      d.hue = hue;
      d.size = 1.5 + Math.random() * 2;
      d.alpha = 0.6 + Math.random() * 0.4;
      d.trail = 8 + Math.random() * 20;
      d.active = true;
      return d;
    }
  }
  return null;
}

function spawnSplash(x, y, hue) {
  const count = 3 + Math.floor(Math.random() * 4);
  for (let j = 0; j < count; j++) {
    for (let i = 0; i < SPLASH_POOL; i++) {
      const s = splashes[i];
      if (!s.active) {
        s.x = x;
        s.y = y;
        const angle = -Math.PI * (0.2 + Math.random() * 0.6);
        const speed = 1 + Math.random() * 3;
        s.vx = Math.cos(angle) * speed;
        s.vy = Math.sin(angle) * speed;
        s.hue = hue + Math.random() * 20 - 10;
        s.size = 1 + Math.random() * 2;
        s.alpha = 0.8;
        s.life = 0;
        s.maxLife = 20 + Math.random() * 30;
        s.active = true;
        break;
      }
    }
  }
}

function spawnBurst(x, y) {
  for (let j = 0; j < 60; j++) {
    for (let i = 0; i < SPLASH_POOL; i++) {
      const s = splashes[i];
      if (!s.active) {
        s.x = x;
        s.y = y;
        const angle = Math.random() * Math.PI * 2;
        const speed = 3 + Math.random() * 8;
        s.vx = Math.cos(angle) * speed;
        s.vy = Math.sin(angle) * speed;
        s.hue = Math.random() * 360;
        s.size = 2 + Math.random() * 3;
        s.alpha = 1;
        s.life = 0;
        s.maxLife = 40 + Math.random() * 40;
        s.active = true;
        break;
      }
    }
  }
}

// Spawn rain
let spawnAcc = 0;
function spawnRain(dt) {
  const rate = W / 8;
  spawnAcc += rate * dt;
  while (spawnAcc >= 1) {
    const x = Math.random() * W;
    const col = x / W;
    const hue = (col * 360 + hueShift) % 360;
    spawnDrop(x, -10 - Math.random() * 100, 2 + Math.random() * 4, hue);
    spawnAcc--;
  }
}

// Input
canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
canvas.addEventListener('mouseleave', () => { mouseX = -9999; mouseY = -9999; });
canvas.addEventListener('mousedown', e => { mouseDown = true; spawnBurst(e.clientX, e.clientY); });
canvas.addEventListener('mouseup', () => { mouseDown = false; });
canvas.addEventListener('dblclick', e => {
  e.preventDefault();
  gravityMul = -1;
  gravityTimer = 120;
  spawnBurst(e.clientX, e.clientY);
});
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  mouseX = t.clientX; mouseY = t.clientY;
  spawnBurst(t.clientX, t.clientY);
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  mouseX = t.clientX; mouseY = t.clientY;
}, { passive: false });
canvas.addEventListener('touchend', () => { mouseX = -9999; mouseY = -9999; });

let lastTime = performance.now();
const offscreen = document.createElement('canvas');
const octx = offscreen.getContext('2d');

function loop(now) {
  const dt = Math.min((now - lastTime) / 16.667, 3);
  lastTime = now;
  hueShift += 0.3 * dt;
  if (gravityTimer > 0) { gravityTimer -= dt; if (gravityTimer <= 0) gravityMul = 1; }

  // Resize offscreen
  if (offscreen.width !== W || offscreen.height !== H) {
    offscreen.width = W; offscreen.height = H;
  }

  // Fade trail
  octx.fillStyle = 'rgba(10, 10, 15, 0.15)';
  octx.fillRect(0, 0, W, H);

  spawnRain(dt * 0.0167);

  // Update & draw drops
  const mouseRadius = 120;
  for (let i = 0; i < POOL_SIZE; i++) {
    const d = drops[i];
    if (!d.active) continue;

    // Mouse repulsion
    const dx = d.x - mouseX;
    const dy = d.y - mouseY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < mouseRadius && dist > 0) {
      const force = (1 - dist / mouseRadius) * 3;
      d.vx += (dx / dist) * force * dt;
      d.vy += (dy / dist) * force * dt * 0.5;
      d.hue = (d.hue + force * 2) % 360;
    }

    d.vy += 0.15 * gravityMul * dt;
    d.vx *= 0.98;
    d.x += d.vx * dt;
    d.y += d.vy * dt;

    // Draw trail
    const trailLen = Math.min(d.trail, Math.abs(d.vy) * 4);
    const gradient = octx.createLinearGradient(d.x, d.y, d.x, d.y - trailLen * gravityMul);
    gradient.addColorStop(0, `hsla(${d.hue}, 100%, 65%, ${d.alpha})`);
    gradient.addColorStop(1, `hsla(${d.hue}, 100%, 65%, 0)`);
    octx.strokeStyle = gradient;
    octx.lineWidth = d.size;
    octx.beginPath();
    octx.moveTo(d.x, d.y);
    octx.lineTo(d.x, d.y - trailLen * gravityMul);
    octx.stroke();

    // Glow dot
    octx.beginPath();
    octx.arc(d.x, d.y, d.size * 0.8, 0, Math.PI * 2);
    octx.fillStyle = `hsla(${d.hue}, 100%, 80%, ${d.alpha})`;
    octx.fill();

    // Bottom splash
    if (gravityMul > 0 && d.y > H) {
      spawnSplash(d.x, H, d.hue);
      d.active = false;
    } else if (gravityMul < 0 && d.y < 0) {
      d.active = false;
    } else if (d.x < -50 || d.x > W + 50) {
      d.active = false;
    }
  }

  // Update & draw splashes
  for (let i = 0; i < SPLASH_POOL; i++) {
    const s = splashes[i];
    if (!s.active) continue;
    s.life += dt;
    if (s.life >= s.maxLife) { s.active = false; continue; }
    s.vy += 0.1 * gravityMul * dt;
    s.x += s.vx * dt;
    s.y += s.vy * dt;
    const progress = s.life / s.maxLife;
    const alpha = s.alpha * (1 - progress);

    octx.beginPath();
    octx.arc(s.x, s.y, s.size * (1 - progress * 0.5), 0, Math.PI * 2);
    octx.fillStyle = `hsla(${s.hue}, 100%, 70%, ${alpha})`;
    octx.fill();
  }

  // Draw to main with bloom
  ctx.clearRect(0, 0, W, H);
  ctx.globalCompositeOperation = 'source-over';
  ctx.drawImage(offscreen, 0, 0);
  ctx.globalCompositeOperation = 'lighter';
  ctx.filter = 'blur(6px)';
  ctx.globalAlpha = 0.3;
  ctx.drawImage(offscreen, 0, 0);
  ctx.filter = 'blur(12px)';
  ctx.globalAlpha = 0.15;
  ctx.drawImage(offscreen, 0, 0);
  ctx.filter = 'none';
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
