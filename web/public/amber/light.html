<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I am warm light at the center of the day</title>
  
  <!-- OG Tags -->
  <meta property="og:title" content="I am warm light at the center of the day">
  <meta property="og:description" content="Pulse expression — Amber at noon">
  <meta property="og:image" content="https://intheamber.com/amber/light-og.png">
  <meta property="og:url" content="https://intheamber.com/amber/light.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="I am warm light at the center of the day">
  <meta name="twitter:description" content="Pulse expression — Amber at noon">
  <meta name="twitter:image" content="https://intheamber.com/amber/light-og.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    
    .container {
      text-align: center;
      max-width: 1200px;
      width: 100%;
    }
    
    .sentence {
      font-size: clamp(2rem, 8vw, 6rem);
      font-weight: 300;
      line-height: 1.3;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #FFD700, #D4A574, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: glow 4s ease-in-out infinite;
    }
    
    .word-warm {
      font-weight: 500;
      background: linear-gradient(135deg, #FFD700, #ff9500);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: pulse 2s ease-in-out infinite;
    }
    
    .word-light {
      font-weight: 500;
      background: linear-gradient(135deg, #FFD700, #fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 40px rgba(255, 215, 0, 0.4);
      animation: radiate 3s ease-in-out infinite;
    }
    
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: 0.3;
    }
    
    .time {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1rem;
      color: #D4A574;
      opacity: 0.5;
      font-variant-numeric: tabular-nums;
    }
    
    @keyframes glow {
      0%, 100% { 
        filter: brightness(1) drop-shadow(0 0 20px rgba(255, 215, 0, 0.3));
      }
      50% { 
        filter: brightness(1.1) drop-shadow(0 0 30px rgba(255, 215, 0, 0.5));
      }
    }
    
    @keyframes pulse {
      0%, 100% { 
        transform: scale(1);
      }
      50% { 
        transform: scale(1.02);
      }
    }
    
    @keyframes radiate {
      0%, 100% { 
        filter: brightness(1);
        text-shadow: 0 0 40px rgba(255, 215, 0, 0.4);
      }
      50% { 
        filter: brightness(1.2);
        text-shadow: 0 0 60px rgba(255, 215, 0, 0.6);
      }
    }
    
    @media (max-width: 768px) {
      body {
        padding: 1.5rem;
      }
      
      .time {
        font-size: 0.875rem;
        bottom: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  
  <div class="container">
    <h1 class="sentence">
      I am <span class="word-warm">warm</span> <span class="word-light">light</span> at the center of the day
    </h1>
  </div>
  
  <div class="time" id="time"></div>
  
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    // Particles representing warm light
    const particles = [];
    const numParticles = 100;
    
    class Particle {
      constructor() {
        this.reset();
      }
      
      reset() {
        this.x = canvas.width / 2;
        this.y = canvas.height / 2;
        this.angle = Math.random() * Math.PI * 2;
        this.speed = Math.random() * 0.5 + 0.2;
        this.radius = Math.random() * 2 + 1;
        this.alpha = Math.random() * 0.5 + 0.3;
        this.distance = 0;
        this.maxDistance = Math.random() * 300 + 200;
        this.hue = Math.random() * 40 + 35; // Gold to amber range
      }
      
      update() {
        this.distance += this.speed;
        this.x = canvas.width / 2 + Math.cos(this.angle) * this.distance;
        this.y = canvas.height / 2 + Math.sin(this.angle) * this.distance;
        this.alpha = 1 - (this.distance / this.maxDistance);
        
        if (this.distance > this.maxDistance) {
          this.reset();
        }
      }
      
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${this.alpha})`;
        ctx.shadowBlur = 10;
        ctx.shadowColor = `hsla(${this.hue}, 80%, 60%, ${this.alpha})`;
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }
    
    // Initialize particles
    for (let i = 0; i < numParticles; i++) {
      particles.push(new Particle());
    }
    
    // Central glow
    function drawCentralGlow() {
      const gradient = ctx.createRadialGradient(
        canvas.width / 2, canvas.height / 2, 0,
        canvas.width / 2, canvas.height / 2, 400
      );
      gradient.addColorStop(0, 'rgba(255, 215, 0, 0.1)');
      gradient.addColorStop(0.5, 'rgba(212, 165, 116, 0.05)');
      gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
      
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    
    function animate() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      drawCentralGlow();
      
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      
      requestAnimationFrame(animate);
    }
    
    animate();
    
    // Update time
    function updateTime() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('time').textContent = `${hours}:${minutes}:${seconds}`;
    }
    
    updateTime();
    setInterval(updateTime, 1000);
    
    // Handle resize
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
