<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MARMALADE — Amber</title>
<meta property="og:title" content="MARMALADE">
<meta property="og:description" content="thick light on dark glass">
<meta property="og:image" content="https://intheamber.com/amber/og/marmalade.png">
<meta property="og:url" content="https://intheamber.com/amber/marmalade.html">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="MARMALADE">
<meta name="twitter:description" content="thick light on dark glass">
<meta name="twitter:image" content="https://intheamber.com/amber/og/marmalade.png">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔮</text></svg>">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; touch-action: none; cursor: crosshair; }
canvas { display: block; width: 100vw; height: 100vh; }
#sig { position: fixed; bottom: 12px; right: 16px; font: 11px/1 monospace; color: rgba(255,215,0,0.25); pointer-events: none; z-index: 10; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="sig">AMBER × NEW MOON</div>
<script>
const c = document.getElementById('c');
const gl = c.getContext('webgl', { alpha: false, preserveDrawingBuffer: true });

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  c.width = window.innerWidth * dpr;
  c.height = window.innerHeight * dpr;
  gl.viewport(0, 0, c.width, c.height);
}
resize();
window.addEventListener('resize', resize);

const PALETTE = [
  [1.0, 0.84, 0.0],    // gold
  [0.96, 0.62, 0.04],   // amber
  [0.18, 0.59, 0.59],   // teal
  [0.08, 0.72, 0.65],   // mint teal
  [0.23, 0.51, 0.96],   // electric blue
  [0.93, 0.29, 0.60],   // hot pink
  [0.55, 0.36, 0.96],   // purple
  [0.98, 0.45, 0.09],   // coral
  [0.52, 0.80, 0.09],   // lime
];

// Metaball shader — thick glossy blobs
const vs = `attribute vec2 a_pos;
void main(){ gl_Position = vec4(a_pos, 0.0, 1.0); }`;

const fs = `precision highp float;
uniform vec2 u_res;
uniform float u_time;
#define MAX_BLOBS 64
uniform vec3 u_blobs[MAX_BLOBS]; // xy = pos, z = radius
uniform vec3 u_colors[MAX_BLOBS];
uniform int u_count;
uniform float u_alphas[MAX_BLOBS];

void main(){
  vec2 uv = gl_FragCoord.xy / u_res;
  float sum = 0.0;
  vec3 col = vec3(0.0);
  float totalWeight = 0.0;

  for(int i = 0; i < MAX_BLOBS; i++){
    if(i >= u_count) break;
    vec2 d = uv - u_blobs[i].xy;
    d.x *= u_res.x / u_res.y;
    float r = u_blobs[i].z;
    float dist = dot(d, d);
    float field = (r * r) / (dist + 0.0001);
    float w = field * u_alphas[i];
    sum += w;
    col += u_colors[i] * w;
    totalWeight += w;
  }

  if(totalWeight > 0.0) col /= totalWeight;

  // Threshold for metaball surface
  float t = smoothstep(0.8, 1.6, sum);

  // Glossy highlight
  float highlight = smoothstep(2.5, 4.0, sum) * 0.3;

  // Edge glow
  float edge = smoothstep(0.6, 0.9, sum) * (1.0 - smoothstep(0.9, 1.3, sum)) * 0.4;

  vec3 bg = vec3(0.035, 0.03, 0.04);
  vec3 final = mix(bg, col, t) + highlight + vec3(col * edge);

  // Subtle film grain
  float grain = (fract(sin(dot(gl_FragCoord.xy + u_time, vec2(12.9898, 78.233))) * 43758.5453) - 0.5) * 0.03;

  gl_FragColor = vec4(final + grain, 1.0);
}`;

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, vs));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fs));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const uRes = gl.getUniformLocation(prog, 'u_res');
const uTime = gl.getUniformLocation(prog, 'u_time');
const uCount = gl.getUniformLocation(prog, 'u_count');
const uBlobs = [], uColors = [], uAlphas = [];
for (let i = 0; i < 64; i++) {
  uBlobs.push(gl.getUniformLocation(prog, `u_blobs[${i}]`));
  uColors.push(gl.getUniformLocation(prog, `u_colors[${i}]`));
  uAlphas.push(gl.getUniformLocation(prog, `u_alphas[${i}]`));
}

const blobs = [];

function addBlob(x, y) {
  const color = PALETTE[Math.floor(Math.random() * PALETTE.length)];
  const r = 0.04 + Math.random() * 0.06;
  blobs.push({
    x, y,
    vx: (Math.random() - 0.5) * 0.003,
    vy: (Math.random() - 0.5) * 0.003 + 0.0005, // slight rise
    r,
    color,
    alpha: 0,
    fadeIn: true,
    life: 1.0,
    decay: 0.0003 + Math.random() * 0.0004,
    wobblePhase: Math.random() * Math.PI * 2,
    wobbleSpeed: 0.5 + Math.random() * 1.5,
  });
  // Cap at 60
  while (blobs.length > 60) blobs.shift();
}

// Seed some initial blobs
for (let i = 0; i < 8; i++) {
  addBlob(0.2 + Math.random() * 0.6, 0.2 + Math.random() * 0.6);
  blobs[blobs.length - 1].alpha = 0.8;
  blobs[blobs.length - 1].fadeIn = false;
}

// Auto-spawn
let autoTimer = 0;
function autoSpawn(dt) {
  autoTimer += dt;
  if (autoTimer > 1.2) {
    autoTimer = 0;
    addBlob(0.1 + Math.random() * 0.8, 0.1 + Math.random() * 0.8);
  }
}

// Touch/mouse
function getUV(e) {
  const rect = c.getBoundingClientRect();
  const touch = e.touches ? e.touches[0] : e;
  return {
    x: (touch.clientX - rect.left) / rect.width,
    y: 1.0 - (touch.clientY - rect.top) / rect.height
  };
}

let pointerDown = false;
let spawnAcc = 0;

function onDown(e) { e.preventDefault(); pointerDown = true; const uv = getUV(e); addBlob(uv.x, uv.y); }
function onMove(e) {
  e.preventDefault();
  if (!pointerDown) return;
  spawnAcc++;
  if (spawnAcc % 3 === 0) { const uv = getUV(e); addBlob(uv.x, uv.y); }
}
function onUp() { pointerDown = false; spawnAcc = 0; }

c.addEventListener('mousedown', onDown);
c.addEventListener('mousemove', onMove);
c.addEventListener('mouseup', onUp);
c.addEventListener('touchstart', onDown, { passive: false });
c.addEventListener('touchmove', onMove, { passive: false });
c.addEventListener('touchend', onUp);

let lastTime = 0;
function frame(t) {
  const dt = Math.min((t - lastTime) / 1000, 0.05);
  lastTime = t;

  autoSpawn(dt);

  // Update blobs
  for (let i = blobs.length - 1; i >= 0; i--) {
    const b = blobs[i];
    if (b.fadeIn) {
      b.alpha = Math.min(b.alpha + dt * 2.0, 1.0);
      if (b.alpha >= 1.0) b.fadeIn = false;
    }
    b.life -= b.decay;
    if (b.life <= 0) { blobs.splice(i, 1); continue; }
    b.alpha = Math.min(b.alpha, b.life);

    // Slow drift + wobble
    b.wobblePhase += b.wobbleSpeed * dt;
    b.x += b.vx * dt * 60 + Math.sin(b.wobblePhase) * 0.0003;
    b.y += b.vy * dt * 60 + Math.cos(b.wobblePhase * 0.7) * 0.0002;

    // Soft boundary
    if (b.x < -0.1 || b.x > 1.1 || b.y < -0.1 || b.y > 1.1) {
      b.life = 0;
    }
  }

  gl.uniform2f(uRes, c.width, c.height);
  gl.uniform1f(uTime, t * 0.001);
  gl.uniform1i(uCount, blobs.length);

  for (let i = 0; i < blobs.length && i < 64; i++) {
    gl.uniform3f(uBlobs[i], blobs[i].x, blobs[i].y, blobs[i].r);
    gl.uniform3f(uColors[i], blobs[i].color[0], blobs[i].color[1], blobs[i].color[2]);
    gl.uniform1f(uAlphas[i], blobs[i].alpha);
  }

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
