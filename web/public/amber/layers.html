<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAYERS - Tap bands to layer ambient drones</title>
  
  <!-- OG tags -->
  <meta property="og:title" content="LAYERS">
  <meta property="og:description" content="Tap bands to layer ambient drones">
  <meta property="og:image" content="https://intheamber.com/amber/layers-og.png">
  <meta property="og:url" content="https://intheamber.com/amber/layers.html">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="LAYERS">
  <meta name="twitter:description" content="Tap bands to layer ambient drones">
  <meta name="twitter:image" content="https://intheamber.com/amber/layers-og.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #000;
      color: #D4A574;
      font-family: 'Space Mono', monospace;
      overflow: hidden;
      cursor: pointer;
    }
    
    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    
    #start-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      gap: 20px;
    }
    
    #start-button {
      background: #D4A574;
      color: #000;
      border: none;
      padding: 20px 40px;
      font-size: 24px;
      font-family: 'Space Mono', monospace;
      font-weight: bold;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
    }
    
    #start-button:hover {
      background: #FFD700;
      transform: scale(1.05);
    }
    
    #title {
      font-size: 48px;
      font-weight: bold;
      color: #FFD700;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
      margin-bottom: 10px;
    }
    
    #subtitle {
      font-size: 16px;
      color: #2D9596;
      text-align: center;
      max-width: 400px;
    }
    
    #stats {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 14px;
      color: #D4A574;
      opacity: 0.7;
      font-family: 'Space Mono', monospace;
      z-index: 50;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px;
      border-radius: 4px;
    }
    
    #instructions {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      color: #2D9596;
      opacity: 0.7;
      text-align: center;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  
  <div id="start-overlay">
    <div id="title">LAYERS</div>
    <div id="subtitle">Tap bands to layer ambient drones. Build your soundscape.</div>
    <button id="start-button">START</button>
  </div>
  
  <div id="stats">
    ACTIVE: <span id="active-count">0</span> / 7
  </div>
  
  <div id="instructions">
    Tap any band to toggle it on/off
  </div>

  <script type="module">
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startOverlay = document.getElementById('start-overlay');
    const startButton = document.getElementById('start-button');
    const activeCountEl = document.getElementById('active-count');
    
    let audioCtx;
    let started = false;
    let layers = [];
    
    // D minor pentatonic scale
    const frequencies = [
      146.83, // D3
      174.61, // F3
      196.00, // G3
      220.00, // A3
      261.63, // C4
      293.66, // D4
      349.23  // F4
    ];
    
    const colors = [
      '#D4A574', // amber
      '#FFD700', // gold
      '#2D9596', // teal
      '#7B68EE', // violet
      '#FF69B4', // pink
      '#FF6B35', // orange
      '#00CED1'  // cyan
    ];
    
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    
    function initLayers() {
      const bandHeight = canvas.height / 7;
      
      for (let i = 0; i < 7; i++) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();
        
        osc.type = 'sine';
        osc.frequency.value = frequencies[i];
        
        filter.type = 'lowpass';
        filter.frequency.value = 800;
        
        gain.gain.value = 0; // Start silent
        
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start();
        
        layers.push({
          index: i,
          y: i * bandHeight,
          height: bandHeight,
          frequency: frequencies[i],
          color: colors[i],
          active: false,
          osc,
          gain,
          phase: Math.random() * Math.PI * 2,
          targetGain: 0,
          currentGain: 0
        });
      }
    }
    
    function toggleLayer(index) {
      const layer = layers[index];
      layer.active = !layer.active;
      layer.targetGain = layer.active ? 0.08 : 0; // Gentle volume
      
      // Audio feedback
      if (layer.active) {
        const feedback = audioCtx.createOscillator();
        const feedbackGain = audioCtx.createGain();
        feedback.frequency.value = layer.frequency;
        feedbackGain.gain.value = 0.1;
        feedbackGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        feedback.connect(feedbackGain);
        feedbackGain.connect(audioCtx.destination);
        feedback.start();
        feedback.stop(audioCtx.currentTime + 0.3);
      }
      
      updateStats();
    }
    
    function updateStats() {
      const activeCount = layers.filter(l => l.active).length;
      activeCountEl.textContent = activeCount;
    }
    
    function handleClick(e) {
      if (!started) return;
      
      const rect = canvas.getBoundingClientRect();
      const y = e.clientY - rect.top;
      
      const layerIndex = Math.floor((y / canvas.height) * 7);
      if (layerIndex >= 0 && layerIndex < 7) {
        toggleLayer(layerIndex);
      }
    }
    
    function handleTouch(e) {
      e.preventDefault();
      if (!started) return;
      
      const rect = canvas.getBoundingClientRect();
      const touch = e.touches[0];
      const y = touch.clientY - rect.top;
      
      const layerIndex = Math.floor((y / canvas.height) * 7);
      if (layerIndex >= 0 && layerIndex < 7) {
        toggleLayer(layerIndex);
      }
    }
    
    function drawWave(layer) {
      const amplitude = 20;
      const wavelength = 200;
      const speed = 0.02;
      
      layer.phase += speed;
      
      ctx.beginPath();
      ctx.strokeStyle = layer.color;
      ctx.lineWidth = 2;
      
      for (let x = 0; x < canvas.width; x += 5) {
        const y = layer.y + layer.height / 2 + 
                  Math.sin(x / wavelength * Math.PI * 2 + layer.phase) * amplitude;
        
        if (x === 0) {
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
      }
      
      ctx.stroke();
    }
    
    function drawParticles(layer) {
      const particleCount = 3;
      
      for (let i = 0; i < particleCount; i++) {
        const x = (Date.now() * 0.05 + i * canvas.width / particleCount) % canvas.width;
        const y = layer.y + layer.height / 2 + Math.sin(x * 0.01) * 15;
        
        ctx.beginPath();
        ctx.arc(x, y, 3, 0, Math.PI * 2);
        ctx.fillStyle = layer.color;
        ctx.shadowBlur = 15;
        ctx.shadowColor =layer.color;
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }
    
    function animate() {
      // Dark fade
      ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Draw all layers
      layers.forEach((layer, i) => {
        // Smooth gain transitions
        layer.currentGain += (layer.targetGain - layer.currentGain) * 0.1;
        layer.gain.gain.value = layer.currentGain;
        
        // Draw band background
        ctx.fillStyle = layer.active 
          ? `${layer.color}10` 
          : 'rgba(255, 255, 255, 0.02)';
        ctx.fillRect(0, layer.y, canvas.width, layer.height);
        
        // Draw separator line
        ctx.strokeStyle = 'rgba(212, 165, 116, 0.2)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, layer.y);
        ctx.lineTo(canvas.width, layer.y);
        ctx.stroke();
        
        // Draw active layer visuals
        if (layer.active) {
          // Glow effect
          ctx.shadowBlur = 30;
          ctx.shadowColor = layer.color;
          
          drawWave(layer);
          drawParticles(layer);
          
          ctx.shadowBlur = 0;
          
          // Layer label
          ctx.fillStyle = layer.color;
          ctx.font = '12px Space Mono';
          ctx.fillText(`${Math.round(layer.frequency)} Hz`, 20, layer.y + 30);
        } else {
          // Dim label for inactive
          ctx.fillStyle = 'rgba(212, 165, 116, 0.3)';
          ctx.font = '12px Space Mono';
          ctx.fillText(`${Math.round(layer.frequency)} Hz`, 20, layer.y + 30);
        }
      });
      
      requestAnimationFrame(animate);
    }
    
    startButton.addEventListener('click', () => {
      if (!audioCtx) {
        audioCtx = new AudioContext();
        initLayers();
      }
      
      audioCtx.resume();
      started = true;
      startOverlay.style.display = 'none';
      animate();
    });
    
    canvas.addEventListener('click', handleClick);
    canvas.addEventListener('touchstart', handleTouch);
    
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
  </script>
</body>
</html>
