<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>CASCADE — Falling notes make music on impact</title>

  <!-- Open Graph -->
  <meta property="og:title" content="CASCADE — Falling notes make music on impact">
  <meta property="og:description" content="Tap to create waterfalls of musical notes. Watch them cascade down and trigger melodies when they hit the ground.">
  <meta property="og:image" content="https://intheamber.com/amber/cascade-og.png">
  <meta property="og:url" content="https://intheamber.com/amber/cascade.html">
  <meta property="og:type" content="website">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="CASCADE — Falling notes make music on impact">
  <meta name="twitter:description" content="Tap to create waterfalls of musical notes. Watch them cascade down and trigger melodies when they hit the ground.">
  <meta name="twitter:image" content="https://intheamber.com/amber/cascade-og.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0D0D0D;
      overflow: hidden;
      font-family: 'Space Mono', monospace;
      color: #D4A574;
      touch-action: none;
    }

    canvas {
      display: block;
      cursor: pointer;
    }

    .ui {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 14px;
      pointer-events: none;
      text-shadow: 0 0 10px rgba(212, 165, 116, 0.5);
    }

    .title {
      font-size: 24px;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    .subtitle {
      font-size: 12px;
      opacity: 0.6;
      margin-bottom: 20px;
    }

    .stats {
      font-size: 12px;
      opacity: 0.8;
    }

    .start-prompt {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
      text-align: center;
      pointer-events: all;
      cursor: pointer;
      padding: 20px 40px;
      background: rgba(212, 165, 116, 0.1);
      border: 2px solid #D4A574;
      border-radius: 4px;
      transition: all 0.3s;
    }

    .start-prompt:hover {
      background: rgba(212, 165, 116, 0.2);
      box-shadow: 0 0 20px rgba(212, 165, 116, 0.4);
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div class="ui">
    <div class="title">CASCADE</div>
    <div class="subtitle">Tap to create falling notes</div>
    <div class="stats">
      <div>Cascades: <span id="cascades">0</span></div>
      <div>Notes played: <span id="notes">0</span></div>
    </div>
  </div>

  <div class="start-prompt" id="startPrompt">TAP TO BEGIN</div>

  <script type="module">
    import { SH101Controller } from '/101/dist/api/index.js';

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startPrompt = document.getElementById('startPrompt');

    let width, height;
    let audioStarted = false;
    let synth = null;

    // Stats
    let cascadeCount = 0;
    let notesPlayed = 0;

    // D minor pentatonic - 2 octaves
    const SCALE = [
      { note: 'D4', freq: 293.66, color: '#D4A574' },  // amber
      { note: 'F4', freq: 349.23, color: '#FFD700' },  // gold
      { note: 'G4', freq: 392.00, color: '#2D9596' },  // teal
      { note: 'A4', freq: 440.00, color: '#7B68EE' },  // violet
      { note: 'C5', freq: 523.25, color: '#FF69B4' },  // hot pink
      { note: 'D5', freq: 587.33, color: '#FF6B35' },  // orange
      { note: 'F5', freq: 698.46, color: '#00CED1' },  // cyan
      { note: 'G5', freq: 783.99, color: '#F59E0B' }   // bright amber
    ];

    // Falling notes
    const notes = [];
    const particles = [];

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }

    function init() {
      resize();
      window.addEventListener('resize', resize);

      // Start animation immediately (visual only)
      animate();

      // Add some initial cascades for visual interest
      for (let i = 0; i < 3; i++) {
        setTimeout(() => {
          const x = Math.random() * width;
          spawnCascade(x, false); // Don't play sound yet
        }, i * 500);
      }

      // Handle start
      startPrompt.addEventListener('click', startAudio);
      canvas.addEventListener('click', handleClick);
      canvas.addEventListener('touchstart', handleTouch);
    }

    function startAudio() {
      if (!audioStarted) {
        audioStarted = true;
        synth = new SH101Controller();
        synth.masterVolume.value = 0.4;
        startPrompt.style.display = 'none';
      }
    }

    function handleClick(e) {
      startAudio();
      spawnCascade(e.clientX, true);
    }

    function handleTouch(e) {
      e.preventDefault();
      startAudio();
      for (let touch of e.touches) {
        spawnCascade(touch.clientX, true);
      }
    }

    function spawnCascade(x, withSound) {
      const scaleNote = SCALE[Math.floor(Math.random() * SCALE.length)];

      // Create stream of falling notes
      const streamSize = 5 + Math.floor(Math.random() * 8);

      for (let i = 0; i < streamSize; i++) {
        notes.push({
          x: x + (Math.random() - 0.5) * 30,
          y: -i * 40 - Math.random() * 20,
          vx: (Math.random() - 0.5) * 1,
          vy: 2 + Math.random() * 2,
          size: 4 + Math.random() * 4,
          color: scaleNote.color,
          freq: scaleNote.freq,
          note: scaleNote.note,
          life: 1.0,
          phase: Math.random() * Math.PI *2,
          withSound: withSound
        });
      }

      cascadeCount++;
      document.getElementById('cascades').textContent = cascadeCount;
    }

    function playNote(freq, note) {
      if (!audioStarted || !synth) return;

      const cutoff = 0.3 + Math.random() * 0.4;
      const resonance = 0.2 + Math.random() * 0.3;

      synth.triggerAttackRelease(note, 0.3, {
        cutoff,
        resonance,
        envMod: 0.4,
        decay: 0.2
      });

      notesPlayed++;
      document.getElementById('notes').textContent = notesPlayed;
    }

    function createImpactParticles(x, y, color) {
      for (let i = 0; i < 15; i++) {
        const angle = (Math.random() * Math.PI) - Math.PI; // Upward burst
        const speed = 2 + Math.random() * 4;
        particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          size: 2 + Math.random() * 3,
          color,
          life: 1.0
        });
      }
    }

    function animate() {
      requestAnimationFrame(animate);

      // Fade trail
      ctx.fillStyle = 'rgba(13, 13, 13, 0.1)';
      ctx.fillRect(0, 0, width, height);

      // Update and draw notes
      for (let i = notes.length - 1; i >= 0; i--) {
        const note = notes[i];

        // Physics
        note.vy += 0.15; // Gravity
        note.x += note.vx;
        note.y += note.vy;
        note.phase += 0.1;

        // Check impact
        if (note.y >= height - 50) {
          if (note.withSound) {
            playNote(note.freq, note.note);
          }
          createImpactParticles(note.x, height - 50, note.color);
          notes.splice(i, 1);
          continue;
        }

        // Fade if off screen
        if (note.x < -50 || note.x > width + 50) {
          notes.splice(i, 1);
          continue;
        }

        // Draw note with glow
        const pulse = 0.7 + Math.sin(note.phase) * 0.3;

        ctx.shadowBlur = 20;
        ctx.shadowColor = note.color;
        ctx.fillStyle = note.color;
        ctx.globalAlpha = note.life * pulse;

        ctx.beginPath();
        ctx.arc(note.x, note.y, note.size, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;
      }

      // Update and draw particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];

        p.vy += 0.2; // Gravity
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.02;

        if (p.life <= 0) {
          particles.splice(i, 1);
          continue;
        }

        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life * 0.8;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalAlpha = 1;
      }

      // Draw ground line
      ctx.strokeStyle = '#D4A574';
      ctx.globalAlpha = 0.3;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, height - 50);
      ctx.lineTo(width, height - 50);
      ctx.stroke();
      ctx.globalAlpha = 1;

      // Auto-spawn cascades for ambient activity
      if (Math.random() < 0.008) {
        const x = Math.random() * width;
        spawnCascade(x, audioStarted);
      }
    }

    init();
  </script>
</body>
</html>
