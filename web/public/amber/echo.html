<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECHO — Rhythm Delay Machine</title>
  
  <!-- OG tags -->
  <meta property="og:title" content="ECHO — Rhythm Delay Machine">
  <meta property="og:description" content="Tap to create beats. Hear them echo back. Build polyrhythmic patterns from simple inputs.">
  <meta property="og:image" content="https://intheamber.com/amber/echo-og.png">
  <meta property="og:url" content="https://intheamber.com/amber/echo.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="ECHO — Rhythm Delay Machine">
  <meta name="twitter:description" content="Tap to create beats. Hear them echo back. Build polyrhythmic patterns from simple inputs.">
  <meta name="twitter:image" content="https://intheamber.com/amber/echo-og.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Space Mono', monospace;
      background: #000;
      color: #D4A574;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    
    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }
    
    .ui {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      text-align: center;
      pointer-events: none;
    }
    
    h1 {
      font-size: 2rem;
      color: #FFD700;
      text-shadow: 0 0 20px #FFD700;
      margin-bottom: 0.5rem;
      letter-spacing: 0.3rem;
    }
    
    .subtitle {
      font-size: 0.9rem;
      color: #2D9596;
      margin-bottom: 1rem;
    }
    
    .instruction {
      font-size: 1rem;
      color: #D4A574;
      margin-top: 0.5rem;
      opacity: 0.8;
    }
    
    .stats {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 2rem;
      font-size: 0.9rem;
      pointer-events: none;
    }
    
    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .stat-label {
      color: #2D9596;
      font-size: 0.7rem;
      text-transform: uppercase;
      margin-bottom: 0.25rem;
    }
    
    .stat-value {
      color: #FFD700;
      font-size: 1.2rem;
      text-shadow: 0 0 10px #FFD700;
    }
    
    .start-btn {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 100;
      background: #7B68EE;
      color: #FFD700;
      border: 3px solid #FFD700;
      padding: 20px 40px;
      font-size: 1.5rem;
      font-family: 'Space Mono', monospace;
      cursor: pointer;
      box-shadow: 0 0 30px #7B68EE;
      pointer-events: auto;
      text-transform: uppercase;
      letter-spacing: 0.2rem;
      transition: all 0.2s;
    }
    
    .start-btn:hover {
      background: #8B78FF;
      box-shadow: 0 0 50px #7B68EE;
      transform: translate(-50%, -50%) scale(1.05);
    }
    
    .start-btn:active {
      transform: translate(-50%, -50%) scale(0.95);
    }
    
    @media (max-width: 600px) {
      h1 {
        font-size: 1.5rem;
      }
      .subtitle {
        font-size: 0.8rem;
      }
      .stats {
        gap: 1rem;
        font-size: 0.8rem;
      }
      .start-btn {
        font-size: 1.2rem;
        padding: 15px 30px;
      }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  
  <div class="ui">
    <h1>ECHO</h1>
    <div class="subtitle">Rhythm Delay Machine</div>
    <div class="instruction">TAP TO CREATE ECHOES</div>
  </div>
  
  <div class="stats">
    <div class="stat-item">
      <div class="stat-label">Taps</div>
      <div class="stat-value" id="taps">0</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Active Echoes</div>
      <div class="stat-value" id="echoes">0</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Total Beats</div>
      <div class="stat-value" id="beats">0</div>
    </div>
  </div>
  
  <button class="start-btn" id="startBtn">START</button>
  
  <script type="module">
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    
    let audioStarted = false;
    let audioCtx;
    
    // Stats
    let tapCount = 0;
    let totalBeats = 0;
    
    // Canvas setup
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);
    
    // Color palette
    const colors = [
      '#D4A574', // amber
      '#FFD700', // gold
      '#2D9596', // teal
      '#7B68EE', // violet
      '#FF1493', // hot pink
      '#FF6B6B', // coral
      '#00CED1', // cyan
      '#32CD32'  // lime
    ];
    
    let colorIndex = 0;
    
    // Echo rings
    const echoRings = [];
    
    class EchoRing {
      constructor(x, y, color, echoNumber) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.echoNumber = echoNumber; // 0 = original, 1-4 = echoes
        this.radius = 0;
        this.maxRadius = 150 + (echoNumber * 30); // Each echo goes slightly wider
        this.alpha = 1 - (echoNumber * 0.15); // Each echo is fainter
        this.lineWidth = 8 - (echoNumber * 1.5); // Each echo is thinner
        this.expandSpeed = 2 + (echoNumber * 0.3);
        this.alive = true;
      }
      
      update() {
        this.radius += this.expandSpeed;
        if (this.radius >= this.maxRadius) {
          this.alive = false;
        }
      }
      
      draw() {
        const fadeAlpha = this.alpha * (1 - this.radius / this.maxRadius);
        ctx.strokeStyle = this.color;
        ctx.globalAlpha = fadeAlpha;
        ctx.lineWidth = this.lineWidth;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.stroke();
        
        // Inner glow
        ctx.shadowBlur = 20;
        ctx.shadowColor = this.color;
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
    }
    
    // Particles for visual feedback
    const particles = [];
    
    class Particle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 4;
        this.vy = (Math.random() - 0.5) * 4;
        this.color = color;
        this.alpha = 1;
        this.size = Math.random() * 3 + 2;
        this.life = 1;
      }
      
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= 0.02;
        this.alpha = this.life;
      }
      
      draw() {
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }
    
    // Audio synthesis - 909-style clap
    function playClap(volume = 1, delay = 0) {
      if (!audioStarted) return;
      
      const now = audioCtx.currentTime + delay;
      
      // Noise burst for clap body
      const noise = audioCtx.createBufferSource();
      const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i++) {
        data[i] = Math.random() * 2 - 1;
      }
      noise.buffer = buffer;
      
      const noiseFilter = audioCtx.createBiquadFilter();
      noiseFilter.type = 'bandpass';
      noiseFilter.frequency.value = 1200;
      noiseFilter.Q.value = 2;
      
      const noiseGain = audioCtx.createGain();
      noiseGain.gain.setValueAtTime(0, now);
      noiseGain.gain.linearRampToValueAtTime(volume * 0.6, now + 0.001);
      noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
      
      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(audioCtx.destination);
      
      noise.start(now);
      noise.stop(now + 0.1);
      
      // Tone component
      const osc = audioCtx.createOscillator();
      osc.type = 'triangle';
      osc.frequency.value = 800;
      
      const oscGain = audioCtx.createGain();
      oscGain.gain.setValueAtTime(0, now);
      oscGain.gain.linearRampToValueAtTime(volume * 0.3, now + 0.001);
      oscGain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
      
      osc.connect(oscGain);
      oscGain.connect(audioCtx.destination);
      
      osc.start(now);
      osc.stop(now + 0.06);
      
      totalBeats++;
      updateStats();
    }
    
    // Delay/echo system
    const ECHO_COUNT = 4; // Number of echoes
    const DELAY_TIME = 0.25; // 250ms between echoes (240 BPM 16th notes)
    
function createEcho(x, y, color) {
      // Create original hit
      echoRings.push(new EchoRing(x, y, color, 0));
      playClap(1, 0);
      
      // Spawn particles
      for (let i = 0; i < 15; i++) {
        particles.push(new Particle(x, y, color));
      }
      
      // Schedule echoes
      for (let i = 1; i <= ECHO_COUNT; i++) {
        const volume = 1 - (i * 0.18); // Each echo is quieter
        const delayTime = DELAY_TIME * i;
        
        // Schedule audio
        setTimeout(() => {
          playClap(volume, 0);
        }, delayTime * 1000);
        
        // Schedule visual
        setTimeout(() => {
          echoRings.push(new EchoRing(x, y, color, i));
          // Fewer particles for echoes
          for (let j = 0; j < 8; j++) {
            particles.push(new Particle(x, y, color));
          }
        }, delayTime * 1000);
      }
    }
    
    // Ambient background pulse (before START)
    const ambientPulses = [];
    
    class AmbientPulse {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.radius = 0;
        this.maxRadius = 100;
        this.alpha = 0.3;
        this.color = colors[Math.floor(Math.random() * colors.length)];
        this.speed = 1;
      }
      
      update() {
        this.radius += this.speed;
        if (this.radius >= this.maxRadius) {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.radius = 0;
          this.color = colors[Math.floor(Math.random() * colors.length)];
        }
      }
      
      draw() {
        const fadeAlpha = this.alpha * (1 - this.radius / this.maxRadius);
        ctx.globalAlpha = fadeAlpha * 0.3;
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.stroke();
      }
    }
    
    // Create ambient pulses
    for (let i = 0; i < 5; i++) {
      ambientPulses.push(new AmbientPulse());
    }
    
    // Update stats
    function updateStats() {
      document.getElementById('taps').textContent = tapCount;
      document.getElementById('echoes').textContent = echoRings.length;
      document.getElementById('beats').textContent = totalBeats;
    }
    
    // Animation loop
    function animate() {
      requestAnimationFrame(animate);
      
      // Fade trail
      ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      ctx.globalAlpha = 1;
      
      // Draw ambient pulses (always visible)
      if (!audioStarted) {
        ambientPulses.forEach(pulse => {
          pulse.update();
          pulse.draw();
        });
      }
      
      // Update and draw echo rings
      for (let i = echoRings.length - 1; i >= 0; i--) {
        const ring = echoRings[i];
        ring.update();
        ring.draw();
        if (!ring.alive) {
          echoRings.splice(i, 1);
        }
      }
      
      // Update and draw particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.update();
        p.draw();
        if (p.life <= 0) {
          particles.splice(i, 1);
        }
      }
      
      ctx.globalAlpha = 1;
      updateStats();
    }
    
    animate();
    
    // Start button
    startBtn.addEventListener('click', () => {
      if (!audioStarted) {
        audioCtx = new AudioContext();
        audioStarted = true;
        startBtn.style.display = 'none';
      }
    });
    
    // Tap to create echoes
    function handleTap(e) {
      if (!audioStarted) return;
      
      e.preventDefault();
      
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX || e.touches[0].clientX) - rect.left;
      const y = (e.clientY || e.touches[0].clientY) - rect.top;
      
      const color = colors[colorIndex];
      colorIndex = (colorIndex + 1) % colors.length;
      
      createEcho(x, y, color);
      tapCount++;
      updateStats();
    }
    
    canvas.addEventListener('click', handleTap);
    canvas.addEventListener('touchstart', handleTap);
  </script>
</body>
</html>
