<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ECHO — Tap. Listen. Fade.</title>
  
  <!-- OG tags -->
  <meta property="og:title" content="ECHO — Tap. Listen. Fade.">
  <meta property="og:description" content="A minimal echo machine. Each tap creates a tone that repeats and fades into silence.">
  <meta property="og:image" content="https://intheamber.com/amber/echo-og.png">
  <meta property="og:url" content="https://intheamber.com/amber/echo.html">
  <meta name="twitter:card" content="summary_large_image">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Space Mono', monospace;
      color: #D4A574;
      touch-action: none;
    }

    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
    }

    #ui {
      position: fixed;
      top: 20px;
      left: 20px;
      pointer-events: none;
      z-index: 10;
    }

    #title {
      font-size: 24px;
      font-weight: bold;
      color: #D4A574;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    #subtitle {
      font-size: 14px;
      color: rgba(212, 165, 116, 0.6);
      margin-bottom: 20px;
    }

    #instructions {
      font-size: 12px;
      color: rgba(212, 165, 116, 0.4);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(212, 165, 116, 0.3);
      transition: background 0.3s;
    }

    #status.active {
      background: #2D9596;
      box-shadow: 0 0 10px #2D9596;
    }

    @media (max-width: 768px) {
      #title { font-size: 20px; }
      #subtitle { font-size: 12px; }
      #instructions { font-size: 11px; }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  
  <div id="ui">
    <div id="title">ECHO</div>
    <div id="subtitle">Tap. Listen. Fade.</div>
    <div id="instructions">
      <div id="status"></div>
      <span id="instructionText">Tap anywhere to start</span>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const instructionText = document.getElementById('instructionText');

    let audioContext = null;
    let audioStarted = false;
    
    // Canvas setup
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // Ring objects
    const rings = [];

    class Ring {
      constructor(x, y, color, maxRadius) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.radius = 0;
        this.maxRadius = maxRadius;
        this.alpha = 1;
        this.speed = 2; // pixels per frame
        this.lineWidth = 2;
      }

      update() {
        this.radius += this.speed;
        
        // Fade as it expands
        this.alpha = 1 - (this.radius / this.maxRadius);
        
        // Fade out completely when near max
        if (this.radius > this.maxRadius * 0.8) {
          this.alpha *= (this.maxRadius - this.radius) / (this.maxRadius * 0.2);
        }
        
        return this.radius < this.maxRadius;
      }

      draw() {
        ctx.save();
        ctx.strokeStyle = this.color;
        ctx.globalAlpha = Math.max(0, this.alpha);
        ctx.lineWidth = this.lineWidth;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
    }

    // Audio setup
    function initAudio() {
      if (!audioContext) {
        audioContext = new AudioContext();
        
        // Create global delay node for echo effect
        window.delayNode = audioContext.createDelay(2.0);
        delayNode.delayTime.value = 0.3; // 300ms echo
        
        window.feedbackGain = audioContext.createGain();
        feedbackGain.gain.value = 0.5; // 50% feedback
        
        window.wetGain = audioContext.createGain();
        wetGain.gain.value = 0.7; // Echo volume
        
        window.dryGain = audioContext.createGain();
        dryGain.gain.value = 0.8; // Direct signal volume
        
        // Create feedback loop: delay -> feedback -> delay
        delayNode.connect(feedbackGain);
        feedbackGain.connect(delayNode);
        delayNode.connect(wetGain);
        wetGain.connect(audioContext.destination);
      }
      
      if (audioContext.state === 'suspended') {
        audioContext.resume();
      }
    }

    // Play note with echo visualization
    function playNote(x, y) {
      if (!audioContext) return;
      
      // Map Y position to frequency (top = high, bottom = low)
      const minFreq = 200;  // Low note
      const maxFreq = 800;  // High note
      const freq = maxFreq - ((y / canvas.height) * (maxFreq - minFreq));
      
      // Map X position to color
      const colors = ['#D4A574', '#FFD700', '#2D9596', '#7B68EE'];
      const colorIndex = Math.floor((x / canvas.width) * colors.length);
      const color = colors[colorIndex];
      
      // Create oscillator
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      
      osc.type = 'sine';
      osc.frequency.value = freq;
      
      // Envelope
      const now = audioContext.currentTime;
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
      
      // Route through dry and delay
      osc.connect(gain);
      gain.connect(dryGain);
      gain.connect(delayNode);
      
      dryGain.connect(audioContext.destination);
      
      osc.start(now);
      osc.stop(now + 0.5);
      
      // Create visual rings for the initial tap and echoes
      spawnEchoRings(x, y, color, freq);
    }

    // Spawn rings for initial hit and echoes
    function spawnEchoRings(x, y, color, freq) {
      const echoCount = 5; // Number of echoes to visualize
      const echoDelay = 300; // ms, matches audio delay
      const maxRadius = 300;
      
      // Initial ring (largest)
      rings.push(new Ring(x, y, color, maxRadius));
      
      // Echo rings (spawn with delay)
      for (let i = 1; i <= echoCount; i++) {
        setTimeout(() => {
          const echoAlpha = Math.pow(0.5, i); // Fade each echo
          const echoColor = color + Math.floor(echoAlpha * 255).toString(16).padStart(2, '0');
          const echoMaxRadius = maxRadius * (1 - i * 0.1); // Smaller rings
          rings.push(new Ring(x, y, echoColor, echoMaxRadius));
        }, i * echoDelay);
      }
    }

    // Animation loop
    function animate() {
      // Dark fade instead of clear for trails
      ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Update and draw rings
      for (let i = rings.length - 1; i >= 0; i--) {
        const ring = rings[i];
        const alive = ring.update();
        ring.draw();
        
        if (!alive) {
          rings.splice(i, 1);
        }
      }
      
      requestAnimationFrame(animate);
    }

    // Start animation immediately (visual works before audio)
    animate();

    // Interaction
    function handleTap(e) {
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX || e.touches?.[0]?.clientX) - rect.left;
      const y = (e.clientY || e.touches?.[0]?.clientY) - rect.top;
      
      // Initialize audio on first tap
      if (!audioStarted) {
        initAudio();
        audioStarted = true;
        status.classList.add('active');
        instructionText.textContent = 'Tap anywhere';
      }
      
      playNote(x, y);
    }

    canvas.addEventListener('click', handleTap);
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      handleTap(e);
    });
  </script>
</body>
</html>
