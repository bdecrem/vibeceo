<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FEED — Don't let it starve. Don't let it pop.</title>
  
  <!-- OG tags -->
  <meta property="og:title" content="FEED — Don't let it starve. Don't let it pop.">
  <meta property="og:description" content="Tap to feed the blob. Keep it alive. Don't overfeed it.">
  <meta property="og:image" content="https://intheamber.com/amber/feed-og.png">
  <meta property="og:url" content="https://intheamber.com/amber/feed.html">
  <meta name="twitter:card" content="summary_large_image">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      background: #000;
      color: #D4A574;
      font-family: 'Space Mono', monospace;
      overflow: hidden;
      touch-action: none;
    }
    
    #canvas {
      display: block;
      background: #000;
    }
    
    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      pointer-events: none;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    #title {
      font-size: 18px;
      color: #FFD700;
      margin-bottom: 4px;
    }
    
    #subtitle {
      font-size: 11px;
      color: #2D9596;
      margin-bottom: 16px;
    }
    
    #stats {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    
    .stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    
    .stat-label {
      font-size: 10px;
      color: #666;
    }
    
    .stat-value {
      font-size: 16px;
      color: #D4A574;
    }
    
    #gameOver {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      display: none;
      pointer-events: none;
    }
    
    #gameOver.show {
      display: block;
    }
    
    #gameOverText {
      font-size: 32px;
      color: #FFD700;
      margin-bottom: 12px;
    }
    
    #gameOverReason {
      font-size: 16px;
      color: #2D9596;
      margin-bottom: 20px;
    }
    
    #gameOverScore {
      font-size: 20px;
      color: #D4A574;
      margin-bottom: 8px;
    }
    
    #gameOverBest {
      font-size: 14px;
      color: #666;
      margin-bottom: 24px;
    }
    
    #tapToRestart {
      font-size: 12px;
      color: #FFD700;
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    
    @media (max-width: 600px) {
      #title { font-size: 16px; }
      #subtitle { font-size: 10px; }
      #stats { gap: 12px; }
      .stat-value { font-size: 14px; }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  
  <div id="ui">
    <div id="title">FEED</div>
    <div id="subtitle">Don't let it starve. Don't let it pop.</div>
    <div id="stats">
      <div class="stat">
        <div class="stat-label">Time</div>
        <div class="stat-value" id="time">0s</div>
      </div>
      <div class="stat">
        <div class="stat-label">Fed</div>
        <div class="stat-value" id="fed">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Best</div>
        <div class="stat-value" id="best">0s</div>
      </div>
    </div>
  </div>
  
  <div id="gameOver">
    <div id="gameOverText">GAME OVER</div>
    <div id="gameOverReason"></div>
    <div id="gameOverScore"></div>
    <div id="gameOverBest"></div>
    <div id="tapToRestart">Tap to restart</div>
  </div>
  
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let W, H;
    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);
    
    // Audio
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let audioStarted = false;
    
    function playTone(freq, duration = 0.1, type = 'sine') {
      if (!audioStarted) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }
    
    // Game state
    let blob = null;
    let food = [];
    let particles = [];
    let gameActive = false;
    let startTime = 0;
    let timeAlive = 0;
    let foodEaten = 0;
    let bestTime = parseInt(localStorage.getItem('feedBest') || '0');
    
    const MIN_SIZE = 30;
    const MAX_SIZE = 200;
    const START_SIZE = 80;
    const SHRINK_RATE = 0.15; // size lost per second
    const GROW_AMOUNT = 15;
    const FOOD_SIZE = 8;
    
    class Blob {
      constructor() {
        this.x = W / 2;
        this.y = H / 2;
        this.size = START_SIZE;
        this.targetX = this.x;
        this.targetY = this.y;
        this.vx = 0;
        this.vy = 0;
      }
      
      update(dt) {
        // Shrink over time
        this.size -= SHRINK_RATE * dt;
        
        // Move toward target (closest food)
        const speed = 100;
        const dx = this.targetX - this.x;
        const dy = this.targetY - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        
        if (dist > 5) {
          this.vx = (dx / dist) * speed * dt;
          this.vy = (dy / dist) * speed * dt;
          this.x += this.vx;
          this.y += this.vy;
        }
        
        // Check food collisions
        for (let i = food.length - 1; i >= 0; i--) {
          const f = food[i];
          const fdx = f.x - this.x;
          const fdy = f.y - this.y;
          const fdist = Math.sqrt(fdx * fdx + fdy * fdy);
          
          if (fdist < this.size / 2 + FOOD_SIZE) {
            // Eat food
            this.size += GROW_AMOUNT;
            foodEaten++;
            food.splice(i, 1);
            
            // Particles
            for (let j = 0; j < 20; j++) {
              particles.push({
                x: f.x,
                y: f.y,
                vx: (Math.random() - 0.5) * 200,
                vy: (Math.random() - 0.5) * 200,
                life: 1,
                color: '#FFD700'
              });
            }
            
            playTone(440 + foodEaten * 20, 0.15);
          }
        }
        
        // Check death conditions
        if (this.size < MIN_SIZE) {
          endGame('STARVED', 'Too hungry. Feed more often.');
        } else if (this.size > MAX_SIZE) {
          endGame('EXPLODED', 'Overfed. It popped.');
        }
        
        // Update target to nearest food
        if (food.length > 0) {
          let nearest = food[0];
          let nearestDist = Infinity;
          
          for (const f of food) {
            const dx = f.x - this.x;
            const dy = f.y - this.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < nearestDist) {
              nearestDist = dist;
              nearest = f;
            }
          }
          
          this.targetX = nearest.x;
          this.targetY = nearest.y;
        }
      }
      
      draw() {
        const healthRatio = (this.size - MIN_SIZE) / (MAX_SIZE - MIN_SIZE);
        let color = '#4CAF50'; // green = healthy
        
        if (healthRatio < 0.3) {
          color = '#FF6B6B'; // red = starving
        } else if (healthRatio > 0.7) {
          color = '#FFD700'; // yellow = getting full
        }
        
        // Glow
        const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size / 2 + 20);
        gradient.addColorStop(0, color + '44');
        gradient.addColorStop(1, color + '00');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, W, H);
        
        // Body
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size / 2, 0, Math.PI * 2);
        ctx.fill();
        
        // Eyes
        const eyeOffset = this.size * 0.15;
        const eyeSize = this.size * 0.1;
        
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(this.x - eyeOffset, this.y - eyeOffset / 2, eyeSize, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.beginPath();
        ctx.arc(this.x + eyeOffset, this.y - eyeOffset / 2, eyeSize, 0, Math.PI * 2);
        ctx.fill();
        
        // Mouth (smile if healthy, frown if not)
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 2;
        ctx.beginPath();
        if (healthRatio > 0.3 && healthRatio < 0.7) {
          // Smile
          ctx.arc(this.x, this.y + eyeOffset / 2, eyeOffset, 0.2 * Math.PI, 0.8 * Math.PI);
        } else {
          // Worried
          ctx.arc(this.x, this.y + eyeOffset * 1.5, eyeOffset, 1.2 * Math.PI, 1.8 * Math.PI, true);
        }
        ctx.stroke();
      }
    }
    
    function startGame() {
      gameActive = true;
      startTime = Date.now();
      timeAlive = 0;
      foodEaten = 0;
      blob = new Blob();
      food = [];
      particles = [];
      document.getElementById('gameOver').classList.remove('show');
    }
    
    function endGame(reason, message) {
      gameActive = false;
      
      // Explosion particles
      const explosionCount = reason === 'EXPLODED' ? 100 : 50;
      for (let i = 0; i < explosionCount; i++) {
        particles.push({
          x: blob.x,
          y: blob.y,
          vx: (Math.random() - 0.5) * 400,
          vy: (Math.random() - 0.5) * 400,
          life: 1,
          color: reason === 'EXPLODED' ? '#FFD700' : '#FF6B6B'
        });
      }
      
      // Sound
      if (reason === 'EXPLODED') {
        playTone(880, 0.3, 'sawtooth');
        setTimeout(() => playTone(440, 0.3, 'sawtooth'), 100);
        setTimeout(() => playTone(220, 0.5, 'sawtooth'), 200);
      } else {
        playTone(330, 0.5);
        setTimeout(() => playTone(220, 0.5), 200);
        setTimeout(() => playTone(165, 0.8), 400);
      }
      
      // Update best
      if (timeAlive > bestTime) {
        bestTime = timeAlive;
        localStorage.setItem('feedBest', bestTime.toString());
        document.getElementById('gameOverBest').innerHTML = '🏆 NEW RECORD!';
      } else {
        document.getElementById('gameOverBest').innerHTML = `Best: ${bestTime}s`;
      }
      
      // Show game over
      document.getElementById('gameOverReason').textContent = message;
      document.getElementById('gameOverScore').textContent = `Survived: ${timeAlive}s`;
      document.getElementById('gameOver').classList.add('show');
    }
    
    function dropFood(x, y) {
      food.push({ x, y });
      
      // Particle burst
      for (let i = 0; i < 10; i++) {
        particles.push({
          x,
          y,
          vx: (Math.random() - 0.5) * 100,
          vy: (Math.random() - 0.5) * 100,
          life: 1,
          color: '#2D9596'
        });
      }
      
      playTone(330, 0.1);
    }
    
    // Input
    function handleInput(e) {
      e.preventDefault();
      
      if (!audioStarted) {
        audioCtx.resume();
        audioStarted = true;
      }
      
      const rect = canvas.getBoundingClientRect();
      const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
      const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
      
      if (!gameActive) {
        startGame();
      } else {
        dropFood(x, y);
      }
    }
    
    canvas.addEventListener('mousedown', handleInput);
    canvas.addEventListener('touchstart', handleInput);
    
    // Update
    let lastTime = Date.now();
    
    function update() {
      const now = Date.now();
      const dt = Math.min((now - lastTime) / 1000, 0.1);
      lastTime = now;
      
      // Clear with fade
      ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
      ctx.fillRect(0, 0, W, H);
      
      if (gameActive) {
        timeAlive = Math.floor((now - startTime) / 1000);
        blob.update(dt);
        blob.draw();
        
        // Draw food
        for (const f of food) {
          ctx.fillStyle = '#2D9596';
          ctx.beginPath();
          ctx.arc(f.x, f.y, FOOD_SIZE, 0, Math.PI * 2);
          ctx.fill();
          
          // Glow
          const gradient = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, FOOD_SIZE + 10);
          gradient.addColorStop(0, '#2D9596' + '88');
          gradient.addColorStop(1, '#2D9596' + '00');
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(f.x, f.y, FOOD_SIZE + 10, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      
      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 300 * dt; // gravity
        p.life -= dt;
        
        if (p.life <= 0) {
          particles.splice(i, 1);
        } else {
          ctx.fillStyle = p.color + Math.floor(p.life * 255).toString(16).padStart(2, '0');
          ctx.beginPath();
          ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      
      // Update UI
      document.getElementById('time').textContent = timeAlive + 's';
      document.getElementById('fed').textContent = foodEaten;
      document.getElementById('best').textContent = bestTime + 's';
      
      requestAnimationFrame(update);
    }
    
    update();
    
    // Start message
    setTimeout(() => {
      if (!gameActive) {
        ctx.fillStyle = '#FFD700';
        ctx.font = '16px Space Mono';
        ctx.textAlign = 'center';
        ctx.fillText('TAP TO START', W / 2, H / 2);
      }
    }, 100);
  </script>
</body>
</html>
