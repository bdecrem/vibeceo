<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPARK — One click. Watch it spread.</title>
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="SPARK — One click. Watch it spread.">
    <meta property="og:description" content="A chain reaction toy by Amber">
    <meta property="og:image" content="https://intheamber.com/amber/spark-og.png">
    <meta property="og:url" content="https://intheamber.com/amber/spark.html">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="SPARK — One click. Watch it spread.">
    <meta name="twitter:description" content="A chain reaction toy by Amber">
    <meta name="twitter:image" content="https://intheamber.com/amber/spark-og.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Space Mono', monospace;
            color: #D4A574;
            touch-action: none;
        }

        canvas {
            display: block;
            cursor: pointer;
        }

        #ui {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        #title {
            font-size: 24px;
            font-weight: bold;
            color: #D4A574;
            text-shadow: 0 0 20px rgba(212, 165, 116, 0.6);
            margin-bottom: 8px;
        }

        #subtitle {
            font-size: 14px;
            color: #2D9596;
            opacity: 0.8;
        }

        #stats {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 14px;
            color: #D4A574;
            text-shadow: 0 0 10px rgba(212, 165, 116, 0.4);
        }

        #gameOver {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
            z-index: 20;
        }

        #gameOver.show {
            display: block;
        }

        #finalScore {
            font-size: 48px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
            margin-bottom: 10px;
        }

        #message {
            font-size: 18px;
            color: #D4A574;
            margin-bottom: 20px;
        }

        #restartBtn {
            padding: 15px 30px;
            font-size: 16px;
            font-family: 'Space Mono', monospace;
            font-weight: bold;
            color: #000;
            background: #D4A574;
            border: none;
            cursor: pointer;
            pointer-events: all;
            box-shadow: 0 0 20px rgba(212, 165, 116, 0.5);
            transition: all 0.2s;
        }

        #restartBtn:hover {
            background: #FFD700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.7);
        }

        #restartBtn:active {
            transform: scale(0.95);
        }

        @media (max-width: 600px) {
            #title {
                font-size: 20px;
            }
            #subtitle {
                font-size: 12px;
            }
            #stats {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="title">SPARK</div>
        <div id="subtitle">One click. Watch it spread.</div>
    </div>

    <div id="stats">
        Circles: <span id="circleCount">0</span><br>
        Chain: <span id="chainCount">0</span><br>
        Best: <span id="bestChain">0</span>
    </div>

    <div id="gameOver">
        <div id="finalScore">0</div>
        <div id="message">CHAIN COMPLETE</div>
        <button id="restartBtn">SPARK AGAIN</button>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Audio context
        let audioCtx;
        let audioStarted = false;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            audioStarted = true;
        }

        function playPop(frequency = 440, duration = 0.1) {
            if (!audioStarted) return;
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.frequency.value = frequency;
            osc.type = 'sine';
            
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // Game state
        let circles = [];
        let shockwaves = [];
        let particles = [];
        let chainCount = 0;
        let bestChain = parseInt(localStorage.getItem('sparkBestChain') || '0');
        let gameStarted = false;
        let gameOver = false;

        document.getElementById('bestChain').textContent = bestChain;

        // Circle class
        class Circle {
            constructor(x, y, radius, color) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.color = color;
                this.alive = true;
                this.pulsePhase = Math.random() * Math.PI * 2;
            }

            draw() {
                if (!this.alive) return;

                // Pulse effect
                const pulse = Math.sin(this.pulsePhase) * 0.1 + 0.9;
                const r = this.radius * pulse;

                // Glow
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * 1.5);
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(0.5, this.color + '88');
                gradient.addColorStop(1, this.color + '00');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, r * 1.5, 0, Math.PI * 2);
                ctx.fill();

                // Core
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
                ctx.fill();

                this.pulsePhase += 0.05;
            }

            pop() {
                if (!this.alive) return false;
                
                this.alive = false;
                chainCount++;
                
                // Create shockwave
                shockwaves.push(new Shockwave(this.x, this.y, this.color));
                
                // Create particles
                for (let i = 0; i < 20; i++) {
                    const angle = (Math.PI * 2 * i) / 20;
                    const speed = 2 + Math.random() * 3;
                    particles.push(new Particle(
                        this.x,
                        this.y,
                        Math.cos(angle) * speed,
                        Math.sin(angle) * speed,
                        this.color
                    ));
                }

                // Play pop sound (pitch rises with chain)
                const basePitch = 200;
                const pitch = basePitch + (chainCount * 30);
                playPop(Math.min(pitch, 1000), 0.15);

                return true;
            }
        }

        // Shockwave class
        class Shockwave {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = 150;
                this.speed = 5;
                this.color = color;
                this.alpha = 1;
                this.width = 3;
            }

            update() {
                this.radius += this.speed;
                this.alpha = 1 - (this.radius / this.maxRadius);
                
                // Check collisions with circles
                if (this.alpha > 0.3) {
                    circles.forEach(circle => {
                        if (!circle.alive) return;
                        
                        const dx = circle.x - this.x;
                        const dy = circle.y - this.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        
                        if (Math.abs(dist - this.radius) < circle.radius) {
                            circle.pop();
                        }
                    });
                }
                
                return this.radius < this.maxRadius;
            }

            draw() {
                ctx.strokeStyle = this.color + Math.floor(this.alpha * 255).toString(16).padStart(2, '0');
                ctx.lineWidth = this.width;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        // Particle class
        class Particle {
            constructor(x, y, vx, vy, color) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.alpha = 1;
                this.life = 1;
                this.size = 2 + Math.random() * 3;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.life -= 0.02;
                this.alpha = this.life;
                return this.life > 0;
            }

            draw() {
                ctx.fillStyle = this.color + Math.floor(this.alpha * 255).toString(16).padStart(2, '0');
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Initialize game
        function initGame() {
            circles = [];
            shockwaves = [];
            particles = [];
            chainCount = 0;
            gameStarted = false;
            gameOver = false;

            document.getElementById('gameOver').classList.remove('show');

            // Colors
            const colors = ['#D4A574', '#FFD700', '#2D9596', '#7B68EE'];

            // Generate circles
            const numCircles = 30;
            const margin = 60;
            
            for (let i = 0; i < numCircles; i++) {
                let x, y, tooClose;
                let attempts = 0;
                
                do {
                    x = margin + Math.random() * (canvas.width - margin * 2);
                    y = margin + Math.random() * (canvas.height - margin * 2);
                    tooClose = false;
                    
                    // Check if too close to existing circles
                    for (let circle of circles) {
                        const dx = circle.x - x;
                        const dy = circle.y - y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 60) {
                            tooClose = true;
                            break;
                        }
                    }
                    
                    attempts++;
                } while (tooClose && attempts < 50);
                
                if (!tooClose || attempts >= 50) {
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    circles.push(new Circle(x, y, 15, color));
                }
            }

            updateStats();
        }

        // Update stats
        function updateStats() {
            const aliveCount = circles.filter(c => c.alive).length;
            document.getElementById('circleCount').textContent = aliveCount;
            document.getElementById('chainCount').textContent = chainCount;
        }

        // Handle click/tap
        canvas.addEventListener('click', (e) => {
            initAudio();

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            if (gameOver) {
                initGame();
                return;
            }

            if (gameStarted) return;

            // Find clicked circle
            for (let circle of circles) {
                if (!circle.alive) continue;
                
                const dx = circle.x - x;
                const dy = circle.y - y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < circle.radius) {
                    circle.pop();
                    gameStarted = true;
                    break;
                }
            }
        });

        // Animation loop
        function animate() {
            // Fade effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update and draw circles
            circles.forEach(circle => circle.draw());

            // Update and draw shockwaves
            shockwaves = shockwaves.filter(wave => {
                const alive = wave.update();
                if (alive) wave.draw();
                return alive;
            });

            // Update and draw particles
            particles = particles.filter(particle => {
                const alive = particle.update();
                if (alive) particle.draw();
                return alive;
            });

            // Update stats
            if (gameStarted) {
                updateStats();

                // Check if chain is complete
                const aliveCount = circles.filter(c => c.alive).length;
                if (shockwaves.length === 0 && aliveCount > 0 && !gameOver) {
gameOver = true;
                    showGameOver();
                } else if (aliveCount === 0 && !gameOver) {
                    gameOver = true;
                    showGameOver();
                }
            }

            requestAnimationFrame(animate);
        }

        // Show game over
        function showGameOver() {
            const aliveCount = circles.filter(c => c.alive).length;
            const cleared = circles.length - aliveCount;
            
            document.getElementById('finalScore').textContent = cleared + ' / ' + circles.length;
            
            if (aliveCount === 0) {
                document.getElementById('message').textContent = '🏆 PERFECT CHAIN!';
                // Play victory sound
                playPop(880, 0.3);
                setTimeout(() => playPop(1100, 0.3), 150);
            } else {
                document.getElementById('message').textContent = 'Chain stopped at ' + chainCount;
                playPop(200, 0.4);
            }

            // Update best
            if (chainCount > bestChain) {
                bestChain = chainCount;
                localStorage.setItem('sparkBestChain', bestChain);
                document.getElementById('bestChain').textContent = bestChain;
            }

            document.getElementById('gameOver').classList.add('show');
        }

        // Restart button
        document.getElementById('restartBtn').addEventListener('click', () => {
            initGame();
        });

        // Handle resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (!gameStarted) initGame();
        });

        // Start
        initGame();
        animate();
    </script>
</body>
</html>
