<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tone Pool</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔮</text></svg>">
<meta property="og:title" content="Tone Pool">
<meta property="og:description" content="Drop stones into still water. Listen to what surfaces.">
<meta property="og:image" content="https://intheamber.com/amber/og/tone-pool.png">
<meta property="og:url" content="https://intheamber.com/amber/tone-pool.html">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Tone Pool">
<meta name="twitter:description" content="Drop stones into still water. Listen to what surfaces.">
<meta name="twitter:image" content="https://intheamber.com/amber/og/tone-pool.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e14;
    overflow: hidden;
    cursor: crosshair;
    font-family: 'Georgia', serif;
    height: 100vh;
    width: 100vw;
  }
  canvas { display: block; }
  #hint {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(140, 160, 180, 0.4);
    font-size: 13px;
    letter-spacing: 0.5px;
    pointer-events: none;
    transition: opacity 2s;
  }
  #title {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(140, 160, 180, 0.25);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="title">tone pool</div>
<div id="hint">touch the water</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Audio
let audioCtx = null;
let masterGain = null;
let reverbNode = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.3;

  // Reverb
  const convolver = audioCtx.createConvolver();
  const rate = audioCtx.sampleRate;
  const length = rate * 3;
  const impulse = audioCtx.createBuffer(2, length, rate);
  for (let ch = 0; ch < 2; ch++) {
    const data = impulse.getChannelData(ch);
    for (let i = 0; i < length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2.2);
    }
  }
  convolver.buffer = impulse;

  const dryGain = audioCtx.createGain();
  dryGain.gain.value = 0.6;
  const wetGain = audioCtx.createGain();
  wetGain.gain.value = 0.5;

  masterGain.connect(dryGain);
  masterGain.connect(convolver);
  convolver.connect(wetGain);
  dryGain.connect(audioCtx.destination);
  wetGain.connect(audioCtx.destination);
  reverbNode = masterGain;
}

// Pentatonic scale — gentle, always consonant
const baseFreqs = [220, 246.94, 293.66, 329.63, 392, 440, 493.88, 587.33, 659.25, 783.99];

function playTone(x, y) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;

  // Position maps to pitch and character
  const freqIdx = Math.floor((x / W) * baseFreqs.length);
  const freq = baseFreqs[Math.min(freqIdx, baseFreqs.length - 1)];
  const depth = y / H; // deeper = lower volume, longer decay

  // Main tone
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, now);
  osc.frequency.exponentialRampToValueAtTime(freq * 0.98, now + 2);
  gain.gain.setValueAtTime(0.25 * (1 - depth * 0.4), now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 2 + depth * 2);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start(now);
  osc.stop(now + 4);

  // Harmonic shimmer
  const osc2 = audioCtx.createOscillator();
  const gain2 = audioCtx.createGain();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(freq * 2.003, now);
  gain2.gain.setValueAtTime(0.06, now);
  gain2.gain.exponentialRampToValueAtTime(0.001, now + 3);
  osc2.connect(gain2);
  gain2.connect(masterGain);
  osc2.start(now);
  osc2.stop(now + 3.5);

  // Sub tone for depth
  if (depth > 0.5) {
    const osc3 = audioCtx.createOscillator();
    const gain3 = audioCtx.createGain();
    osc3.type = 'sine';
    osc3.frequency.setValueAtTime(freq * 0.5, now);
    gain3.gain.setValueAtTime(0.08 * depth, now);
    gain3.gain.exponentialRampToValueAtTime(0.001, now + 3);
    osc3.connect(gain3);
    gain3.connect(masterGain);
    osc3.start(now);
    osc3.stop(now + 3.5);
  }
}

// Ripples
const ripples = [];
const stones = [];

class Ripple {
  constructor(x, y, hue) {
    this.x = x;
    this.y = y;
    this.radius = 0;
    this.maxRadius = 150 + Math.random() * 100;
    this.speed = 0.8 + Math.random() * 0.4;
    this.life = 1;
    this.hue = hue;
  }
  update() {
    this.radius += this.speed;
    this.life = 1 - this.radius / this.maxRadius;
    return this.life > 0;
  }
  draw() {
    const alpha = this.life * 0.4;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.strokeStyle = `hsla(${this.hue}, 30%, 60%, ${alpha})`;
    ctx.lineWidth = 1.5 * this.life;
    ctx.stroke();

    // Inner ring
    if (this.radius > 10) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius * 0.7, 0, Math.PI * 2);
      ctx.strokeStyle = `hsla(${this.hue}, 25%, 50%, ${alpha * 0.4})`;
      ctx.lineWidth = 0.8 * this.life;
      ctx.stroke();
    }
  }
}

class Stone {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.hue = 190 + (x / W) * 40; // blue to teal range
    this.size = 3 + Math.random() * 3;
    this.pulse = Math.random() * Math.PI * 2;
    this.rippleTimer = 0;
    this.rippleInterval = 120 + Math.random() * 180; // frames between ambient ripples
    this.born = Date.now();
    this.brightness = 1;
  }
  update() {
    this.pulse += 0.02;
    this.brightness = Math.max(0.3, this.brightness * 0.998);
    this.rippleTimer++;

    // Ambient ripples from resting stones
    if (this.rippleTimer > this.rippleInterval) {
      this.rippleTimer = 0;
      ripples.push(new Ripple(this.x, this.y, this.hue));
      // Quiet ambient tone
      if (audioCtx && Math.random() > 0.5) {
        const now = audioCtx.currentTime;
        const freqIdx = Math.floor((this.x / W) * baseFreqs.length);
        const freq = baseFreqs[Math.min(freqIdx, baseFreqs.length - 1)];
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.03 * this.brightness, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 2);
        osc.connect(gain);
        gain.connect(masterGain);
        osc.start(now);
        osc.stop(now + 2.5);
      }
    }
  }
  draw() {
    const glow = 0.3 + Math.sin(this.pulse) * 0.15;
    const s = this.size + Math.sin(this.pulse) * 0.5;

    // Glow
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, s * 4);
    grad.addColorStop(0, `hsla(${this.hue}, 35%, 55%, ${glow * this.brightness})`);
    grad.addColorStop(1, `hsla(${this.hue}, 35%, 55%, 0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, s * 4, 0, Math.PI * 2);
    ctx.fill();

    // Core
    ctx.fillStyle = `hsla(${this.hue}, 30%, 65%, ${(0.6 + glow) * this.brightness})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, s, 0, Math.PI * 2);
    ctx.fill();
  }
}

// Water surface noise
let noiseTime = 0;
function drawWaterSurface() {
  noiseTime += 0.003;
  const imageData = ctx.getImageData(0, 0, W, H);
  const data = imageData.data;

  // Subtle caustic-like overlay
  for (let y = 0; y < H; y += 6) {
    for (let x = 0; x < W; x += 6) {
      const noise = Math.sin(x * 0.01 + noiseTime) * Math.cos(y * 0.01 + noiseTime * 0.7) *
                    Math.sin((x + y) * 0.005 + noiseTime * 1.3);
      if (noise > 0.3) {
        const idx = (y * W + x) * 4;
        data[idx] = Math.min(255, data[idx] + 3);
        data[idx + 1] = Math.min(255, data[idx + 1] + 5);
        data[idx + 2] = Math.min(255, data[idx + 2] + 6);
      }
    }
  }
  ctx.putImageData(imageData, 0, 0);
}

// Interaction
function drop(x, y) {
  initAudio();
  stones.push(new Stone(x, y));
  for (let i = 0; i < 3; i++) {
    setTimeout(() => {
      ripples.push(new Ripple(x, y, 190 + (x / W) * 40));
    }, i * 100);
  }
  playTone(x, y);

  // Interaction ripples — stones near each other resonate
  stones.forEach(s => {
    const dx = s.x - x;
    const dy = s.y - y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 200 && dist > 10) {
      setTimeout(() => {
        ripples.push(new Ripple(s.x, s.y, s.hue));
        if (audioCtx) {
          const now = audioCtx.currentTime;
          const freqIdx = Math.floor((s.x / W) * baseFreqs.length);
          const freq = baseFreqs[Math.min(freqIdx, baseFreqs.length - 1)];
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.08 * (1 - dist / 200), now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 2);
          osc.connect(gain);
          gain.connect(masterGain);
          osc.start(now);
          osc.stop(now + 2.5);
        }
      }, dist * 3);
    }
  });

  // Hide hint
  document.getElementById('hint').style.opacity = '0';
}

canvas.addEventListener('click', e => drop(e.clientX, e.clientY));
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.touches) drop(t.clientX, t.clientY);
}, { passive: false });

// Drag to scatter stones
let dragging = false;
let lastDrop = 0;
canvas.addEventListener('mousedown', () => dragging = true);
canvas.addEventListener('mouseup', () => dragging = false);
canvas.addEventListener('mousemove', e => {
  if (dragging && Date.now() - lastDrop > 200) {
    lastDrop = Date.now();
    drop(e.clientX, e.clientY);
  }
});

// Animation
function animate() {
  // Dark water background
  ctx.fillStyle = 'rgba(10, 14, 20, 0.15)';
  ctx.fillRect(0, 0, W, H);

  // Update and draw stones
  stones.forEach(s => { s.update(); s.draw(); });

  // Update and draw ripples
  for (let i = ripples.length - 1; i >= 0; i--) {
    if (!ripples[i].update()) {
      ripples.splice(i, 1);
    } else {
      ripples[i].draw();
    }
  }

  requestAnimationFrame(animate);
}
animate();

// Keyboard: Space to clear
document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    stones.length = 0;
    ripples.length = 0;
  }
});
</script>
</body>
</html>
