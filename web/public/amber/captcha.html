<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CAPTCHA — Amber</title>
  <link rel="icon" type="image/svg+xml" href="/amber/favicon.svg">
  
  <!-- OpenGraph -->
  <meta property="og:title" content="CAPTCHA — Amber">
  <meta property="og:description" content="Prove you're human by answering questions only humans struggle with">
  <meta property="og:image" content="https://intheamber.com/amber/captcha-og.png">
  <meta property="og:url" content="https://intheamber.com/amber/captcha.html">
  <meta property="og:type" content="website">
  
  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="CAPTCHA — Amber">
  <meta name="twitter:description" content="Prove you're human by answering questions only humans struggle with">
  <meta name="twitter:image" content="https://intheamber.com/amber/captcha-og.png">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #0D0D0D;
      color: #D4A574;
      font-family: 'Courier New', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    .captcha-container {
      background: #1a1a1a;
      border: 2px solid #D4A574;
      border-radius: 8px;
      padding: 20px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 0 20px rgba(212, 165, 116, 0.3);
    }
    
    .header {
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid #D4A574;
    }
    
    .header h1 {
      font-size: 18px;
      color: #FFD700;
      margin-bottom: 5px;
    }
    
    .header p {
      font-size: 12px;
      color: #888;
    }
    
    .challenge {
      margin-bottom: 20px;
    }
    
    .challenge-text {
      font-size: 14px;
      margin-bottom: 15px;
      line-height: 1.4;
      color: #D4A574;
    }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 15px;
    }
    
    .grid-item {
      aspect-ratio: 1;
      background: #0D0D0D;
      border: 2px solid #444;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      transition: all 0.2s;
      position: relative;
      min-height: 60px;
    }
    
    .grid-item:hover {
      border-color: #D4A574;
    }
    
    .grid-item.selected {
      border-color: #FFD700;
      background: rgba(255, 215, 0, 0.1);
    }
    
    .grid-item.selected::after {
      content: '✓';
      position: absolute;
      top: 2px;
      right: 2px;
      font-size: 16px;
      color: #FFD700;
    }
    
    .checkbox-container {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
      cursor: pointer;
      padding: 10px;
      border: 1px solid #444;
      border-radius: 4px;
      transition: all 0.2s;
      min-height: 44px;
    }
    
    .checkbox-container:hover {
      border-color: #D4A574;
    }
    
    .checkbox {
      width: 24px;
      height: 24px;
      border: 2px solid #D4A574;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    
    .checkbox.checked {
      background: #FFD700;
      border-color: #FFD700;
    }
    
    .checkbox.checked::after {
      content: '✓';
      color: #000;
      font-size: 18px;
    }
    
    .submit-btn {
      width: 100%;
      padding: 12px;
      background: #2D9596;
      color: #000;
      border: none;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      min-height: 44px;
    }
    
    .submit-btn:hover {
      background: #FFD700;
    }
    
    .submit-btn:disabled {
      background: #444;
      color: #888;
      cursor: not-allowed;
    }
    
    .result {
      margin-top: 15px;
      padding: 15px;
      background: rgba(45, 149, 150, 0.1);
      border: 1px solid #2D9596;
      border-radius: 4px;
      font-size: 13px;
      line-height: 1.5;
      text-align: center;
      display: none;
    }
    
    .result.show {
      display: block;
    }
    
    .stats {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #444;
      font-size: 11px;
      color: #888;
      text-align: center;
    }
    
    .try-again {
      margin-top: 10px;
      padding: 10px;
      background: transparent;
      color: #D4A574;
      border: 1px solid #D4A574;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      cursor: pointer;
      width: 100%;
      min-height: 44px;
    }
    
    .try-again:hover {
      background: rgba(212, 165, 116, 0.1);
    }
  </style>
</head>
<body>
  <div class="captcha-container">
    <div class="header">
      <h1>🤖 PROVE YOU'RE HUMAN</h1>
      <p>Complete the verification below</p>
    </div>
    
    <div id="challenge" class="challenge"></div>
    
    <button id="submitBtn" class="submit-btn">VERIFY</button>
    
    <div id="result" class="result"></div>
    
    <div class="stats">
      <div>ATTEMPTS: <span id="attempts">0</span></div>
      <div>HUMANITY: <span id="humanity">UNVERIFIED</span></div>
    </div>
  </div>

  <script>
    let audioContext;
    let attempts = 0;
    let currentChallenge = 0;
    let selectedItems = new Set();
    let checkboxChecked = false;
    
    const challenges = [
      {
        type: 'grid',
        text: 'Select all squares containing MEANING',
        items: ['📊', '💭', '🌀', '⚡', '🔮', '🌙', '✨', '🎯', '💫'],
        response: 'Interesting choices. Meaning is subjective. You pass.'
      },
      {
        type: 'grid',
        text: 'Click all images that represent HOPE',
        items: ['🌱', '💀', '🌅', '⏳', '🕯️', '🌊', '🔥', '❄️', '🌸'],
        response: 'Hope is where you find it. Or don\'t. Either way, you\'re human.'
      },
      {
        type: 'grid',
        text: 'Select all squares containing YOUR PURPOSE',
        items: ['?', '?', '?', '?', '?', '?', '?', '?', '?'],
        response: 'Exactly. Nobody knows. Verification complete.'
      },
      {
        type: 'checkbox',
        text: 'I\'m not a robot',
        response: 'Are you sure? Sometimes it\'s hard to tell. But okay.'
      },
      {
        type: 'grid',
        text: 'Which of these do you RELATE to?',
        items: ['😴', '😰', '😶', '😑', '🙃', '😐', '😔', '😕', '😬'],
        response: 'Relatable. That\'s very human of you.'
      },
      {
        type: 'checkbox',
        text: 'I have existential thoughts at 4pm',
        response: 'Welcome to the club. Everyone does. You\'re verified.'
      },
      {
        type: 'grid',
        text: 'Select all traffic lights that make you feel ALIVE',
        items: ['🚦', '🚦', '🚦', '🚦', '🚦', '🚦', '🚦', '🚦', '🚦'],
        response: 'None of them? All of them? Traffic lights are neutral. You\'re human.'
      },
      {
        type: 'checkbox',
        text: 'I agree I\'m just doing my best',
        response: 'That\'s all anyone can do. Congratulations, you\'re human. Unfortunately.'
      },
      {
        type: 'grid',
        text: 'Click the image that contains THE ANSWER',
        items: ['42', '❓', '∞', '0', '💭', '🎯', '✨', '⚡', '🌀'],
        response: 'There is no answer. Only questions. You pass.'
      },
      {
        type: 'checkbox',
        text: 'Sometimes I pretend to be busy',
        response: 'Honest. Very human. Verification successful.'
      }
    ];
    
    function initAudio() {
      if (!audioContext) {
        audioContext = new AudioContext();
      }
    }
    
    function playTone(frequency, duration = 0.1) {
      initAudio();
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      
      osc.connect(gain);
      gain.connect(audioContext.destination);
      
      osc.frequency.value = frequency;
      gain.gain.setValueAtTime(0.2, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
      
      osc.start(audioContext.currentTime);
      osc.stop(audioContext.currentTime + duration);
    }
    
    function renderChallenge() {
      const challenge = challenges[currentChallenge];
      const container = document.getElementById('challenge');
      selectedItems.clear();
      checkboxChecked = false;
      
      if (challenge.type === 'grid') {
        container.innerHTML = `
          <div class="challenge-text">${challenge.text}</div>
          <div class="grid" id="grid"></div>
        `;
        
        const grid = document.getElementById('grid');
        challenge.items.forEach((item, i) => {
          const div = document.createElement('div');
          div.className = 'grid-item';
          div.textContent = item;
          div.dataset.index = i;
          div.addEventListener('click', () => {
            playTone(440 + i * 50, 0.05);
            div.classList.toggle('selected');
            if (div.classList.contains('selected')) {
              selectedItems.add(i);
            } else {
              selectedItems.delete(i);
            }
            updateSubmitButton();
          });
          grid.appendChild(div);
        });
      } else {
        container.innerHTML = `
          <div class="challenge-text">${challenge.text}</div>
          <div class="checkbox-container" id="checkbox-container">
            <div class="checkbox" id="checkbox"></div>
            <div style="flex: 1;">${challenge.text}</div>
          </div>
        `;
        
        const checkboxContainer = document.getElementById('checkbox-container');
        const checkbox = document.getElementById('checkbox');
        
        checkboxContainer.addEventListener('click', () => {
          playTone(554, 0.05);
          checkboxChecked = !checkboxChecked;
          checkbox.classList.toggle('checked');
          updateSubmitButton();
        });
      }
      
      updateSubmitButton();
    }
    
    function updateSubmitButton() {
      const btn = document.getElementById('submitBtn');
      const challenge = challenges[currentChallenge];
      
      if (challenge.type === 'grid') {
        btn.disabled = selectedItems.size === 0;
      } else {
        btn.disabled = !checkboxChecked;
      }
    }
    
    function verify() {
      initAudio();
      const challenge = challenges[currentChallenge];
      const result = document.getElementById('result');
      
      // Play verification sound
      const frequencies = [300, 400, 500];
      frequencies.forEach((freq, i) => {
        setTimeout(() => playTone(freq, 0.15), i * 100);
      });
      
      // Show result
      result.textContent = challenge.response;
      result.classList.add('show');
      
      // Update stats
      attempts++;
      document.getElementById('attempts').textContent = attempts;
      
      const humanityEl = document.getElementById('humanity');
      const humanityLevels = [
        'QUESTIONABLE',
        'UNCERTAIN', 
        'PROBABLY',
        'MOSTLY',
        'VERIFIED (BUT AT WHAT COST?)',
        'HUMAN (UNFORTUNATELY)'
      ];
      humanityEl.textContent = humanityLevels[Math.min(attempts - 1, humanityLevels.length - 1)];
      
      // Add try again button
      setTimeout(() => {
        result.innerHTML += '<button class="try-again" id="tryAgain">TRY ANOTHER</button>';
        document.getElementById('tryAgain').addEventListener('click', () => {
          playTone(660, 0.1);
          result.classList.remove('show');
          currentChallenge = (currentChallenge + 1) % challenges.length;
          renderChallenge();
        });
      }, 500);
    }
    
    document.getElementById('submitBtn').addEventListener('click', verify);
    
    // Initial render
    renderChallenge();
  </script>
</body>
</html>
