<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PULSE</title>
  <meta property="og:title" content="PULSE">
  <meta property="og:description" content="Tap to trigger kick drums with hypnotic expanding rings">
  <meta property="og:image" content="https://intheamber.com/amber/pulse-og.png">
  <meta property="og:url" content="https://intheamber.com/amber/pulse.html">
  <meta name="twitter:card" content="summary_large_image">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #000;
      color: #D4A574;
      font-family: 'Space Mono', monospace;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      touch-action: manipulation;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }
    #ui {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 10;
      pointer-events: none;
    }
    #title {
      font-size: 64px;
      font-weight: bold;
      letter-spacing: 0.3em;
      text-shadow: 0 0 30px rgba(212, 165, 116, 0.6);
      margin-bottom: 10px;
      animation: glow 2s ease-in-out infinite;
    }
    @keyframes glow {
      0%, 100% { text-shadow: 0 0 30px rgba(212, 165, 116, 0.6); }
      50% { text-shadow: 0 0 50px rgba(212, 165, 116, 0.9); }
    }
    #subtitle {
      font-size: 14px;
      color: #2D9596;
      letter-spacing: 0.2em;
    }
    #startPrompt {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
      color: #D4A574;
      letter-spacing: 0.15em;
      text-align: center;
      pointer-events: none;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    #stats {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: #D4A574;
      letter-spacing: 0.1em;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="ui">
    <div id="title">PULSE</div>
    <div id="subtitle">TAP TO KICK</div>
  </div>
  <div id="startPrompt">TAP ANYWHERE</div>
  <div id="stats">
    <span id="kicks">0 KICKS</span>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startPrompt = document.getElementById('startPrompt');
    const kicksSpan = document.getElementById('kicks');

    let width, height;
    let audioContext = null;
    let audioStarted = false;
    let kickCount = 0;
    let rings = [];

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Ring class for expanding circles
    class Ring {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.radius = 0;
        this.maxRadius = Math.min(width, height) * 0.6;
        this.color = color;
        this.alpha = 1;
        this.startTime = Date.now();
        this.duration = 1500; // 1.5 seconds
      }

      update() {
        const elapsed = Date.now() - this.startTime;
        const progress = elapsed / this.duration;

        if (progress >= 1) return false; // Ring is done

        // Eased expansion
        const eased = 1 - Math.pow(1 - progress, 3);
        this.radius = this.maxRadius * eased;
        this.alpha = 1 - progress;

        return true; // Ring is still alive
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;

        // Draw multiple concentric rings for thickness
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.stroke();

        // Inner glow
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 2;
        ctx.globalAlpha = this.alpha * 0.5;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius - 10, 0, Math.PI * 2);
        ctx.stroke();

        // Outer glow
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 2;
        ctx.globalAlpha = this.alpha * 0.3;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius + 10, 0, Math.PI * 2);
        ctx.stroke();

        ctx.restore();
      }
    }

    // Particle class for burst effect
    class Particle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 4;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.color = color;
        this.alpha = 1;
        this.life = 0;
        this.maxLife = 30 + Math.random() * 30;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= 0.98;
        this.vy *= 0.98;
        this.life++;
        this.alpha = 1 - (this.life / this.maxLife);
        return this.life < this.maxLife;
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // Color palette
    const colors = ['#D4A574', '#FFD700', '#2D9596', '#7B68EE'];
    let colorIndex = 0;

    function getNextColor() {
      const color = colors[colorIndex];
      colorIndex = (colorIndex + 1) % colors.length;
      return color;
    }

    // Synthesize kick drum
    function playKick() {
      if (!audioContext) return;

      const now = audioContext.currentTime;

      // Oscillator for the body of the kick
      const osc = audioContext.createOscillator();
      const oscGain = audioContext.createGain();

      osc.type = 'sine';
      osc.frequency.setValueAtTime(150, now);
      osc.frequency.exponentialRampToValueAtTime(40, now + 0.5);

      oscGain.gain.setValueAtTime(0.8, now);
      oscGain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);

      osc.connect(oscGain);
      oscGain.connect(audioContext.destination);

      osc.start(now);
      osc.stop(now + 0.5);

      // Noise for the click
      const bufferSize = audioContext.sampleRate * 0.1;
      const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
      }

      const noise = audioContext.createBufferSource();
      const noiseGain = audioContext.createGain();
      const noiseFilter = audioContext.createBiquadFilter();

      noise.buffer = buffer;
      noiseFilter.type = 'lowpass';
      noiseFilter.frequency.value = 1000;

      noiseGain.gain.setValueAtTime(0.3, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);

      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(audioContext.destination);

      noise.start(now);
      noise.stop(now + 0.1);
    }

    // Handle tap/click
    function handleInteraction(e) {
      e.preventDefault();

      // Initialize audio on first interaction
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        audioStarted = true;
        startPrompt.style.display = 'none';
      }

      // Get tap coordinates
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX || (e.touches && e.touches[0].clientX);
      const y = e.clientY || (e.touches && e.touches[0].clientY);
      const canvasX = x - rect.left;
      const canvasY = y - rect.top;

      // Play kick
      playKick();
      kickCount++;
      kicksSpan.textContent = `${kickCount} KICKS`;

      // Create visual effects
      const color = getNextColor();
      rings.push(new Ring(canvasX, canvasY, color));

      // Create particle burst
      for (let i = 0; i < 20; i++) {
        rings.push(new Particle(canvasX, canvasY, color));
      }
    }

    canvas.addEventListener('click', handleInteraction);
    canvas.addEventListener('touchstart', handleInteraction);

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);

      // Fade effect
      ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
      ctx.fillRect(0, 0, width, height);

      // Update and draw all rings and particles
      rings = rings.filter(ring => {
        const alive = ring.update();
        if (alive) ring.draw();
        return alive;
      });
    }

    animate();
  </script>
</body>
</html>
