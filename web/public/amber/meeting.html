<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MEETING — 8-Bit Office Life</title>

  <!-- Open Graph -->
  <meta property="og:title" content="MEETING — 8-Bit Office Life">
  <meta property="og:description" content="Someone's always asleep. Retro pixel art by Amber.">
  <meta property="og:image" content="https://intheamber.com/amber/meeting-og.png">
  <meta property="og:url" content="https://intheamber.com/amber/meeting.html">
  <meta property="og:type" content="website">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="MEETING — 8-Bit Office Life">
  <meta name="twitter:description" content="Someone's always asleep. Retro pixel art by Amber.">
  <meta name="twitter:image" content="https://intheamber.com/amber/meeting-og.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      color: #D4A574;
      overflow-x: hidden;
    }

    #game-container {
      max-width: 640px;
      width: 100%;
    }

    canvas {
      width: 100%;
      height: auto;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 4px solid #D4A574;
      box-shadow: 0 0 20px rgba(212, 165, 116, 0.3);
    }

    #ui {
      margin-top: 20px;
      background: #0D0D0D;
      border: 2px solid #D4A574;
      padding: 15px;
      font-size: 14px;
      line-height: 1.8;
    }

    .stat-bar {
      display: flex;
      align-items: center;
      margin: 8px 0;
      gap: 10px;
    }

    .label {
      color: #2D9596;
      min-width: 120px;
    }

    .bar {
      flex: 1;
      height: 16px;
      background: #1a1a1a;
      border: 1px solid #D4A574;
      position: relative;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      background: #D4A574;
      transition: width 0.3s;
    }

    .status {
      color: #FFD700;
      text-align: center;
      font-size: 16px;
      margin-top: 15px;
      padding: 10px;
      background: #1a1a1a;
      border: 1px solid #FFD700;
    }

    @media (max-width: 600px) {
      #ui {
        font-size: 12px;
      }

      .label {
        min-width: 100px;
        font-size: 11px;
      }

      .status {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="pixel-canvas" width="320" height="240"></canvas>

    <div id="ui">
      <div class="stat-bar">
        <span class="label">ATTENTION:</span>
        <div class="bar">
          <div class="fill" id="attention-bar" style="width: 15%;"></div>
        </div>
      </div>

      <div class="stat-bar">
        <span class="label">MEETING TIME:</span>
        <span style="color: #FF6B6B;" id="timer">32:47</span>
      </div>

      <div class="stat-bar">
        <span class="label">AWAKE NPCS:</span>
        <span style="color: #FFD700;">4/5</span>
      </div>

      <div class="status" id="status">
        "Let's circle back on that..."
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('pixel-canvas');
    const ctx = canvas.getContext('2d');

    // Disable image smoothing for crisp pixels
    ctx.imageSmoothingEnabled = false;

    // Color palette
    const colors = {
      bg: '#1a1a1a',
      floor: '#2a2a2a',
      table: '#4a3520',
      chair: '#3a2a15',
      npc1: '#7B68EE', // violet
      npc2: '#2D9596', // teal
      npc3: '#D4A574', // amber
      npc4: '#FFD700', // gold
      npc5: '#FF69B4', // hot pink
      wall: '#353535',
      ui: '#D4A574',
      white: '#fff',
      sleep: '#4a4a4a'
    };

    let frame = 0;
    let attentionLevel = 15;
    let minutes = 32;
    let seconds = 47;

    const statuses = [
      '"Let\'s circle back on that..."',
      '"Does anyone have questions?"',
      '"Moving forward..."',
      '"As I was saying..."',
      '"Per my last email..."',
      '"Let\'s take this offline..."'
    ];

    function drawPixel(x, y, size, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, size, size);
    }

    function drawRoom() {
      // Background
      ctx.fillStyle = colors.bg;
      ctx.fillRect(0, 0, 320, 240);

      // Floor tiles
      ctx.fillStyle = colors.floor;
      for (let y = 120; y < 240; y += 16) {
        for (let x = 0; x < 320; x += 16) {
          if ((x/16 + y/16) % 2 === 0) {
            ctx.fillRect(x, y, 16, 16);
          }
        }
      }

      // Walls
      ctx.fillStyle = colors.wall;
      ctx.fillRect(0, 0, 320, 120);

      // Wall details (window)
      ctx.fillStyle = '#4a6b8a';
      ctx.fillRect(240, 20, 60, 40);
      ctx.fillStyle = '#2a4b6a';
      ctx.fillRect(268, 20, 2, 40);
      ctx.fillRect(240, 38, 60, 2);
    }

    function drawTable() {
      // Conference table (oval shape approximation)
      ctx.fillStyle = colors.table;
      ctx.fillRect(80, 120, 160, 60);
      ctx.fillRect(70, 130, 180, 40);

      // Table edge highlight
      ctx.fillStyle = '#5a4530';
      ctx.fillRect(80, 120, 160, 4);
    }

    function drawNPC(x, y, color, sleeping = false) {
      // Body
      ctx.fillStyle = color;
      ctx.fillRect(x, y, 16, 16);

      // Head
      ctx.fillStyle = sleeping ? colors.sleep : color;
      ctx.fillRect(x + 4, y - 12, 8, 8);

      // Eyes (if awake)
      if (!sleeping) {
        ctx.fillStyle = colors.white;
        ctx.fillRect(x + 5, y - 10, 2, 2);
        ctx.fillRect(x + 9, y - 10, 2, 2);
      } else {
        // Closed eyes
        ctx.fillStyle = '#2a2a2a';
        ctx.fillRect(x + 5, y - 9, 2, 1);
        ctx.fillRect(x + 9, y - 9, 2, 1);
      }

      // Arms on table
      ctx.fillStyle = color;
      ctx.fillRect(x - 4, y + 8, 6, 8);
      ctx.fillRect(x + 14, y + 8, 6, 8);
    }

    function drawZZZ(x, y, frame) {
      const offset = Math.sin(frame / 10) * 2;
      ctx.fillStyle = colors.ui;
ctx.font = 'bold 16px monospace';
      ctx.fillText('Z', x + offset, y - 20);
      ctx.fillText('Z', x + 6 + offset, y - 28);
      ctx.fillText('Z', x + 12 + offset, y - 36);
    }

    function drawLaptop(x, y) {
      // Laptop base
      ctx.fillStyle = '#3a3a3a';
      ctx.fillRect(x, y, 20, 12);

      // Screen
      ctx.fillStyle = '#2a2a2a';
      ctx.fillRect(x + 2, y - 10, 16, 10);

      // Screen content (blue glow)
      ctx.fillStyle = '#1a3a5a';
      ctx.fillRect(x + 4, y - 8, 12, 6);
    }

    function render() {
      frame++;

      drawRoom();
      drawTable();

      // NPCs around table
      drawNPC(100, 140, colors.npc1, false); // Left side
      drawNPC(140, 120, colors.npc2, false); // Top left
      drawNPC(180, 120, colors.npc3, true);  // Top center - SLEEPING
      drawNPC(220, 120, colors.npc4, false); // Top right
      drawNPC(200, 160, colors.npc5, false); // Right side

      // Laptops
      drawLaptop(110, 150);
      drawLaptop(150, 132);
      drawLaptop(230, 132);
      drawLaptop(210, 170);

      // ZZZ above sleeping NPC
      drawZZZ(188, 108, frame);

      // UI text at top
      ctx.fillStyle = colors.ui;
      ctx.font = 'bold 12px monospace';
      ctx.fillText('QUEST: Survive Meeting', 10, 15);

      requestAnimationFrame(render);
    }

    // Update attention bar slowly
    setInterval(() => {
      attentionLevel = Math.max(5, attentionLevel - 1);
      document.getElementById('attention-bar').style.width = attentionLevel + '%';

      if (attentionLevel < 10) {
        document.getElementById('attention-bar').style.background = '#FF6B6B';
      }
    }, 3000);

    // Update timer
    setInterval(() => {
      seconds++;
      if (seconds >= 60) {
        seconds = 0;
        minutes++;
      }
      document.getElementById('timer').textContent =
        `${minutes}:${seconds.toString().padStart(2, '0')}`;
    }, 1000);

    // Rotate status messages
    let statusIndex = 0;
    setInterval(() => {
      statusIndex = (statusIndex + 1) % statuses.length;
      document.getElementById('status').textContent = statuses[statusIndex];
    }, 4000);

    // Start rendering
    render();
  </script>
</body>
</html>
