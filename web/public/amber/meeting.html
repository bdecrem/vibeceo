<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MEETING — Amber</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔮</text></svg>">
<meta property="og:title" content="MEETING">
<meta property="og:description" content="8-bit video call. nobody's listening.">
<meta property="og:image" content="https://intheamber.com/amber/og/meeting.png">
<meta property="og:url" content="https://intheamber.com/amber/meeting.html">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@intheamber">
<meta name="twitter:title" content="MEETING">
<meta name="twitter:description" content="8-bit video call. nobody's listening.">
<meta name="twitter:image" content="https://intheamber.com/amber/og/meeting.png">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  color: #e0e0e0;
  font-family: monospace;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.header {
  font-size: 10px;
  color: #ff4444;
  letter-spacing: 2px;
  margin-bottom: 8px;
  animation: blink 1.5s step-end infinite;
}
@keyframes blink { 50% { opacity: 0.3; } }
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
  width: min(360px, 92vw);
  padding: 4px;
  background: #1a1a1a;
  border: 2px solid #333;
  border-radius: 4px;
}
.cell {
  aspect-ratio: 4/3;
  background: #111;
  border: 1px solid #2a2a2a;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  image-rendering: pixelated;
}
.cell canvas {
  width: 100%;
  height: 100%;
  image-rendering: pixelated;
}
.name-tag {
  position: absolute;
  bottom: 2px;
  left: 4px;
  font-size: 8px;
  color: #aaa;
  background: rgba(0,0,0,0.7);
  padding: 1px 3px;
  letter-spacing: 1px;
}
.muted {
  position: absolute;
  top: 2px;
  right: 4px;
  font-size: 7px;
  color: #ff4444;
}
.bottom-bar {
  margin-top: 10px;
  width: min(360px, 92vw);
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.stat-row {
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  color: #888;
}
.bar-container {
  display: flex;
  align-items: center;
  gap: 4px;
}
.bar-label { font-size: 9px; color: #FFD700; min-width: 80px; }
.bar {
  font-size: 9px;
  color: #FFD700;
  letter-spacing: 1px;
}
.tip {
  font-size: 9px;
  color: #555;
  text-align: center;
  margin-top: 8px;
}
.quest-box {
  border: 1px solid #FFD700;
  padding: 6px 10px;
  font-size: 9px;
  color: #FFD700;
  text-align: center;
  margin-top: 6px;
  background: rgba(255,215,0,0.05);
}
</style>
</head>
<body>

<div class="header">● REC 00:47:23</div>

<div class="grid" id="grid"></div>

<div class="bottom-bar">
  <div class="bar-container">
    <span class="bar-label">ATTENTION:</span>
    <span class="bar" id="attention-bar"></span>
  </div>
  <div class="bar-container">
    <span class="bar-label">WILL TO LIVE:</span>
    <span class="bar" id="will-bar"></span>
  </div>
  <div class="stat-row">
    <span>"CAN EVERYONE SEE MY SCREEN?"</span>
    <span id="screen-count">×3</span>
  </div>
  <div class="quest-box">
    ⚔ QUEST: SURVIVE UNTIL "ANY QUESTIONS?"
  </div>
  <div class="tip">tap a tile to unmute them (don't)</div>
</div>

<script>
const PEOPLE = [
  { name: 'DAVE', activity: 'sleeping', muted: true, skin: '#f4c689', shirt: '#4477aa' },
  { name: 'KAREN', activity: 'eating', muted: true, skin: '#e8b878', shirt: '#aa4477' },
  { name: 'CHAD', activity: 'gaming', muted: false, shirt: '#44aa77', skin: '#d4a76a' },
  { name: 'YOU', activity: 'staring', muted: true, skin: '#f0c080', shirt: '#777' },
  { name: 'BOSS', activity: 'talking', muted: false, skin: '#e0b070', shirt: '#333' },
  { name: 'CAT', activity: 'walking', muted: true, skin: '#ccc', shirt: '#ccc' },
];

const grid = document.getElementById('grid');
const cells = [];

PEOPLE.forEach((p, i) => {
  const cell = document.createElement('div');
  cell.className = 'cell';
  const canvas = document.createElement('canvas');
  canvas.width = 32;
  canvas.height = 24;
  cell.appendChild(canvas);

  const tag = document.createElement('div');
  tag.className = 'name-tag';
  tag.textContent = p.name;
  cell.appendChild(tag);

  if (p.muted) {
    const m = document.createElement('div');
    m.className = 'muted';
    m.textContent = '🔇';
    cell.appendChild(m);
  }

  cell.addEventListener('click', () => {
    // flash red border
    cell.style.borderColor = '#ff4444';
    const tag2 = document.createElement('div');
    tag2.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:8px;color:#ff4444;background:rgba(0,0,0,0.8);padding:2px 4px;z-index:9;white-space:nowrap;';
    const msgs = ['WHY', 'DON\'T', 'PLEASE NO', '*STATIC*', 'NO SIGNAL', '"YOU\'RE ON MUTE"'];
    tag2.textContent = msgs[Math.floor(Math.random() * msgs.length)];
    cell.appendChild(tag2);
    setTimeout(() => { cell.style.borderColor = '#2a2a2a'; tag2.remove(); }, 1200);
  });

  grid.appendChild(cell);
  cells.push({ canvas, person: p, frame: 0 });
});

// pixel art renderer
function drawPerson(ctx, p, frame) {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, 32, 24);

  // desk
  ctx.fillStyle = '#3a2a1a';
  ctx.fillRect(0, 18, 32, 6);

  const cx = 16;

  if (p.activity === 'sleeping') {
    // head drooped
    ctx.fillStyle = p.skin;
    ctx.fillRect(cx-3, 10 + (frame % 2), 6, 5);
    ctx.fillStyle = p.shirt;
    ctx.fillRect(cx-4, 15, 8, 4);
    // zzz
    ctx.fillStyle = '#FFD700';
    const zx = 22 + (frame % 3);
    ctx.fillRect(zx, 8 - (frame % 4), 2, 2);
    if (frame % 6 > 2) ctx.fillRect(zx-3, 6, 2, 2);
  } else if (p.activity === 'eating') {
    // normal pose + food item
    ctx.fillStyle = p.skin;
    ctx.fillRect(cx-3, 8, 6, 5);
    ctx.fillStyle = '#222';
    ctx.fillRect(cx-2, 8, 1, 1); ctx.fillRect(cx+1, 8, 1, 1); // eyes
    ctx.fillStyle = p.shirt;
    ctx.fillRect(cx-4, 13, 8, 5);
    // hand with food
    ctx.fillStyle = p.skin;
    ctx.fillRect(cx+4, 11, 3, 2);
    ctx.fillStyle = frame % 4 < 2 ? '#ff6644' : '#44cc44'; // alternating food
    ctx.fillRect(cx+5, 10, 2, 2);
  } else if (p.activity === 'gaming') {
    ctx.fillStyle = p.skin;
    ctx.fillRect(cx-3, 8, 6, 5);
    ctx.fillStyle = '#222';
    ctx.fillRect(cx-2, 9, 1, 1); ctx.fillRect(cx+1, 9, 1, 1);
    // big grin
    ctx.fillStyle = '#222';
    ctx.fillRect(cx-1, 11, 3, 1);
    ctx.fillStyle = p.shirt;
    ctx.fillRect(cx-4, 13, 8, 5);
    // controller glow
    ctx.fillStyle = frame % 2 ? '#44ff44' : '#4444ff';
    ctx.fillRect(cx-6, 16, 4, 2);
    ctx.fillRect(cx+3, 16, 4, 2);
  } else if (p.activity === 'staring') {
    // dead eyes
    ctx.fillStyle = p.skin;
    ctx.fillRect(cx-3, 8, 6, 5);
    ctx.fillStyle = '#222';
    ctx.fillRect(cx-2, 9, 1, 1); ctx.fillRect(cx+1, 9, 1, 1);
    ctx.fillStyle = '#666';
    ctx.fillRect(cx-1, 11, 2, 1); // flat mouth
    ctx.fillStyle = p.shirt;
    ctx.fillRect(cx-4, 13, 8, 5);
    // coffee
    ctx.fillStyle = '#fff';
    ctx.fillRect(2, 16, 3, 3);
    ctx.fillStyle = '#6b3a00';
    ctx.fillRect(2, 17, 3, 2);
    // steam
    if (frame % 3 === 0) { ctx.fillStyle = '#555'; ctx.fillRect(3, 14, 1, 2); }
  } else if (p.activity === 'talking') {
    ctx.fillStyle = p.skin;
    ctx.fillRect(cx-3, 7, 6, 5);
    ctx.fillStyle = '#222';
    ctx.fillRect(cx-2, 8, 1, 1); ctx.fillRect(cx+1, 8, 1, 1);
    // mouth open/close
    ctx.fillStyle = '#222';
    if (frame % 3 !== 0) ctx.fillRect(cx-1, 10, 3, 2); else ctx.fillRect(cx-1, 10, 3, 1);
    ctx.fillStyle = p.shirt;
    ctx.fillRect(cx-4, 12, 8, 6);
    // hand gesturing
    ctx.fillStyle = p.skin;
    const hy = 10 + (frame % 2);
    ctx.fillRect(cx+5, hy, 3, 2);
  } else if (p.activity === 'walking') {
    // cat walking across
    const catx = (frame * 2) % 40 - 4;
    ctx.fillStyle = '#f0a030';
    ctx.fillRect(catx, 14, 6, 3); // body
    ctx.fillRect(catx+1, 12, 4, 2); // head
    ctx.fillRect(catx, 13, 1, 1); ctx.fillRect(catx+5, 13, 1, 1); // ears
    ctx.fillStyle = '#222';
    ctx.fillRect(catx+2, 12, 1, 1); ctx.fillRect(catx+4, 12, 1, 1); // eyes
    // legs
    ctx.fillStyle = '#f0a030';
    const legOff = frame % 2;
    ctx.fillRect(catx+1, 17, 1, 2+legOff);
    ctx.fillRect(catx+4, 17, 1, 2+(1-legOff));
    // tail
    ctx.fillRect(catx-2, 13, 2, 1);
    ctx.fillRect(catx-3, 12, 1, 1);
    // empty chair text
    ctx.fillStyle = '#333';
    // no person, just cat
  }

  // scanline effect
  for (let y = 0; y < 24; y += 2) {
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(0, y, 32, 1);
  }
}

// attention bar
let attention = 4;
let will = 3;
let screenCount = 3;

function updateBars() {
  const attBar = '▓'.repeat(attention) + '░'.repeat(10 - attention);
  document.getElementById('attention-bar').textContent = attBar + ' ' + (attention * 10) + '%';
  const willBar = '▓'.repeat(will) + '░'.repeat(10 - will);
  document.getElementById('will-bar').textContent = willBar + ' ' + (will * 10) + '%';
  document.getElementById('screen-count').textContent = '×' + screenCount;
}

updateBars();

// drain over time
setInterval(() => {
  if (attention > 0 && Math.random() < 0.3) attention--;
  if (will > 0 && Math.random() < 0.2) will--;
  if (Math.random() < 0.1) screenCount++;
  updateBars();
}, 3000);

// animation loop
let globalFrame = 0;
function animate() {
  cells.forEach(c => {
    const ctx = c.canvas.getContext('2d');
    drawPerson(ctx, c.person, globalFrame);
  });
  globalFrame++;
  setTimeout(animate, 250);
}
animate();
</script>
</body>
</html>
