<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TUESDAY — The Shape of Mid-Week Momentum</title>
  
  <!-- Open Graph -->
  <meta property="og:title" content="TUESDAY — The Shape of Mid-Week Momentum">
  <meta property="og:description" content="Angular geometry crystallizing. The week's trajectory becomes visible.">
  <meta property="og:image" content="https://intheamber.com/amber/tuesday-og.png">
  <meta property="og:url" content="https://intheamber.com/amber/tuesday.html">
  <meta property="og:type" content="website">
  
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="TUESDAY — The Shape of Mid-Week Momentum">
  <meta name="twitter:description" content="Angular geometry crystallizing. The week's trajectory becomes visible.">
  <meta name="twitter:image" content="https://intheamber.com/amber/tuesday-og.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #0D0D0D;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #FFD700;
      touch-action: none;
    }
    
    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    
    #title {
      position: fixed;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 48px;
      font-weight: 700;
      letter-spacing: 8px;
      color: #FFD700;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
      z-index: 10;
      pointer-events: none;
      animation: breathe 4s ease-in-out infinite;
    }
    
    @keyframes breathe {
      0%, 100% { opacity: 0.8; transform: translateX(-50%) scale(1); }
      50% { opacity: 1; transform: translateX(-50%) scale(1.02); }
    }
    
    #hint {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      color: #2D9596;
      opacity: 0.6;
      z-index: 10;
      pointer-events: none;
      text-align: center;
    }
    
    @media (max-width: 768px) {
      #title {
        font-size: 32px;
        letter-spacing: 4px;
        top: 30px;
      }
      #hint {
        font-size: 12px;
        bottom: 30px;
      }
    }
  </style>
</head>
<body>
  <div id="title">TUESDAY</div>
  <canvas id="canvas"></canvas>
  <div id="hint">Tap to crystallize new patterns</div>
  
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;
    
    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    });
    
    // Audio context
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let audioUnlocked = false;
    
    function playTone(freq, duration = 0.1) {
      if (!audioUnlocked) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }
    
    // Unlock audio on first interaction
    function unlockAudio() {
      if (!audioUnlocked) {
        audioCtx.resume();
        audioUnlocked = true;
      }
    }
    
    // Color palette - full spectrum
    const colors = [
      '#FFD700', // gold
      '#f59e0b', // amber
      '#2D9596', // teal
      '#3b82f6', // electric blue
      '#ec4899', // hot pink
      '#8b5cf6', // purple
      '#f97316', // coral
      '#84cc16', // lime
    ];
    
    // Shape class - angular, crystallizing geometry
    class TuesdayShape {
      constructor(x, y, colorIndex) {
        this.x = x;
        this.y = y;
        this.color = colors[colorIndex];
        this.colorIndex = colorIndex;
        
        // Start as simple triangle
        this.sides = 3;
        this.targetSides = 3 + Math.floor(Math.random() * 5); // 3-7 sides
        this.size = 20;
        this.targetSize = 40 + Math.random() * 80;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotationSpeed = (Math.random() - 0.5) * 0.02;
        
        // Momentum vector (Tuesday has direction)
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2;
        this.friction = 0.98;
        
        // Crystallization progress
        this.crystallization = 0;
        this.targetCrystallization = 1;
        
        // Pulse
        this.pulsePhase = Math.random() * Math.PI * 2;
        this.pulseSpeed = 0.02 + Math.random() * 0.02;
        
        this.age = 0;
        this.maxAge = 600 + Math.random() * 400;
      }
      
      update() {
        // Move with momentum
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= this.friction;
        this.vy *= this.friction;
        
        // Wrap edges
        if (this.x < -100) this.x = width + 100;
        if (this.x > width + 100) this.x = -100;
        if (this.y < -100) this.y = height + 100;
        if (this.y > height + 100) this.y = -100;
        
        // Rotate
        this.rotation += this.rotationSpeed;
        
        // Crystallize (morph toward target)
        if (this.sides < this.targetSides) {
          this.sides += 0.05;
        }
        if (this.size < this.targetSize) {
          this.size += (this.targetSize - this.size) * 0.02;
        }
        if (this.crystallization < this.targetCrystallization) {
          this.crystallization += 0.01;
        }
        
        // Pulse
        this.pulsePhase += this.pulseSpeed;
        
        this.age++;
      }
      
      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        
        // Draw polygon with current number of sides
        const sideCount = Math.floor(this.sides);
        const pulse = Math.sin(this.pulsePhase) * 0.1 + 1;
        const drawSize = this.size * pulse;
        
        // Outer glow
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 20 * this.crystallization;
        
        // Main shape
        ctx.beginPath();
        for (let i = 0; i <= sideCount; i++) {
          const angle = (i / sideCount) * Math.PI * 2;
          const x = Math.cos(angle) * drawSize;
          const y = Math.sin(angle) * drawSize;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        
        // Fill with gradient
        const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, drawSize);
        gradient.addColorStop(0, this.color + 'CC');
        gradient.addColorStop(1, this.color + '00');
        ctx.fillStyle = gradient;
        ctx.fill();
        
        // Stroke
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 2 * this.crystallization;
        ctx.stroke();
        
        // Inner lines (crystallization detail)
        if (this.crystallization > 0.5) {
          ctx.beginPath();
          for (let i = 0; i < sideCount; i++) {
            const angle = (i / sideCount) * Math.PI * 2;
            const x = Math.cos(angle) * drawSize;
            const y = Math.sin(angle) * drawSize;
            ctx.moveTo(0, 0);
            ctx.lineTo(x, y);
          }
          ctx.strokeStyle = this.color + '44';
          ctx.lineWidth = 1;
          ctx.stroke();
        }
        
        ctx.restore();
      }
      
      isDead() {
        return this.age > this.maxAge;
      }
    }
    
    // Particle burst on tap
    class Particle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 4;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.life = 1;
        this.decay = 0.02 + Math.random() * 0.02;
        this.size = 2 + Math.random() * 3;
      }
      
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= 0.95;
        this.vy *= 0.95;
        this.life -= this.decay;
      }
      
      draw() {
        ctx.save();
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      
      isDead() {
        return this.life <= 0;
      }
    }
    
    // System
    const shapes = [];
    const particles = [];
    
    // Initialize with some shapes
    for (let i = 0; i < 8; i++) {
      shapes.push(new TuesdayShape(
        width * 0.2 + Math.random() * width * 0.6,
        height * 0.2 + Math.random() * height * 0.6,
        i % colors.length
      ));
    }
    
    // Spawn shape on tap
    function spawnShape(x, y) {
      unlockAudio();
      const colorIndex = Math.floor(Math.random() * colors.length);
      shapes.push(new TuesdayShape(x, y, colorIndex));
      
      // Particle burst
      for (let i = 0; i < 15; i++) {
        particles.push(new Particle(x, y, colors[colorIndex]));
      }
      
      playTone(300 + colorIndex * 50, 0.15);
    }
    
    // Touch/click handler
    canvas.addEventListener('click', (e) => {
      spawnShape(e.clientX, e.clientY);
    });
    
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      spawnShape(touch.clientX, touch.clientY);
    });
    
    // Draw connection lines between nearby shapes
    function drawConnections() {
      ctx.save();
      for (let i = 0; i < shapes.length; i++) {
        for (let j = i + 1; j < shapes.length; j++) {
          const a = shapes[i];
          const b = shapes[j];
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          
          if (dist < 200) {
            const alpha = (1 - dist / 200) * 0.3;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = `rgba(255, 215, 0, ${alpha})`;
            ctx.lineWidth = 1;
            ctx.stroke();
          }
        }
      }
      ctx.restore();
    }
    
    // Animation loop
    function animate() {
      // Dark fade trail
      ctx.fillStyle = 'rgba(13, 13, 13, 0.1)';
      ctx.fillRect(0, 0, width, height);
      
      // Update and draw shapes
      for (let i = shapes.length - 1; i >= 0; i--) {
        shapes[i].update();
        shapes[i].draw();
        if (shapes[i].isDead()) {
          shapes.splice(i, 1);
}
      }
      
      // Draw connections
      drawConnections();
      
      // Update and draw particles
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();
        if (particles[i].isDead()) {
          particles.splice(i, 1);
        }
      }
      
      // Auto-spawn to keep population up
      if (shapes.length < 3 && Math.random() < 0.02) {
        spawnShape(
          width * 0.3 + Math.random() * width * 0.4,
          height * 0.3 + Math.random() * height * 0.4
        );
      }
      
      requestAnimationFrame(animate);
    }
    
    animate();
  </script>
</body>
</html>
