<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEARS — Clockwork in color</title>
    <meta property="og:title" content="GEARS — Clockwork in color">
    <meta property="og:description" content="Rotating mechanisms in bold colors. Tap to add more gears to the machine.">
    <meta property="og:image" content="https://intheamber.com/amber/gears-og.png">
    <meta property="og:url" content="https://intheamber.com/amber/gears.html">
    <meta name="twitter:card" content="summary_large_image">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0D0D0D;
            overflow: hidden;
            font-family: 'Space Mono', monospace;
            color: #D4A574;
            touch-action: none;
        }
        
        canvas {
            display: block;
            cursor: pointer;
        }
        
        #stats {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 14px;
            line-height: 1.6;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(212, 165, 116, 0.5);
        }
        
        #info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            opacity: 0.7;
            pointer-events: none;
            text-align: center;
        }
        
        .value {
            color: #FFD700;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="stats">
        <div>GEARS: <span class="value" id="gearCount">0</span></div>
        <div>ROTATIONS: <span class="value" id="rotations">0</span></div>
        <div>ENERGY: <span class="value">0.82</span></div>
    </div>
    
    <div id="info">TAP TO ADD GEARS</div>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // Color palette - bold and saturated for high energy
        const COLORS = [
            '#FFD700', // gold
            '#f59e0b', // amber
            '#2D9596', // teal
            '#14b8a6', // teal bright
            '#3b82f6', // electric blue
            '#ec4899', // hot pink
            '#8b5cf6', // purple
            '#f97316', // coral
        ];
        
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color= color;
                this.life = 1;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.02;
            }
            
            draw(ctx) {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        
        class Gear {
            constructor(x, y, radius, teeth, speed, color) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.teeth = teeth;
                this.speed = speed; // degrees per frame
                this.angle = Math.random() * Math.PI * 2;
                this.color = color;
                this.toothHeight = radius * 0.2;
                this.innerRadius = radius * 0.6;
                this.lastTickAngle = 0;
                this.rotationCount = 0;
            }
            
            update() {
                this.angle += this.speed * Math.PI / 180;
                
                // Count full rotations
                const currentRotation = Math.floor(this.angle / (Math.PI * 2));
                if (currentRotation > this.rotationCount) {
                    this.rotationCount = currentRotation;
                    return true; // Signal a full rotation
                }
                
                // Tick sound at each tooth
                const tickInterval = (Math.PI * 2) / this.teeth;
                if (Math.floor(this.angle / tickInterval) > Math.floor(this.lastTickAngle / tickInterval)) {
                    this.playTick();
                }
                this.lastTickAngle = this.angle;
                
                return false;
            }
            
            playTick() {
                const audioCtx = getAudioContext();
                if (!audioCtx) return;
                
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                // Pitch based on gear size - smaller = higher pitch
                const frequency = 200 + (100 - this.radius) * 3;
                osc.frequency.value = frequency;
                osc.type = 'sine';
                
                gain.gain.value = 0.03;
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            }
            
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                
                // Draw gear with teeth
                ctx.beginPath();
                for (let i = 0; i < this.teeth; i++) {
                    const angle1 = (i / this.teeth) * Math.PI * 2;
                    const angle2 = ((i + 0.4) / this.teeth) * Math.PI * 2;
                    const angle3 = ((i + 0.6) / this.teeth) * Math.PI * 2;
                    const angle4 = ((i + 1) / this.teeth) * Math.PI * 2;
                    
                    // Outer arc (tooth tip)
                    ctx.arc(0, 0, this.radius + this.toothHeight, angle1, angle2);
                    // Inner arc (tooth base)
                    ctx.arc(0, 0, this.radius, angle2, angle3, true);
                    // Outer arc (tooth tip)
                    ctx.arc(0, 0, this.radius + this.toothHeight, angle3, angle4);
                    // Inner arc (between teeth)
                    ctx.arc(0, 0, this.radius, angle4, angle1 + (Math.PI * 2 / this.teeth), true);
                }
                ctx.closePath();
                
                // Fill with semi-transparent color
                ctx.fillStyle = this.color + '33'; // 20% opacity
                ctx.fill();
                
                // Glowing edge
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.stroke();
                ctx.shadowBlur = 0;
                
                // Inner circle
                ctx.beginPath();
                ctx.arc(0, 0, this.innerRadius, 0, Math.PI * 2);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 1;
                ctx.stroke();
                
                // Center hub
                ctx.beginPath();
                ctx.arc(0, 0, this.innerRadius * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = this.color + '80'; // 50% opacity
                ctx.fill();
                
                ctx.restore();
            }
            
            spawnParticles() {
                const particles = [];
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2 + this.angle;
                    const x = this.x + Math.cos(angle) * this.radius;
                    const y = this.y + Math.sin(angle) * this.radius;
                    particles.push(new Particle(x, y, this.color));
                }
                return particles;
            }
        }
        
        let gears = [];
        let particles = [];
        let audioContext = null;
        let totalRotations = 0;
        let isAudioReady = false;
        
        function getAudioContext() {
            if (!isAudioReady) return null;
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioContext;
        }
        
        function createRandomGear(x, y) {
            const radius = 40 + Math.random() * 60;
            const teeth = 8 + Math.floor(Math.random() * 16);
            const speed = (Math.random() > 0.5 ? 1 : -1) * (0.5 + Math.random() * 1.5);
            const color = COLORS[Math.floor(Math.random() * COLORS.length)];
            
            return new Gear(x, y, radius, teeth, speed, color);
        }
        
        // Initialize with several gears for immediate visual impact
        function initGears() {
            const positions = [
                [canvas.width * 0.25, canvas.height * 0.3],
                [canvas.width * 0.75, canvas.height * 0.3],
                [canvas.width * 0.5, canvas.height * 0.5],
                [canvas.width * 0.3, canvas.height * 0.7],
                [canvas.width * 0.7, canvas.height * 0.7],
            ];
            
            positions.forEach(([x, y]) => {
                gears.push(createRandomGear(x, y));
            });
        }
        
        initGears();
        
        // Click/tap to add gears
        canvas.addEventListener('click', (e) => {
            isAudioReady = true;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const newGear = createRandomGear(x, y);
            gears.push(newGear);
            
            // Spawn particles on creation
            particles.push(...newGear.spawnParticles());
            
            // Audio feedback
            const audioCtx = getAudioContext();
            if (audioCtx) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.frequency.value = 400;
                osc.type = 'sine';
                gain.gain.value = 0.1;
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
                
osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            }
        });
        
        function animate() {
            // Fade effect for trails
            ctx.fillStyle = 'rgba(13, 13, 13, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Update and draw gears
            gears.forEach(gear => {
                if (gear.update()) {
                    totalRotations++;
                }
                gear.draw(ctx);
            });
            
            // Update and draw particles
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.update();
                p.draw(ctx);
            });
            
            // Update stats
            document.getElementById('gearCount').textContent = gears.length;
            document.getElementById('rotations').textContent = totalRotations;
            
            requestAnimationFrame(animate);
        }
        
        animate();
        
        // Handle resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
