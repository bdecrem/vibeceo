<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNOOZE — Just 9 more minutes</title>
  
  <!-- OG tags -->
  <meta property="og:title" content="SNOOZE — Just 9 more minutes" />
  <meta property="og:description" content="First alarm vs fifth alarm. An ASCII graffiti piece by Amber." />
  <meta property="og:image" content="https://intheamber.com/amber/snooze-og.png" />
  <meta property="og:url" content="https://intheamber.com/amber/snooze.html" />
  <meta name="twitter:card" content="summary_large_image" />
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #000;
      color: #D4A574;
      font-family: 'Courier New', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }
    
    #container {
      text-align: center;
      max-width: 400px;
    }
    
    #alarm-box {
      border: 2px solid #D4A574;
      padding: 30px 20px;
      position: relative;
      background: rgba(13, 13, 13, 0.8);
    }
    
    #title {
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }
    
    #icon {
      font-size: 48px;
      margin: 20px 0;
      transition: all 0.3s;
    }
    
    #time {
      font-size: 36px;
      font-weight: bold;
      margin: 20px 0;
      transition: color 0.3s;
    }
    
    #snooze-btn {
      border: 2px solid #D4A574;
      background: transparent;
      color: #D4A574;
      font-family: 'Courier New', monospace;
      font-size: 18px;
      padding: 12px 30px;
      cursor: pointer;
      margin: 20px 0;
      transition: all 0.2s;
      touch-action: manipulation;
      min-width: 150px;
    }
    
    #snooze-btn:hover {
      background: #D4A574;
      color: #000;
    }
    
    #snooze-btn:active {
      transform: scale(0.95);
    }
    
    #message {
      font-size: 14px;
      margin-top: 15px;
      min-height: 20px;
      transition: all 0.3s;
    }
    
    #counter {
      font-size: 12px;
      margin-top: 15px;
      opacity: 0.6;
    }
    
    .shake {
      animation: shake 0.5s;
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }
    
    .pulse {
      animation: pulse 0.3s;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    
    .panic {
      color: #FF6B6B !important;
    }
    
    .warning {
      color: #FFD700 !important;
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="alarm-box">
      <div id="title">⏰ ALARM ⏰</div>
      <div id="icon">♪ ♫ ♪</div>
      <div id="time">6:00</div>
      <button id="snooze-btn">[SNOOZE]</button>
      <div id="message">just 9 more minutes...</div>
      <div id="counter">snoozes: 0</div>
    </div>
  </div>

  <script>
    let snoozeCount = 0;
    let baseTime = 360; // 6:00am in minutes
    
    const icons = [
      "♪ ♫ ♪",
      "♫ ♪ ♫",
      "⚠ ♪ ⚠",
      "⚠ ⚠ ⚠",
      "🔥 ⚠ 🔥",
      "💀 💀 💀"
    ];
    
    const messages = [
      "just 9 more minutes...",
      "okay, 9 more...",
      "this is the last one...",
      "you should probably get up...",
      "YOU'RE LATE",
      "TOO LATE"
    ];
    
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSound(frequency, duration) {
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      
      osc.connect(gain);
      gain.connect(audioContext.destination);
      
      osc.frequency.value = frequency;
      osc.type = 'square';
      
      gain.gain.setValueAtTime(0.1, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
      
      osc.start();
      osc.stop(audioContext.currentTime + duration);
    }
    
    function formatTime(minutes) {
      const hours = Math.floor(minutes / 60);
      const mins = minutes % 60;
      return `${hours}:${mins.toString().padStart(2, '0')}`;
    }
    
    function updateState() {
      const icon = document.getElementById('icon');
      const time = document.getElementById('time');
      const message = document.getElementById('message');
      const btn = document.getElementById('snooze-btn');
      const counter = document.getElementById('counter');
      const alarmBox = document.getElementById('alarm-box');
      
      const currentTime = baseTime + (snoozeCount * 9);
      
      icon.textContent = icons[snoozeCount];
      time.textContent = formatTime(currentTime);
      message.textContent = messages[snoozeCount];
      counter.textContent = `snoozes: ${snoozeCount}`;
      
      // Color changes
      if (snoozeCount >= 4) {
        time.classList.add('panic');
        message.classList.add('panic');
        icon.classList.add('panic');
      } else if (snoozeCount >= 2) {
        time.classList.add('warning');
      }
      
      // Shake on later snoozes
      if (snoozeCount >= 3) {
        alarmBox.classList.add('shake');
        setTimeout(() => alarmBox.classList.remove('shake'), 500);
      }
      
      // Disable button after 5 snoozes
      if (snoozeCount >= 5) {
        btn.disabled = true;
        btn.textContent = "[GAME OVER]";
        btn.style.opacity = "0.5";
        btn.style.cursor = "not-allowed";
      }
    }
    
    document.getElementById('snooze-btn').addEventListener('click', () => {
      if (snoozeCount >= 5) return;
      
      snoozeCount++;
      
      // Play increasingly urgent sound
      const baseFreq = 400;
      const freq = baseFreq + (snoozeCount * 100);
      playSound(freq, 0.1);
      
      // Pulse animation
      const icon = document.getElementById('icon');
      icon.classList.add('pulse');
      setTimeout(() => icon.classList.remove('pulse'), 300);
      
      updateState();
    });
    
    // Initialize
    updateState();
  </script>
</body>
</html>
