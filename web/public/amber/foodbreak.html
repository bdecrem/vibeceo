<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FOODBREAK</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍕</text></svg>">
<meta property="og:title" content="FOODBREAK">
<meta property="og:description" content="jawbreaker but make it lunch">
<meta property="og:image" content="https://intheamber.com/amber/og/foodbreak.png">
<meta property="og:url" content="https://intheamber.com/amber/foodbreak.html">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="FOODBREAK">
<meta name="twitter:description" content="jawbreaker but make it lunch">
<meta name="twitter:image" content="https://intheamber.com/amber/og/foodbreak.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    font-family: -apple-system, system-ui, sans-serif;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
    overflow: hidden;
  }
  #header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: min(95vw, 440px);
    padding: 8px 4px;
    color: #e0e0e0;
  }
  #title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #ffd700;
  }
  #score-display {
    font-size: 16px;
    font-weight: 600;
    color: #e0e0e0;
  }
  #score-val {
    color: #ffd700;
    font-variant-numeric: tabular-nums;
  }
  #grid {
    display: grid;
    gap: 2px;
    padding: 4px;
    background: #16213e;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  .cell {
    width: 100%;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    border-radius: 6px;
    background: #1a1a2e;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.15s;
    will-change: transform;
  }
  .cell:active { transform: scale(0.9); }
  .cell.highlight { background: #2a2a4e; box-shadow: 0 0 8px rgba(255,215,0,0.3); }
  .cell.popping {
    animation: pop 0.3s ease-out forwards;
  }
  @keyframes pop {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.3); opacity: 0.5; }
    100% { transform: scale(0); opacity: 0; }
  }
  .cell.falling {
    animation: fall 0.2s ease-in;
  }
  @keyframes fall {
    from { transform: translateY(-100%); opacity: 0.7; }
    to { transform: translateY(0); opacity: 1; }
  }
  #combo {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    font-weight: 900;
    color: #ffd700;
    text-shadow: 0 2px 12px rgba(255,215,0,0.5);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 10;
  }
  #combo.show {
    animation: comboFlash 0.8s ease-out;
  }
  @keyframes comboFlash {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
    30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1) translateY(-30px); }
  }
  #game-over {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.8);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    color: white;
  }
  #game-over.show { display: flex; }
  #game-over h2 { font-size: 36px; color: #ffd700; margin-bottom: 8px; }
  #game-over .final-score { font-size: 24px; margin-bottom: 24px; }
  #game-over button {
    font-size: 18px;
    padding: 12px 32px;
    border: 2px solid #ffd700;
    background: transparent;
    color: #ffd700;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 1px;
    font-weight: 600;
  }
  #game-over button:active { background: #ffd700; color: #1a1a2e; }
  #preview {
    height: 24px;
    color: #888;
    font-size: 13px;
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>

<div id="header">
  <div id="title">FOODBREAK</div>
  <div id="score-display">SCORE <span id="score-val">0</span></div>
</div>
<div id="grid"></div>
<div id="preview"></div>
<div id="combo"></div>
<div id="game-over">
  <h2>NO MOVES LEFT</h2>
  <div class="final-score">SCORE: <span id="final-score">0</span></div>
  <button id="restart">PLAY AGAIN</button>
</div>

<script>
const FOODS = ['🍕', '🍔', '🌮', '🍣', '🍩', '🍎'];
const COLS = 10;
const ROWS = 14;
let grid = [];
let score = 0;
let busy = false;

const gridEl = document.getElementById('grid');
const scoreEl = document.getElementById('score-val');
const previewEl = document.getElementById('preview');
const comboEl = document.getElementById('combo');
const gameOverEl = document.getElementById('game-over');
const finalScoreEl = document.getElementById('final-score');

function init() {
  // Size cells based on viewport
  const maxW = Math.min(window.innerWidth * 0.95, 440);
  const cellSize = Math.floor((maxW - (COLS + 1) * 2) / COLS);
  
  gridEl.style.gridTemplateColumns = `repeat(${COLS}, ${cellSize}px)`;
  gridEl.style.gridTemplateRows = `repeat(${ROWS}, ${cellSize}px)`;
  
  // Adjust font size based on cell size
  const fontSize = Math.max(16, Math.floor(cellSize * 0.65));
  
  grid = [];
  score = 0;
  scoreEl.textContent = '0';
  previewEl.textContent = '';
  gameOverEl.classList.remove('show');
  gridEl.innerHTML = '';
  
  for (let r = 0; r < ROWS; r++) {
    grid[r] = [];
    for (let c = 0; c < COLS; c++) {
      grid[r][c] = FOODS[Math.floor(Math.random() * FOODS.length)];
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.style.fontSize = fontSize + 'px';
      cell.textContent = grid[r][c];
      cell.dataset.r = r;
      cell.dataset.c = c;
      cell.addEventListener('click', onCellClick);
      cell.addEventListener('mouseenter', onCellHover);
      cell.addEventListener('mouseleave', clearHighlights);
      gridEl.appendChild(cell);
    }
  }
  busy = false;
}

function getCell(r, c) {
  return gridEl.children[r * COLS + c];
}

function findGroup(r, c) {
  const food = grid[r][c];
  if (!food) return [];
  const visited = new Set();
  const stack = [[r, c]];
  const group = [];
  while (stack.length) {
    const [cr, cc] = stack.pop();
    const key = cr * COLS + cc;
    if (visited.has(key)) continue;
    if (cr < 0 || cr >= ROWS || cc < 0 || cc >= COLS) continue;
    if (grid[cr][cc] !== food) continue;
    visited.add(key);
    group.push([cr, cc]);
    stack.push([cr-1, cc], [cr+1, cc], [cr, cc-1], [cr, cc+1]);
  }
  return group;
}

function onCellHover(e) {
  if (busy) return;
  const r = +e.target.dataset.r;
  const c = +e.target.dataset.c;
  clearHighlights();
  const group = findGroup(r, c);
  if (group.length < 2) {
    previewEl.textContent = '';
    return;
  }
  for (const [gr, gc] of group) {
    getCell(gr, gc).classList.add('highlight');
  }
  const pts = group.length * group.length * 10;
  previewEl.textContent = `${group.length} × ${grid[r][c]} = ${pts} pts`;
}

function clearHighlights() {
  for (const cell of gridEl.children) {
    cell.classList.remove('highlight');
  }
  previewEl.textContent = '';
}

async function onCellClick(e) {
  if (busy) return;
  const r = +e.target.dataset.r;
  const c = +e.target.dataset.c;
  const group = findGroup(r, c);
  if (group.length < 2) return;
  
  busy = true;
  clearHighlights();
  
  // Score: n² × 10
  const pts = group.length * group.length * 10;
  score += pts;
  scoreEl.textContent = score;
  
  // Show combo for big groups
  if (group.length >= 5) {
    comboEl.textContent = group.length >= 10 ? '🔥 FEAST!' : 
                          group.length >= 7 ? '😋 COMBO!' : '👍 NICE!';
    comboEl.className = 'show';
    setTimeout(() => comboEl.className = '', 800);
  }
  
  // Pop animation
  for (const [gr, gc] of group) {
    getCell(gr, gc).classList.add('popping');
    grid[gr][gc] = null;
  }
  
  await sleep(300);
  
  // Gravity: drop items down
  for (let c = 0; c < COLS; c++) {
    let writeRow = ROWS - 1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (grid[r][c] !== null) {
        if (r !== writeRow) {
          grid[writeRow][c] = grid[r][c];
          grid[r][c] = null;
        }
        writeRow--;
      }
    }
    // Fill remaining with null
    for (let r = writeRow; r >= 0; r--) {
      grid[r][c] = null;
    }
  }
  
  // Collapse empty columns to the left
  let writeCols = [];
  for (let c = 0; c < COLS; c++) {
    if (grid[ROWS-1][c] !== null) {
      writeCols.push(c);
    }
  }
  
  if (writeCols.length < COLS) {
    let newGrid = [];
    for (let r = 0; r < ROWS; r++) {
      newGrid[r] = [];
      for (let i = 0; i < writeCols.length; i++) {
        newGrid[r][i] = grid[r][writeCols[i]];
      }
      for (let i = writeCols.length; i < COLS; i++) {
        newGrid[r][i] = null;
      }
    }
    grid = newGrid;
  }
  
  // Redraw
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = getCell(r, c);
      cell.className = 'cell';
      cell.textContent = grid[r][c] || '';
      cell.style.cursor = grid[r][c] ? 'pointer' : 'default';
    }
  }
  
  // Check for game over
  if (!hasValidMoves()) {
    await sleep(500);
    // Bonus for clearing the board
    let remaining = 0;
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (grid[r][c]) remaining++;
    
    if (remaining === 0) {
      score += 1000;
      scoreEl.textContent = score;
      comboEl.textContent = '🏆 PERFECT!';
      comboEl.className = 'show';
      await sleep(1000);
    }
    
    finalScoreEl.textContent = score;
    gameOverEl.classList.add('show');
  }
  
  busy = false;
}

function hasValidMoves() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (!grid[r][c]) continue;
      const group = findGroup(r, c);
      if (group.length >= 2) return true;
    }
  }
  return false;
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

document.getElementById('restart').addEventListener('click', init);
window.addEventListener('resize', init);
init();
</script>
</body>
</html>
