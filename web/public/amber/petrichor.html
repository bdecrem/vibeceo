<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PETRICHOR</title>
<meta property="og:title" content="PETRICHOR">
<meta property="og:description" content="the moment dust becomes earth">
<meta property="og:image" content="https://intheamber.com/amber/og/petrichor.png">
<meta property="og:url" content="https://intheamber.com/amber/petrichor.html">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="PETRICHOR">
<meta name="twitter:description" content="the moment dust becomes earth">
<meta name="twitter:image" content="https://intheamber.com/amber/og/petrichor.png">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔮</text></svg>">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1008; overflow: hidden; touch-action: none; }
canvas { display: block; width: 100vw; height: 100vh; }
#hint {
  position: fixed; bottom: 20px; left: 0; right: 0;
  text-align: center; color: rgba(180,150,100,0.4);
  font: 14px/1 Georgia, serif; letter-spacing: 2px;
  pointer-events: none; transition: opacity 2s;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">touch to bring rain</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// Ground surface - array of height values and wetness
const COLS = 200;
const ground = [];
const groundY = H * 0.72;
for (let i = 0; i < COLS; i++) {
  // Gentle terrain undulation
  const x = i / COLS;
  const h = Math.sin(x * 7) * 8 + Math.sin(x * 13) * 4 + Math.sin(x * 23) * 2;
  ground.push({ h, wetness: 0 });
}

// Dust particles floating above the ground
const dustParticles = [];
const MAX_DUST = 300;
for (let i = 0; i < MAX_DUST; i++) {
  dustParticles.push({
    x: Math.random() * W,
    y: groundY - Math.random() * H * 0.15 - 5,
    vx: (Math.random() - 0.5) * 0.3,
    vy: (Math.random() - 0.5) * 0.1,
    size: Math.random() * 2 + 0.5,
    alpha: Math.random() * 0.4 + 0.1,
    baseAlpha: Math.random() * 0.4 + 0.1,
    settled: true // on/near ground
  });
}

// Rain drops
const raindrops = [];
const MAX_RAIN = 400;

// Impact effects
const impacts = [];
const MAX_IMPACTS = 100;

// Splash particles
const splashes = [];

// Ripple rings on wet surface
const ripples = [];

// Accumulated puddles
let totalWetness = 0;
const MAX_WETNESS = 1;

let touching = false;
let touchX = W / 2;
let touchY = H / 3;
let hintShown = true;
let autoRain = false;
let autoRainTimer = 0;

function addRaindrop(x) {
  if (raindrops.length >= MAX_RAIN) return;
  const spread = W * 0.3;
  raindrops.push({
    x: x + (Math.random() - 0.5) * spread,
    y: -10 - Math.random() * 60,
    vy: 8 + Math.random() * 4,
    vx: (Math.random() - 0.5) * 0.5,
    length: 8 + Math.random() * 12,
    alpha: 0.2 + Math.random() * 0.3,
    width: 1 + Math.random() * 1.5
  });
}

function addImpact(x, y, vel) {
  if (impacts.length >= MAX_IMPACTS) return;
  impacts.push({
    x, y, vel,
    life: 1,
    decay: 0.03 + Math.random() * 0.02
  });
  // Splash particles fly up
  const count = 3 + Math.floor(Math.random() * 4);
  for (let i = 0; i < count; i++) {
    const angle = -Math.PI * (0.15 + Math.random() * 0.7);
    const speed = 1.5 + Math.random() * 3;
    splashes.push({
      x, y,
      vx: Math.cos(angle) * speed * (Math.random() > 0.5 ? 1 : -1),
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.02 + Math.random() * 0.02,
      size: 1 + Math.random() * 2
    });
  }
  // Ripple on wet ground
  if (totalWetness > 0.1) {
    ripples.push({
      x, y: y + 2,
      radius: 2,
      maxRadius: 15 + Math.random() * 20,
      alpha: 0.3 * Math.min(totalWetness, 1),
      growth: 0.8 + Math.random() * 0.4
    });
  }
  // Kick up nearby dust
  for (const d of dustParticles) {
    const dx = d.x - x;
    const dy = d.y - y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 40 && d.settled) {
      d.vy = -(1 + Math.random() * 2);
      d.vx += (dx / dist) * (1 + Math.random());
      d.settled = false;
      d.alpha = d.baseAlpha;
    }
  }
}

function getGroundHeight(x) {
  const col = Math.floor((x / W) * COLS);
  const idx = Math.max(0, Math.min(COLS - 1, col));
  return groundY + ground[idx].h;
}

// Color interpolation: dry warm → wet cool
function lerpColor(t) {
  // Dry: warm ochre #3d2b10 → Wet: cool dark #1a2030
  const r = Math.round(61 + t * (26 - 61));
  const g = Math.round(43 + t * (32 - 43));
  const b = Math.round(16 + t * (48 - 16));
  return `rgb(${r},${g},${b})`;
}

function drawGround() {
  const colW = W / COLS;
  for (let i = 0; i < COLS; i++) {
    const g = ground[i];
    const x = i * colW;
    const y = groundY + g.h;
    const w = g.wetness;

    // Draw ground column
    const baseColor = lerpColor(Math.min(w, 1));
    ctx.fillStyle = baseColor;
    ctx.fillRect(x, y, colW + 1, H - y);

    // Wet sheen on surface
    if (w > 0.1) {
      const sheenAlpha = Math.min(w, 1) * 0.15;
      ctx.fillStyle = `rgba(140,160,180,${sheenAlpha})`;
      ctx.fillRect(x, y, colW + 1, 3);
    }
  }
}

function drawSky() {
  // Sky gradient shifts from warm haze to rain grey
  const wetFactor = Math.min(totalWetness, 1);
  const grad = ctx.createLinearGradient(0, 0, 0, groundY);

  // Dry: warm amber sky → Wet: cool grey
  const r1 = Math.round(40 + wetFactor * (30 - 40));
  const g1 = Math.round(30 + wetFactor * (32 - 30));
  const b1 = Math.round(18 + wetFactor * (40 - 18));

  const r2 = Math.round(50 + wetFactor * (35 - 50));
  const g2 = Math.round(38 + wetFactor * (38 - 38));
  const b2 = Math.round(20 + wetFactor * (45 - 20));

  grad.addColorStop(0, `rgb(${r1},${g1},${b1})`);
  grad.addColorStop(1, `rgb(${r2},${g2},${b2})`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, groundY + 20);
}

function drawDust() {
  for (const d of dustParticles) {
    // Dust fades as ground gets wet
    const wetFade = Math.max(0, 1 - totalWetness * 1.5);
    const a = d.alpha * wetFade;
    if (a < 0.01) continue;
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180,150,100,${a})`;
    ctx.fill();
  }
}

function drawRain() {
  ctx.lineCap = 'round';
  for (const r of raindrops) {
    ctx.beginPath();
    ctx.moveTo(r.x, r.y);
    ctx.lineTo(r.x + r.vx * 2, r.y + r.length);
    ctx.strokeStyle = `rgba(160,180,200,${r.alpha})`;
    ctx.lineWidth = r.width;
    ctx.stroke();
  }
}

function drawImpacts() {
  for (const imp of impacts) {
    // Crown splash
    const r = (1 - imp.life) * 15;
    ctx.beginPath();
    ctx.arc(imp.x, imp.y, r, -Math.PI, 0);
    ctx.strokeStyle = `rgba(180,200,220,${imp.life * 0.4})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}

function drawSplashes() {
  for (const s of splashes) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(160,180,200,${s.life * 0.5})`;
    ctx.fill();
  }
}

function drawRipples() {
  for (const r of ripples) {
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(140,170,200,${r.alpha})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }
}

function update() {
  // Auto rain starts slowly after 8 seconds
  autoRainTimer++;
  if (autoRainTimer > 480 && !touching) {
    autoRain = true;
  }

  // Add rain
  if (touching) {
    const count = 3 + Math.floor(Math.random() * 4);
    for (let i = 0; i < count; i++) addRaindrop(touchX);
  } else if (autoRain) {
    // Gentle ambient rain
    if (Math.random() < 0.3) {
      addRaindrop(Math.random() * W);
    }
  }

  // Update raindrops
  for (let i = raindrops.length - 1; i >= 0; i--) {
    const r = raindrops[i];
    r.y += r.vy;
    r.x += r.vx;
    const gy = getGroundHeight(r.x);
    if (r.y + r.length >= gy) {
      addImpact(r.x, gy, r.vy);
      // Wet the ground
      const col = Math.floor((r.x / W) * COLS);
      if (col >= 0 && col < COLS) {
        ground[col].wetness = Math.min(ground[col].wetness + 0.04, MAX_WETNESS);
        // Spread to neighbors
        if (col > 0) ground[col - 1].wetness = Math.min(ground[col - 1].wetness + 0.01, MAX_WETNESS);
        if (col < COLS - 1) ground[col + 1].wetness = Math.min(ground[col + 1].wetness + 0.01, MAX_WETNESS);
      }
      raindrops.splice(i, 1);
    } else if (r.y > H + 20 || r.x < -20 || r.x > W + 20) {
      raindrops.splice(i, 1);
    }
  }

  // Update impacts
  for (let i = impacts.length - 1; i >= 0; i--) {
    impacts[i].life -= impacts[i].decay;
    if (impacts[i].life <= 0) impacts.splice(i, 1);
  }

  // Update splashes
  for (let i = splashes.length - 1; i >= 0; i--) {
    const s = splashes[i];
    s.x += s.vx;
    s.y += s.vy;
    s.vy += 0.15; // gravity
    s.life -= s.decay;
    if (s.life <= 0 || s.y > H) splashes.splice(i, 1);
  }

  // Update ripples
  for (let i = ripples.length - 1; i >= 0; i--) {
    const r = ripples[i];
    r.radius += r.growth;
    r.alpha *= 0.96;
    if (r.radius >= r.maxRadius || r.alpha < 0.01) ripples.splice(i, 1);
  }

  // Update dust
  for (const d of dustParticles) {
    if (!d.settled) {
      d.vy += 0.03; // gravity
      d.x += d.vx;
      d.y += d.vy;
      d.vx *= 0.99;
      // Resettle
      const gy = getGroundHeight(d.x);
      if (d.y >= gy - 5) {
        d.y = gy - 5 - Math.random() * 3;
        d.vy = 0;
        d.vx *= 0.5;
        if (Math.abs(d.vx) < 0.05) d.settled = true;
      }
      // Wrap horizontally
      if (d.x < 0) d.x = W;
      if (d.x > W) d.x = 0;
    } else {
      // Gentle drift
      d.x += d.vx;
      d.y += Math.sin(Date.now() * 0.001 + d.x * 0.1) * 0.05;
      if (d.x < 0) d.x = W;
      if (d.x > W) d.x = 0;
    }
  }

  // Calculate total wetness
  let totalW = 0;
  for (const g of ground) totalW += g.wetness;
  totalWetness = totalW / COLS;

  // Very slow evaporation
  if (!touching && !autoRain) {
    for (const g of ground) {
      g.wetness = Math.max(0, g.wetness - 0.0001);
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawSky();
  drawDust();
  drawGround();
  drawRipples();
  drawImpacts();
  drawSplashes();
  drawRain();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Touch/mouse
function startTouch(e) {
  e.preventDefault();
  touching = true;
  autoRain = false;
  autoRainTimer = 0;
  const t = e.touches ? e.touches[0] : e;
  touchX = t.clientX;
  touchY = t.clientY;
  if (hintShown) {
    document.getElementById('hint').style.opacity = '0';
    hintShown = false;
  }
}
function moveTouch(e) {
  e.preventDefault();
  const t = e.touches ? e.touches[0] : e;
  touchX = t.clientX;
  touchY = t.clientY;
}
function endTouch() {
  touching = false;
}

canvas.addEventListener('touchstart', startTouch, { passive: false });
canvas.addEventListener('touchmove', moveTouch, { passive: false });
canvas.addEventListener('touchend', endTouch);
canvas.addEventListener('mousedown', startTouch);
canvas.addEventListener('mousemove', (e) => { if (touching) moveTouch(e); });
canvas.addEventListener('mouseup', endTouch);
canvas.addEventListener('mouseleave', endTouch);

loop();
</script>
</body>
</html>
