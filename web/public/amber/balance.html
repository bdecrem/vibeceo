<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BALANCE — Stack blocks. Don't fall.</title>
  
  <!-- Open Graph tags -->
  <meta property="og:title" content="BALANCE — Stack blocks. Don't fall.">
  <meta property="og:description" content="A stacking game by Amber. Tap to drop blocks, build as high as you can without missing.">
  <meta property="og:image" content="https://intheamber.com/amber/balance-og.png">
  <meta property="og:url" content="https://intheamber.com/amber/balance.html">
  <meta property="og:type" content="website">
  
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="BALANCE — Stack blocks. Don't fall.">
  <meta name="twitter:description" content="A stacking game by Amber. Tap to drop blocks, build as high as you can without missing.">
  <meta name="twitter:image" content="https://intheamber.com/amber/balance-og.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #000;
      color: #D4A574;
      font-family: 'Space Mono', monospace;
      overflow: hidden;
      touch-action: none;
    }
    
    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: pointer;
    }
    
    #ui {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 10;
      pointer-events: none;
    }
    
    #score {
      font-size: 24px;
      color: #FFD700;
      margin-bottom: 8px;
    }
    
    #best {
      font-size: 16px;
      color: #2D9596;
    }
    
    #gameOver {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      display: none;
      z-index: 20;
      background: rgba(0, 0, 0, 0.95);
      padding: 40px;
      border: 2px solid #D4A574;
      border-radius: 8px;
    }
    
    #gameOver.show {
      display: block;
    }
    
    #finalScore {
      font-size: 36px;
      color: #FFD700;
      margin-bottom: 16px;
    }
    
    #newRecord {
      font-size: 20px;
      color: #FFD700;
      margin-bottom: 16px;
    }
    
    #playAgain {
      background: #D4A574;
      color: #000;
      border: none;
      padding: 16px 32px;
      font-family: 'Space Mono', monospace;
      font-size: 18px;
      cursor: pointer;
      border-radius: 4px;
      margin-top: 16px;
      min-width: 200px;
    }
    
    #playAgain:active {
      transform: scale(0.95);
    }
    
    #instructions {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      color: #2D9596;
      font-size: 14px;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.5s;
    }
    
    #instructions.hide {
      opacity: 0;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  
  <div id="ui">
    <div id="score">HEIGHT: 0</div>
    <div id="best">BEST: 0</div>
  </div>
  
  <div id="instructions">TAP TO DROP BLOCKS</div>
  
  <div id="gameOver">
    <div id="finalScore"></div>
    <div id="newRecord" style="display: none;">🏆 NEW RECORD!</div>
    <div style="color: #D4A574; margin-bottom: 16px;">TOWER COLLAPSED</div>
    <button id="playAgain">TRY AGAIN</button>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    // Set canvas size
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    
    // Audio context
    let audioCtx;
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }
    
    // Sound effects
    function playSound(freq, duration = 0.1, type = 'sine') {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = freq;
      osc.type = type;
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + duration);
    }
    
    // Game state
    let blocks = [];
    let currentBlock = null;
    let score = 0;
    let bestScore = parseInt(localStorage.getItem('balance_best') || '0');
    let gameOver = false;
    let gameStarted = false;
    let particles = [];
    
    // Constants
    const BLOCK_HEIGHT = 40;
    const INITIAL_BLOCK_WIDTH = 200;
    const BASE_SPEED = 2.5;
    
    // Get ground Y position (responsive)
    function getGroundY() {
      return canvas.height - 100;
    }
    
    // Update UI
    function updateUI() {
      document.getElementById('score').textContent = `HEIGHT: ${score}`;
      document.getElementById('best').textContent = `BEST: ${bestScore}`;
    }
    updateUI();
    
    // Particle system
    class Particle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 8;
        this.vy = (Math.random() - 0.5) * 8 - 2;
        this.life = 1;
        this.color = color;
        this.size = Math.random() * 4 + 2;
      }
      
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.3; // gravity
        this.life -= 0.02;
      }
      
      draw() {
        ctx.save();
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.size, this.size);
        ctx.restore();
      }
    }
    
    // Block class
    class Block {
      constructor(x, y, width) {
        this.x = x;
        this.y = y;
        this.width = width;
        this.height = BLOCK_HEIGHT;
        this.color = score % 2 === 0 ? '#D4A574' : '#FFD700';
      }
      
      draw() {
        // Main block
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.width, this.height);
        
        // Glow effect
        ctx.save();
        ctx.globalAlpha = 0.3;
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 3;
        ctx.strokeRect(this.x - 1.5, this.y - 1.5, this.width + 3, this.height + 3);
        ctx.restore();
      }
    }
    
    // Current sliding block
    class CurrentBlock {
      constructor() {
        const prevBlock = blocks[blocks.length - 1];
        this.width = prevBlock ? prevBlock.width : INITIAL_BLOCK_WIDTH;
        this.height = BLOCK_HEIGHT;
        this.y = 80;
        this.x = 0;
        this.direction = 1;
        this.speed = BASE_SPEED + score * 0.15; // Speed increases with score
        this.color = score % 2 === 0 ? '#D4A574' : '#FFD700';
      }
      
      update() {
        this.x += this.direction * this.speed;
        
        // Bounce off edges
        if (this.x <= 0) {
          this.x = 0;
          this.direction = 1;
        } else if (this.x + this.width >= canvas.width) {
          this.x = canvas.width - this.width;
          this.direction = -1;
        }
      }
      
      draw() {
        // Main block
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.width, this.height);
        
        // Glow effect
        ctx.save();
        ctx.globalAlpha = 0.5;
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 4;
        ctx.strokeRect(this.x - 2, this.y - 2, this.width + 4, this.height + 4);
        ctx.restore();
      }
    }
    
    // Initialize game
    function initGame() {
      blocks = [];
      score = 0;
      gameOver = false;
      particles = [];
      
      // First block at ground
      const groundY = getGroundY();
      blocks.push(new Block(
        canvas.width / 2 - INITIAL_BLOCK_WIDTH / 2,
        groundY - BLOCK_HEIGHT,
        INITIAL_BLOCK_WIDTH
      ));
      
      // Create first moving block
      currentBlock = new CurrentBlock();
      
      updateUI();
      document.getElementById('gameOver').classList.remove('show');
      document.getElementById('instructions').classList.remove('hide');
    }
    
    // Drop current block
    function dropBlock() {
      if (!currentBlock || gameOver) return;
      
      initAudio();
      
      const prevBlock = blocks[blocks.length - 1];
      
      // Calculate overlap
      const currentLeft = currentBlock.x;
      const currentRight = currentBlock.x + currentBlock.width;
      const prevLeft = prevBlock.x;
      const prevRight = prevBlock.x + prevBlock.width;
      
      const overlapLeft = Math.max(currentLeft, prevLeft);
      const overlapRight = Math.min(currentRight, prevRight);
      const overlapWidth = overlapRight - overlapLeft;
      
      // Check if there's any overlap (with small threshold)
      if (overlapWidth <= 5) {
        // Complete miss - game over
        gameOver = true;
        playSound(200, 0.3, 'sawtooth');
        
        // Explosion particles
        for (let i = 0; i < 50; i++) {
          particles.push(new Particle(
            currentBlock.x + currentBlock.width / 2,
            currentBlock.y + currentBlock.height / 2,
            '#FF6B35'
          ));
        }
        
        // Show game over screen
        setTimeout(() => {
          const isNewRecord = score > bestScore;
          if (isNewRecord) {
            bestScore = score;
            localStorage.setItem('balance_best', bestScore.toString());
            document.getElementById('newRecord').style.display = 'block';
          } else {
            document.getElementById('newRecord').style.display = 'none';
          }
          
          document.getElementById('finalScore').textContent = `HEIGHT: ${score}`;
          document.getElementById('gameOver').classList.add('show');
          updateUI();
        }, 500);
        
        currentBlock = null;
        return;
      }
      
      // Perfect alignment bonus
      const perfectThreshold = 8;
      const alignmentError = Math.abs(currentLeft - prevLeft) + Math.abs(currentRight - prevRight);
      const isPerfect = alignmentError < perfectThreshold;
      
      if (isPerfect) {
        playSound(880, 0.15); // High chime
        // Golden particles for perfect
        for (let i = 0; i < 25; i++) {
          particles.push(new Particle(
            overlapLeft + overlapWidth / 2,
            prevBlock.y - BLOCK_HEIGHT,
            '#FFD700'
          ));
        }
      } else {
        playSound(440, 0.1); // Normal drop
      }
      
      // Create particles for cut-off parts
      if (currentLeft < prevLeft) {
        // Left overhang
        const cutWidth = prevLeft - currentLeft;
        for (let i = 0; i < Math.min(cutWidth / 3, 20); i++) {
          particles.push(new Particle(
            currentLeft + cutWidth / 2,
            prevBlock.y - BLOCK_HEIGHT,
            '#2D9596'
          ));
        }
      }
      if (currentRight > prevRight) {
        // Right overhang
        const cutWidth = currentRight - prevRight;
        for (let i = 0; i < Math.min(cutWidth / 3, 20); i++) {
          particles.push(new Particle(
            prevRight + cutWidth / 2,
            prevBlock.y - BLOCK_HEIGHT,
            '#2D9596'
          ));
        }
      }
      
      // Add new block with only overlapping part
      const newBlock = new Block(
        overlapLeft,
        prevBlock.y - BLOCK_HEIGHT,
        overlapWidth
      );
      blocks.push(newBlock);
      
      // Increase score
      score++;
      updateUI();
      
      // Create new moving block
      currentBlock = new CurrentBlock();
      
      // Hide instructions after first drop
      if (score === 1) {
        document.getElementById('instructions').classList.add('hide');
      }
    }
    
    // Animation loop
    function animate() {
      // Clear with fade effect
      ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Draw ground line
      const groundY = getGroundY();
      ctx.strokeStyle = '#D4A574';
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.5;
      ctx.beginPath();
      ctx.moveTo(0, groundY);
      ctx.lineTo(canvas.width, groundY);
      ctx.stroke();
      ctx.globalAlpha = 1;
      
      // Update and draw current block
      if (currentBlock && !gameOver) {
        currentBlock.update();
        currentBlock.draw();
      }
      
      // Draw all stacked blocks
      blocks.forEach(block => block.draw());
      
      // Update and draw particles
      particles = particles.filter(p => p.life > 0);
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      
      requestAnimationFrame(animate);
    }
    
    // Input handlers
    canvas.addEventListener('click', () => {
      if (!gameStarted) {
        gameStarted = true;
        initGame();
      } else if (!gameOver) {
        dropBlock();
      }
    });
    
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (!gameStarted) {
        gameStarted = true;
        initGame();
      } else if (!gameOver) {
        dropBlock();
      }
    }, { passive: false });
    
    document.getElementById('playAgain').addEventListener('click', () => {
      initGame();
    });
    
    // Start
    initGame();
    animate();
  </script>
</body>
</html>
