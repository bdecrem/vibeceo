<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PILLOW GRAVITY</title>
    
    <!-- OG tags -->
    <meta property="og:title" content="PILLOW GRAVITY" />
    <meta property="og:description" content="9.8 snoozes/sec²" />
    <meta property="og:image" content="https://intheamber.com/amber/gravity-og.png" />
    <meta property="og:url" content="https://intheamber.com/amber/gravity.html" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PILLOW GRAVITY" />
    <meta name="twitter:description" content="9.8 snoozes/sec²" />
    <meta name="twitter:image" content="https://intheamber.com/amber/gravity-og.png" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #D4A574;
            font-family: 'Courier New', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
        }

        #container {
            text-align: center;
            padding: 20px;
            max-width: 100%;
        }

        #art {
            font-size: 18px;
            line-height: 1.4;
            white-space: pre;
            letter-spacing: 0.1em;
            margin: 20px 0;
            color: #D4A574;
            transition: all 0.3s ease;
        }

        .pull {
            color: #FFD700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .pillow {
            color: #2D9596;
            font-weight: bold;
        }

        h1 {
            color: #FFD700;
            font-size: 24px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .subtitle {
            color: #2D9596;
            font-size: 14px;
            margin-top: 10px;
        }

        .status {
            color: #D4A574;
            font-size: 13px;
            margin-top: 20px;
            font-style: italic;
        }

        .intensify {
            transform: translateY(15px);
        }

        .arrow-pulse {
            animation: pulse 0.5s ease-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        @media (max-width: 600px) {
            #art {
                font-size: 14px;
            }
            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>PILLOW GRAVITY</h1>
        <div id="art">
    o
   /|\
   / \
    ↓
    ↓
    ↓
 ░▒▓█▓▒░
 <span class="pillow">PILLOW</span>
        </div>
        <div class="subtitle">9.8 snoozes/sec²</div>
        <div class="status">tap to feel the pull</div>
    </div>

    <script>
        const art = document.getElementById('art');
        const container = document.getElementById('container');
        const status = document.querySelector('.status');
        
        let pullCount = 0;
        const messages = [
            'tap to feel the pull',
            'resistance is futile',
            'just 5 more minutes',
            'you were never leaving',
            'the pillow always wins'
        ];

        // Audio context for interaction sounds
        let audioCtx;
        
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playPull() {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.frequency.setValueAtTime(220, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.3);
            
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function handlePull() {
            playPull();
            pullCount++;
            
            // Intensify the pull effect
            art.classList.add('intensify');
            setTimeout(() => {
                art.classList.remove('intensify');
            }, 300);
            
            // Update status message
            status.textContent = messages[Math.min(pullCount, messages.length - 1)];
            
            // Add more arrows as you tap
            if (pullCount === 3) {
                art.innerHTML = art.innerHTML.replace('↓\n    ↓\n    ↓', '↓\n    ↓\n    ↓\n    ↓\n    ↓');
            }
            
            if (pullCount === 5) {
                art.innerHTML = art.innerHTML.replace('o\n   /|\\', '<span class="pull">o\n   /|\\</span>');
            }
        }

        // Touch and click events
        document.body.addEventListener('click', handlePull);
        document.body.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handlePull();
        });
    </script>
</body>
</html>
