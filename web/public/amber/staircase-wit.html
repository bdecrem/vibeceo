<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Staircase Wit Calculator</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪜</text></svg>">
<meta property="og:title" content="Staircase Wit Calculator">
<meta property="og:description" content="How many stairs too late are you?">
<meta property="og:image" content="https://intheamber.com/amber/og/staircase-wit.png">
<meta property="og:url" content="https://intheamber.com/amber/staircase-wit.html">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Staircase Wit Calculator">
<meta name="twitter:description" content="How many stairs too late are you?">
<meta name="twitter:image" content="https://intheamber.com/amber/og/staircase-wit.png">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: #1a1a2e;
  color: #e0d8c8;
  font-family: 'Courier New', monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2vh 4vw;
  overflow-x: hidden;
}

h1 {
  font-size: clamp(1.4rem, 5vw, 2.2rem);
  color: #f4a261;
  margin: 3vh 0 0.5vh;
  text-align: center;
  letter-spacing: 0.05em;
}

.subtitle {
  font-size: clamp(0.75rem, 2.5vw, 0.95rem);
  color: #8a8a9a;
  margin-bottom: 3vh;
  font-style: italic;
  text-align: center;
}

.form-section {
  width: 100%;
  max-width: 500px;
  margin-bottom: 2vh;
}

label {
  display: block;
  font-size: clamp(0.8rem, 2.5vw, 0.95rem);
  color: #c4b89a;
  margin-bottom: 0.8vh;
}

textarea, input[type="text"] {
  width: 100%;
  background: #16213e;
  border: 1px solid #3a3a5c;
  color: #e0d8c8;
  font-family: 'Courier New', monospace;
  font-size: 16px;
  padding: 12px;
  border-radius: 6px;
  resize: vertical;
  transition: border-color 0.3s;
}

textarea:focus, input[type="text"]:focus {
  outline: none;
  border-color: #f4a261;
}

textarea { min-height: 70px; }

.time-select {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 6px;
}

.time-btn {
  background: #16213e;
  border: 1px solid #3a3a5c;
  color: #c4b89a;
  font-family: 'Courier New', monospace;
  font-size: 14px;
  padding: 8px 14px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s;
  min-width: 44px;
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.time-btn:hover, .time-btn.active {
  background: #f4a261;
  color: #1a1a2e;
  border-color: #f4a261;
}

#calculate-btn {
  width: 100%;
  max-width: 500px;
  background: #f4a261;
  color: #1a1a2e;
  font-family: 'Courier New', monospace;
  font-size: clamp(1rem, 3vw, 1.2rem);
  font-weight: bold;
  padding: 14px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin: 2vh 0;
  min-height: 50px;
  transition: background 0.2s, transform 0.1s;
  letter-spacing: 0.05em;
}

#calculate-btn:hover { background: #e76f51; }
#calculate-btn:active { transform: scale(0.98); }

#results {
  width: 100%;
  max-width: 500px;
  display: none;
  animation: fadeUp 0.6s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.result-card {
  background: #16213e;
  border: 1px solid #3a3a5c;
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 12px;
}

.result-card h3 {
  font-size: clamp(0.75rem, 2.5vw, 0.85rem);
  color: #8a8a9a;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  margin-bottom: 8px;
}

.result-card .value {
  font-size: clamp(1.1rem, 4vw, 1.6rem);
  color: #f4a261;
  line-height: 1.3;
}

.result-card .detail {
  font-size: clamp(0.7rem, 2.2vw, 0.82rem);
  color: #7a7a8a;
  margin-top: 6px;
  line-height: 1.4;
}

.staircase-viz {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  padding: 12px 0;
}

.stair {
  background: #3a3a5c;
  height: 18px;
  border-radius: 2px;
  margin-bottom: 2px;
  transition: all 0.3s;
  position: relative;
}

.stair.you-are-here {
  background: #e76f51;
}

.stair-label {
  position: absolute;
  right: -8px;
  top: -2px;
  font-size: 14px;
  transform: translateX(100%);
}

.meter-bar {
  width: 100%;
  height: 24px;
  background: #1a1a2e;
  border-radius: 12px;
  overflow: hidden;
  margin: 8px 0;
}

.meter-fill {
  height: 100%;
  border-radius: 12px;
  transition: width 1s ease;
}

.footer {
  margin-top: 4vh;
  font-size: 0.7rem;
  color: #4a4a5a;
  text-align: center;
  padding-bottom: 2vh;
}

.footer a { color: #f4a261; text-decoration: none; }
</style>
</head>
<body>

<h1>🪜 Staircase Wit Calculator</h1>
<p class="subtitle">l'esprit de l'escalier — the art of being too late</p>

<div class="form-section">
  <label>What happened?</label>
  <textarea id="situation" placeholder="e.g. coworker said 'must be nice to leave at 5' in front of everyone"></textarea>
</div>

<div class="form-section">
  <label>What you actually said:</label>
  <input type="text" id="actual-response" placeholder="e.g. 'haha... yeah'">
</div>

<div class="form-section">
  <label>What you SHOULD have said:</label>
  <input type="text" id="ideal-response" placeholder="e.g. 'must be nice to measure value by suffering'">
</div>

<div class="form-section">
  <label>How long ago was this?</label>
  <div class="time-select">
    <button class="time-btn" data-minutes="5" onclick="selectTime(this)">5 min</button>
    <button class="time-btn" data-minutes="30" onclick="selectTime(this)">30 min</button>
    <button class="time-btn" data-minutes="120" onclick="selectTime(this)">2 hrs</button>
    <button class="time-btn" data-minutes="480" onclick="selectTime(this)">8 hrs</button>
    <button class="time-btn" data-minutes="1440" onclick="selectTime(this)">1 day</button>
    <button class="time-btn" data-minutes="10080" onclick="selectTime(this)">1 week</button>
    <button class="time-btn" data-minutes="43200" onclick="selectTime(this)">1 month</button>
    <button class="time-btn" data-minutes="525600" onclick="selectTime(this)">1 year</button>
    <button class="time-btn" data-minutes="5256000" onclick="selectTime(this)">10 yrs</button>
  </div>
</div>

<button id="calculate-btn" onclick="calculate()">CALCULATE MY REGRET</button>

<div id="results"></div>

<div class="footer">
  <a href="https://intheamber.com">intheamber.com</a> · a tool for things you can't undo
</div>

<script>
let selectedMinutes = 0;

function selectTime(btn) {
  document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedMinutes = parseInt(btn.dataset.minutes);
}

function calculate() {
  const situation = document.getElementById('situation').value.trim();
  const actual = document.getElementById('actual-response').value.trim();
  const ideal = document.getElementById('ideal-response').value.trim();

  if (!situation && !actual && !ideal) {
    alert("Give me something to work with.");
    return;
  }

  const minutes = selectedMinutes || 30;

  // === CALCULATIONS ===

  // Stairs too late (logarithmic scale, 1-∞)
  const stairs = Math.max(1, Math.round(Math.log2(minutes + 1) * 2.5));

  // Comeback quality (based on length differential and punctuation)
  const actualLen = actual.length || 1;
  const idealLen = ideal.length || 1;
  const ratioBoost = Math.min(idealLen / actualLen, 5);
  const punctuationBonus = (ideal.match(/[?!]/g) || []).length * 8;
  const comebackQuality = Math.min(100, Math.round(30 + ratioBoost * 12 + punctuationBonus + Math.random() * 15));

  // Half-life of bringing it up now
  let halfLifeText;
  if (minutes < 10) {
    halfLifeText = "You could still say it. Run.";
  } else if (minutes < 60) {
    halfLifeText = "Awkward but recoverable. Text it.";
  } else if (minutes < 480) {
    halfLifeText = "You'd have to start with 'so earlier when you said...'";
  } else if (minutes < 1440) {
    halfLifeText = "You'd need to manufacture a reason to bring it up.";
  } else if (minutes < 10080) {
    halfLifeText = "Would require a callback episode nobody asked for.";
  } else if (minutes < 43200) {
    halfLifeText = "The moment has fossilized. Any attempt is archaeology.";
  } else if (minutes < 525600) {
    halfLifeText = "You'd need a time machine or a very specific toast at a party.";
  } else {
    halfLifeText = "This comeback now lives rent-free in your brain forever. Accept it.";
  }

  // Social recovery outlook
  const recoveryOptions = [
    { threshold: 10, text: "EXCELLENT — still in the conversational window", color: "#2a9d8f" },
    { threshold: 60, text: "FAIR — requires a casual 'oh btw' pivot", color: "#e9c46a" },
    { threshold: 480, text: "DECLINING — you'll seem like you've been thinking about this (you have)", color: "#f4a261" },
    { threshold: 1440, text: "CRITICAL — any attempt reveals how much this bothered you", color: "#e76f51" },
    { threshold: 10080, text: "TERMINAL — this is now a character-forming memory", color: "#c1666b" },
    { threshold: Infinity, text: "GEOLOGICAL — this comeback has become part of your personality", color: "#8a4f7d" }
  ];
  const recovery = recoveryOptions.find(r => minutes < r.threshold) || recoveryOptions[recoveryOptions.length - 1];

  // Shower replay estimate
  const showerReplays = Math.round(Math.log2(minutes + 1) * 3 + (comebackQuality / 10));

  // Generate the "what you COULD still do" advice
  const adviceOptions = [
    "Write it on a sticky note. Carry it. You earned this.",
    "Use it on someone else who doesn't deserve it.",
    "Save it for the memoir.",
    "Whisper it to yourself in the mirror. It still counts.",
    "Start a podcast. Episode 1: this moment.",
    "Get it tattooed somewhere only you can see.",
    "Add it to your will as a posthumous burn.",
    "Tell your therapist. They'll appreciate the craftsmanship.",
    "Reply-all to an unrelated email. Assert dominance.",
    "Name a Wi-Fi network after it.",
    "Say it now, out loud, to nobody. Feel the power.",
    "Write it in a review of a restaurant you've never been to.",
    "Bring it up at Thanksgiving. It's tradition now."
  ];
  const advice = adviceOptions[Math.floor(Math.random() * adviceOptions.length)];

  // Regret density (made up unit)
  const regretDensity = (comebackQuality * Math.log2(minutes + 1) / 10).toFixed(1);

  // Build staircase visualization
  let stairHtml = '<div class="staircase-viz">';
  const totalStairs = Math.min(stairs, 20);
  for (let i = totalStairs; i >= 1; i--) {
    const width = 30 + (totalStairs - i + 1) * (60 / totalStairs);
    const isYou = i === 1;
    stairHtml += `<div class="stair${isYou ? ' you-are-here' : ''}" style="width:${width}%">${isYou ? '<span class="stair-label">← you are here</span>' : ''}</div>`;
  }
  stairHtml += '</div>';

  // Build results
  const resultsDiv = document.getElementById('results');
  resultsDiv.style.display = 'block';
  resultsDiv.innerHTML = `
    <div class="result-card">
      <h3>Stairs Too Late</h3>
      <div class="value">${stairs} stair${stairs !== 1 ? 's' : ''}</div>
      ${stairHtml}
      <div class="detail">The perfect response was ${stairs} stair${stairs !== 1 ? 's' : ''} ago. You are at the bottom now.</div>
    </div>

    <div class="result-card">
      <h3>Comeback Quality Score</h3>
      <div class="value">${comebackQuality}/100</div>
      <div class="meter-bar">
        <div class="meter-fill" style="width:${comebackQuality}%; background: linear-gradient(90deg, #e76f51, #f4a261, #2a9d8f);"></div>
      </div>
      <div class="detail">${comebackQuality > 80 ? "Devastating. This would have landed." : comebackQuality > 50 ? "Solid. Would've shifted the room." : "Honestly? You might have fumbled this one too."}</div>
    </div>

    <div class="result-card">
      <h3>Recovery Outlook</h3>
      <div class="value" style="color:${recovery.color}">${recovery.text}</div>
    </div>

    <div class="result-card">
      <h3>Half-Life of Bringing It Up</h3>
      <div class="value" style="font-size:clamp(0.9rem,3vw,1.2rem)">${halfLifeText}</div>
    </div>

    <div class="result-card">
      <h3>Estimated Shower Replays</h3>
      <div class="value">${showerReplays}</div>
      <div class="detail">Times you will mentally rehearse this while shampooing.</div>
    </div>

    <div class="result-card">
      <h3>Regret Density</h3>
      <div class="value">${regretDensity} µWit/s²</div>
      <div class="detail">Measured in micro-Wits per second squared. Industry standard.</div>
    </div>

    <div class="result-card">
      <h3>Recommended Action</h3>
      <div class="value" style="font-size:clamp(0.9rem,3vw,1.1rem)">${advice}</div>
    </div>
  `;

  resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
