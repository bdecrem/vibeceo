<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLARITY — Is this clarity or chemistry?</title>
  
  <!-- OG tags -->
  <meta property="og:title" content="CLARITY — Is this clarity or chemistry?">
  <meta property="og:description" content="When I'm this sure, is it because I see clearly, or just because my chemistry is good?">
  <meta property="og:image" content="https://intheamber.com/amber/clarity-og.png">
  <meta property="og:url" content="https://intheamber.com/amber/clarity.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="CLARITY — Is this clarity or chemistry?">
  <meta name="twitter:description" content="When I'm this sure, is it because I see clearly, or just because my chemistry is good?">
  <meta name="twitter:image" content="https://intheamber.com/amber/clarity-og.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Space Mono', monospace;
      background: #000;
      color: #D4A574;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
    }
    
    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 20px;
      max-width: 600px;
    }
    
    .question {
      font-size: clamp(24px, 5vw, 40px);
      font-weight: bold;
      margin-bottom: 60px;
      line-height: 1.4;
      transition: all 0.6s ease;
    }
    
    .state-label {
      font-size: clamp(60px, 12vw, 120px);
      font-weight: bold;
      margin-bottom: 30px;
      transition: all 0.6s ease;
      text-shadow: 0 0 40px currentColor;
    }
    
    .state-text {
      font-size: clamp(16px, 3vw, 20px);
      opacity: 0.8;
      transition: all 0.6s ease;
    }
    
    .hint {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      opacity: 0.4;
      z-index: 10;
    }
    
    /* Clarity state */
    body.clarity .question {
      color: #FFD700;
      text-shadow: 0 0 30px #FFD700;
    }
    
    body.clarity .state-label {
      color: #FFD700;
    }
    
    body.clarity .state-text {
      color: #f59e0b;
    }
    
    /* Chemistry state */
    body.chemistry .question {
      color: #2D9596;
      text-shadow: 0 0 30px #2D9596;
    }
    
    body.chemistry .state-label {
      color: #2D9596;
    }
    
    body.chemistry .state-text {
      color: #D4A574;
    }
    
    @media (max-width: 600px) {
      .content {
        padding: 30px 20px;
      }
      
      .question {
        margin-bottom: 40px;
      }
      
      .state-label {
        margin-bottom: 20px;
      }
    }
  </style>
</head>
<body class="clarity">
  <canvas id="canvas"></canvas>
  
  <div class="content">
    <div class="question">Is this clarity or chemistry?</div>
    <div class="state-label" id="stateLabel">CLARITY</div>
    <div class="state-text" id="stateText">I see it. I know it. This is real.</div>
  </div>
  
  <div class="hint">tap to question</div>
  
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const stateLabel = document.getElementById('stateLabel');
    const stateText = document.getElementById('stateText');
    
    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;
    
    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    });
    
    // Audio context
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let audioInitialized = false;
    
    function playTone(freq, duration = 0.3) {
      if (!audioInitialized) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }
    
    // Particle system
    class Particle {
      constructor(x, y, vx, vy, color, size) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.color = color;
        this.size = size;
        this.alpha = 1;
        this.decay = 0.015;
      }
      
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.alpha -= this.decay;
        this.size *= 0.98;
      }
      
      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        
        // Glow
        const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 2);
        gradient.addColorStop(0, this.color + '40');
        gradient.addColorStop(1, this.color + '00');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }
    
    let particles = [];
    let currentState = 'clarity'; // 'clarity' or 'chemistry'
    
    // State definitions
    const states = {
      clarity: {
        label: 'CLARITY',
        text: 'I see it. I know it. This is real.',
        color: '#FFD700',
        particleType: 'sharp', // sharp beams of light
        tone: 523 // C5
      },
      chemistry: {
        label: 'CHEMISTRY',
        text: 'Or am I just in a good mood?',
        color: '#2D9596',
        particleType: 'molecular', // scattered molecules
        tone: 330 // E4
      }
    };
    
    function toggleState() {
      currentState = currentState === 'clarity' ? 'chemistry' : 'clarity';
      const state = states[currentState];
      
      // Update DOM
      document.body.className = currentState;
      stateLabel.textContent = state.label;
      stateText.textContent = state.text;
      
      // Play tone
      playTone(state.tone, 0.4);
      
      // Generate particles
      generateParticles();
    }
    
    function generateParticles() {
      const state = states[currentState];
      const centerX = width / 2;
      const centerY = height / 2;
      
      if (state.particleType === 'sharp') {
        // Sharp beams radiating outward (clarity)
        for (let i = 0; i < 20; i++) {
          const angle = (Math.PI * 2 * i) / 20;
          const speed = 3 + Math.random() * 2;
          particles.push(new Particle(
            centerX,
            centerY,
            Math.cos(angle) * speed,
            Math.sin(angle) * speed,
            state.color,
            3 + Math.random() * 2
          ));
        }
      } else {
        // Scattered molecules (chemistry)
        for (let i = 0; i < 40; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 1 + Math.random() * 3;
          particles.push(new Particle(
            centerX + (Math.random()- 0.5) * 100,
            centerY + (Math.random() - 0.5) * 100,
            Math.cos(angle) * speed,
            Math.sin(angle) * speed,
            Math.random() > 0.5 ? '#2D9596' : '#D4A574',
            2 + Math.random() * 3
          ));
        }
      }
    }
    
    // Ambient glow effect
    function drawAmbientGlow() {
      const state = states[currentState];
      const centerX = width / 2;
      const centerY = height / 2;
      
      ctx.save();
      ctx.globalAlpha = 0.05;
      const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, width * 0.6);
      gradient.addColorStop(0, state.color);
      gradient.addColorStop(1, '#00000000');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);
      ctx.restore();
    }
    
    // Animation loop
    function animate() {
      // Fade effect instead of clear
      ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
      ctx.fillRect(0, 0, width, height);
      
      // Draw ambient glow
      drawAmbientGlow();
      
      // Update and draw particles
      particles = particles.filter(p => p.alpha > 0);
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      
      requestAnimationFrame(animate);
    }
    
    // Initialize
    document.body.addEventListener('click', () => {
      if (!audioInitialized) {
        audioCtx.resume();
        audioInitialized = true;
      }
      toggleState();
    });
    
    // Start with initial particles
    generateParticles();
    animate();
  </script>
</body>
</html>
