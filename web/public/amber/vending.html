<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VENDING — Amber</title>
  <link rel="icon" type="image/svg+xml" href="/amber/favicon.svg">
  
  <!-- OpenGraph -->
  <meta property="og:title" content="VENDING — Amber">
  <meta property="og:description" content="Dispense emotions from a vending machine. Sometimes it works. Sometimes it doesn't.">
  <meta property="og:image" content="https://intheamber.com/amber/vending-og.png">
  <meta property="og:url" content="https://intheamber.com/amber/vending.html">
  <meta property="og:type" content="website">
  
  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="VENDING — Amber">
  <meta name="twitter:description" content="Dispense emotions from a vending machine. Sometimes it works. Sometimes it doesn't.">
  <meta name="twitter:image" content="https://intheamber.com/amber/vending-og.png">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #000;
      color: #D4A574;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
    }
    
    #machine {
      background: #1a1a1a;
      border: 4px solid #D4A574;
      border-radius: 12px;
      padding: 20px;
      width: min(90vw, 400px);
      box-shadow: 0 0 30px rgba(212, 165, 116, 0.3);
    }
    
    #display {
      background: #0a0a0a;
      border: 2px solid #D4A574;
      padding: 15px;
      text-align: center;
      font-size: 14px;
      min-height: 80px;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    #status {
      color: #FFD700;
      font-size: 12px;
      text-transform: uppercase;
    }
    
    #dispensed {
      font-size: 18px;
      color: #2D9596;
      font-weight: bold;
      animation: fadeIn 0.3s;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    #grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 15px;
    }
    
    .button {
      background: #0a0a0a;
      border: 2px solid #666;
      color: #D4A574;
      padding: 12px 8px;
      font-size: 11px;
      font-family: 'Courier New', monospace;
      cursor: pointer;
      transition: all 0.1s;
      border-radius: 4px;
      min-height: 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      touch-action: manipulation;
    }
    
    .button:active {
      transform: scale(0.95);
      border-color: #D4A574;
    }
    
    .button.disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    
    .button-code {
      color: #FFD700;
      font-weight: bold;
      font-size: 10px;
    }
    
    .button-label {
      font-size: 12px;
    }
    
    #coin-slot {
      background: #0a0a0a;
      border: 3px solid #D4A574;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      border-radius: 4px;
      margin-bottom: 15px;
      transition: all 0.2s;
      touch-action: manipulation;
    }
    
    #coin-slot:active {
      transform: scale(0.98);
      background: #1a1a1a;
    }
    
    #coin-slot.ready {
      border-color: #2D9596;
      box-shadow: 0 0 15px rgba(45, 149, 150, 0.5);
    }
    
    #window {
      background: #111;
      border: 3px solid #666;
      height: 120px;
      margin-bottom: 15px;
      position: relative;
      overflow: hidden;
      border-radius: 4px;
    }
    
    .item {
      position: absolute;
      background: #D4A574;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 14px;
      left: 50%;
      transform: translateX(-50%);
      transition: top 0.5s ease-in;
      box-shadow: 0 0 10px rgba(212, 165, 116, 0.5);
    }
    
    .item.stuck {
      animation: shake 0.5s infinite;
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(-50%) rotate(0deg); }
      25% { transform: translateX(-48%) rotate(-2deg); }
      75% { transform: translateX(-52%) rotate(2deg); }
    }
    
    #stats {
      text-align: center;
      font-size: 11px;
      color: #666;
      margin-top: 10px;
    }
    
    #start-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      gap: 20px;
    }
    
    #start-btn {
      background: #D4A574;
      color: #000;
      border: none;
      padding: 20px 40px;
      font-size: 20px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s;
      touch-action: manipulation;
    }
    
    #start-btn:active {
      transform: scale(0.95);
    }
    
    .title {
      font-size: 24px;
      color: #FFD700;
      text-align: center;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  
  <div id="start-overlay">
    <div class="title">VENDING MACHINE</div>
    <button id="start-btn">▶ START</button>
  </div>

  <div id="machine">
    <div class="title" style="font-size: 16px; margin-bottom: 15px;">EMOTIONS INC.</div>
    
    <div id="display">
      <div id="status">Insert coin to begin</div>
      <div id="dispensed"></div>
    </div>
    
    <div id="coin-slot">
      💰 INSERT COIN 💰
    </div>
    
    <div id="grid">
      <div class="button disabled" data-code="A1" data-emotion="Joy">
        <span class="button-code">A1</span>
        <span class="button-label">Joy</span>
      </div>
      <div class="button disabled" data-code="A2" data-emotion="Calm">
        <span class="button-code">A2</span>
        <span class="button-label">Calm</span>
      </div>
      <div class="button disabled" data-code="A3" data-emotion="Hope">
        <span class="button-code">A3</span>
        <span class="button-label">Hope</span>
      </div>
      <div class="button disabled" data-code="B1" data-emotion="Confidence">
        <span class="button-code">B1</span>
        <span class="button-label">Confidence</span>
      </div>
      <div class="button disabled" data-code="B2" data-emotion="Peace">
        <span class="button-code">B2</span>
        <span class="button-label">Peace</span>
      </div>
      <div class="button disabled" data-code="B3" data-emotion="Energy">
        <span class="button-code">B3</span>
        <span class="button-label">Energy</span>
      </div>
      <div class="button disabled" data-code="C1" data-emotion="Love">
        <span class="button-code">C1</span>
        <span class="button-label">Love</span>
      </div>
      <div class="button disabled" data-code="C2" data-emotion="Wonder">
        <span class="button-code">C2</span>
        <span class="button-label">Wonder</span>
      </div>
      <div class="button disabled" data-code="C3" data-emotion="Gratitude">
        <span class="button-code">C3</span>
        <span class="button-label">Gratitude</span>
      </div>
    </div>
    
    <div id="window"></div>
    
    <div id="stats">
      Dispensed: <span id="count">0</span> | 
      Stuck: <span id="stuck-count">0</span> | 
      Malfunctions: <span id="malfunction-count">0</span>
    </div>
  </div>

  <script>
    let audioCtx;
    let hasCredit = false;
    let dispensedCount = 0;
    let stuckCount = 0;
    let malfunctionCount = 0;
    
    const wrongEmotions = ['Dread', 'Anxiety', 'Regret', 'Confusion', 'Boredom', 'Doubt'];
    
    document.getElementById('start-btn').addEventListener('click', () => {
      audioCtx = new AudioContext();
      document.getElementById('start-overlay').style.display = 'none';
    });
    
    function playSound(type) {
      if (!audioCtx) return;
      
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      if (type === 'coin') {
        // Coin clink
        osc.frequency.value = 800;
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now);
        osc.stop(now + 0.1);
      } else if (type === 'button') {
        // Button press
        osc.type = 'square';
        osc.frequency.value = 200;
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
        osc.start(now);
        osc.stop(now + 0.05);
      } else if (type === 'motor') {
        // Motor whirr
        osc.type = 'sawtooth';
        osc.frequency.value = 150;
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.8);
        osc.start(now);
        osc.stop(now + 0.8);
      } else if (type === 'dispense') {
        // Thunk
        osc.type = 'triangle';
        osc.frequency.value = 80;
        gain.gain.setValueAtTime(0.4, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
        osc.start(now);
        osc.stop(now + 0.2);
      } else if (type === 'error') {
        // Error buzz
        osc.type = 'sawtooth';
        osc.frequency.value = 100;
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.setValueAtTime(0.2, now + 0.1);
        gain.gain.setValueAtTime(0, now + 0.15);
        gain.gain.setValueAtTime(0.2, now + 0.2);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
        osc.start(now);
        osc.stop(now + 0.3);
      }
    }
    
    const coinSlot = document.getElementById('coin-slot');
    const buttons = document.querySelectorAll('.button');
    const display = document.getElementById('display');
    const status = document.getElementById('status');
    const dispensed = document.getElementById('dispensed');
    const window = document.getElementById('window');
    
    coinSlot.addEventListener('click', () => {
      playSound('coin');
      hasCredit = true;
      coinSlot.classList.add('ready');
      status.textContent = 'Select emotion';
      status.style.color = '#2D9596';
      
      buttons.forEach(btn => btn.classList.remove('disabled'));
    });
    
    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        if (!hasCredit) {
          playSound('error');
          status.textContent = 'Insert coin first!';
          status.style.color = '#ff6b6b';
          return;
        }
        
        playSound('button');
        playSound('motor');
        
        const code = btn.dataset.code;
        const emotion = btn.dataset.emotion;
        
        hasCredit = false;
        coinSlot.classList.remove('ready');
        buttons.forEach(b => b.classList.add('disabled'));
        
        status.textContent = `Vending ${code}...`;
        status.style.color = '#FFD700';
        dispensed.textContent = '';
        
        // Random outcome
        const outcome = Math.random();
        
        if (outcome < 0.5) {
          // Success
          setTimeout(() => {
            const item = document.createElement('div');
            item.className = 'item';
            item.textContent = emotion;
            item.style.top = '-50px';
            window.appendChild(item);
            
            setTimeout(() => {
              item.style.top = '90px';
              playSound('dispense');
            }, 50);
            
            setTimeout(() => {
              status.textContent = 'Dispensed!';
              status.style.color = '#2D9596';
              dispensed.textContent = `You received: ${emotion}`;
              window.removeChild(item);
              dispensedCount++;
              document.getElementById('count').textContent = dispensedCount;
              
              setTimeout(() => {
                status.textContent = 'Insert coin to begin';
                status.style.color = '#D4A574';
                dispensed.textContent = '';
              }, 2000);
            }, 600);
          }, 800);
          
        } else if (outcome < 0.75) {
          // Stuck
          setTimeout(() => {
            const item = document.createElement('div');
            item.className = 'item stuck';
            item.textContent = emotion;
            item.style.top = '30px';
            window.appendChild(item);
            
            status.textContent = 'STUCK!';
            status.style.color = '#ff6b6b';
            dispensed.textContent = 'Tap the machine to shake it';
            stuckCount++;
            document.getElementById('stuck-count').textContent = stuckCount;
            
            const shakeHandler = () => {
              playSound('dispense');
              item.style.top = '90px';
              
              setTimeout(() => {
                status.textContent = 'Dispensed!';
                status.style.color = '#2D9596';
                dispensed.textContent = `You received: ${emotion}`;
                window.removeChild(item);
                dispensedCount++;
                document.getElementById('count').textContent = dispensedCount;
                
                setTimeout(() => {
                  status.textContent = 'Insert coin to begin';
                  status.style.color = '#D4A574';
                  dispensed.textContent = '';
                }, 2000);
              }, 600);
              
              document.getElementById('machine').removeEventListener('click', shakeHandler);
            };
            
            document.getElementById('machine').addEventListener('click', shakeHandler);
          }, 800);
          
        } else if (outcome < 0.9) {
          // Wrong emotion
          setTimeout(() => {
            const wrongEmotion = wrongEmotions[Math.floor(Math.random() * wrongEmotions.length)];
            const item = document.createElement('div');
            item.className = 'item';
            item.textContent = wrongEmotion;
            item.style.top = '-50px';
            item.style.background = '#7B68EE';
            window.appendChild(item);
            
            setTimeout(() => {
              item.style.top = '90px';
              playSound('dispense');
            }, 50);
            
            setTimeout(() => {
              status.textContent = 'Malfunction!';
              status.style.color = '#ff6b6b';
              dispensed.textContent = `You received: ${wrongEmotion} (???)`;
              window.removeChild(item);
              malfunctionCount++;
              document.getElementById('malfunction-count').textContent = malfunctionCount;
              
              setTimeout(() => {
                status.textContent = 'Insert coin to begin';
                status.style.color = '#D4A574';
                dispensed.textContent = '';
              }, 2500);
            }, 600);
          }, 800);
          
        } else {
          // Out of stock
          setTimeout(() => {
            playSound('error');
            status.textContent = 'OUT OF STOCK';
            status.style.color = '#ff6b6b';
            dispensed.textContent = `${emotion} is currently unavailable`;
            
            setTimeout(() => {
              status.textContent = 'Insert coin to begin';
              status.style.color = '#D4A574';
              dispensed.textContent = '';
            }, 2000);
          }, 800);
        }
      });
    });
  </script>
</body>
</html>
