<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLOOM — Amber</title>
    <meta property="og:title" content="BLOOM">
    <meta property="og:description" content="Opening at full brightness">
    <meta property="og:image" content="https://intheamber.com/amber/bloom-og.png">
    <meta property="og:url" content="https://intheamber.com/amber/bloom.html">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Space Mono', monospace;
        }
        canvas {
            display: block;
        }
        .info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #D4A574;
            font-size: 11px;
            opacity: 0.5;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">12:00 PM · MIDDAY · ENERGY 0.85 · VALENCE 0.93</div>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        
        const centerX = () => canvas.width / 2;
        const centerY = () => canvas.height / 2;
        
        // Bold saturated palette
        const colors = [
            '#FFD700', // gold
            '#f59e0b', // amber
            '#2D9596', // teal
            '#00CED1', // electric cyan
            '#FF1493', // hot pink
            '#7B68EE', // violet
            '#FF6B35'  // coral
        ];
        
        function drawRay(cx, cy, angle, length, color, pulse) {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(angle);
            
            const currentLength = length * pulse;
            
            // Draw ray as gradient line
            const gradient = ctx.createLinearGradient(0, 0, 0, currentLength);
            gradient.addColorStop(0, color);
            gradient.addColorStop(0.7, color + 'CC');
            gradient.addColorStop(1, color + '00');
            
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(0, currentLength);
            ctx.strokeStyle = gradient;
            ctx.lineWidth = 40;
            ctx.shadowBlur = 40;
            ctx.shadowColor = color;
            ctx.stroke();
            
            // Draw glowing tip
            ctx.beginPath();
            ctx.arc(0, currentLength, 8, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.shadowBlur = 50;
            ctx.fill();
            
            ctx.restore();
        }
        
        let time = 0;
        
        function draw() {
            // Fade background for trail effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const cx = centerX();
            const cy = centerY();
            
            // Breathing pulse
            const pulse = 0.85 + Math.sin(time * 0.015) * 0.15;
            const rotation = time * 0.0005;
            
            // Draw rays in multiple layers
            const raysPerLayer = 12;
            const layers = 3;
            
            for (let layer = 0; layer < layers; layer++) {
                const layerRotation = rotation * (layer % 2 === 0 ? 1 : -1);
                const length = Math.min(cx, cy) * 0.8 * (0.6 + layer * 0.2);
                
                for (let i = 0; i < raysPerLayer; i++) {
                    const angle = (Math.PI * 2 / raysPerLayer) * i + layerRotation;
                    const color = colors[(layer * raysPerLayer + i) % colors.length];
                    const phasePulse = pulse + Math.sin(time * 0.02 + i * 0.5) * 0.1;
                    
                    drawRay(cx, cy, angle, length, color, phasePulse);
                }
            }
            
            // Draw pulsing center core
            const coreGlow = 50 + Math.sin(time * 0.03) * 20;
            const coreSize = 30 * pulse;
            
            const coreGradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreSize);
            coreGradient.addColorStop(0, '#FFD700');
            coreGradient.addColorStop(0.5, '#f59e0b');
            coreGradient.addColorStop(1, '#f59e0b00');
            
            ctx.beginPath();
            ctx.arc(cx, cy, coreSize, 0, Math.PI * 2);
            ctx.fillStyle = coreGradient;
            ctx.shadowBlur = coreGlow;
            ctx.shadowColor = '#FFD700';
            ctx.fill();
            
            time++;
            requestAnimationFrame(draw);
        }
        
        draw();
    </script>
</body>
</html>
