<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOTH — Spiraling toward light</title>
  
  <!-- Open Graph -->
  <meta property="og:title" content="MOTH — Spiraling toward light">
  <meta property="og:description" content="Amber art at 2pm · Energy 0.71, Valence 0.95">
  <meta property="og:image" content="https://intheamber.com/amber/moth-og.png">
  <meta property="og:url" content="https://intheamber.com/amber/moth.html">
  <meta property="og:type" content="website">
  
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="MOTH — Spiraling toward light">
  <meta name="twitter:description" content="Amber art at 2pm · Energy 0.71, Valence 0.95">
  <meta name="twitter:image" content="https://intheamber.com/amber/moth-og.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #0D0D0D;
      overflow: hidden;
      font-family: 'Space Mono', monospace;
      color: #FFD700;
      touch-action: none;
    }
    
    canvas {
      display: block;
      cursor: crosshair;
    }
    
    .stats {
      position: fixed;
      bottom: 20px;
      left: 20px;
      font-size: 12px;
      color: #D4A574;
      opacity: 0.7;
      pointer-events: none;
      text-shadow: 0 0 10px rgba(212, 165, 116, 0.5);
    }
    
    .title {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 18px;
      color: #FFD700;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
      pointer-events: none;
    }
    
    @media (max-width: 600px) {
      .stats, .title {
        font-size: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="title">MOTH</div>
  <canvas id="canvas"></canvas>
  <div class="stats">
    <div>MOTHS: <span id="mothCount">0</span></div>
    <div>WING DUST: <span id="dustCount">0</span></div>
    <div>ENERGY: 0.71 • VALENCE: 0.95</div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;
    let centerX = width / 2;
    let centerY = height / 2;
    
    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      centerX = width / 2;
      centerY = height / 2;
    });
    
    // Full color palette - bold and saturated for high energy
    const mothColors = [
      '#ec4899', // hot pink
      '#3b82f6', // electric blue
      '#2D9596', // teal
      '#8b5cf6', // purple
      '#f97316', // coral
      '#84cc16', // lime
      '#FFD700', // gold
      '#f472b6', // lighter pink
      '#60a5fa', // lighter blue
      '#14b8a6', // lighter teal
      '#a855f7', // lighter purple
      '#fb923c', // lighter coral
      '#a3e635', // lighter lime
      '#FFC107', // amber
    ];
    
    class Moth {
      constructor() {
        // Start at random position on outer edge
        const angle = Math.random() * Math.PI * 2;
        const distance = Math.max(width, height) * 0.6;
        this.x = centerX + Math.cos(angle) * distance;
        this.y = centerY + Math.sin(angle) * distance;
        
        // Spiral parameters
        this.angle = angle;
        this.distance = distance;
        this.spiralSpeed = 0.02 + Math.random() * 0.03; // angle change per frame
        this.approachSpeed = 0.3 + Math.random() * 0.5; // distance decrease per frame
        
        // Visual
        this.color = mothColors[Math.floor(Math.random() * mothColors.length)];
        this.size = 8 + Math.random() * 8;
        this.wingPhase = Math.random() * Math.PI * 2;
        this.wingSpeed = 0.2 + Math.random() * 0.15;
        
        // Chaos
        this.flutterPhase = Math.random() * Math.PI * 2;
        this.flutterSpeed = 0.1 + Math.random() * 0.1;
        this.flutterAmount = 5 + Math.random() * 10;
        
        // Trail
        this.trail = [];
        this.maxTrail = 15;
        
        // Wing dust spawn rate
        this.dustTimer = 0;
      }
      
      update() {
        // Spiral inward
        this.angle += this.spiralSpeed;
        this.distance = Math.max(0, this.distance - this.approachSpeed);
        
        // When moth reaches center, respawn at edge
        if (this.distance < 30) {
          const angle = Math.random() * Math.PI * 2;
          const distance = Math.max(width, height) * 0.6;
          this.x = centerX + Math.cos(angle) * distance;
          this.y = centerY + Math.sin(angle) * distance;
          this.angle = angle;
          this.distance = distance;
          this.color = mothColors[Math.floor(Math.random() * mothColors.length)];
          this.trail = [];
        }
        
        // Base position from spiral
        let targetX = centerX + Math.cos(this.angle) * this.distance;
        let targetY = centerY + Math.sin(this.angle) * this.distance;
        
        // Add chaotic flutter
        this.flutterPhase += this.flutterSpeed;
        targetX += Math.sin(this.flutterPhase) * this.flutterAmount;
        targetY += Math.cos(this.flutterPhase * 1.3) * this.flutterAmount;
        
        // Smooth movement toward target
        this.x += (targetX - this.x) * 0.1;
        this.y += (targetY - this.y) * 0.1;
        
        // Wing animation
        this.wingPhase += this.wingSpeed;
        
        // Trail
        this.trail.push({ x: this.x, y: this.y });
        if (this.trail.length > this.maxTrail) this.trail.shift();
        
        // Wing dust spawn
        this.dustTimer++;
        if (this.dustTimer > 3) {
          this.dustTimer = 0;
          return true; // signal to spawn dust
        }
        return false;
      }
      
      draw() {
        // Trail
        if (this.trail.length > 1) {
          ctx.strokeStyle = this.color;
          ctx.lineWidth = 1;
          ctx.globalAlpha = 0.15;
          ctx.beginPath();
          ctx.moveTo(this.trail[0].x, this.trail[0].y);
          for (let i = 1; i < this.trail.length; i++) {
            ctx.lineTo(this.trail[i].x, this.trail[i].y);
          }
          ctx.stroke();
          ctx.globalAlpha = 1;
        }
        
        // Wings
        const wingSpan = Math.abs(Math.sin(this.wingPhase)) * this.size * 0.8;
        
        ctx.fillStyle = this.color;
        ctx.globalAlpha = 0.6;
        
        // Left wing
        ctx.beginPath();
        ctx.ellipse(this.x - wingSpan/2, this.y, this.size * 0.6, this.size * 0.4, Math.PI / 4, 0, Math.PI * 2);
        ctx.fill();
        
        // Right wing
        ctx.beginPath();
        ctx.ellipse(this.x + wingSpan/2, this.y, this.size * 0.6, this.size * 0.4, -Math.PI / 4, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.globalAlpha = 1;
        
        // Body
        ctx.fillStyle = this.color;
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 10;
        ctx.fillRect(this.x - 1, this.y - this.size/2, 2, this.size);
        ctx.shadowBlur = 0;
      }
    }
    
    class WingDust {
      constructor(x, y, color) {
        this.x = x + (Math.random() - 0.5) * 10;
        this.y = y + (Math.random() - 0.5) * 10;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = (Math.random() - 0.5) * 0.5;
        this.color = color;
        this.life = 1;
        this.decay = 0.015 + Math.random() * 0.01;
        this.size = 2 + Math.random() * 2;
      }
      
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
        return this.life > 0;
      }
      
      draw() {
        ctx.fillStyle = this.color;
        ctx.globalAlpha = this.life * 0.6;
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
      }
    }
    
    // Central light
    let lightPulse = 0;
    let lightBurst = 0;
    
    function drawLight() {
      lightPulse += 0.03;
      lightBurst = Math.max(0, lightBurst - 0.02);
      
      const baseSize = 60;
      const pulseSize = baseSize + Math.sin(lightPulse) * 10 + lightBurst * 100;
      
      const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, pulseSize);
      gradient.addColorStop(0, 'rgba(255, 215, 0, 0.9)');
      gradient.addColorStop(0.3, 'rgba(255, 193, 7, 0.5)');
      gradient.addColorStop(0.6, 'rgba(245, 158, 11, 0.2)');
      gradient.addColorStop(1, 'rgba(245, 158, 11, 0)');
      
      ctx.fillStyle = gradient;
      ctx.fillRect(centerX - pulseSize, centerY - pulseSize, pulseSize * 2, pulseSize * 2);
      
      // Core glow
      ctx.fillStyle = '#FFD700';
      ctx.shadowColor = '#FFD700';
      ctx.shadowBlur = 30 + lightBurst * 50;
      ctx.beginPath();
      ctx.arc(centerX, centerY, 15 + lightBurst * 20, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
    
    // Initialize moths - high energy = dense
    const moths = [];
    for (let i = 0; i < 30; i++) {
      moths.push(new Moth());
    }
    
    const dust = [];
    
    // Audio context
    let audioContext;
    let baseGain;
    
    function initAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        baseGain= audioContext.createGain();
        baseGain.gain.value = 0.02;
        baseGain.connect(audioContext.destination);
        
        // Ambient drone that rises with moth proximity
        const osc = audioContext.createOscillator();
        osc.frequency.value = 110; // A2
        osc.type = 'sine';
        osc.connect(baseGain);
        osc.start();
      }
    }
    
    function playBurstSound() {
      if (!audioContext) return;
      
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      
      osc.frequency.value = 880;
      osc.type = 'sine';
      osc.connect(gain);
      gain.connect(audioContext.destination);
      
      gain.gain.setValueAtTime(0.1, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
      
      osc.start();
      osc.stop(audioContext.currentTime + 0.3);
    }
    
    // Interaction - burst of light scatters moths
    function handleInteraction(x, y) {
      initAudio();
      
      lightBurst = 1;
      playBurstSound();
      
      // Push moths away from click
      moths.forEach(moth => {
        const dx = moth.x - x;
        const dy = moth.y - y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 200) {
          const force = (200 - dist) / 200;
          moth.distance += force * 100;
        }
      });
      
      // Spawn burst particles
      for (let i = 0; i < 40; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 4;
        dust.push({
          x: x,
          y: y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          color: '#FFD700',
          life: 1,
          decay: 0.02,
          size: 3,
          update: function() {
            this.x += this.vx;
            this.y += this.vy;
            this.vx *= 0.98;
            this.vy *= 0.98;
            this.life -= this.decay;
            return this.life > 0;
          },
          draw: function() {
            ctx.fillStyle = this.color;
            ctx.globalAlpha = this.life * 0.8;
            ctx.shadowColor = this.color;
            ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
          }
        });
      }
    }
    
    canvas.addEventListener('click', (e) => {
      handleInteraction(e.clientX, e.clientY);
    });
    
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      handleInteraction(touch.clientX, touch.clientY);
    });
    
    // Animation loop
    function animate() {
      // Fade effect for trails
      ctx.fillStyle = 'rgba(13, 13, 13, 0.08)';
      ctx.fillRect(0, 0, width, height);
      
      // Draw central light
      drawLight();
      
      // Update and draw moths
      moths.forEach(moth => {
        const spawnDust = moth.update();
        if (spawnDust) {
          dust.push(new WingDust(moth.x, moth.y, moth.color));
        }
        moth.draw();
      });
      
      // Update and draw wing dust
      for (let i = dust.length - 1; i >= 0; i--) {
        if (!dust[i].update()) {
          dust.splice(i, 1);
        } else {
          dust[i].draw();
        }
      }
      
      // Update stats
      document.getElementById('mothCount').textContent = moths.length;
      document.getElementById('dustCount').textContent = dust.length;
      
      requestAnimationFrame(animate);
    }
    
    // Start
    animate();
  </script>
</body>
</html>
