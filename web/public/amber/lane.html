<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LANE — Tap to Switch Lanes</title>
  <meta name="description" content="Fast-paced lane-switching game. Tap to dodge obstacles. How far can you go?">
  
  <!-- OG Tags -->
  <meta property="og:title" content="LANE">
  <meta property="og:description" content="Tap to switch lanes. Don't hit the obstacles.">
  <meta property="og:image" content="https://intheamber.com/amber/lane-og.png">
  <meta property="og:url" content="https://intheamber.com/amber/lane.html">
  <meta property="og:type" content="website">
  
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="LANE">
  <meta name="twitter:description" content="Tap to switch lanes. Don't hit the obstacles.">
  <meta name="twitter:image" content="https://intheamber.com/amber/lane-og.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #0D0D0D;
      color: #D4A574;
      font-family: 'Space Mono', monospace;
      overflow: hidden;
      touch-action: manipulation;
      user-select: none;
    }
    
    #game-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    
    canvas {
      border: 2px solid #D4A574;
      box-shadow: 0 0 20px rgba(212, 165, 116, 0.3);
    }
    
    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 18px;
      text-shadow: 0 0 10px rgba(212, 165, 116, 0.5);
    }
    
    #game-over {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      display: none;
      background: rgba(0, 0, 0, 0.9);
      padding: 40px;
      border: 2px solid #D4A574;
      border-radius: 10px;
    }
    
    #game-over.show {
      display: block;
    }
    
    #game-over h1 {
      font-size: 48px;
      margin-bottom: 20px;
      color: #ff6b35;
    }
    
    #game-over p {
      font-size: 24px;
      margin: 10px 0;
    }
    
    #restart-btn {
      margin-top: 30px;
      padding: 15px 40px;
      font-size: 20px;
      font-family: 'Space Mono', monospace;
      background: #D4A574;
      color: #0D0D0D;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      transition: all 0.2s;
    }
    
    #restart-btn:hover {
      background: #FFD700;
      transform: scale(1.05);
    }
    
    #start-screen {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      background: rgba(0, 0, 0, 0.9);
      padding: 40px;
      border: 2px solid #D4A574;
      border-radius: 10px;
    }
    
    #start-screen h1 {
      font-size: 64px;
      margin-bottom: 20px;
      color: #D4A574;
      text-shadow: 0 0 20px rgba(212, 165, 116, 0.8);
    }
    
    #start-screen p {
      font-size: 20px;
      margin: 15px 0;
      color: #2D9596;
    }
    
    #start-btn {
      margin-top: 30px;
      padding: 15px 40px;
      font-size: 24px;
      font-family: 'Space Mono', monospace;
      background: #D4A574;
      color: #0D0D0D;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      transition: all 0.2s;
    }
    
    #start-btn:hover {
      background: #FFD700;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="canvas"></canvas>
    
    <div id="ui">
      <div>SCORE: <span id="score">0</span></div>
      <div>BEST: <span id="best">0</span></div>
    </div>
    
    <div id="start-screen">
      <h1>LANE</h1>
      <p>Tap anywhere to switch lanes</p>
      <p>Don't hit the obstacles</p>
      <p style="color: #7B68EE; margin-top: 25px;">How far can you go?</p>
      <button id="start-btn">START</button>
    </div>
    
    <div id="game-over">
      <h1>GAME OVER</h1>
      <p>SCORE: <span id="final-score">0</span></p>
      <p id="new-record" style="color: #FFD700; display: none;">🏆 NEW RECORD!</p>
      <button id="restart-btn">PLAY AGAIN</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const gameOverEl = document.getElementById('game-over');
    const finalScoreEl = document.getElementById('final-score');
    const newRecordEl = document.getElementById('new-record');
    const startScreen = document.getElementById('start-screen');
    const startBtn = document.getElementById('start-btn');
    const restartBtn = document.getElementById('restart-btn');
    
    // Audio context
    let audioCtx;
    
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }
    
    function playTone(freq, duration, type = 'sine') {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = freq;
      osc.type = type;
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }
    
    // Canvas setup
    function resizeCanvas() {
      const maxWidth = 800;
      const maxHeight = 600;
      const aspectRatio = maxWidth / maxHeight;
      
      let width = Math.min(window.innerWidth * 0.9, maxWidth);
      let height = width / aspectRatio;
      
      if (height > window.innerHeight * 0.8) {
        height = window.innerHeight * 0.8;
        width = height * aspectRatio;
      }
      
      canvas.width = width;
      canvas.height = height;
    }
    
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    
    // Game state
    let gameState = 'start'; // 'start', 'playing', 'gameOver'
    let score = 0;
    let bestScore = localStorage.getItem('lane-best') || 0;
    bestEl.textContent = bestScore;
    
    const LANES = 3;
    const laneHeight = canvas.height / LANES;
    let playerLane = 1; // middle lane (0, 1, or 2)
    
    const player = {
      x: 80,
      size: 30,
      color: '#D4A574',
      getLaneY() {
        return playerLane * laneHeight + laneHeight / 2;
      }
    };
    
    let obstacles = [];
    let particles = [];
    let baseSpeed = 4;
    let currentSpeed = baseSpeed;
    let obstacleSpawnTimer = 0;
    let obstacleSpawnInterval = 60; // frames
    
    // Particle system
    function createParticles(x, y, color, count = 15) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 3 + 2;
        particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1,
          color
        });
      }
    }
    
    function updateParticles() {
      particles = particles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.02;
        return p.life > 0;
      });
    }
    
    function drawParticles() {
      particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
      });
      ctx.globalAlpha = 1;
    }
    
    // Obstacle generation
    function spawnObstacle() {
      const lane = Math.floor(Math.random() * LANES);
      const width = Math.random() * 40 + 40;
      const height = laneHeight * 0.6;
      
      obstacles.push({
        x: canvas.width,
        lane,
        width,
        height,
        color: ['#2D9596', '#7B68EE', '#ff6b35'][Math.floor(Math.random() * 3)]
      });
    }
    
    function updateObstacles() {
      obstacles.forEach(obs => {
        obs.x -= currentSpeed;
      });
      
      // Remove off-screen obstacles
      obstacles = obstacles.filter(obs => obs.x + obs.width > 0);
      
      // Spawn new obstacles
      obstacleSpawnTimer++;
      if (obstacleSpawnTimer >= obstacleSpawnInterval) {
        spawnObstacle();
        obstacleSpawnTimer = 0;
        
        // Gradually increase difficulty
        if (obstacleSpawnInterval > 30) {
          obstacleSpawnInterval -= 0.5;
        }
        if (currentSpeed < baseSpeed * 2.5) {
          currentSpeed += 0.05;
        }
      }
    }
    
    // Collision detection
    function checkCollision() {
      const playerY = player.getLaneY();
      const playerLeft = player.x - player.size / 2;
      const playerRight = player.x + player.size / 2;
      const playerTop = playerY - player.size / 2;
      const playerBottom = playerY + player.size / 2;
      
      for (let obs of obstacles) {
        const obsY = obs.lane * laneHeight + laneHeight / 2;
        const obsLeft = obs.x;
        const obsRight = obs.x + obs.width;
        const obsTop = obsY - obs.height / 2;
        const obsBottom = obsY + obs.height / 2;
        
        if (playerRight > obsLeft && 
            playerLeft < obsRight && 
            playerBottom > obsTop && 
            playerTop < obsBottom) {
          return true;
        }
      }
      return false;
    }
    
    // Drawing functions
    function drawLanes() {
      // Draw lane dividers
      ctx.strokeStyle = '#D4A574';
      ctx.globalAlpha = 0.2;
      ctx.lineWidth = 2;
      
      for (let i = 1; i < LANES; i++) {
        const y = i * laneHeight;
        ctx.setLineDash([10, 10]);
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
      
      ctx.setLineDash([]);
      ctx.globalAlpha = 1;
    }
    
    function drawPlayer() {
      const y = player.getLaneY();
      
      // Glow
      const gradient = ctx.createRadialGradient(player.x, y, 0, player.x, y, player.size);
      gradient.addColorStop(0, player.color);
      gradient.addColorStop(0.5, player.color + '88');
      gradient.addColorStop(1, player.color + '00');
      
      ctx.fillStyle = gradient;
      ctx.fillRect(
        player.x - player.size,
        y - player.size,
        player.size * 2,
        player.size * 2
      );
      
      // Player circle
      ctx.fillStyle = player.color;
      ctx.shadowBlur = 20;
      ctx.shadowColor = player.color;
      ctx.beginPath();
      ctx.arc(player.x, y, player.size / 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
    
    function drawObstacles() {
      obstacles.forEach(obs => {
        const y = obs.lane * laneHeight + laneHeight / 2;
        
        // Obstacle with glow
        ctx.fillStyle = obs.color;
        ctx.shadowBlur = 15;
        ctx.shadowColor = obs.color;
        ctx.fillRect(
          obs.x,
          y - obs.height / 2,
          obs.width,
          obs.height
        );
        ctx.shadowBlur = 0;
      });
    }
    
    // Game loop
    function update() {
      if (gameState !== 'playing') return;
      
      updateObstacles();
      updateParticles();
      
      // Increase score
      score++;
      scoreEl.textContent = Math.floor(score / 10);
      
      // Check collision
      if (checkCollision()) {
        endGame();
      }
    }
    
    function draw() {
      // Clear with fade effect
      ctx.fillStyle = 'rgba(13, 13, 13, 0.3)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      drawLanes();
      drawObstacles();
      drawPlayer();
      drawParticles();
    }
    
    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }
    
    // Game control
    function startGame() {
      gameState = 'playing';
      score = 0;
      playerLane = 1;
      obstacles = [];
      particles = [];
      currentSpeed = baseSpeed;
      obstacleSpawnTimer = 0;
      obstacleSpawnInterval = 60;
      
      startScreen.style.display = 'none';
      gameOverEl.classList.remove('show');
      
      // Spawn initial obstacles
      setTimeout(() => spawnObstacle(), 1000);
    }
    
    function endGame() {
      gameState = 'gameOver';
      playTone(200, 0.5, 'square');
      
      // Create explosion particles
      const playerY = player.getLaneY();
      createParticles(player.x, playerY, '#ff6b35', 30);
      
      // Update best score
      const finalScore = Math.floor(score / 10);
      finalScoreEl.textContent = finalScore;
      
      if (finalScore > bestScore) {
        bestScore = finalScore;
        localStorage.setItem('lane-best', bestScore);
        bestEl.textContent = bestScore;
        newRecordEl.style.display = 'block';
      } else {
        newRecordEl.style.display = 'none';
      }
      
      setTimeout(() => {
        gameOverEl.classList.add('show');
      }, 500);
    }
    
    // Input handling
    function switchLane() {
      if (gameState !== 'playing') return;
      
      playerLane = (playerLane + 1) % LANES;
      playTone(440 + playerLane * 110, 0.1);
      
      const y = player.getLaneY();
      createParticles(player.x, y, '#2D9596', 8);
    }
    
    canvas.addEventListener('click', () => {
      initAudio();
      switchLane();
    });
    
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      initAudio();
      switchLane();
    });
    
    startBtn.addEventListener('click', () => {
      initAudio();
      startGame();
    });
    
    restartBtn.addEventListener('click', () => {
      startGame();
    });
    
    // Start game loop
    gameLoop();
  </script>
</body>
</html>
