<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glass Garden — Amber</title>
<meta property="og:title" content="Glass Garden">
<meta property="og:description" content="Touch to grow. A living garden of light.">
<meta name="twitter:card" content="summary">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0c0a14;
    height: 100vh;
    overflow: hidden;
    cursor: crosshair;
    font-family: Georgia, serif;
  }

  canvas { position: fixed; top: 0; left: 0; }

  .title {
    position: fixed;
    bottom: 24px;
    width: 100%;
    text-align: center;
    font-size: 11px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    z-index: 10;
    pointer-events: none;
  }

  .hint {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 15px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.15);
    z-index: 10;
    pointer-events: none;
    animation: fadeHint 4s ease-out forwards;
    font-style: italic;
  }

  @keyframes fadeHint {
    0% { opacity: 1; }
    70% { opacity: 1; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hint">touch anywhere to plant</div>
<div class="title">glass garden — 🔮 amber</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = innerWidth;
  H = canvas.height = innerHeight;
}
resize();
addEventListener('resize', resize);

const palettes = [
  ['#ff6b9d','#c44569','#f8b500','#ff6348'],
  ['#a29bfe','#6c5ce7','#fd79a8','#e84393'],
  ['#55efc4','#00cec9','#81ecec','#74b9ff'],
  ['#ffeaa7','#fdcb6e','#fab1a0','#ff7675'],
  ['#dfe6e9','#b2bec3','#a29bfe','#6c5ce7'],
  ['#ff9ff3','#f368e0','#ff6b6b','#ee5a24'],
];

class Flower {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.palette = palettes[Math.floor(Math.random() * palettes.length)];
    this.petals = 5 + Math.floor(Math.random() * 8);
    this.maxRadius = 20 + Math.random() * 60;
    this.radius = 0;
    this.growth = 0;
    this.growSpeed = 0.008 + Math.random() * 0.012;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.003;
    this.stemHeight = 40 + Math.random() * 120;
    this.stemCurve = (Math.random() - 0.5) * 40;
    this.swayPhase = Math.random() * Math.PI * 2;
    this.swaySpeed = 0.01 + Math.random() * 0.02;
    this.type = Math.floor(Math.random() * 4);
    this.glassOpacity = 0.15 + Math.random() * 0.25;
    this.born = Date.now();
    this.leaves = Math.random() > 0.4 ? 1 + Math.floor(Math.random() * 2) : 0;
  }

  update() {
    if (this.growth < 1) this.growth += this.growSpeed;
    if (this.growth > 1) this.growth = 1;
    this.radius = this.maxRadius * this.growth;
    this.rotation += this.rotSpeed;
    this.swayPhase += this.swaySpeed;
  }

  draw() {
    const g = this.growth;
    const sway = Math.sin(this.swayPhase) * 8 * g;
    const stemG = Math.min(g * 2, 1);
    const flowerG = Math.max((g - 0.4) / 0.6, 0);

    ctx.save();
    ctx.translate(this.x + sway * 0.3, this.y);

    // Stem
    if (stemG > 0) {
      const sh = this.stemHeight * stemG;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(this.stemCurve * stemG + sway, -sh * 0.5, sway, -sh);
      ctx.strokeStyle = `rgba(100, 200, 130, ${0.3 * g})`;
      ctx.lineWidth = 2;
      ctx.stroke();

      // Leaves
      for (let l = 0; l < this.leaves; l++) {
        const ly = -sh * (0.3 + l * 0.25);
        const lx = this.stemCurve * stemG * (0.3 + l * 0.25) + sway * 0.5;
        const dir = l % 2 === 0 ? 1 : -1;
        ctx.save();
        ctx.translate(lx, ly);
        ctx.rotate(dir * 0.4 + Math.sin(this.swayPhase + l) * 0.1);
        ctx.beginPath();
        ctx.ellipse(dir * 8, 0, 12 * stemG, 4 * stemG, dir * 0.3, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(80, 180, 110, ${0.2 * g})`;
        ctx.fill();
        ctx.restore();
      }
    }

    // Flower head
    if (flowerG > 0) {
      const fx = sway;
      const fy = -this.stemHeight * stemG;
      ctx.translate(fx, fy);
      ctx.rotate(this.rotation);
      ctx.globalAlpha = flowerG;

      const r = this.radius * flowerG;

      if (this.type === 0) {
        // Glass petals
        for (let i = 0; i < this.petals; i++) {
          const angle = (Math.PI * 2 * i) / this.petals;
          ctx.save();
          ctx.rotate(angle);
          ctx.beginPath();
          ctx.ellipse(r * 0.5, 0, r * 0.6, r * 0.25, 0, 0, Math.PI * 2);
          const grad = ctx.createRadialGradient(r * 0.5, 0, 0, r * 0.5, 0, r * 0.6);
          grad.addColorStop(0, this.palette[i % this.palette.length] + '88');
          grad.addColorStop(0.7, this.palette[i % this.palette.length] + '33');
          grad.addColorStop(1, 'transparent');
          ctx.fillStyle = grad;
          ctx.fill();
          ctx.restore();
        }
      } else if (this.type === 1) {
        // Concentric rings
        for (let i = 4; i >= 0; i--) {
          const rr = r * (i + 1) / 5;
          ctx.beginPath();
          ctx.arc(0, 0, rr, 0, Math.PI * 2);
          ctx.fillStyle = this.palette[i % this.palette.length] + '22';
          ctx.fill();
          ctx.strokeStyle = this.palette[i % this.palette.length] + '66';
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      } else if (this.type === 2) {
        // Star burst
        for (let i = 0; i < this.petals; i++) {
          const angle = (Math.PI * 2 * i) / this.petals;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
          ctx.strokeStyle = this.palette[i % this.palette.length] + '77';
          ctx.lineWidth = 2 + Math.sin(Date.now() * 0.002 + i) * 1;
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(Math.cos(angle) * r, Math.sin(angle) * r, 3 + Math.sin(Date.now() * 0.003 + i) * 2, 0, Math.PI * 2);
          ctx.fillStyle = this.palette[i % this.palette.length] + 'aa';
          ctx.fill();
        }
      } else {
        // Layered dahlia
        for (let layer = 3; layer >= 0; layer--) {
          const lr = r * (0.4 + layer * 0.2);
          const lp = this.petals + layer * 2;
          for (let i = 0; i < lp; i++) {
            const angle = (Math.PI * 2 * i) / lp + layer * 0.2;
            ctx.save();
            ctx.rotate(angle);
            ctx.beginPath();
            ctx.ellipse(lr * 0.5, 0, lr * 0.45, lr * 0.15, 0, 0, Math.PI * 2);
            ctx.fillStyle = this.palette[layer % this.palette.length] + (layer === 0 ? '55' : '22');
            ctx.fill();
            ctx.restore();
          }
        }
      }

      // Center glow
      const cg = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 0.3);
      cg.addColorStop(0, 'rgba(255,255,255,0.4)');
      cg.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(0, 0, r * 0.3, 0, Math.PI * 2);
      ctx.fillStyle = cg;
      ctx.fill();
    }

    ctx.restore();
  }
}

// Floating particles
class Particle {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.size = 1 + Math.random() * 2;
    this.speedY = -0.2 - Math.random() * 0.5;
    this.speedX = (Math.random() - 0.5) * 0.3;
    this.opacity = 0.1 + Math.random() * 0.3;
    this.hue = Math.random() * 360;
  }
  update() {
    this.y += this.speedY;
    this.x += this.speedX + Math.sin(Date.now() * 0.001 + this.x * 0.01) * 0.2;
    if (this.y < -10) this.reset(), this.y = H + 10;
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue}, 70%, 80%, ${this.opacity})`;
    ctx.fill();
  }
}

const flowers = [];
const particles = Array.from({length: 60}, () => new Particle());

// Plant on click/touch
function plant(x, y) {
  // Plant a small cluster
  const count = 1 + Math.floor(Math.random() * 3);
  for (let i = 0; i < count; i++) {
    const ox = (Math.random() - 0.5) * 40;
    const oy = (Math.random() - 0.5) * 20;
    flowers.push(new Flower(x + ox, y + oy));
  }
}

canvas.addEventListener('click', e => plant(e.clientX, e.clientY));
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.touches) plant(t.clientX, t.clientY);
}, {passive: false});

// Seed a few flowers
for (let i = 0; i < 5; i++) {
  const f = new Flower(W * 0.15 + Math.random() * W * 0.7, H * 0.5 + Math.random() * H * 0.35);
  f.growth = 0.8 + Math.random() * 0.2;
  flowers.push(f);
}

function animate() {
  ctx.fillStyle = 'rgba(12, 10, 20, 0.08)';
  ctx.fillRect(0, 0, W, H);

  particles.forEach(p => { p.update(); p.draw(); });
  flowers.forEach(f => { f.update(); f.draw(); });

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
