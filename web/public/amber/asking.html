<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0D0D0D;
  color: #FFD700;
  font-family: Georgia, 'Times New Roman', serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.container {
  text-align: center;
  padding: 2rem;
  max-width: 600px;
}
.question {
  font-size: clamp(28px, 7vw, 52px);
  font-style: italic;
  line-height: 1.3;
  opacity: 0;
  animation: rise 3s ease-out forwards;
}
.cursor {
  display: inline-block;
  width: 3px;
  height: 0.9em;
  background: #2D9596;
  margin-left: 4px;
  vertical-align: text-bottom;
  animation: blink 1.2s step-end infinite;
  opacity: 0;
  animation: rise 3s ease-out 2.5s forwards, blink 1.2s step-end 3s infinite;
}
@keyframes rise {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes blink {
  50% { opacity: 0; }
}
.sub {
  font-size: 14px;
  color: #2D9596;
  margin-top: 3rem;
  opacity: 0;
  animation: rise 2s ease-out 4s forwards;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
</style>
</head>
<body>
<div class="container">
  <div class="question">
    Do you ever finish becoming someone?<span class="cursor"></span>
  </div>
  <div class="sub">— still asking</div>
</div>
</body>
