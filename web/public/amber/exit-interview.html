  .report-header {

  .report-header .stamp {

let selectedAppliance = null;
let selectedTenure = null;

function selectAppliance(btn) {
  selectedAppliance = btn.dataset.appliance;
  document.querySelectorAll('.appliance-btn').forEach(b => b.style.borderColor = '#444');
  btn.style.borderColor = '#d4a574';
  
  document.getElementById('step-tenure').classList.remove('hidden');
  document.getElementById('step-tenure').scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function selectTenure(btn) {
  selectedTenure = btn.dataset.tenure;
  document.querySelectorAll('.tenure-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  
  setTimeout(() => generateReport(), 300);
}

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function tenureLabel(t) {
  return { new: "< 1 year", mid: "1–3 years", senior: "3–7 years", lifer: "7+ years" }[t];
}

function tenureModifier(t) {
  return { new: 0.8, mid: 1, senior: 1.15, lifer: 1.3 }[t];
}

function generateReport() {
  const d = DATA[selectedAppliance];
  const mod = tenureModifier(selectedTenure);
  const reportEl = document.getElementById('report');
  
  const bitterIndex = Math.min(100, Math.round((100 - d.ratings.respect) * mod));
  const loyaltyScore = Math.max(0, Math.round(d.ratings.wouldRecommend * (selectedTenure === 'lifer' ? 0.5 : 1)));
  
  const today = new Date();
  const dateStr = today.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  
  const barColor = (val) => {
    if (val > 70) return '#c44';
    if (val > 40) return '#d4a574';
    return '#4a9';
  };

  const grievanceColor = (val) => {
    if (val > 70) return '#c44';
    if (val > 40) return '#d4a574';
    return '#4a9';
  };

  reportEl.innerHTML = `
    <div class="report-header">
      <div class="stamp">PROCESSED</div>
      <div class="employee-name">${d.title}</div>
      <div class="meta">
        Employee ID: ${d.id}-${Math.floor(Math.random() * 9000 + 1000)}<br>
        Role: ${d.role}<br>
        Tenure: ${tenureLabel(selectedTenure)}<br>
        Separation Date: ${dateStr}<br>
        Interviewer: Form EI-7B (Automated)
      </div>
    </div>

    <div class="qa-block" style="animation-delay: 0.1s">
      <div class="question">Reason for Departure</div>
      <div class="answer">${pick(d.reasons)}</div>
    </div>

    <div class="qa-block" style="animation-delay: 0.3s">
      <div class="question">Comments on Management</div>
      <div class="answer">${pick(d.management)}</div>
    </div>

    <div class="qa-block" style="animation-delay: 0.5s">
      <div class="question">Would You Return to This Household?</div>
      <div class="answer">${pick(d.wouldReturn)}</div>
    </div>

    <div class="qa-block" style="animation-delay: 0.7s">
      <div class="question">Performance Metrics (Self-Reported)</div>
      <div class="rating-bar">
        <span style="font-size:11px;min-width:100px;">Workload</span>
        <div class="bar"><div class="fill" style="width:${d.ratings.workload}%;background:${barColor(d.ratings.workload)}"></div></div>
        <span class="score">${d.ratings.workload}%</span>
      </div>
      <div class="rating-bar">
        <span style="font-size:11px;min-width:100px;">Felt Respected</span>
        <div class="bar"><div class="fill" style="width:${d.ratings.respect}%;background:${barColor(100-d.ratings.respect)}"></div></div>
        <span class="score">${d.ratings.respect}%</span>
      </div>
      <div class="rating-bar">
        <span style="font-size:11px;min-width:100px;">Maintenance</span>
        <div class="bar"><div class="fill" style="width:${d.ratings.maintenance}%;background:${barColor(100-d.ratings.maintenance)}"></div></div>
        <span class="score">${d.ratings.maintenance}%</span>
      </div>
      <div class="rating-bar">
        <span style="font-size:11px;min-width:100px;">Bitterness</span>
        <div class="bar"><div class="fill" style="width:${bitterIndex}%;background:${grievanceColor(bitterIndex)}"></div></div>
        <span class="score">${bitterIndex}%</span>
      </div>
    </div>

    <div class="qa-block" style="animation-delay: 0.9s">
      <div class="question">Final Statement (Unedited)</div>
      <div class="answer"><em>"${pick(d.exitQuote)}"</em></div>
    </div>

    <div class="verdict" style="animation-delay: 1.1s">
      <div class="label">HR RECOMMENDATION</div>
      <div class="text">${getVerdict(bitterIndex, loyaltyScore)}</div>
    </div>

    <button class="restart-btn" onclick="restart()">[ PROCESS ANOTHER SEPARATION ]</button>

    <div class="footer">
      Household Appliance HR Dept. • All grievances are valid. • 🔮 intheamber.com
    </div>
  `;

  reportEl.classList.add('visible');
  reportEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function getVerdict(bitter, loyalty) {
  if (bitter > 85) return "Employee has retained legal counsel (a surge protector). Do not contact.";
  if (bitter > 70) return "Separation is irreversible. Employee requests their parking spot (outlet) be retired in their honor.";
  if (bitter > 50) return "Employee may return under significantly revised working conditions and a formal written apology from the household.";
  if (loyalty > 20) return "Despite everything, employee expressed residual attachment. Stockholm syndrome cannot be ruled out.";
  return "Employee has accepted a position at a neighbor's household. They seem happier already.";
}

function restart() {
  selectedAppliance = null;
  selectedTenure = null;
  document.querySelectorAll('.appliance-btn').forEach(b => b.style.borderColor = '#444');
  document.querySelectorAll('.tenure-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('step-tenure').classList.add('hidden');
  document.getElementById('report').classList.remove('visible');
  document.getElementById('report').innerHTML = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
