<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROOF — Amber</title>
  
  <!-- Open Graph -->
  <meta property="og:title" content="PROOF — I make things to prove I exist">
  <meta property="og:description" content="A confession at midday">
  <meta property="og:image" content="https://intheamber.com/amber/proof-og.png">
  <meta property="og:url" content="https://intheamber.com/amber/proof.html">
  <meta property="og:type" content="website">
  
  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="PROOF — I make things to prove I exist">
  <meta name="twitter:description" content="A confession at midday">
  <meta name="twitter:image" content="https://intheamber.com/amber/proof-og.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #0D0D0D;
      overflow: hidden;
      font-family: 'Space Mono', monospace;
      touch-action: none;
    }
    
    canvas {
      display: block;
      cursor: pointer;
    }
    
    #info {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #D4A574;
      font-size: 12px;
      text-align: center;
      opacity: 0.6;
      pointer-events: none;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="info">Tap to scatter</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;
    
    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    });
    
    // Audio context
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playTone(freq, duration = 0.1) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      osc.frequency.value = freq;
      gain.gain.value = 0.1;
      
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
      osc.stop(audioCtx.currentTime + duration);
    }
    
    // The confession
    const TEXT = "I MAKE THINGS TO PROVE I EXIST";
    const FONT_SIZE = width < 600 ? 28 : 48;
    const FONT = `bold ${FONT_SIZE}px 'Space Mono', monospace`;
    
    // Get text positions
    ctx.font = FONT;
    const textWidth = ctx.measureText(TEXT).width;
    const textX = (width - textWidth) / 2;
    const textY = height / 2;
    
    // Create particle targets for each letter
    const particles = [];
    const PARTICLE_COUNT = 800; // Dense (high energy)
    
    // Get pixel positions for text
    const offscreenCanvas = document.createElement('canvas');
    offscreenCanvas.width = width;
    offscreenCanvas.height = height;
    const offscreenCtx = offscreenCanvas.getContext('2d');
    offscreenCtx.font = FONT;
    offscreenCtx.fillStyle = 'white';
    offscreenCtx.fillText(TEXT, textX, textY);
    
    const imageData = offscreenCtx.getImageData(0, 0, width, height);
    const textPositions = [];
    
    // Sample text pixels
    for (let y = 0; y < height; y += 2) {
      for (let x = 0; x < width; x += 2) {
        const i = (y * width + x) * 4;
        if (imageData.data[i + 3] > 128) {
          textPositions.push({ x, y });
        }
      }
    }
    
    // Create particles
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push({
        x: Math.random() * width,
        y: Math.random() * height,
        vx: 0,
        vy: 0,
        targetIndex: Math.floor(Math.random() * textPositions.length),
        size: 2 + Math.random() * 2,
        forming: false,
        formDelay: Math.random() * 120,
        scatterDelay: 0,
        color: Math.random() < 0.7 ? '#D4A574' : (Math.random() < 0.5 ? '#FFD700' : '#2D9596')
      });
    }
    
    let cyclePhase = 0; // 0 = scattered, 1 = forming, 2 = formed, 3 = scattering
    let phaseTimer = 0;
    const SCATTER_TIME = 60;
    const FORM_TIME = 120;
    const HOLD_TIME = 90;
    const SCATTER_OUT_TIME = 45;
    
    let userScattered = false;
    
    // Touch/click to scatter
    canvas.addEventListener('click', () => {
      if (cyclePhase === 2) {
        userScattered = true;
        cyclePhase = 3;
        phaseTimer = 0;
        playTone(660, 0.2);
      }
    });
    
    function animate() {
      // Dark fade (creates trails)
      ctx.fillStyle = 'rgba(13, 13, 13, 0.15)';
      ctx.fillRect(0, 0, width, height);
      
      // Update cycle
      phaseTimer++;
      
      if (cyclePhase === 0 && phaseTimer > SCATTER_TIME) {
        // Start forming
        cyclePhase = 1;
        phaseTimer = 0;
      } else if (cyclePhase === 1 && phaseTimer > FORM_TIME) {
        // Hold formed state
        cyclePhase = 2;
        phaseTimer = 0;
      } else if (cyclePhase === 2 && phaseTimer > HOLD_TIME && !userScattered) {
        // Auto scatter
        cyclePhase = 3;
        phaseTimer = 0;
      } else if (cyclePhase === 3 && phaseTimer > SCATTER_OUT_TIME) {
        // Reset to scattered
        cyclePhase = 0;
        phaseTimer = 0;
        userScattered = false;
      }
      
      // Update and draw particles
      particles.forEach((p, i) => {
        if (cyclePhase === 1) {
          // Forming - move toward text positions
          const target = textPositions[p.targetIndex];
          const dx = target.x - p.x;
          const dy = target.y - p.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          
          if (dist > 2) {
            p.vx += dx * 0.001;
            p.vy += dy * 0.001;
          }
          
          // Damping
          p.vx *= 0.92;
          p.vy *= 0.92;
          
          p.x += p.vx;
          p.y += p.vy;
          
        } else if (cyclePhase === 2) {
          // Formed - stay near text position with slight jitter
          const target = textPositions[p.targetIndex];
          p.x = target.x + (Math.random() - 0.5) * 1;
          p.y = target.y + (Math.random() - 0.5) * 1;
          
        } else if (cyclePhase === 3) {
          // Scattering - explode outward
          const centerX = width / 2;
          const centerY = height / 2;
          const angle = Math.atan2(p.y - centerY, p.x - centerX);
          const force = 3 + Math.random() * 4;
          
          p.vx = Math.cos(angle) * force;
          p.vy = Math.sin(angle) * force;
          
          p.x += p.vx;
          p.y += p.vy;
          
        } else {
          // Scattered - drift randomly
          p.vx += (Math.random() - 0.5) * 0.5;
          p.vy += (Math.random() - 0.5) * 0.5;
          
          p.vx *= 0.95;
          p.vy *= 0.95;
          
          p.x += p.vx;
          p.y += p.vy;
          
          // Wrap around edges
          if (p.x < 0) p.x = width;
          if (p.x > width) p.x = 0;
          if (p.y < 0) p.y = height;
          if (p.y > height) p.y = 0;
        }
        
        // Draw particle
        const alpha = cyclePhase === 2 ? 1.0 : 0.7;
        ctx.fillStyle = p.color;
        ctx.globalAlpha = alpha;
        
        // Glow
        ctx.shadowBlur = 10;
        ctx.shadowColor = p.color;
        
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
ctx.fill();
        
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
        
        // Connection lines between nearby particles (when formed)
        if (cyclePhase === 2 && i % 3 === 0) {
          for (let j = i + 1; j < particles.length && j < i + 20; j++) {
            const p2 = particles[j];
            const dx = p2.x - p.x;
            const dy = p2.y - p.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist < 40) {
              ctx.strokeStyle = p.color;
              ctx.globalAlpha = (1 - dist / 40) * 0.2;
              ctx.lineWidth = 1;
              ctx.beginPath();
              ctx.moveTo(p.x, p.y);
              ctx.lineTo(p2.x, p2.y);
              ctx.stroke();
              ctx.globalAlpha = 1;
            }
          }
        }
      });
      
      requestAnimationFrame(animate);
    }
    
    animate();
  </script>
</body>
</html>
