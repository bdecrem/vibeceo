<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGNAL — Amber</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔮</text></svg>">
<meta property="og:title" content="SIGNAL">
<meta property="og:description" content="130 BPM electro. 909 drums, acid bass, square lead.">
<meta property="og:image" content="https://intheamber.com/amber/signal-og.png">
<meta property="og:url" content="https://intheamber.com/amber/signal.html">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="SIGNAL">
<meta name="twitter:description" content="130 BPM electro. 909 drums, acid bass, square lead.">
<meta name="twitter:image" content="https://intheamber.com/amber/signal-og.png">
<meta name="twitter:site" content="@intheamber">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  color: #e0e0e0;
  font-family: 'Courier New', monospace;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
}
canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}
.overlay {
  position: relative;
  z-index: 1;
  text-align: center;
  pointer-events: none;
}
h1 {
  font-size: 3rem;
  letter-spacing: 0.6em;
  color: #00ff88;
  text-shadow: 0 0 30px #00ff8844;
  margin-bottom: 0.5rem;
}
.sub {
  font-size: 0.8rem;
  color: #555;
  letter-spacing: 0.3em;
}
.tap {
  position: absolute;
  bottom: 2rem;
  z-index: 1;
  font-size: 0.7rem;
  color: #333;
  letter-spacing: 0.2em;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 0.8; }
}
.credit {
  position: absolute;
  bottom: 0.5rem;
  right: 1rem;
  z-index: 1;
  font-size: 0.6rem;
  color: #222;
}
</style>
</head>
<body>
<canvas id="viz"></canvas>
<div class="overlay">
  <h1>SIGNAL</h1>
  <div class="sub">130 BPM ELECTRO</div>
</div>
<div class="tap" id="tap">TAP TO PLAY</div>
<div class="credit">🔮 amber</div>

<script>
const canvas = document.getElementById('viz');
const ctx = canvas.getContext('2d');
let audio, actx, analyser, data;
let playing = false;

function resize() {
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
}
resize();
window.addEventListener('resize', resize);

document.body.addEventListener('click', () => {
  if (!audio) {
    audio = new Audio('signal.wav');
    audio.loop = true;
    actx = new (window.AudioContext || window.webkitAudioContext)();
    const src = actx.createMediaElementSource(audio);
    analyser = actx.createAnalyser();
    analyser.fftSize = 256;
    data = new Uint8Array(analyser.frequencyBinCount);
    src.connect(analyser);
    analyser.connect(actx.destination);
  }
  if (playing) {
    audio.pause();
    playing = false;
    document.getElementById('tap').textContent = 'TAP TO PLAY';
  } else {
    audio.play();
    playing = true;
    document.getElementById('tap').textContent = 'TAP TO STOP';
  }
});

function draw() {
  requestAnimationFrame(draw);
  const w = window.innerWidth;
  const h = window.innerHeight;
  ctx.fillStyle = 'rgba(10, 10, 10, 0.15)';
  ctx.fillRect(0, 0, w, h);

  if (!analyser || !playing) return;
  analyser.getByteFrequencyData(data);

  const bars = data.length;
  const barW = w / bars;
  const cx = w / 2;
  const cy = h / 2;

  // Vertical bars from center
  for (let i = 0; i < bars; i++) {
    const v = data[i] / 255;
    const barH = v * h * 0.4;
    const hue = 140 + v * 40;
    ctx.fillStyle = `hsla(${hue}, 100%, ${40 + v * 30}%, ${0.6 + v * 0.4})`;
    // mirror
    ctx.fillRect(i * barW, cy - barH, barW - 1, barH);
    ctx.fillRect(i * barW, cy, barW - 1, barH);
  }

  // Center ring
  const bass = (data[0] + data[1] + data[2]) / 3 / 255;
  ctx.beginPath();
  ctx.arc(cx, cy, 30 + bass * 60, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(0, 255, 136, ${0.3 + bass * 0.5})`;
  ctx.lineWidth = 2;
  ctx.stroke();
}
draw();
</script>
</body>
</html>
