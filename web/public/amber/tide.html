<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TIDE — Amber</title>
<link rel="icon" href="/amber-favicon.svg" type="image/svg+xml">
<meta property="og:title" content="TIDE — Amber">
<meta property="og:description" content="color washes ashore and never leaves">
<meta property="og:image" content="https://intheamber.com/og/amber/tide.png">
<meta property="og:url" content="https://intheamber.com/amber/tide.html">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="TIDE — Amber">
<meta name="twitter:description" content="color washes ashore and never leaves">
<meta name="twitter:image" content="https://intheamber.com/og/amber/tide.png">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; touch-action: none; }
canvas { display: block; width: 100vw; height: 100vh; }
#title {
  position: fixed; bottom: 3vh; left: 0; right: 0; text-align: center;
  font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 4px;
  color: rgba(255,255,255,0.2); pointer-events: none; z-index: 10;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="title">TIDE</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth * devicePixelRatio;
  H = canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
}
resize();
window.addEventListener('resize', resize);

const palette = [
  [255, 215, 0],    // gold
  [245, 158, 11],   // amber
  [45, 149, 150],   // teal
  [20, 184, 166],   // light teal
  [59, 130, 246],   // electric blue
  [236, 72, 153],   // hot pink
  [139, 92, 246],   // purple
  [249, 115, 22],   // coral
  [132, 204, 22],   // lime
];

class Wave {
  constructor(y, color, speed, amp, freq) {
    this.baseY = y;
    this.color = color;
    this.speed = speed;
    this.amp = amp;
    this.freq = freq;
    this.phase = Math.random() * Math.PI * 2;
    this.opacity = 0;
    this.targetOpacity = 0.6 + Math.random() * 0.3;
    this.birth = performance.now();
  }

  update(t) {
    this.phase += this.speed;
    const age = (t - this.birth) / 1000;
    if (age < 2) this.opacity = this.targetOpacity * (age / 2);
    else this.opacity = this.targetOpacity;
  }

  draw() {
    const [r, g, b] = this.color;
    ctx.beginPath();
    ctx.moveTo(0, H);
    for (let x = 0; x <= W; x += 3) {
      const nx = x / W;
      const y = this.baseY +
        Math.sin(nx * this.freq + this.phase) * this.amp +
        Math.sin(nx * this.freq * 2.3 + this.phase * 1.7) * this.amp * 0.4 +
        Math.sin(nx * this.freq * 0.5 + this.phase * 0.3) * this.amp * 0.7;
      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    ctx.fillStyle = `rgba(${r},${g},${b},${this.opacity * 0.35})`;
    ctx.fill();
  }
}

const waves = [];
let nextWaveTime = 0;
let waveIndex = 0;

function spawnWave(yRatio) {
  const y = yRatio !== undefined ? yRatio * H : (0.2 + Math.random() * 0.6) * H;
  const color = palette[waveIndex % palette.length];
  waveIndex++;
  const speed = 0.003 + Math.random() * 0.008;
  const amp = H * (0.02 + Math.random() * 0.06);
  const freq = 3 + Math.random() * 8;
  waves.push(new Wave(y, color, speed, amp, freq));
  if (waves.length > 30) waves.shift();
}

// Start with a few waves
for (let i = 0; i < 6; i++) {
  spawnWave(0.15 + i * 0.14);
}

// Touch/click spawns waves
function onInteract(e) {
  e.preventDefault();
  const touches = e.touches ? e.touches : [e];
  for (const t of touches) {
    const y = (t.clientY / window.innerHeight);
    spawnWave(y);
  }
}
canvas.addEventListener('touchstart', onInteract, { passive: false });
canvas.addEventListener('touchmove', onInteract, { passive: false });
canvas.addEventListener('mousedown', onInteract);
canvas.addEventListener('mousemove', (e) => { if (e.buttons) onInteract(e); });

function draw(t) {
  // Slow fade — layers accumulate
  ctx.fillStyle = 'rgba(10, 10, 15, 0.03)';
  ctx.fillRect(0, 0, W, H);

  // Auto-spawn waves periodically
  if (t > nextWaveTime) {
    spawnWave();
    nextWaveTime = t + 3000 + Math.random() * 5000;
  }

  // Sort by baseY so deeper waves render first
  const sorted = [...waves].sort((a, b) => a.baseY - b.baseY);
  for (const wave of sorted) {
    wave.update(t);
    wave.draw();
  }

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
