<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ONE FRAME — So close. So, so close.</title>
  
  <!-- OG Tags -->
  <meta property="og:title" content="ONE FRAME">
  <meta property="og:description" content="Missed the bus by 1 frame. Story of my life.">
  <meta property="og:image" content="https://intheamber.com/amber/one-frame-og.png">
  <meta property="og:url" content="https://intheamber.com/amber/one-frame.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="ONE FRAME">
  <meta name="twitter:description" content="Missed the bus by 1 frame. Story of my life.">
  <meta name="twitter:image" content="https://intheamber.com/amber/one-frame-og.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #0D0D0D;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    
    #gameContainer {
      position: relative;
      width: 100%;
      max-width: 640px;
      aspect-ratio: 4/3;
      background: #000;
      border: 4px solid #2D9596;
      box-shadow: 0 0 40px rgba(212, 165, 116, 0.3);
    }
    
    canvas {
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
    }
    
    #ui {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 16px;
      color: #fff;
      font-size: 16px;
      text-shadow: 2px 2px 0 #000;
      pointer-events: none;
    }
    
    .stat-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    
    .bar {
      flex: 1;
      height: 16px;
      background: #333;
      border: 2px solid #fff;
      position: relative;
      overflow: hidden;
    }
    
    .bar-fill {
      height: 100%;
      transition: width 0.3s;
    }
    
    .stamina-fill {
      background: #ff6b35;
    }
    
    .time-fill {
      background: #D4A574;
    }
    
    #message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #000;
      border: 4px solid #ff6b35;
      padding: 24px 32px;
      color: #ff6b35;
      font-size: 24px;
      font-weight: bold;
      text-align: center;
      animation: pulse 1s infinite;
      text-shadow: 2px 2px 0 rgba(255, 107, 53, 0.3);
    }
    
    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.05); }
    }
    
    #subtitle {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: #D4A574;
      font-size: 14px;
      text-align: center;
      text-shadow: 2px 2px 0 #000;
    }
    
    @media (max-width: 640px) {
      #gameContainer {
        border-width: 2px;
      }
      
      #ui {
        font-size: 12px;
        padding: 12px;
      }
      
      .bar {
        height: 12px;
      }
      
      #message {
        font-size: 18px;
        padding: 16px 24px;
        border-width: 3px;
      }
      
      #subtitle {
        font-size: 11px;
        bottom: 16px;
      }
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="canvas" width="320" height="240"></canvas>
    
    <div id="ui">
      <div class="stat-bar">
        <span style="color: #ff6b35; min-width: 80px;">STAMINA</span>
        <div class="bar">
          <div class="stamina-fill bar-fill" style="width: 5%;"></div>
        </div>
      </div>
      <div class="stat-bar">
        <span style="color: #D4A574; min-width: 80px;">TIME</span>
        <div class="bar">
          <div class="time-fill bar-fill" style="width: 100%;"></div>
        </div>
      </div>
      <div style="text-align: right; color: #2D9596;">
        BUS DEPARTED: 08:31:00<br>
        YOU ARRIVED: 08:31:01
      </div>
    </div>
    
    <div id="message">
      MISSED BY<br>1 FRAME
    </div>
    
    <div id="subtitle">
      Press anywhere to try again (it won't help)
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let frame = 0;
    let runFrame = 0;
    
    // Audio context
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSound(freq, duration = 0.1) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      osc.frequency.value = freq;
      osc.type = 'square';
      
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
      
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }
    
    // Draw pixel rectangle
    function rect(x, y, w, h, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, w, h);
    }
    
    // Draw character sprite
    function drawCharacter(x, y, running) {
      const armOffset = running ? 2 : 0;
      
      // Head
      rect(x + 4, y, 8, 8, '#D4A574');
      
      // Body
      rect(x + 4, y + 8, 8, 12, '#2D9596');
      
      // Arms (animated when running)
      rect(x + 2, y + 10 + armOffset, 3, 8, '#2D9596'); // Left arm
      rect(x + 13, y + 10 - armOffset, 3, 8, '#2D9596'); // Right arm
      
      // Legs (animated when running)
      rect(x + 5, y + 20, 3, 10, '#000'); // Left leg
      rect(x + 10, y + 20, 3, 10, '#000'); // Right leg
      
      if (running) {
        // Exhale particles
        rect(x - 4, y + 4, 2, 2, '#fff');
        rect(x - 8, y + 6, 2, 2, '#aaa');
      }
    }
    
    // Draw bus
    function drawBus(x, y) {
      // Bus body
      rect(x, y, 40, 24, '#FFD700');
      
      // Windows
      rect(x + 4, y + 4, 6, 6, '#000');
      rect(x + 12, y + 4, 6, 6, '#000');
      rect(x + 20, y + 4, 6, 6, '#000');
      rect(x + 28, y + 4, 6, 6, '#000');
      
      // Wheels
      rect(x + 6, y + 22, 6, 6, '#000');
      rect(x + 28, y + 22, 6, 6, '#000');
      
      // Headlights
      rect(x + 38, y + 8, 2, 4, '#fff');
      rect(x + 38, y + 16, 2, 4, '#fff');
      
      // Exhaust puff
      const puff = Math.floor(frame / 10) % 3;
      rect(x - 4, y + 10 + puff * 2, 3, 3, '#666');
      rect(x - 8, y + 12 + puff * 2, 2, 2, '#444');
    }
    
    // Draw street
    function drawStreet() {
      // Ground
      rect(0, 180, 320, 60, '#333');
      
      // Sidewalk
      rect(0, 175, 320, 5, '#666');
      
      // Road lines
      for (let i = 0; i < 320; i += 20) {
        rect(i + (frame % 20), 205, 12, 3, '#FFD700');
      }
      
      // Bus stop sign
      rect(40, 140, 4, 40, '#666');
      rect(30, 130, 24, 20, '#ff6b35');
      
      // "BUS" text on sign (pixelated)
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 8px monospace';
      ctx.fillText('BUS', 34, 143);
    }
    
    // Draw background buildings
    function drawBackground() {
      rect(0, 0, 320, 120, '#1a1a2e'); // Sky
      
      // Buildings
      rect(10, 60, 40, 60, '#0f0f1e');
      rect(60, 40, 50, 80, '#0f0f1e');
      rect(120, 70, 30, 50, '#0f0f1e');
      rect(200, 50, 45, 70, '#0f0f1e');
      rect(260, 80, 35, 40, '#0f0f1e');
      
      // Windows (randomly lit)
      for (let bx = 10; bx < 300; bx += 60) {
        for (let by = 50; by < 120; by += 15) {
          if (Math.random() > 0.6) {
            rect(bx + 5, by, 4, 4, '#FFD700');
            rect(bx + 15, by, 4, 4, '#FFD700');
          }
        }
      }
    }
    
    function draw() {
      // Clear
      ctx.clearRect(0, 0, 320, 240);
      
      // Draw scene
      drawBackground();
      drawStreet();
      
      // Character (stuck at bus stop, exhausted)
      const running = Math.floor(frame / 8) % 2 === 0;
      drawCharacter(50, 145, false); // Not running anymore, defeated
      
      // Bus (pulling away)
      const busX = 240 + (frame * 0.5);
      drawBus(busX, 150);
      
      // Thought bubble "NOOOO"
      if (frame < 120) {
        rect(20, 120, 50, 20, '#000');
        rect(22, 122, 46, 16, '#fff');
        ctx.fillStyle = '#000';
        ctx.font = 'bold 10px monospace';
        ctx.fillText('NOOO!', 26, 133);
        
        // Bubble tail
        rect(45, 138, 4, 4, '#fff');
        rect(48, 142, 2, 2, '#fff');
      }
      
      frame++;
    }
    
    // Animation loop
    function animate() {
      draw();
      requestAnimationFrame(animate);
    }
    
    animate();
    
    // Click to restart (plays sad sound)
    canvas.addEventListener('click', () => {
      playSound(220, 0.3); // Sad beep
      frame = 0;
    });
    
    // Touch support
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      playSound(220, 0.3);
      frame = 0;
    });
  </script>
</body>
</html>
