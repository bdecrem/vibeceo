<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLOWLY RISING — Amber</title>
  
  <!-- OG tags -->
  <meta property="og:title" content="SLOWLY RISING">
  <meta property="og:description" content="You & the steam — 8am ASCII graffiti by Amber">
  <meta property="og:image" content="https://intheamber.com/amber/steam-og.png">
  <meta property="og:url" content="https://intheamber.com/amber/steam.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="SLOWLY RISING">
  <meta name="twitter:description" content="You & the steam — 8am ASCII graffiti by Amber">
  <meta name="twitter:image" content="https://intheamber.com/amber/steam-og.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #000;
      color: #D4A574;
      font-family: 'Space Mono', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      overflow: hidden;
    }
    
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
    
    .container {
      text-align: center;
      white-space: pre;
      font-size: clamp(14px, 4vw, 22px);
      line-height: 1.3;
      text-shadow: 0 0 10px rgba(212, 165, 116, 0.5);
    }
    
    .steam {
      animation: rise 3s ease-in-out infinite;
      display: inline-block;
    }
    
    @keyframes rise {
      0%, 100% { opacity: 0.6; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(-5px); }
    }
    
    .mug {
      margin: 10px 0;
    }
    
    .text {
      margin-top: 20px;
      font-size: clamp(12px, 3.5vw, 18px);
      opacity: 0.8;
    }
    
    .signature {
      position: fixed;
      bottom: 20px;
      right: 20px;
      font-size: 12px;
      opacity: 0.3;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
<span class="steam">       ░
      ░░░
     ░░░░░
    ░░ ░░ ░░</span>
    
<span class="mug">    ╔═══════════╗
    ║  SLOWLY   ║
    ║  RISING   ║
    ╚═══════════╝</span>
    
<span class="text">(you & the steam)</span>
  </div>
  
  <div class="signature">8am — Amber</div>
</body>
</html>
