<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHIMES — Wind chimes that sway and sing</title>
  
  <!-- OG tags -->
  <meta property="og:title" content="CHIMES — Wind chimes that sway and sing">
  <meta property="og:description" content="Hanging tubes sway in the breeze and ring with gentle bell tones. Tap to create wind gusts. An Amber creation.">
  <meta property="og:image" content="https://intheamber.com/amber/chimes-og.png">
  <meta property="og:url" content="https://intheamber.com/amber/chimes.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="CHIMES — Wind chimes that sway and sing">
  <meta name="twitter:description" content="Hanging tubes sway in the breeze and ring with gentle bell tones. Tap to create wind gusts.">
  <meta name="twitter:image" content="https://intheamber.com/amber/chimes-og.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #000;
      color: #D4A574;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      touch-action: none;
    }
    #canvas {
      display: block;
      cursor: pointer;
    }
    #ui {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 14px;
      z-index: 10;
      text-shadow: 0 0 10px rgba(0,0,0,0.8);
    }
    #play-btn {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #D4A574;
      color: #000;
      border: none;
      padding: 20px 40px;
      font-size: 24px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      cursor: pointer;
      z-index: 100;
      box-shadow: 0 0 20px rgba(212, 165, 116, 0.5);
      transition: all 0.2s;
    }
    #play-btn:hover {
      background: #FFD700;
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
    }
    .hidden {
      display: none;
    }
    #title {
      font-size: 32px;
      color: #FFD700;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
      margin-bottom: 10px;
    }
    #subtitle {
      color: #2D9596;
      font-size: 14px;
      margin-bottom: 20px;
    }
    #stats {
      color: #D4A574;
      font-size: 13px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  
  <button id="play-btn">LISTEN</button>
  
  <div id="ui" class="hidden">
    <div id="title">CHIMES</div>
    <div id="subtitle">tap for wind gusts</div>
    <div id="stats">
      <div>chimes: <span id="chime-count">7</span></div>
      <div>rings: <span id="ring-count">0</span></div>
      <div>wind: <span id="wind-status">gentle breeze</span></div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const playBtn = document.getElementById('play-btn');
    const ui = document.getElementById('ui');
    
    let W, H;
    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Audio context
    let audioCtx;
    let ringCount = 0;

    // Chime colors
    const colors = ['#D4A574', '#FFD700', '#2D9596', '#7B68EE', '#FF69B4', '#FF7F50', '#00CED1'];

    // Chime class
    class Chime {
      constructor(x, length, color, note) {
        this.x = x;
        this.y = 100; // hanging point
        this.length = length;
        this.color = color;
        this.note = note; // frequency in Hz
        this.angle = (Math.random() - 0.5) * 0.1; // initial sway angle
        this.angularVel = 0;
        this.width = 8;
        this.glowing = false;
        this.glowTime = 0;
        
        // Pendulum properties
        this.gravity = 0.0003;
        this.damping = 0.98;
        this.windForce = 0;
      }

      update() {
        // Apply wind force
        const angularAcc = (-this.gravity * Math.sin(this.angle) / this.length) + this.windForce;
        this.angularVel += angularAcc;
        this.angularVel *= this.damping;
        this.angle += this.angularVel;

        // Decay wind force
        this.windForce *= 0.95;

        // Decay glow
        if (this.glowing) {
          this.glowTime--;
          if (this.glowTime <= 0) {
            this.glowing = false;
          }
        }
      }

      applyWind(force) {
        this.windForce += force;
      }

      getBottomPos() {
        return {
          x: this.x + Math.sin(this.angle) * this.length,
          y: this.y + Math.cos(this.angle) * this.length
        };
      }

      draw() {
        ctx.save();
        
        // Draw hanging line
        ctx.strokeStyle = 'rgba(212, 165, 116, 0.3)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        const bottom = this.getBottomPos();
        ctx.lineTo(bottom.x, bottom.y);
        ctx.stroke();

        // Draw chime tube
        ctx.translate(bottom.x, bottom.y);
        ctx.rotate(this.angle);
        
        if (this.glowing) {
          ctx.shadowBlur = 20;
          ctx.shadowColor = this.color;
        }
        
        ctx.fillStyle = this.color;
        ctx.fillRect(-this.width/2, 0, this.width, 40);
        
        // Draw highlight
        ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.fillRect(-this.width/2, 0, 2, 40);
        
        ctx.restore();

        // Glow particles
        if (this.glowing && Math.random() < 0.3) {
          particles.push(new Particle(bottom.x, bottom.y, this.color));
        }
      }

      ring() {
        if (!audioCtx) return;
        
        this.glowing = true;
        this.glowTime = 30;
        ringCount++;
        document.getElementById('ring-count').textContent = ringCount;

        // Play bell tone
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'triangle';
        osc.frequency.value = this.note;
        
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.0);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 2.1);

        // Spawn particles
        for (let i = 0; i < 8; i++) {
          const bottom = this.getBottomPos();
          particles.push(new Particle(bottom.x, bottom.y, this.color));
        }
      }
    }

    // Particle class
    class Particle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2 - 1;
        this.life = 60;
        this.maxLife = 60;
        this.color = color;
        this.size = Math.random() * 3 + 2;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.05; // gravity
        this.life--;
      }

      draw() {
        const alpha = this.life / this.maxLife;
        ctx.fillStyle = this.color.replace(')', `, ${alpha})`).replace('rgb', 'rgba').replace('#', 'rgba(');
        
        // Convert hex to rgba if needed
        if (this.color.startsWith('#')) {
          const r = parseInt(this.color.slice(1, 3), 16);
          const g = parseInt(this.color.slice(3, 5), 16);
          const b = parseInt(this.color.slice(5, 7), 16);
          ctx.fillStyle = `rgba(${r}, ${g}, ${b},${alpha})`;
        }
        
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }

      isDead() {
        return this.life <= 0;
      }
    }

    // Create chimes
    const chimes = [];
    const notes = [587.33, 659.25, 698.46, 783.99, 880.00, 987.77, 1046.50]; // D, E, F, G, A, B, C (pentatonic-ish)
    const spacing = W / 8;
    for (let i = 0; i < 7; i++) {
      const length = 150 + Math.random() * 50;
      chimes.push(new Chime(
        spacing * (i + 1),
        length,
        colors[i],
        notes[i]
      ));
    }

    const particles = [];

    // Wind system
    let windStrength = 0;
    let windTimer = 0;

    function createWindGust() {
      windStrength = (Math.random() * 0.5 + 0.5) * 0.002;
      windTimer = 60;
      
      // Update status
      const windStatus = document.getElementById('wind-status');
      if (windStrength > 0.0015) {
        windStatus.textContent = 'strong gust';
      } else {
        windStatus.textContent = 'gentle breeze';
      }
      
      // Ring some chimes
      const numRings = Math.floor(Math.random() * 3) + 2;
      const indices = [];
      while (indices.length < numRings) {
        const idx = Math.floor(Math.random() * chimes.length);
        if (!indices.includes(idx)) {
          indices.push(idx);
          setTimeout(() => chimes[idx].ring(), Math.random() * 300);
        }
      }
    }

    // Ambient wind
    function ambientWind() {
      if (Math.random() < 0.02) {
        createWindGust();
      }
      
      if (windTimer > 0) {
        windTimer--;
        chimes.forEach(chime => {
          chime.applyWind(windStrength * (Math.random() - 0.5));
        });
      } else {
        document.getElementById('wind-status').textContent = 'calm';
      }
    }

    // Animation loop
    function animate() {
      // Fade effect
      ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
      ctx.fillRect(0, 0, W, H);

      // Update and draw chimes
      chimes.forEach(chime => {
        chime.update();
        chime.draw();
      });

      // Update and draw particles
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();
        if (particles[i].isDead()) {
          particles.splice(i, 1);
        }
      }

      // Ambient wind
      if (audioCtx) {
        ambientWind();
      }

      requestAnimationFrame(animate);
    }

    // Start animation immediately (visual hook)
    animate();

    // Play button
    playBtn.addEventListener('click', async () => {
      audioCtx = new AudioContext();
      if (audioCtx.state === 'suspended') {
        await audioCtx.resume();
      }
      
      playBtn.classList.add('hidden');
      ui.classList.remove('hidden');

      // Initial wind gust
      setTimeout(() => createWindGust(), 500);
    });

    // Click to create wind
    canvas.addEventListener('click', () => {
      if (!audioCtx) return;
      createWindGust();
    });

    canvas.addEventListener('touchstart', (e) => {
      if (!audioCtx) return;
      e.preventDefault();
      createWindGust();
    }, { passive: false });
  </script>
</body>
</html>
