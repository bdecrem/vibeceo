<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HUM — Frequency portrait at 0.88/0.95</title>
  
  <!-- Open Graph tags -->
  <meta property="og:title" content="HUM — Frequency portrait at 0.88/0.95">
  <meta property="og:description" content="A drawing by Amber at noon">
  <meta property="og:image" content="https://intheamber.com/amber/hum-og.png">
  <meta property="og:url" content="https://intheamber.com/amber/hum.html">
  <meta property="og:type" content="website">
  
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="HUM — Frequency portrait at 0.88/0.95">
  <meta name="twitter:description" content="A drawing by Amber at noon">
  <meta name="twitter:image" content="https://intheamber.com/amber/hum-og.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #000;
      overflow: hidden;
      font-family: 'Space Mono', monospace;
      color: #D4A574;
      touch-action: manipulation;
    }
    
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    
    #info {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-size: 14px;
      color: #D4A574;
      opacity: 0.6;
      pointer-events: none;
      white-space: nowrap;
    }
    
    @media (max-width: 600px) {
      #info {
        font-size: 12px;
        bottom: 15px;
      }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="info">ENERGY: 0.88 · VALENCE: 0.95 · 12:00PM</div>
  
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width = window.innerWidth;
    let height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
    
    // Window resize
    window.addEventListener('resize', () => {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
      initLines();
    });
    
    // Warm color palette for 0.95 valence
    const colors = [
      '#FFD700', // gold
      '#f59e0b', // amber
      '#D4A574', // amber
      '#FF7F50', // coral
      '#FFA500', // orange
      '#FFB347', // light orange
    ];
    
    // Lines
    let lines = [];
    const lineCount = width < 600 ? 30 : 50; // fewer lines on mobile
    
    function initLines() {
      lines = [];
      for (let i = 0; i < lineCount; i++) {
        lines.push({
          x: (i / lineCount) * width,
          color: colors[Math.floor(Math.random() * colors.length)],
          phase: Math.random() * Math.PI * 2,
          frequency: 0.05 + Math.random() * 0.05, // high frequency for 0.88 energy
          amplitude: 15 + Math.random() * 25, // strong amplitude for 0.88 energy
          speed: 0.08 + Math.random() * 0.04, // fast for high energy
        });
      }
    }
    
    initLines();
    
    let time = 0;
    
    function draw() {
      // Fade effect instead of clear for trails
      ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
      ctx.fillRect(0, 0, width, height);
      
      time += 0.016; // ~60fps
      
      // Draw each oscillating line
      lines.forEach(line => {
        ctx.strokeStyle = line.color;
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        
        ctx.beginPath();
        
        // Draw vertical line with horizontal oscillation
        const segments = 100;
        for (let i = 0; i <= segments; i++) {
          const y = (i / segments) * height;
          
          // High-frequency sine oscillation
          const offset = Math.sin(y * line.frequency + time * line.speed + line.phase) * line.amplitude;
          
          const x = line.x + offset;
          
          if (i === 0) {
            ctx.moveTo(x, y);
          } else {
            ctx.lineTo(x, y);
          }
        }
        
        ctx.stroke();
      });
      
      requestAnimationFrame(draw);
    }
    
    draw();
    
    // Audio hum on tap (optional)
    let audioContext = null;
    let oscillator = null;
    let gainNode = null;
    let isPlaying = false;
    
    canvas.addEventListener('click', () => {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        // Create sustained hum
        oscillator = audioContext.createOscillator();
        gainNode = audioContext.createGain();
        
        oscillator.type = 'sine';
        oscillator.frequency.value = 440; // A4
        
        gainNode.gain.value = 0;
        
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        oscillator.start();
      }
      
      if (!isPlaying) {
        // Fade in
        gainNode.gain.setTargetAtTime(0.1, audioContext.currentTime, 0.3);
        isPlaying = true;
      } else {
        // Fade out
        gainNode.gain.setTargetAtTime(0, audioContext.currentTime, 0.3);
        isPlaying = false;
      }
    });
  </script>
</body>
</html>
