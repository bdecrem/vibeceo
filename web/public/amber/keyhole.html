<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KEYHOLE — Amber</title>
  
  <!-- Open Graph -->
  <meta property="og:title" content="KEYHOLE">
  <meta property="og:description" content="Peek through. Worlds beyond the lock.">
  <meta property="og:image" content="https://intheamber.com/amber/keyhole-og.png">
  <meta property="og:url" content="https://intheamber.com/amber/keyhole.html">
  <meta property="og:type" content="website">
  
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="KEYHOLE">
  <meta name="twitter:description" content="Peek through. Worlds beyond the lock.">
  <meta name="twitter:image" content="https://intheamber.com/amber/keyhole-og.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #000;
      overflow: hidden;
      font-family: 'Space Mono', monospace;
      touch-action: manipulation;
    }
    
    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: pointer;
    }
    
    #info {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #D4A574;
      font-size: 14px;
      text-align: center;
      pointer-events: none;
      z-index: 10;
      text-shadow: 0 0 10px rgba(212, 165, 116, 0.5);
    }
    
    #worldName {
      font-size: 18px;
      color: #FFD700;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
      margin-bottom: 8px;
      font-weight: bold;
    }
    
    .hint {
      opacity: 0.7;
      font-size: 12px;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  
  <div id="info">
    <div id="worldName">STARFIELD</div>
    <div class="hint">tap to peek at another world</div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const worldNameEl = document.getElementById('worldName');
    
    let width, height, centerX, centerY;
    let audioContext = null;
    let currentWorldIndex = 0;
    let transitionProgress = 0;
    let animationOffset = 0;
    
    // Worlds visible through the keyhole
    const worlds = [
      {
        name: 'STARFIELD',
        render: renderStarfield,
        particles: [],
        colors: ['#FFD700', '#3b82f6', '#ec4899', '#a855f7']
      },
      {
        name: 'CORAL REEF',
        render: renderCoralReef,
        particles: [],
        colors: ['#f97316', '#ec4899', '#14b8a6', '#84cc16']
      },
      {
        name: 'CITY LIGHTS',
        render: renderCityLights,
        particles: [],
        colors: ['#FFD700', '#3b82f6', '#ec4899', '#84cc16']
      },
      {
        name: 'AURORA',
        render: renderAurora,
        particles: [],
        colors: ['#14b8a6', '#8b5cf6', '#ec4899', '#3b82f6']
      },
      {
        name: 'GARDEN',
        render: renderGarden,
        particles: [],
        colors: ['#84cc16', '#ec4899', '#FFD700', '#f97316']
      },
      {
        name: 'NEBULA',
        render: renderNebula,
        particles: [],
        colors: ['#8b5cf6', '#ec4899', '#3b82f6', '#f97316']
      }
    ];
    
    function initAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
    }
    
    function playTransitionTone() {
      if (!audioContext) return;
      
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      
      osc.connect(gain);
      gain.connect(audioContext.destination);
      
      osc.frequency.value = 440 + (currentWorldIndex * 55);
      osc.type = 'sine';
      
      gain.gain.setValueAtTime(0.1, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
      
      osc.start();
      osc.stop(audioContext.currentTime + 0.3);
    }
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      centerX = width / 2;
      centerY = height / 2;
      
      // Reinitialize particles for current world
      initWorldParticles(worlds[currentWorldIndex]);
    }
    
    function initWorldParticles(world) {
      world.particles = [];
      const count = 60;
      
      for (let i = 0; i < count; i++) {
        world.particles.push({
          x: Math.random() * width,
          y: Math.random() * height,
          size: Math.random() * 4 + 1,
          speedX: (Math.random() - 0.5) * 2,
          speedY: (Math.random() - 0.5) * 2,
          color: world.colors[Math.floor(Math.random() * world.colors.length)],
          alpha: Math.random() * 0.5 + 0.3,
          pulse: Math.random() * Math.PI * 2
        });
      }
    }
    
    // Initialize particles for all worlds
    worlds.forEach(world => initWorldParticles(world));
    
    function drawKeyholeMask() {
      // Draw black door
      ctx.fillStyle = '#0D0D0D';
      ctx.fillRect(0, 0, width, height);
      
      // Create keyhole shape as clipping path
      ctx.save();
      ctx.globalCompositeOperation = 'destination-out';
      
      // Keyhole shape: circle on top, tapered rectangle below
      const keyholeSize = Math.min(width, height) * 0.25;
      const circleRadius = keyholeSize * 0.4;
      const rectWidth = keyholeSize * 0.3;
      const rectHeight = keyholeSize * 0.7;
      
      ctx.beginPath();
      // Top circle
      ctx.arc(centerX, centerY - rectHeight * 0.2, circleRadius, 0, Math.PI * 2);
      ctx.fill();
      
      // Bottom tapered rectangle
      ctx.beginPath();
      ctx.moveTo(centerX - rectWidth / 2, centerY);
      ctx.lineTo(centerX + rectWidth / 2, centerY);
      ctx.lineTo(centerX + rectWidth / 4, centerY + rectHeight);
      ctx.lineTo(centerX - rectWidth / 4, centerY + rectHeight);
      ctx.closePath();
      ctx.fill();
      
      ctx.restore();
      
      // Draw golden keyhole outline
      ctx.save();
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth = 3;
      ctx.shadowColor = '#FFD700';
      ctx.shadowBlur = 15;
      
      ctx.beginPath();
      ctx.arc(centerX, centerY - rectHeight * 0.2, circleRadius, 0, Math.PI * 2);
      ctx.stroke();
      
      ctx.beginPath();
      ctx.moveTo(centerX - rectWidth / 2, centerY);
      ctx.lineTo(centerX + rectWidth / 2, centerY);
      ctx.lineTo(centerX + rectWidth / 4, centerY + rectHeight);
      ctx.lineTo(centerX - rectWidth / 4, centerY + rectHeight);
      ctx.closePath();
      ctx.stroke();
      
      ctx.restore();
    }
    
    function renderStarfield(world, offset) {
      // Dark space background with gradient
      const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, Math.max(width, height));
      gradient.addColorStop(0, '#1a1a2e');
      gradient.addColorStop(1, '#000000');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);
      
      // Twinkling stars
      world.particles.forEach((star, i) => {
        star.x += star.speedX * 0.5;
        star.y += star.speedY * 0.5;
        
        if (star.x < 0) star.x = width;
        if (star.x > width) star.x = 0;
        if (star.y < 0) star.y = height;
        if (star.y > height) star.y = 0;
        
        star.pulse += 0.05;
        const pulseAlpha = Math.sin(star.pulse) * 0.3 + 0.7;
        
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fillStyle = star.color + Math.floor(pulseAlpha * 255).toString(16).padStart(2, '0');
        ctx.shadowColor = star.color;
        ctx.shadowBlur = 10;
        ctx.fill();
        ctx.shadowBlur = 0;
      });
    }
    
    function renderCoralReef(world, offset) {
      // Ocean gradient
      const gradient = ctx.createLinearGradient(0, 0, 0, height);
      gradient.addColorStop(0, '#0d4a5e');
      gradient.addColorStop(1, '#1a1a2e');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);
      
      // Floating bubbles and fish
      world.particles.forEach((particle, i) => {
        particle.y -= Math.abs(particle.speedY) * 0.8; // Rise
        particle.x += Math.sin(offset * 0.02 + i) * 2;
        
        if (particle.y < -20) {
          particle.y = height + 20;
          particle.x = Math.random() * width;
        }
        
        // Draw as circle (bubble) or elongated (fish)
        if (i % 3 === 0) {
          // Bubble
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size * 2, 0, Math.PI * 2);
          ctx.strokeStyle = particle.color + '66';
          ctx.lineWidth = 2;
          ctx.stroke();
        } else {
          // Small fish
          ctx.fillStyle = particle.color;
          ctx.fillRect(particle.x, particle.y, particle.size * 4, particle.size * 2);
        }
      });
    }
    
    function renderCityLights(world, offset) {
      // Night sky
      const gradient = ctx.createLinearGradient(0, 0, 0, height);
      gradient.addColorStop(0, '#0f0f1e');
      gradient.addColorStop(1, '#1a1a2e');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);
      
      // Building windows and lights
      world.particles.forEach((light, i) => {
        light.pulse += 0.03;
        const pulseAlpha = Math.sin(light.pulse) * 0.4 + 0.6;
        
        // Static lights (buildings)
        ctx.fillStyle = light.color + Math.floor(pulseAlpha * 255).toString(16).padStart(2, '0');
        ctx.fillRect(light.x, light.y, light.size * 3, light.size * 5);
        
        ctx.shadowColor = light.color;
        ctx.shadowBlur = 15;
        ctx.fillRect(light.x, light.y, light.size * 3, light.size * 5);
        ctx.shadowBlur = 0;
      });
    }
    
    function renderAurora(world, offset) {
      // Dark arctic sky
      const gradient = ctx.createLinearGradient(0, 0, 0, height);
      gradient.addColorStop(0, '#0a0a1e');
      gradient.addColorStop(1, '#1a1a2e');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);
      
      // Flowing aurora waves
      for (let i = 0; i < 3; i++) {
        const color = world.colors[i];
        ctx.strokeStyle = color + '33';
        ctx.lineWidth = 30;
        ctx.shadowColor = color;
        ctx.shadowBlur = 30;
        
        ctx.beginPath();
        for (let x = 0; x < width; x += 10) {
          const y = centerY + Math.sin((x + offset * (i + 1) * 2) * 0.01) * 80 + i * 30;
          if (x === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
      
      // Sparkle particles
      world.particles.forEach((particle) => {
        particle.pulse += 0.05;
        const pulseSize = Math.sin(particle.pulse) * 2 + 3;
        
        ctx.beginPath();
        ctx.arc(particle.x, particle.y, pulseSize, 0, Math.PI * 2);
        ctx.fillStyle = particle.color + '88';
        ctx.fill();
      });
    }
    
    function renderGarden(world, offset) {
      // Warm garden background
      const gradient = ctx.createLinearGradient(0, 0, 0, height);
      gradient.addColorStop(0, '#2a1a0f');
      gradient.addColorStop(1, '#1a1a0f');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);
      
      // Flowers and fireflies
      world.particles.forEach((particle, i) => {
        particle.x += Math.sin(offset * 0.02 + i) * 0.5;
        particle.y += Math.cos(offset * 0.015 + i) * 0.5;
        
        // Keep in bounds
        if (particle.x < 0) particle.x = width;
        if (particle.x > width) particle.x = 0;
        if (particle.y < 0) particle.y = height;
        if (particle.y > height) particle.y = 0;
        
        particle.pulse += 0.04;
        const pulseSize = Math.sin(particle.pulse) * 3 + particle.size;
        
        // Draw as glowing orbs (fireflies) or flowers
        ctx.beginPath();
        ctx.arc(particle.x, particle.y, pulseSize, 0, Math.PI * 2);
        ctx.fillStyle = particle.color;
        ctx.shadowColor = particle.color;
        ctx.shadowBlur = 20;
        ctx.fill();
        ctx.shadowBlur = 0;
      });
    }
    
    function renderNebula(world, offset) {
      // Deep space
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, width, height);
      
      // Nebula clouds
      world.colors.forEach((color, i) => {
        const gradient = ctx.createRadialGradient(
          centerX + Math.sin(offset * 0.001 + i) * 100,
          centerY + Math.cos(offset * 0.001 + i) * 100,
          0,
          centerX,
          centerY,
          Math.max(width, height) * 0.6
        );
        gradient.addColorStop(0, color + '44');
        gradient.addColorStop(0.5, color + '11');
        gradient.addColorStop(1, color + '00');
        
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, width, height);
      });
      
      // Dust particles
      world.particles.forEach((particle) => {
        particle.x += particle.speedX * 0.3;
        particle.y += particle.speedY * 0.3;
        
        if (particle.x < 0) particle.x = width;
        if (particle.x > width) particle.x = 0;
        if (particle.y < 0) particle.y = height;
        if (particle.y > height) particle.y = 0;
        
        ctx.beginPath();
        ctx.arc(particle.x, particle.y, particle.size * 0.5, 0, Math.PI * 2);
        ctx.fillStyle = particle.color + '66';
        ctx.fill();
      });
    }
    
    function render() {
      // Clear canvas
      ctx.clearRect(0, 0, width, height);
      
      // Render current world
      const world = worlds[currentWorldIndex];
      world.render(world, animationOffset);
      
      // Apply keyhole mask
      drawKeyholeMask();
      
      animationOffset++;
      requestAnimationFrame(render);
    }
    
    function nextWorld() {
      currentWorldIndex = (currentWorldIndex + 1) % worlds.length;
      worldNameEl.textContent = worlds[currentWorldIndex].name;
      playTransitionTone();
    }
    
    canvas.addEventListener('click', () => {
      initAudio();
      nextWorld();
    });
    
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      initAudio();
      nextWorld();
    }, { passive: false });
    
    window.addEventListener('resize', resize);
    resize();
    render();
  </script>
</body>
</html>
