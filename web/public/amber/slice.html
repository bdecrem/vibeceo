<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SLICE — Swipe to slice falling shapes</title>
    
    <!-- OG tags -->
    <meta property="og:title" content="SLICE">
    <meta property="og:description" content="Swipe to slice falling shapes. Don't let them hit the ground.">
    <meta property="og:image" content="https://intheamber.com/amber/slice-og.png">
    <meta property="og:url" content="https://intheamber.com/amber/slice.html">
    <meta name="twitter:card" content="summary_large_image">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Space Mono', monospace;
            color: #D4A574;
            touch-action: none;
        }

        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            cursor: none;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        .stat {
            font-size: 18px;
            text-shadow: 0 0 10px rgba(212, 165, 116, 0.5);
        }

        .stat-value {
            color: #FFD700;
            font-weight: bold;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(13, 13, 13, 0.95);
            border: 2px solid #D4A574;
            padding: 40px;
            text-align: center;
            display: none;
            z-index: 20;
            box-shadow: 0 0 30px rgba(212, 165, 116, 0.3);
        }

        #gameOver h1 {
            color: #FFD700;
            font-size: 32px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        #gameOver p {
            font-size: 18px;
            margin: 10px 0;
        }

        #restartBtn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 18px;
            font-family: 'Space Mono', monospace;
            background: #7B68EE;
            color: #FFD700;
            border: 2px solid #FFD700;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 200px;
            min-height: 50px;
        }

        #restartBtn:hover {
            background: #FFD700;
            color: #000;
            transform: scale(1.05);
        }

        #instructions {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(13, 13, 13, 0.95);
            border: 2px solid #2D9596;
            padding: 40px;
            text-align: center;
            z-index: 30;
            box-shadow: 0 0 30px rgba(45, 149, 150, 0.3);
        }

        #instructions h1 {
            color: #FFD700;
            font-size: 36px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        #instructions p {
            font-size: 16px;
            margin: 15px 0;
            line-height: 1.6;
        }

        #startBtn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 20px;
            font-family: 'Space Mono', monospace;
            background: #2D9596;
            color: #FFD700;
            border: 2px solid #FFD700;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 200px;
            min-height: 50px;
        }

        #startBtn:hover {
            background: #FFD700;
            color: #000;
            transform: scale(1.05);
        }

        @media (max-width: 600px) {
            #instructions, #gameOver {
                padding: 30px 20px;
                max-width: 90vw;
            }
            
            #instructions h1, #gameOver h1 {
                font-size: 28px;
            }
            
            #instructions p, #gameOver p {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="ui">
        <div class="stat">SCORE: <span class="stat-value" id="score">0</span></div>
        <div class="stat">MISSES: <span class="stat-value" id="misses">0</span>/5</div>
    </div>

    <div id="instructions">
        <h1>SLICE</h1>
        <p>Swipe across falling shapes to slice them.</p>
        <p>Don't let them hit the ground.</p>
        <p>Miss 5 shapes and it's game over.</p>
        <button id="startBtn">START SLICING</button>
    </div>

    <div id="gameOver">
        <h1>SLICED</h1>
        <p>Final Score: <span id="finalScore">0</span></p>
        <p>Shapes Sliced: <span id="shapesSliced">0</span></p>
        <button id="restartBtn">SLICE AGAIN</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let audioContext;
        
        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Colors
        const COLORS = {
            amber: '#D4A574',
            gold: '#FFD700',
            teal: '#2D9596',
            violet: '#7B68EE',
            hotPink: '#FF69B4',
            coral: '#FF6B6B',
            cyan: '#00CED1',
            lime: '#39FF14'
        };

        const SHAPE_COLORS = [COLORS.amber, COLORS.gold, COLORS.teal, COLORS.violet, COLORS.hotPink, COLORS.coral];

        // Game state
        let gameState = 'waiting'; // waiting, playing, gameOver
        let score = 0;
        let misses = 0;
        let shapes = [];
        let particles = [];
        let swipeTrail = [];
        let lastSpawnTime = 0;
        let spawnInterval = 1500;
        let shapesSliced = 0;

        // Shape class
        class Shape {
            constructor() {
                this.x = Math.random() * (width - 80) + 40;
                this.y = -50;
                this.size = 30 + Math.random() * 20;
                this.velocity = 2 + Math.random() * 2;
                this.color = SHAPE_COLORS[Math.floor(Math.random() * SHAPE_COLORS.length)];
                this.type = ['circle', 'square', 'triangle'][Math.floor(Math.random() * 3)];
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
                this.sliced = false;
            }

            update() {
                this.y += this.velocity;
                this.rotation += this.rotationSpeed;
                
                // Check if missed (hit bottom)
                if (this.y > height + 50 && !this.sliced) {
                    this.sliced = true;
                    misses++;
                    updateUI();
                    playMissSound();
                    
                    if (misses >= 5) {
                        endGame();
                    }
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                
                if (this.type === 'circle') {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                    ctx.fill();
                } else if (this.type === 'square') {
                    ctx.fillRect(-this.size, -this.size, this.size * 2, this.size * 2);
                } else if (this.type === 'triangle') {
                    ctx.beginPath();
                    ctx.moveTo(0, -this.size);
                    ctx.lineTo(this.size, this.size);
                    ctx.lineTo(-this.size, this.size);
                    ctx.closePath();
                    ctx.fill();
                }
                
                ctx.restore();
            }

            checkCollision(trail) {
                if (this.sliced || trail.length < 2) return false;
                
                // Check if any trail segment intersects with shape
                for (let i = 1; i < trail.length; i++) {
                    const p1 = trail[i - 1];
                    const p2 = trail[i];
                    const dist = distanceToLineSegment(this.x, this.y, p1.x, p1.y, p2.x, p2.y);
                    
                    if (dist < this.size) {
                        return true;
                    }
                }
                return false;
            }
        }

        // Particle class
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.life = 1;
                this.decay = 0.015 + Math.random() * 0.015;
                this.size = 3 + Math.random() * 4;
                this.color = color;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2; // gravity
                this.life -= this.decay;
            }

draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // Helper function: distance from point to line segment
        function distanceToLineSegment(px, py, x1, y1, x2, y2) {
            const dx = x2 - x1;
            const dy = y2 - y1;
            const lengthSquared = dx * dx + dy * dy;
            
            if (lengthSquared === 0) {
                return Math.sqrt((px - x1) ** 2 + (py - y1) ** 2);
            }
            
            let t = ((px - x1) * dx + (py - y1) * dy) / lengthSquared;
            t = Math.max(0, Math.min(1, t));
            
            const projX = x1 + t * dx;
            const projY = y1 + t * dy;
            
            return Math.sqrt((px - projX) ** 2 + (py - projY) ** 2);
        }

        // Audio functions
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSliceSound(pitch = 1) {
            if (!audioContext) return;
            
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(400 * pitch, audioContext.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800 * pitch, audioContext.currentTime + 0.1);
            
            gain.gain.setValueAtTime(0.15, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
            
            osc.connect(gain);
            gain.connect(audioContext.destination);
            
            osc.start();
            osc.stop(audioContext.currentTime + 0.1);
        }

        function playMissSound() {
            if (!audioContext) return;
            
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(300, audioContext.currentTime);
            osc.frequency.exponentialRampToValueAtTime(150, audioContext.currentTime + 0.3);
            
            gain.gain.setValueAtTime(0.1, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
            
            osc.connect(gain);
            gain.connect(audioContext.destination);
            
            osc.start();
            osc.stop(audioContext.currentTime + 0.3);
        }

        function playGameOverSound() {
            if (!audioContext) return;
            
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(400, audioContext.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 0.5);
            
            gain.gain.setValueAtTime(0.2, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            
            osc.connect(gain);
            gain.connect(audioContext.destination);
            
            osc.start();
            osc.stop(audioContext.currentTime + 0.5);
        }

        // Touch/Mouse handling
        let isDrawing = false;
        let currentTrail = [];

        function handleStart(e) {
            if (gameState !== 'playing') return;
            
            e.preventDefault();
            isDrawing = true;
            currentTrail = [];
            
            const pos = getPosition(e);
            currentTrail.push({
                x: pos.x,
                y: pos.y,
                time: Date.now()
            });
        }

        function handleMove(e) {
            if (!isDrawing || gameState !== 'playing') return;
            
            e.preventDefault();
            const pos = getPosition(e);
            currentTrail.push({
                x: pos.x,
                y: pos.y,
                time: Date.now()
            });
            
            // Keep trail length manageable
            if (currentTrail.length > 20) {
                currentTrail.shift();
            }
            
            // Check collisions
            checkSlices();
        }

        function handleEnd(e) {
            if (!isDrawing) return;
            
            e.preventDefault();
            isDrawing = false;
            
            // Add trail to swipe trail for visual decay
            swipeTrail.push(...currentTrail.map(p => ({
                ...p,
                alpha: 1,
                decay: 0.05
            })));
            
            currentTrail = [];
        }

        function getPosition(e) {
            if (e.touches && e.touches[0]) {
                return {
                    x: e.touches[0].clientX,
                    y: e.touches[0].clientY
                };
            }
            return {
                x: e.clientX,
                y: e.clientY
            };
        }

        // Touch events
        canvas.addEventListener('touchstart', handleStart, { passive: false });
        canvas.addEventListener('touchmove', handleMove, { passive: false });
        canvas.addEventListener('touchend', handleEnd, { passive: false });
        
        // Mouse events (for desktop)
        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('mousemove', handleMove);
        canvas.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('mouseleave', handleEnd);

        function checkSlices() {
            shapes.forEach(shape => {
                if (!shape.sliced && shape.checkCollision(currentTrail)) {
                    shape.sliced = true;
                    score += 10;
                    shapesSliced++;
                    updateUI();
                    
                    // Create particles
                    for (let i = 0; i < 30; i++) {
                        particles.push(new Particle(shape.x, shape.y, shape.color));
                    }
                    
                    // Play sound with increasing pitch
                    playSliceSound(1 + (shapesSliced % 8) * 0.1);
                    
                    // Increase difficulty
                    if (score % 100 === 0 && spawnInterval > 500) {
                        spawnInterval -= 100;
                    }
                }
            });
            
            // Remove sliced shapes
            shapes = shapes.filter(s => !s.sliced || s.y < height + 100);
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('misses').textContent = misses;
        }

        function startGame() {
            initAudio();
            
            gameState = 'playing';
            score = 0;
            misses = 0;
            shapes = [];
            particles = [];
            swipeTrail = [];
            lastSpawnTime = Date.now();
            spawnInterval = 1500;
            shapesSliced = 0;
            
            updateUI();
            
            document.getElementById('instructions').style.display = 'none';
            document.getElementById('gameOver').style.display = 'none';
        }

        function endGame() {
            gameState = 'gameOver';
            playGameOverSound();
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('shapesSliced').textContent = shapesSliced;
            document.getElementById('gameOver').style.display = 'block';
        }

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);

        // Game loop
        function update() {
            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);
            
            if (gameState === 'playing') {
                // Spawn new shapes
                const now = Date.now();
                if (now - lastSpawnTime > spawnInterval) {
                    shapes.push(new Shape());
                    lastSpawnTime = now;
                }
                
                // Update and draw shapes
                shapes.forEach(shape => {
                    shape.update();
                    shape.draw();
                });
            }
            
            // Update and draw particles
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            
            // Draw swipe trail
            if (currentTrail.length > 1) {
                ctx.save();
                ctx.strokeStyle = COLORS.hotPink;
                ctx.lineWidth = 8;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.shadowBlur = 20;
                ctx.shadowColor = COLORS.hotPink;
                
                ctx.beginPath();
                ctx.moveTo(currentTrail[0].x, currentTrail[0].y);
                for (let i = 1; i < currentTrail.length; i++) {
                    ctx.lineTo(currentTrail[i].x, currentTrail[i].y);
                }
                ctx.stroke();
                ctx.restore();
            }
            
            // Draw fading swipe trails
            swipeTrail = swipeTrail.filter(p => p.alpha > 0);
            if (swipeTrail.length > 1) {
                ctx.save();
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                for (let i = 1; i < swipeTrail.length; i++) {
                    const p1 = swipeTrail[i - 1];
                    const p2 = swipeTrail[i];
                    
                    ctx.globalAlpha = p1.alpha;
                    ctx.strokeStyle = COLORS.hotPink;
                    ctx.lineWidth = 8;
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = COLORS.hotPink;
                    
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                    
                    p1.alpha -= p1.decay;
                }
                ctx.restore();
            }
            
            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
