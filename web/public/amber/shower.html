  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #D4A574;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
    }

    #art-container {
      position: relative;
      cursor: pointer;
    }

    #art {
      font-size: clamp(16px, 4vw, 24px);
      line-height: 1.2;
      white-space: pre;
      text-align: center;
      color: #D4A574;
      filter: drop-shadow(0 0 8px rgba(212, 165, 116, 0.5));
      transition: all 0.3s ease;
    }

    #art.hot {
      color: #FFD700;
      filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.8));
      transform: scale(1.02);
    }

    .steam {
      color: #2D9596;
      opacity: 0.8;
      animation: rise 3s ease-in-out infinite;
    }

    .steam:nth-child(2) { animation-delay: 0.3s; }
    .steam:nth-child(3) { animation-delay: 0.6s; }
    .steam:nth-child(4) { animation-delay: 0.9s; }
    .steam:nth-child(5) { animation-delay: 1.2s; }

    @keyframes rise {
      0%, 100% { 
        opacity: 0.3;
        transform: translateY(0px);
      }
      50% { 
        opacity: 0.8;
        transform: translateY(-3px);
      }
    }

    .salvation {
      color: #FFD700;
      font-weight: bold;
      animation: glow 2s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { 
        filter: drop-shadow(0 0 4px rgba(255, 215, 0, 0.4));
      }
      50% { 
        filter: drop-shadow(0 0 12px rgba(255, 215, 0, 0.8));
      }
    }

    #subtitle {
      margin-top: 30px;
      font-size: clamp(12px, 3vw, 16px);
      color: #7B68EE;
      opacity: 0.7;
      text-align: center;
    }

    #time {
      margin-top: 40px;
      font-size: clamp(14px, 3.5vw, 18px);
      color: #2D9596;
      opacity: 0.5;
    }

    #instruction {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(10px, 2.5vw, 14px);
      color: #2D9596;
      opacity: 0.4;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.6; }
    }

    /* Mobile optimization */
    @media (max-width: 768px) {
      body {
        padding: 15px;
      }
    }
  </style>
</head>
<body>
  <div id="art-container">
    <div id="art">  ╔═══════════════╗

  ║     <span class="steam">~</span> <span class="steam">~</span> <span class="steam">~</span>     ║
  ║               ║
  ║  <span class="salvation">SALVATION</span>  ║
  ║               ║
  ╚═══════════════╝</div>
    
    <div id="subtitle">hot water • 8:00 am</div>
  </div>

  <div id="time"></div>
  <div id="instruction">tap for heat</div>

  <script>
    // Audio context
    let audioCtx = null;
    let isHot = false;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    function playHeatSound() {
      if (!audioCtx) return;

      // Create a rising steam sound (sine wave sweep)
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      osc.type = 'sine';
      osc.frequency.setValueAtTime(220, audioCtx.currentTime);
      osc.frequency.linearRampToValueAtTime(440, audioCtx.currentTime + 0.5);
      
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
      
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.5);
    }

    // Update clock
    function updateClock() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('en-US', { 
        hour: 'numeric', 
        minute: '2-digit',
        hour12: true 
      });
      document.getElementById('time').textContent = timeStr;
    }

    updateClock();
    setInterval(updateClock, 1000);

    // Tap interaction
    const artContainer = document.getElementById('art-container');
    const art = document.getElementById('art');

    function heatUp() {
      initAudio();
      playHeatSound();
      
      art.classList.add('hot');
      isHot = true;
      
      setTimeout(() => {
        art.classList.remove('hot');
        isHot = false;
      }, 1000);
    }

    artContainer.addEventListener('click', heatUp);
    artContainer.addEventListener('touchstart', (e) => {
      e.preventDefault();
      heatUp();
    });
  </script>
</body>
