<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRIBAL 909 — Visualizer</title>
  <meta property="og:title" content="TRIBAL 909 — Visualizer">
  <meta property="og:description" content="909 tribal jam. 130 BPM. Hat decay automation. Late-night warehouse.">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔮</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a12;
      overflow: hidden;
      cursor: crosshair;
      font-family: 'Courier New', monospace;
    }
    canvas { display: block; }
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    #start-prompt {
      color: #ff8c00;
      font-size: 0.9rem;
      letter-spacing: 0.6em;
      text-transform: uppercase;
      opacity: 0.5;
      cursor: pointer;
      padding: 3rem;
      transition: opacity 0.3s;
    }
    #start-prompt:hover { opacity: 1; }
    #section-label {
      position: fixed;
      top: 2rem;
      right: 2.5rem;
      color: rgba(224,224,224,0.2);
      font-size: 0.55rem;
      letter-spacing: 0.5em;
      z-index: 20;
      transition: opacity 0.8s;
    }
    #credits {
      position: fixed;
      bottom: 1.2rem;
      left: 2rem;
      color: rgba(224,224,224,0.12);
      font-size: 0.5rem;
      letter-spacing: 0.25em;
      z-index: 20;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="overlay">
    <div id="start-prompt">▶ PLAY</div>
  </div>
  <div id="section-label"></div>
  <div id="credits">HALLMAN · JT-90 · VIZ AMBER</div>

  <script type="module">
    import { JT90Engine } from '/jt90/dist/machines/jt90/engine.js';

    // ── ARRANGEMENT ──
    function hits(steps) {
      return Array.from({ length: 16 }, (_, i) =>
        ({ velocity: steps.includes(i) ? 0.85 : 0, accent: false })
      );
    }

    const patterns = {
      A: { kick: hits([0,4,8,12]), ch: hits([0,2,4,6,8,10,12,14]) },
      B: { kick: hits([0,4,8,12]), ch: hits([0,2,4,6,8,10,12,14]), oh: hits([2,10]) },
      C: { kick: hits([0,4,8,12]), ch: hits([0,2,4,6,8,10,12,14]), oh: hits([2,10]) },
      D: { ch: hits([0,2,4,6,8,10,12,14]), oh: hits([2,6,10,14]) },
    };

    const automations = {
      A: null,
      B: { 'ch.decay': [0.70,0.15,0.55,0.20,0.65,0.15,0.50,0.25,0.75,0.15,0.60,0.20,0.45,0.30,0.70,0.10] },
      C: { 'ch.decay': [0.95,0.10,0.85,0.10,0.90,0.15,0.80,0.10,0.95,0.10,0.75,0.20,0.90,0.10,0.85,0.15] },
      D: { 'ch.decay': [0.40,0.60,0.30,0.70,0.25,0.75,0.20,0.80,0.15,0.85,0.10,0.90,0.10,0.95,0.10,0.95] },
    };

    const sections = [
      { bars: 4, pattern: 'A', label: 'INTRO', density: 0.15 },
      { bars: 8, pattern: 'B', label: 'BUILD', density: 0.4 },
      { bars: 4, pattern: 'D', label: 'BREAKDOWN', density: 0.25 },
      { bars: 8, pattern: 'C', label: 'PEAK', density: 0.9 },
      { bars: 4, pattern: 'B', label: 'PULL BACK', density: 0.35 },
      { bars: 4, pattern: 'A', label: 'OUTRO', density: 0.08 },
    ];

    // ── CANVAS ──
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H, cx, cy;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      cx = W / 2;
      cy = H / 2;
    }
    resize();
    window.addEventListener('resize', resize);

    // ── COLORS ──
    const AMBER = '#ff8c00';
    const WHITE = '#e0e0e0';
    const BG = '#0a0a12';

    // ── ELEMENTS ──
    // Expanding rings (open hats)
    const rings = [];
    class Ring {
      constructor(x, y) {
        this.x = x; this.y = y;
        this.r = 10;
        this.maxR = 80 + Math.random() * 120;
        this.speed = 1.5 + Math.random() * 1.5;
        this.width = 0.8;
      }
      update() { this.r += this.speed; return this.r < this.maxR; }
      draw() {
        const a = 1 - (this.r / this.maxR);
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,140,0,${a * 0.4})`;
        ctx.lineWidth = this.width;
        ctx.stroke();
      }
    }

    // Hat particles — lines that respond to decay
    const hatLines = [];
    class HatLine {
      constructor(x, y, decay) {
        this.x = x; this.y = y;
        const angle = Math.random() * Math.PI * 2;
        const speed = 0.5 + Math.random() * 2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        // decay controls length: tight (low) = short sharp, open (high) = long fluid
        this.len = 3 + decay * 25;
        this.life = this.maxLife = 20 + decay * 40;
        this.decay = decay;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= 0.97;
        this.vy *= 0.97;
        this.life--;
        return this.life > 0;
      }
      draw() {
        const a = (this.life / this.maxLife) * 0.6;
        const ex = this.x + this.vx * this.len;
        const ey = this.y + this.vy * this.len;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(ex, ey);
        ctx.strokeStyle = `rgba(224,224,224,${a})`;
        ctx.lineWidth = this.decay > 0.5 ? 1 : 0.5;
        ctx.stroke();
      }
    }

    // Diagonal flashes (rimshots)
    const flashes = [];
    class DiagFlash {
      constructor() {
        const side = Math.random();
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.angle = -0.3 + Math.random() * 0.6 + (Math.random() > 0.5 ? Math.PI/4 : -Math.PI/4);
        this.len = 60 + Math.random() * 140;
        this.life = this.maxLife = 8 + Math.random() * 6;
      }
      update() { this.life--; return this.life > 0; }
      draw() {
        const a = (this.life / this.maxLife) * 0.25;
        const dx = Math.cos(this.angle) * this.len;
        const dy = Math.sin(this.angle) * this.len;
        ctx.beginPath();
        ctx.moveTo(this.x - dx/2, this.y - dy/2);
        ctx.lineTo(this.x + dx/2, this.y + dy/2);
        ctx.strokeStyle = `rgba(224,224,224,${a})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }

    // ── STATE ──
    let analyser, freqData, waveData;
    let playing = false;
    let kickPulse = 0;     // 0-1, decays
    let kickZoom = 1;
    let sectionDensity = 0.15;
    let targetDensity = 0.15;
    let hatDecayValue = 0;
    let globalTime = 0;

    // ── RENDER LOOP ──
    function draw() {
      requestAnimationFrame(draw);
      globalTime++;

      // Smooth density transition
      sectionDensity += (targetDensity - sectionDensity) * 0.02;

      // Background — fade with slight trail
      const fadeAlpha = 0.12 + (1 - sectionDensity) * 0.1;
      ctx.fillStyle = `rgba(10,10,18,${fadeAlpha})`;
      ctx.fillRect(0, 0, W, H);

      // Kick pulse decay
      kickPulse *= 0.88;
      kickZoom += (1 - kickZoom) * 0.08;

      if (analyser) {
        analyser.getByteFrequencyData(freqData);
        analyser.getByteTimeDomainData(waveData);

        // ── ENERGY DETECTION ──
        let lowSum = 0, midSum = 0, highSum = 0;
        for (let i = 0; i < 6; i++) lowSum += freqData[i];
        for (let i = 8; i < 20; i++) midSum += freqData[i];
        for (let i = 25; i < 70; i++) highSum += freqData[i];
        const kickRaw = lowSum / (6 * 255);
        const midRaw = midSum / (12 * 255);
        const hatRaw = highSum / (45 * 255);

        // Kick detection
        if (kickRaw > 0.45) {
          kickPulse = Math.min(1, kickRaw);
          kickZoom = 1 + kickPulse * 0.03;
        }

        // Hat decay tracking
        hatDecayValue += (hatRaw - hatDecayValue) * 0.2;

        // Apply zoom
        ctx.save();
        ctx.translate(cx, cy);
        ctx.scale(kickZoom, kickZoom);
        ctx.translate(-cx, -cy);

        // ── KICK FLASH — subtle full-screen pulse ──
        if (kickPulse > 0.2) {
          ctx.fillStyle = `rgba(255,140,0,${kickPulse * 0.04})`;
          ctx.fillRect(0, 0, W, H);
        }

        // ── CENTRAL OSCILLOSCOPE ──
        const scopeWidth = W * 0.55;
        const scopeY = cy;
        const sliceCount = analyser.fftSize;

        ctx.beginPath();
        for (let i = 0; i < sliceCount; i++) {
          const t = i / sliceCount;
          const x = cx - scopeWidth/2 + t * scopeWidth;
          const val = (waveData[i] - 128) / 128;
          const y = scopeY + val * 50 * (1 + sectionDensity);
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.strokeStyle = `rgba(255,140,0,${0.35 + kickPulse * 0.4})`;
        ctx.lineWidth = 1;
        ctx.stroke();

        // Second pass — thinner ghost line, slightly offset
        ctx.beginPath();
        for (let i = 0; i < sliceCount; i++) {
          const t = i / sliceCount;
          const x = cx - scopeWidth/2 + t * scopeWidth;
          const val = (waveData[i] - 128) / 128;
          const y = scopeY + val * 50 * (1 + sectionDensity) + 2;
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.strokeStyle = `rgba(255,140,0,${0.1 + kickPulse * 0.15})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();

        // ── MINIMAL FREQUENCY DOTS ──
        // Sparse dots along a horizontal line below scope
        const dotY = cy + 80;
        const dotCount = 32;
        const dotSpan = W * 0.5;
        for (let i = 0; i < dotCount; i++) {
          const freqIdx = Math.floor(i * (freqData.length * 0.5 / dotCount));
          const val = freqData[freqIdx] / 255;
          if (val < 0.1) continue;
          const x = cx - dotSpan/2 + (i / dotCount) * dotSpan;
          const r = 0.5 + val * 2 * sectionDensity;
          ctx.beginPath();
          ctx.arc(x, dotY, r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(224,224,224,${val * 0.4})`;
          ctx.fill();
        }

        // ── UPPER FREQUENCY LINE (mirror) ──
        const dotY2 = cy - 80;
        for (let i = 0; i < dotCount; i++) {
          const freqIdx = Math.floor(i * (freqData.length * 0.5 / dotCount));
          const val = freqData[freqIdx] / 255;
          if (val < 0.15) continue;
          const x = cx - dotSpan/2 + (i / dotCount) * dotSpan;
          const r = 0.3 + val * 1.5 * sectionDensity;
          ctx.beginPath();
          ctx.arc(x, dotY2, r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(224,224,224,${val * 0.25})`;
          ctx.fill();
        }

        // ── HAT PARTICLES ──
        // Spawn based on hat energy, shape based on decay
        if (hatRaw > 0.15) {
          const count = Math.floor(1 + sectionDensity * 4 * hatRaw);
          for (let i = 0; i < count; i++) {
            const x = cx + (Math.random() - 0.5) * scopeWidth * 0.8;
            const y = cy + (Math.random() - 0.5) * 60;
            hatLines.push(new HatLine(x, y, hatDecayValue));
          }
        }

        // ── OPEN HAT RINGS ──
        if (hatRaw > 0.4 && hatDecayValue > 0.3) {
          const rx = cx + (Math.random() - 0.5) * W * 0.3;
          const ry = cy + (Math.random() - 0.5) * H * 0.2;
          rings.push(new Ring(rx, ry));
        }

        // ── RIMSHOT / MID FLASHES ──
        if (midRaw > 0.35 && Math.random() < sectionDensity * 0.4) {
          flashes.push(new DiagFlash());
        }

        ctx.restore();
      }

      // ── DRAW ELEMENTS ──
      for (let i = rings.length - 1; i >= 0; i--) {
        rings[i].draw();
        if (!rings[i].update()) rings.splice(i, 1);
      }
      for (let i = hatLines.length - 1; i >= 0; i--) {
        hatLines[i].draw();
        if (!hatLines[i].update()) hatLines.splice(i, 1);
      }
      for (let i = flashes.length - 1; i >= 0; i--) {
        flashes[i].draw();
        if (!flashes[i].update()) flashes.splice(i, 1);
      }

      // ── HORIZONTAL REFERENCE LINES (very subtle) ──
      if (playing) {
        ctx.strokeStyle = `rgba(224,224,224,0.03)`;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(cx - W * 0.3, cy);
        ctx.lineTo(cx + W * 0.3, cy);
        ctx.stroke();
      }
    }

    draw();

    // ── PLAY ──
    document.getElementById('start-prompt').addEventListener('click', async () => {
      const overlay = document.getElementById('overlay');
      const prompt = document.getElementById('start-prompt');
      const labelEl = document.getElementById('section-label');

      if (playing) return;
      prompt.textContent = 'RENDERING';

      try {
        const engine = new JT90Engine();
        const sectionBuffers = [];

        for (const section of sections) {
          engine.setPattern(patterns[section.pattern]);
          const buffer = await engine.renderPattern({
            bars: section.bars,
            bpm: 130,
            automation: automations[section.pattern],
          });
          sectionBuffers.push(buffer);
        }

        const totalLength = sectionBuffers.reduce((sum, b) => sum + b.length, 0);
        const audioCtx = new AudioContext();
        const fullBuffer = audioCtx.createBuffer(1, totalLength, sectionBuffers[0].sampleRate);
        const channel = fullBuffer.getChannelData(0);
        let offset = 0;
        for (const buf of sectionBuffers) {
          channel.set(buf.getChannelData(0), offset);
          offset += buf.length;
        }

        // Analyser
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 1024;
        analyser.smoothingTimeConstant = 0.75;
        freqData = new Uint8Array(analyser.frequencyBinCount);
        waveData = new Uint8Array(analyser.fftSize);

        const source = audioCtx.createBufferSource();
        source.buffer = fullBuffer;
        source.connect(analyser);
        analyser.connect(audioCtx.destination);
        source.start();

        overlay.classList.add('hidden');
        playing = true;

        // Section tracking
        const stepMs = (60 / 130 / 4) * 1000;
        let step = 0;
        let sectionIdx = 0;
        let sectionStart = 0;

        const iv = setInterval(() => {
          while (sectionIdx < sections.length - 1 &&
                 step >= sectionStart + sections[sectionIdx].bars * 16) {
            sectionStart += sections[sectionIdx].bars * 16;
            sectionIdx++;
          }
          labelEl.textContent = sections[sectionIdx].label;
          targetDensity = sections[sectionIdx].density;
          step++;
          if (step >= 32 * 16) clearInterval(iv);
        }, stepMs);

        source.onended = () => {
          clearInterval(iv);
          playing = false;
          analyser = null;
          targetDensity = 0;
          labelEl.textContent = '';
          overlay.classList.remove('hidden');
          prompt.textContent = '▶ REPLAY';
        };

      } catch (err) {
        prompt.textContent = '▶ PLAY';
        console.error(err);
      }
    });
  </script>
</body>
</html>
