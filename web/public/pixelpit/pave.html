<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>PAVE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #f8fafc; overflow: hidden; touch-action: none; font-family: monospace; }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    let W, H, safeTop = 0;
    function resize() {
      canvas.width = window.innerWidth; canvas.height = window.innerHeight;
      W = canvas.width; H = canvas.height;
      safeTop = parseInt(getComputedStyle(document.documentElement).getPropertyValue('env(safe-area-inset-top)')) || 0;
    }
    resize();
    window.addEventListener('resize', resize);

    // --- PLAYROOM THEME ---
    const T = {
      bg: '#f8fafc',
      ghost: '#e2e8f0',
      solid: '#a3e635',
      solidBorder: '#65a30d',
      dot: '#22d3ee',
      dotGlow: '#06b6d4',
      player: '#1e293b',
      text: '#1e293b',
      muted: '#94a3b8',
      danger: '#ef4444',
      gold: '#facc15',
    };

    // --- AUDIO ---
    let audioCtx;
    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playBounce(pitch) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
      osc.connect(g); g.connect(audioCtx.destination);
      osc.type = 'sine'; osc.frequency.value = pitch || 440;
      g.gain.setValueAtTime(0.12, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
      osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function playCollect() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
      osc.connect(g); g.connect(audioCtx.destination);
      osc.type = 'sine'; osc.frequency.value = 880;
      g.gain.setValueAtTime(0.1, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
      osc.start(); osc.stop(audioCtx.currentTime + 0.08);
    }

    function playSolidify() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
      osc.connect(g); g.connect(audioCtx.destination);
      osc.type = 'square';
      osc.frequency.setValueAtTime(330, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(500, audioCtx.currentTime + 0.1);
      g.gain.setValueAtTime(0.1, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
      osc.start(); osc.stop(audioCtx.currentTime + 0.18);
    }

    function playFallThrough() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
      osc.connect(g); g.connect(audioCtx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(300, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.3);
      g.gain.setValueAtTime(0.1, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
      osc.start(); osc.stop(audioCtx.currentTime + 0.35);
    }

    // --- CONSTANTS ---
    const BOUNCE_VY = -650;
    const GRAVITY = 1400;
    const PLAT_W = 70;
    const PLAT_H = 12;
    const PLAT_SPACING_MIN = 60;
    const PLAT_SPACING_MAX = 100;
    const PLAYER_R = 10;
    const DOT_R = 8;

    // --- STATE ---
    let player, platforms, dots, particles;
    let cameraY, score, maxHeight, dots_count;
    let phase; // 'start', 'playing', 'dead', 'over'
    let gameTime, deadTimer, bestScore;
    let dragActive, dragX;
    let screenShake;

    // --- TUTORIAL STATE ---
    let tutStep, tutSuccess, tutSuccessTimer, tutBounces, tutDotsCollected, tutFellThrough, tutScore;

    const TUT_STEPS = [
      {
        name: 'BOUNCE & STEER',
        instruction: 'DRAG TO STEER MID-AIR',
        setup() {
          player = { x: W / 2, y: 0, vx: 0, vy: 0 };
          platforms = []; dots = []; particles = [];
          cameraY = 0; tutBounces = 0; dots_count = 99;
          // 3 solid platforms staggered left-center-right
          platforms.push({ x: W / 2, y: 50, w: PLAT_W * 1.5, solid: true, flash: 0 });
          platforms.push({ x: W * 0.3, y: -40, w: PLAT_W * 1.3, solid: true, flash: 0 });
          platforms.push({ x: W * 0.7, y: -130, w: PLAT_W * 1.3, solid: true, flash: 0 });
          platforms.push({ x: W * 0.4, y: -220, w: PLAT_W * 1.3, solid: true, flash: 0 });
        },
        check() { return tutBounces >= 3; },
      },
      {
        name: 'COLLECT DOTS',
        instruction: 'FLY THROUGH CYAN DOTS',
        setup() {
          player = { x: W / 2, y: 0, vx: 0, vy: 0 };
          platforms = []; dots = []; particles = [];
          cameraY = 0; tutDotsCollected = 0; dots_count = 0;
          // platforms with dots between them
          platforms.push({ x: W / 2, y: 50, w: PLAT_W * 1.5, solid: true, flash: 0 });
          platforms.push({ x: W * 0.35, y: -50, w: PLAT_W * 1.3, solid: true, flash: 0 });
          dots.push({ x: W * 0.45, y: -10, alive: true, pulse: 0 });
          platforms.push({ x: W * 0.65, y: -150, w: PLAT_W * 1.3, solid: true, flash: 0 });
          dots.push({ x: W * 0.5, y: -100, alive: true, pulse: 1 });
          platforms.push({ x: W * 0.4, y: -250, w: PLAT_W * 1.3, solid: true, flash: 0 });
          dots.push({ x: W * 0.55, y: -200, alive: true, pulse: 2 });
        },
        check() { return tutDotsCollected >= 3; },
      },
      {
        name: 'BUILD YOUR PATH',
        instruction: 'DOTS SOLIDIFY GHOST PLATFORMS',
        setup() {
          player = { x: W / 2, y: 0, vx: 0, vy: 0 };
          platforms = []; dots = []; particles = [];
          cameraY = 0; dots_count = 0;
          // solid start, dot, then ghost platform
          platforms.push({ x: W / 2, y: 50, w: PLAT_W * 1.5, solid: true, flash: 0 });
          dots.push({ x: W / 2, y: -10, alive: true, pulse: 0 });
          platforms.push({ x: W * 0.5, y: -70, w: PLAT_W * 1.3, solid: false, flash: 0 });
          // second ghost above with another dot
          dots.push({ x: W * 0.4, y: -110, alive: true, pulse: 1 });
          platforms.push({ x: W * 0.45, y: -170, w: PLAT_W * 1.3, solid: false, flash: 0 });
        },
        check() {
          return platforms.filter(p => p.solid).length >= 3; // start + 2 solidified
        },
      },
      {
        name: 'NO DOTS = DANGER',
        instruction: 'EMPTY? YOU FALL THROUGH',
        setup() {
          player = { x: W / 2, y: 0, vx: 0, vy: 0 };
          platforms = []; dots = []; particles = [];
          cameraY = 0; dots_count = 0; tutFellThrough = false;
          // solid start
          platforms.push({ x: W / 2, y: 50, w: PLAT_W * 1.5, solid: true, flash: 0 });
          // ghost above (will fall through with 0 dots)
          platforms.push({ x: W / 2, y: -40, w: PLAT_W * 1.3, solid: false, flash: 0 });
          // solid safety net below
          platforms.push({ x: W / 2, y: 150, w: W, solid: true, flash: 0 });
          // dot and ghost after safety bounce
          dots.push({ x: W * 0.5, y: 90, alive: true, pulse: 0 });
          platforms.push({ x: W * 0.5, y: -40, w: PLAT_W * 1.3, solid: false, flash: 0 });
        },
        check() { return tutFellThrough && platforms.some(p => p.solid && p.y < 0); },
      },
      {
        name: 'CLIMB!',
        instruction: 'REACH HEIGHT 15',
        setup() {
          // mini real game
          player = { x: W / 2, y: 0, vx: 0, vy: 0 };
          platforms = []; dots = []; particles = [];
          cameraY = 0; score = 0; maxHeight = 0; dots_count = 2;
          gameTime = 0; spawnTimer = 0;
          platforms.push({ x: W / 2, y: 50, w: PLAT_W * 1.5, solid: true, flash: 0 });
          let lastY = 50;
          for (let i = 0; i < 20; i++) {
            lastY -= PLAT_SPACING_MIN + Math.random() * (PLAT_SPACING_MAX - PLAT_SPACING_MIN) * 0.8;
            const x = 40 + Math.random() * (W - 80);
            platforms.push({ x, y: lastY, w: PLAT_W, solid: false, flash: 0 });
            if (Math.random() < 0.7) {
              dots.push({ x: x + (Math.random() - 0.5) * 60, y: lastY - 25 - Math.random() * 30, alive: true, pulse: Math.random() * 6 });
            }
          }
        },
        check() { return score >= 15; },
      },
    ];

    function init() {
      player = { x: W / 2, y: 0, vx: 0, vy: 0 };
      platforms = [];
      dots = [];
      particles = [];
      cameraY = 0;
      score = 0;
      maxHeight = 0;
      dots_count = 1;
      phase = 'start';
      gameTime = 0;
      deadTimer = 0;
      dragActive = false;
      dragX = 0;
      screenShake = { timer: 0, intensity: 0 };
      tutStep = 0; tutSuccess = false; tutSuccessTimer = 0;
      bestScore = parseInt(localStorage.getItem('pave_best') || '0');

      // Generate initial platforms
      // First platform is solid (starting platform)
      platforms.push({ x: W / 2, y: 50, w: PLAT_W * 1.5, solid: true, flash: 0 });

      // Generate upward
      let lastY = 50;
      for (let i = 0; i < 30; i++) {
        lastY -= PLAT_SPACING_MIN + Math.random() * (PLAT_SPACING_MAX - PLAT_SPACING_MIN);
        const x = 30 + Math.random() * (W - 60);
        platforms.push({ x, y: lastY, w: PLAT_W, solid: false, flash: 0 });

        // Place a dot near some platforms (60% chance)
        if (Math.random() < 0.6) {
          const dotX = x + (Math.random() - 0.5) * 80;
          const dotY = lastY - 20 - Math.random() * 40;
          dots.push({ x: dotX, y: dotY, alive: true, pulse: Math.random() * Math.PI * 2 });
        }
      }
    }

    // --- PLATFORM GENERATION ---
    function generateAbove() {
      const target = cameraY - H * 1.5;
      while (true) {
        const highest = platforms.reduce((min, p) => Math.min(min, p.y), Infinity);
        if (highest <= target) break;

        const newY = highest - PLAT_SPACING_MIN - Math.random() * (PLAT_SPACING_MAX - PLAT_SPACING_MIN);
        const x = 30 + Math.random() * (W - 60);

        // Difficulty: platforms get narrower and gaps wider as score increases
        const diffMult = Math.min(score / 50, 1);
        const platW = PLAT_W - diffMult * 15;

        platforms.push({ x, y: newY, w: platW, solid: false, flash: 0 });

        // Dots — spawn rate decreases with difficulty (scarcity)
        const dotChance = 0.65 - diffMult * 0.15;
        if (Math.random() < dotChance) {
          const dotX = x + (Math.random() - 0.5) * 80;
          const dotY = newY - 20 - Math.random() * 40;
          dots.push({ x: dotX, y: dotY, alive: true, pulse: Math.random() * Math.PI * 2 });
        }
      }
    }

    // --- PARTICLES ---
    function spawnParticles(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 40 + Math.random() * 80;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1, color,
          size: 2 + Math.random() * 3,
        });
      }
    }

    // --- INPUT ---
    let lastTapY = 0;
    function handleStart(x, y) {
      initAudio();
      lastTapY = y || 0;
      if (phase === 'start') {
        // Check TUTORIAL button
        const tutBtnY = H / 2 + 105 + (bestScore > 0 ? 25 : 0);
        if (x >= W / 2 - 80 && x <= W / 2 + 80 && lastTapY >= tutBtnY - 18 && lastTapY <= tutBtnY + 18) {
          startTutorial(); return;
        }
        phase = 'playing'; player.vy = BOUNCE_VY; return;
      }
      if (phase === 'over') { init(); return; }
      if (phase === 'tutorial') {
        if (x >= W - 80 && lastTapY <= 50 + safeTop) { skipTutorial(); return; }
      }
      dragActive = true;
      dragX = x;
    }

    function handleMove(x) {
      if (!dragActive || phase !== 'playing') return;
      const dx = x - dragX;
      player.vx = dx * 15; // responsive steering
      dragX = x;
    }

    function handleEnd() {
      dragActive = false;
    }

    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      handleStart(e.touches[0].clientX, e.touches[0].clientY);
    });
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      handleMove(e.touches[0].clientX);
    });
    canvas.addEventListener('touchend', handleEnd);
    canvas.addEventListener('mousedown', (e) => handleStart(e.clientX, e.clientY));
    canvas.addEventListener('mousemove', (e) => { if (dragActive) handleMove(e.clientX); });
    canvas.addEventListener('mouseup', handleEnd);

    // --- TUTORIAL ---
    function startTutorial() {
      phase = 'tutorial';
      tutStep = 0; tutSuccess = false; tutSuccessTimer = 0;
      score = 0; gameTime = 0;
      screenShake = { timer: 0, intensity: 0 };
      TUT_STEPS[0].setup();
      player.vy = BOUNCE_VY;
    }

    function advanceTutorial() {
      tutStep++;
      tutSuccess = false; tutSuccessTimer = 0;
      if (tutStep >= TUT_STEPS.length) {
        // start real game
        phase = 'playing';
        player = { x: W / 2, y: 0, vx: 0, vy: 0 };
        platforms = []; dots = []; particles = [];
        cameraY = 0; score = 0; maxHeight = 0; dots_count = 1;
        gameTime = 0; deadTimer = 0;
        platforms.push({ x: W / 2, y: 50, w: PLAT_W * 1.5, solid: true, flash: 0 });
        let lastY = 50;
        for (let i = 0; i < 30; i++) {
          lastY -= PLAT_SPACING_MIN + Math.random() * (PLAT_SPACING_MAX - PLAT_SPACING_MIN);
          const x = 30 + Math.random() * (W - 60);
          platforms.push({ x, y: lastY, w: PLAT_W, solid: false, flash: 0 });
          if (Math.random() < 0.6) {
            dots.push({ x: x + (Math.random() - 0.5) * 80, y: lastY - 20 - Math.random() * 40, alive: true, pulse: Math.random() * Math.PI * 2 });
          }
        }
        player.vy = BOUNCE_VY;
        return;
      }
      TUT_STEPS[tutStep].setup();
      player.vy = BOUNCE_VY;
    }

    function skipTutorial() {
      phase = 'playing';
      player = { x: W / 2, y: 0, vx: 0, vy: 0 };
      platforms = []; dots = []; particles = [];
      cameraY = 0; score = 0; maxHeight = 0; dots_count = 1;
      gameTime = 0; deadTimer = 0;
      platforms.push({ x: W / 2, y: 50, w: PLAT_W * 1.5, solid: true, flash: 0 });
      let lastY = 50;
      for (let i = 0; i < 30; i++) {
        lastY -= PLAT_SPACING_MIN + Math.random() * (PLAT_SPACING_MAX - PLAT_SPACING_MIN);
        const x = 30 + Math.random() * (W - 60);
        platforms.push({ x, y: lastY, w: PLAT_W, solid: false, flash: 0 });
        if (Math.random() < 0.6) {
          dots.push({ x: x + (Math.random() - 0.5) * 80, y: lastY - 20 - Math.random() * 40, alive: true, pulse: Math.random() * Math.PI * 2 });
        }
      }
      player.vy = BOUNCE_VY;
    }

    function updateTutorial(dt) {
      gameTime += dt;

      // Physics (same as main game)
      player.vy += GRAVITY * dt;
      player.y += player.vy * dt;
      player.x += player.vx * dt;
      player.vx *= 0.88;
      if (player.x < -PLAYER_R) player.x = W + PLAYER_R;
      if (player.x > W + PLAYER_R) player.x = -PLAYER_R;

      // Collect dots
      for (const dot of dots) {
        if (!dot.alive) continue;
        const dx = player.x - dot.x, dy = player.y - dot.y;
        if (dx * dx + dy * dy < (PLAYER_R + DOT_R) * (PLAYER_R + DOT_R)) {
          dot.alive = false;
          dots_count++;
          if (tutStep === 1) tutDotsCollected++;
          playCollect();
          spawnParticles(dot.x, dot.y, T.dot, 6);
        }
      }

      // Platform collision
      if (player.vy > 0) {
        for (const plat of platforms) {
          if (player.y + PLAYER_R >= plat.y && player.y + PLAYER_R <= plat.y + PLAT_H + player.vy * dt &&
              player.x >= plat.x - plat.w / 2 - PLAYER_R * 0.5 && player.x <= plat.x + plat.w / 2 + PLAYER_R * 0.5) {
            if (plat.solid) {
              player.y = plat.y - PLAYER_R;
              player.vy = BOUNCE_VY;
              tutBounces = (tutBounces || 0) + 1;
              playBounce(440);
              spawnParticles(player.x, plat.y, T.solid, 4);
            } else if (dots_count > 0) {
              dots_count--;
              plat.solid = true;
              plat.flash = 0.3;
              player.y = plat.y - PLAYER_R;
              player.vy = BOUNCE_VY;
              tutBounces = (tutBounces || 0) + 1;
              playSolidify();
              spawnParticles(player.x, plat.y, T.solid, 8);
              screenShake = { timer: 0.06, intensity: 1.5 };
            } else {
              // Fall through ghost — step 4 teaches this
              if (tutStep === 3) {
                tutFellThrough = true;
                playFallThrough();
                screenShake = { timer: 0.1, intensity: 2 };
              }
              // Don't die in tutorial — just fall through
            }
            break;
          }
        }
      }

      // Camera
      const targetCam = player.y - H * 0.6;
      cameraY += (targetCam - cameraY) * 4 * dt;

      // Score for step 5
      if (tutStep === 4) {
        const height = Math.floor(-player.y / 10);
        if (height > maxHeight) { maxHeight = height; score = maxHeight; }
        generateAbove();
      }

      // Safety: if player falls way below, respawn on nearest solid
      if (player.y > cameraY + H + 100 && tutStep !== 4) {
        const solidPlats = platforms.filter(p => p.solid);
        if (solidPlats.length > 0) {
          const highest = solidPlats.reduce((a, b) => a.y < b.y ? a : b);
          player.x = highest.x;
          player.y = highest.y - PLAYER_R;
          player.vy = BOUNCE_VY;
          player.vx = 0;
        }
      }

      // Step 5 death recovery
      if (tutStep === 4 && player.y > cameraY + H + 50) {
        // Respawn at last solid
        const solidPlats = platforms.filter(p => p.solid);
        if (solidPlats.length > 0) {
          const best = solidPlats.reduce((a, b) => a.y < b.y ? a : b);
          player.x = best.x; player.y = best.y - PLAYER_R;
          player.vy = BOUNCE_VY; player.vx = 0;
          cameraY = player.y - H * 0.6;
        }
      }

      // Success check
      if (!tutSuccess && TUT_STEPS[tutStep].check()) {
        tutSuccess = true;
        tutSuccessTimer = 1.5;
        playBounce(880);
      }
      if (tutSuccess) {
        tutSuccessTimer -= dt;
        if (tutSuccessTimer <= 0) advanceTutorial();
      }

      // Particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 200 * dt;
        p.life -= dt * 2;
        if (p.life <= 0) particles.splice(i, 1);
      }
      for (const plat of platforms) { if (plat.flash > 0) plat.flash -= dt; }
      if (screenShake.timer > 0) screenShake.timer -= dt;

      // Cleanup below camera
      platforms = platforms.filter(p => p.y < cameraY + H + 200);
      dots = dots.filter(d => d.y < cameraY + H + 200);
    }

    function drawTutorial() {
      ctx.fillStyle = T.bg;
      ctx.fillRect(0, 0, W, H);

      const step = TUT_STEPS[tutStep];

      ctx.save();
      if (screenShake.timer > 0) {
        const s = screenShake.intensity * (screenShake.timer / 0.15);
        ctx.translate((Math.random() * 2 - 1) * s, (Math.random() * 2 - 1) * s);
      }

      // Platforms
      for (const plat of platforms) {
        const sy = plat.y - cameraY;
        if (sy < -20 || sy > H + 20) continue;
        if (plat.solid) {
          const flashAlpha = plat.flash > 0 ? plat.flash / 0.3 : 0;
          ctx.fillStyle = T.solid;
          ctx.shadowBlur = flashAlpha > 0 ? 12 : 0; ctx.shadowColor = T.solid;
          ctx.fillRect(plat.x - plat.w / 2, sy, plat.w, PLAT_H);
          ctx.shadowBlur = 0;
          ctx.strokeStyle = T.solidBorder; ctx.lineWidth = 2;
          ctx.strokeRect(plat.x - plat.w / 2, sy, plat.w, PLAT_H);
          if (flashAlpha > 0) {
            ctx.fillStyle = `rgba(255,255,255,${flashAlpha * 0.5})`;
            ctx.fillRect(plat.x - plat.w / 2, sy, plat.w, PLAT_H);
          }
        } else {
          ctx.fillStyle = T.ghost;
          ctx.globalAlpha = 0.25 + Math.sin(gameTime * 3 + plat.x) * 0.05;
          ctx.fillRect(plat.x - plat.w / 2, sy, plat.w, PLAT_H);
          ctx.globalAlpha = 1;
          ctx.strokeStyle = T.ghost; ctx.lineWidth = 1;
          ctx.setLineDash([4, 4]);
          ctx.strokeRect(plat.x - plat.w / 2, sy, plat.w, PLAT_H);
          ctx.setLineDash([]);
        }
      }

      // Dots
      for (const dot of dots) {
        if (!dot.alive) continue;
        const sy = dot.y - cameraY;
        if (sy < -20 || sy > H + 20) continue;
        dot.pulse += 0.05;
        const pulse = 1 + Math.sin(dot.pulse) * 0.15;
        const r = DOT_R * pulse;
        ctx.fillStyle = T.dot; ctx.globalAlpha = 0.3;
        ctx.beginPath(); ctx.arc(dot.x, sy, r * 2, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
        ctx.fillStyle = T.dot;
        ctx.beginPath(); ctx.arc(dot.x, sy, r, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff'; ctx.globalAlpha = 0.6;
        ctx.beginPath(); ctx.arc(dot.x - r * 0.3, sy - r * 0.3, r * 0.3, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
      }

      // Player
      const py = player.y - cameraY;
      ctx.fillStyle = 'rgba(0,0,0,0.1)';
      ctx.beginPath(); ctx.arc(player.x + 2, py + 2, PLAYER_R, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = T.player;
      ctx.beginPath(); ctx.arc(player.x, py, PLAYER_R, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#fff';
      const eyeOff = player.vx > 10 ? 2 : player.vx < -10 ? -2 : 0;
      ctx.beginPath(); ctx.arc(player.x - 3 + eyeOff, py - 2, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(player.x + 3 + eyeOff, py - 2, 2.5, 0, Math.PI * 2); ctx.fill();

      // Particles
      for (const p of particles) {
        const psy = p.y - cameraY;
        ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
        ctx.beginPath(); ctx.arc(p.x, psy, p.size, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
      }

      ctx.restore();

      // --- Tutorial HUD ---
      ctx.textAlign = 'center';

      // Step indicator
      ctx.fillStyle = T.muted; ctx.font = '12px monospace';
      ctx.fillText('TUTORIAL ' + (tutStep + 1) + ' / ' + TUT_STEPS.length, W / 2, 24 + safeTop);

      // Step name
      ctx.fillStyle = T.text; ctx.font = 'bold 20px monospace';
      ctx.fillText(step.name, W / 2, 48 + safeTop);

      // Instruction
      if (!tutSuccess) {
        ctx.fillStyle = T.muted; ctx.font = '14px monospace';
        ctx.fillText(step.instruction, W / 2, H - 40);
      }

      // Dot counter
      ctx.textAlign = 'right';
      ctx.fillStyle = dots_count > 0 ? T.dot : T.danger;
      ctx.font = 'bold 20px monospace';
      ctx.fillText(dots_count + '', W - 16, 36 + safeTop);
      ctx.fillStyle = T.muted; ctx.font = '10px monospace';
      ctx.fillText('DOTS', W - 16, 50 + safeTop);

      // Score (step 5)
      if (tutStep === 4) {
        ctx.textAlign = 'left';
        ctx.fillStyle = T.text; ctx.font = 'bold 22px monospace';
        ctx.fillText(score + ' / 15', 16, 36 + safeTop);
      }

      // Success
      if (tutSuccess) {
        const a = Math.min(1, tutSuccessTimer);
        ctx.globalAlpha = a;
        ctx.textAlign = 'center';
        ctx.fillStyle = T.solid; ctx.font = 'bold 28px monospace';
        const txt = tutStep === TUT_STEPS.length - 1 ? 'GO!' : 'NICE!';
        ctx.fillText(txt, W / 2, H / 2);
        ctx.globalAlpha = 1;
      }

      // SKIP button
      ctx.textAlign = 'right';
      ctx.fillStyle = T.muted; ctx.font = '12px monospace';
      ctx.fillText('SKIP ›', W - 16, 24 + safeTop);

      ctx.textAlign = 'left';
    }

    // --- UPDATE ---
    function update(dt) {
      if (phase === 'start') { gameTime += dt; return; }
      if (phase === 'over') return;
      if (phase === 'tutorial') { updateTutorial(dt); return; }

      if (phase === 'dead') {
        deadTimer += dt;
        player.vy += GRAVITY * dt;
        player.y += player.vy * dt;
        if (deadTimer >= 1.5) {
          phase = 'over';
          if (score > bestScore) {
            bestScore = score;
            localStorage.setItem('pave_best', bestScore.toString());
          }
        }
        return;
      }

      gameTime += dt;

      // Physics
      player.vy += GRAVITY * dt;
      player.y += player.vy * dt;
      player.x += player.vx * dt;
      player.vx *= 0.88; // drag

      // Wrap horizontally
      if (player.x < -PLAYER_R) player.x = W + PLAYER_R;
      if (player.x > W + PLAYER_R) player.x = -PLAYER_R;

      // Collect dots
      for (const dot of dots) {
        if (!dot.alive) continue;
        const dx = player.x - dot.x;
        const dy = player.y - dot.y;
        if (dx * dx + dy * dy < (PLAYER_R + DOT_R) * (PLAYER_R + DOT_R)) {
          dot.alive = false;
          dots_count++;
          playCollect();
          spawnParticles(dot.x, dot.y, T.dot, 6);
        }
      }

      // Platform collision (only when falling)
      if (player.vy > 0) {
        for (const plat of platforms) {
          const py = plat.y;
          // Check if player feet cross platform top
          if (player.y + PLAYER_R >= py && player.y + PLAYER_R <= py + PLAT_H + player.vy * dt &&
              player.x >= plat.x - plat.w / 2 - PLAYER_R * 0.5 && player.x <= plat.x + plat.w / 2 + PLAYER_R * 0.5) {

            if (plat.solid) {
              // Bounce off solid
              player.y = py - PLAYER_R;
              player.vy = BOUNCE_VY;
              playBounce(440 + score * 2);
              spawnParticles(player.x, py, T.solid, 4);
            } else {
              // Ghost platform
              if (dots_count > 0) {
                // Spend a dot, solidify
                dots_count--;
                plat.solid = true;
                plat.flash = 0.3;
                player.y = py - PLAYER_R;
                player.vy = BOUNCE_VY;
                playSolidify();
                spawnParticles(player.x, py, T.solid, 8);
                screenShake = { timer: 0.06, intensity: 1.5 };
              } else {
                // No dots — fall through
                playFallThrough();
                phase = 'dead';
                deadTimer = 0;
                screenShake = { timer: 0.15, intensity: 3 };
                return;
              }
            }
            break;
          }
        }
      }

      // Update height / score
      const height = Math.floor(-player.y / 10);
      if (height > maxHeight) {
        maxHeight = height;
        score = maxHeight;
      }

      // Camera follows player (smooth)
      const targetCam = player.y - H * 0.6;
      cameraY += (targetCam - cameraY) * 4 * dt;

      // Death: fell below camera
      if (player.y > cameraY + H + 50) {
        phase = 'dead';
        deadTimer = 0;
      }

      // Generate new platforms above
      generateAbove();

      // Cleanup below camera
      platforms = platforms.filter(p => p.y < cameraY + H + 100);
      dots = dots.filter(d => d.y < cameraY + H + 100);

      // Particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * dt; p.y += p.vy * dt;
        p.vy += 200 * dt;
        p.life -= dt * 2;
        if (p.life <= 0) particles.splice(i, 1);
      }

      // Platform flash decay
      for (const plat of platforms) {
        if (plat.flash > 0) plat.flash -= dt;
      }

      if (screenShake.timer > 0) screenShake.timer -= dt;
    }

    // --- DRAW ---
    function draw() {
      ctx.fillStyle = T.bg;
      ctx.fillRect(0, 0, W, H);

      if (phase === 'start') { drawStart(); return; }
      if (phase === 'over') { drawGameOver(); return; }
      if (phase === 'tutorial') { drawTutorial(); return; }

      ctx.save();
      if (screenShake.timer > 0) {
        const s = screenShake.intensity * (screenShake.timer / 0.15);
        ctx.translate((Math.random() * 2 - 1) * s, (Math.random() * 2 - 1) * s);
      }

      // Platforms
      for (const plat of platforms) {
        const sy = plat.y - cameraY;
        if (sy < -20 || sy > H + 20) continue;

        if (plat.solid) {
          // Flash effect on recent solidify
          const flashAlpha = plat.flash > 0 ? plat.flash / 0.3 : 0;

          ctx.fillStyle = T.solid;
          ctx.shadowBlur = flashAlpha > 0 ? 12 : 0;
          ctx.shadowColor = T.solid;
          ctx.fillRect(plat.x - plat.w / 2, sy, plat.w, PLAT_H);
          ctx.shadowBlur = 0;

          // Border
          ctx.strokeStyle = T.solidBorder;
          ctx.lineWidth = 2;
          ctx.strokeRect(plat.x - plat.w / 2, sy, plat.w, PLAT_H);

          if (flashAlpha > 0) {
            ctx.fillStyle = `rgba(255,255,255,${flashAlpha * 0.5})`;
            ctx.fillRect(plat.x - plat.w / 2, sy, plat.w, PLAT_H);
          }
        } else {
          // Ghost platform
          ctx.fillStyle = T.ghost;
          ctx.globalAlpha = 0.25 + Math.sin(gameTime * 3 + plat.x) * 0.05;
          ctx.fillRect(plat.x - plat.w / 2, sy, plat.w, PLAT_H);
          ctx.globalAlpha = 1;

          // Dashed border
          ctx.strokeStyle = T.ghost;
          ctx.lineWidth = 1;
          ctx.setLineDash([4, 4]);
          ctx.strokeRect(plat.x - plat.w / 2, sy, plat.w, PLAT_H);
          ctx.setLineDash([]);
        }
      }

      // Dots
      for (const dot of dots) {
        if (!dot.alive) continue;
        const sy = dot.y - cameraY;
        if (sy < -20 || sy > H + 20) continue;

        dot.pulse += 0.05;
        const pulse = 1 + Math.sin(dot.pulse) * 0.15;
        const r = DOT_R * pulse;

        // Glow
        ctx.fillStyle = T.dot;
        ctx.globalAlpha = 0.3;
        ctx.beginPath(); ctx.arc(dot.x, sy, r * 2, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;

        // Core
        ctx.fillStyle = T.dot;
        ctx.beginPath(); ctx.arc(dot.x, sy, r, 0, Math.PI * 2); ctx.fill();

        // Shine
        ctx.fillStyle = '#fff';
        ctx.globalAlpha = 0.6;
        ctx.beginPath(); ctx.arc(dot.x - r * 0.3, sy - r * 0.3, r * 0.3, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
      }

      // Player
      const py = player.y - cameraY;
      if (phase !== 'dead' || deadTimer < 1.5) {
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        ctx.beginPath(); ctx.arc(player.x + 2, py + 2, PLAYER_R, 0, Math.PI * 2); ctx.fill();

        // Body
        ctx.fillStyle = T.player;
        ctx.beginPath(); ctx.arc(player.x, py, PLAYER_R, 0, Math.PI * 2); ctx.fill();

        // Eyes (two white dots)
        ctx.fillStyle = '#fff';
        const eyeOff = player.vx > 10 ? 2 : player.vx < -10 ? -2 : 0;
        ctx.beginPath(); ctx.arc(player.x - 3 + eyeOff, py - 2, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(player.x + 3 + eyeOff, py - 2, 2.5, 0, Math.PI * 2); ctx.fill();
      }

      // Particles
      for (const p of particles) {
        const psy = p.y - cameraY;
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.beginPath(); ctx.arc(p.x, psy, p.size, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
      }

      ctx.restore();

      // --- HUD ---
      const hy = safeTop;

      // Score (top left)
      ctx.fillStyle = T.text;
      ctx.font = 'bold 28px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(score + '', 16, 36 + hy);

      // Dot counter (top right)
      ctx.textAlign = 'right';
      ctx.fillStyle = dots_count > 0 ? T.dot : T.danger;
      ctx.font = 'bold 22px monospace';
      ctx.fillText(dots_count + '', W - 16, 36 + hy);
      ctx.fillStyle = T.muted;
      ctx.font = '10px monospace';
      ctx.fillText('DOTS', W - 16, 50 + hy);

      // Danger flash when low on dots
      if (dots_count <= 1 && phase === 'playing') {
        ctx.strokeStyle = T.danger;
        ctx.lineWidth = 2;
        ctx.globalAlpha = 0.2 + Math.sin(gameTime * 6) * 0.15;
        ctx.strokeRect(2, 2, W - 4, H - 4);
        ctx.globalAlpha = 1;
      }

      ctx.textAlign = 'left';
    }

    function drawStart() {
      ctx.fillStyle = T.bg;
      ctx.fillRect(0, 0, W, H);
      ctx.textAlign = 'center';

      // Animated player bob
      const bobY = Math.sin(gameTime * 2) * 8;

      // Ghost platform
      ctx.fillStyle = T.ghost;
      ctx.globalAlpha = 0.4;
      ctx.fillRect(W / 2 - 40, H / 2 + 20, 80, PLAT_H);
      ctx.globalAlpha = 1;

      // Player on platform
      ctx.fillStyle = T.player;
      ctx.beginPath(); ctx.arc(W / 2, H / 2 + 10 + bobY, PLAYER_R, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(W / 2 - 3, H / 2 + 8 + bobY, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(W / 2 + 3, H / 2 + 8 + bobY, 2.5, 0, Math.PI * 2); ctx.fill();

      // Dot above
      const dotPulse = 1 + Math.sin(gameTime * 3) * 0.15;
      ctx.fillStyle = T.dot;
      ctx.beginPath(); ctx.arc(W / 2 + 30, H / 2 - 30, DOT_R * dotPulse, 0, Math.PI * 2); ctx.fill();

      // Title
      ctx.fillStyle = T.text;
      ctx.font = 'bold 48px monospace';
      ctx.fillText('PAVE', W / 2, H / 2 - 70);

      ctx.fillStyle = T.muted;
      ctx.font = '14px monospace';
      ctx.fillText('collect dots to build your path', W / 2, H / 2 - 45);
      ctx.fillText('drag to steer', W / 2, H / 2 - 28);

      ctx.fillStyle = T.text;
      ctx.font = '18px monospace';
      ctx.fillText('[ TAP TO START ]', W / 2, H / 2 + 70);

      if (bestScore > 0) {
        ctx.fillStyle = T.muted;
        ctx.font = '14px monospace';
        ctx.fillText('Best: ' + bestScore, W / 2, H / 2 + 100);
      }

      // TUTORIAL button
      ctx.fillStyle = T.muted;
      ctx.font = '14px monospace';
      ctx.fillText('[ TUTORIAL ]', W / 2, H / 2 + 105 + (bestScore > 0 ? 25 : 0));

      ctx.textAlign = 'left';
    }

    function drawGameOver() {
      ctx.fillStyle = T.bg;
      ctx.fillRect(0, 0, W, H);
      ctx.textAlign = 'center';

      ctx.fillStyle = T.muted;
      ctx.font = '14px monospace';
      ctx.fillText('GAME OVER', W / 2, H / 2 - 70);

      ctx.fillStyle = T.text;
      ctx.font = 'bold 56px monospace';
      ctx.fillText(score + '', W / 2, H / 2 - 20);

      if (score >= bestScore && score > 0) {
        ctx.fillStyle = T.gold;
        ctx.font = 'bold 16px monospace';
        ctx.fillText('NEW RECORD!', W / 2, H / 2 + 5);
      }

      ctx.fillStyle = T.muted;
      ctx.font = '14px monospace';
      ctx.fillText('Best: ' + bestScore, W / 2, H / 2 + 28);

      ctx.fillStyle = T.text;
      ctx.font = '18px monospace';
      ctx.fillText('[ TAP TO RETRY ]', W / 2, H / 2 + 70);

      ctx.textAlign = 'left';
    }

    // --- LOOP ---
    let lastTime = performance.now();
    init();

    function loop(ts) {
      const dt = Math.min((ts - lastTime) / 1000, 0.05);
      lastTime = ts;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
</html>
