<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>GLINT</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #09090b; overflow: hidden; touch-action: none; font-family: monospace; }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    let W, H, safeTop = 0;
    function resize() {
      canvas.width = window.innerWidth; canvas.height = window.innerHeight;
      W = canvas.width; H = canvas.height;
      safeTop = parseInt(getComputedStyle(document.documentElement).getPropertyValue('env(safe-area-inset-top)')) || 0;
    }
    resize();
    window.addEventListener('resize', resize);

    // --- INDIE BITE THEME ---
    const T = {
      bg: '#09090b',
      surface: '#18181b',
      border: '#27272a',
      red: '#ef4444',
      blue: '#3b82f6',
      green: '#22c55e',
      white: '#ffffff',
      gold: '#facc15',
      muted: '#71717a',
      text: '#ffffff',
      absorber: '#18181b',
    };

    // --- CONSTANTS ---
    const SHARD_R = 8;
    const SHARD_SPEED = 400;
    const HIT_FREEZE_MS = 40;
    const WALL_THICK = 12;
    const TARGET_R = 18;
    const TRAIL_MAX = 60;
    const BOUNCE_LIMIT = 20;

    // --- AUDIO ---
    let audioCtx;
    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    function unlockAudio() {
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      document.removeEventListener('touchstart', unlockAudio);
      document.removeEventListener('click', unlockAudio);
    }
    document.addEventListener('touchstart', unlockAudio);
    document.addEventListener('click', unlockAudio);

    function playBounce(color) {
      if (!audioCtx) return;
      // Red=C4(261), Blue=E4(329), Green=G4(392)
      const freq = color === 'red' ? 261.63 : color === 'blue' ? 329.63 : color === 'green' ? 392.00 : 440;
      const o = audioCtx.createOscillator(); o.type = 'triangle'; o.frequency.value = freq;
      const g = audioCtx.createGain(); g.gain.setValueAtTime(0.15, audioCtx.currentTime);
      g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
      o.connect(g).connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.3);
    }

    function playChord() {
      if (!audioCtx) return;
      [261.63, 329.63, 392.00, 523.25].forEach((freq, i) => {
        const t = audioCtx.currentTime + i * 0.05;
        const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.value = freq;
        const g = audioCtx.createGain(); g.gain.setValueAtTime(0.12, t);
        g.gain.linearRampToValueAtTime(0, t + 0.6);
        o.connect(g).connect(audioCtx.destination); o.start(t); o.stop(t + 0.6);
      });
    }

    function playPrismExplode() {
      if (!audioCtx) return;
      // Rising arpeggio
      [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
        const t = audioCtx.currentTime + i * 0.08;
        const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.value = freq;
        const g = audioCtx.createGain(); g.gain.setValueAtTime(0.1, t);
        g.gain.linearRampToValueAtTime(0, t + 0.4);
        o.connect(g).connect(audioCtx.destination); o.start(t); o.stop(t + 0.4);
      });
    }

    function playBuzz() {
      if (!audioCtx) return;
      const o = audioCtx.createOscillator(); o.type = 'sawtooth'; o.frequency.value = 80;
      const g = audioCtx.createGain(); g.gain.setValueAtTime(0.12, audioCtx.currentTime);
      g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
      o.connect(g).connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.3);
    }

    function playAbsorb() {
      if (!audioCtx) return;
      const o = audioCtx.createOscillator(); o.type = 'sine';
      o.frequency.setValueAtTime(300, audioCtx.currentTime);
      o.frequency.linearRampToValueAtTime(60, audioCtx.currentTime + 0.2);
      const g = audioCtx.createGain(); g.gain.setValueAtTime(0.1, audioCtx.currentTime);
      g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
      o.connect(g).connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.2);
    }

    function playLaunch() {
      if (!audioCtx) return;
      const o = audioCtx.createOscillator(); o.type = 'sine';
      o.frequency.setValueAtTime(200, audioCtx.currentTime);
      o.frequency.linearRampToValueAtTime(500, audioCtx.currentTime + 0.06);
      const g = audioCtx.createGain(); g.gain.setValueAtTime(0.1, audioCtx.currentTime);
      g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.08);
      o.connect(g).connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.08);
    }

    // --- LEVEL GENERATION ---
    // Wall: { x, y, w, h, color: 'red'|'blue'|'green'|'absorber'|'neutral', moving?, moveAxis?, moveRange?, moveSpeed? }
    // Target: { x, y }
    // Shard start: { x, y }

    function generateLevel(lvl) {
      const walls = [];
      const margin = 40;
      const playW = W - margin * 2;
      const playH = H - margin * 2 - safeTop;
      const ox = margin;
      const oy = margin + safeTop;

      // Arena border walls (neutral — no color)
      // We don't add border walls; shard bounces off screen edges naturally

      const colors = ['red', 'blue', 'green'];

      if (lvl <= 10) {
        // Hand-tuned feel: increasing complexity
        const numColorWalls = Math.min(3, 1 + Math.floor(lvl / 2));
        const numAbsorbers = lvl >= 5 ? Math.min(3, Math.floor((lvl - 4) / 2)) : 0;
        const hasMoving = lvl >= 7;

        // Place colored walls
        const usedColors = [];
        for (let i = 0; i < numColorWalls; i++) {
          const color = colors[i % 3];
          usedColors.push(color);
          const isHoriz = Math.random() > 0.5;
          let wall;
          if (isHoriz) {
            wall = {
              x: ox + playW * (0.2 + Math.random() * 0.5),
              y: oy + playH * (0.2 + i * 0.25 + Math.random() * 0.1),
              w: 60 + Math.random() * 40,
              h: WALL_THICK,
              color,
            };
          } else {
            wall = {
              x: ox + playW * (0.2 + i * 0.25 + Math.random() * 0.1),
              y: oy + playH * (0.2 + Math.random() * 0.5),
              w: WALL_THICK,
              h: 60 + Math.random() * 40,
              color,
            };
          }
          if (hasMoving && i === numColorWalls - 1) {
            wall.moving = true;
            wall.moveAxis = isHoriz ? 'x' : 'y';
            wall.moveRange = 30 + Math.random() * 30;
            wall.moveSpeed = 0.8 + Math.random() * 0.6;
            wall.baseX = wall.x;
            wall.baseY = wall.y;
          }
          walls.push(wall);
        }

        // Absorbers
        for (let i = 0; i < numAbsorbers; i++) {
          const isHoriz = Math.random() > 0.5;
          walls.push({
            x: ox + playW * (0.15 + Math.random() * 0.6),
            y: oy + playH * (0.15 + Math.random() * 0.6),
            w: isHoriz ? 40 + Math.random() * 30 : WALL_THICK,
            h: isHoriz ? WALL_THICK : 40 + Math.random() * 30,
            color: 'absorber',
          });
        }

        // Always ensure all 3 colors present from lvl 3+
        if (lvl >= 3) {
          for (const c of colors) {
            if (!usedColors.includes(c)) {
              walls.push({
                x: ox + playW * (0.1 + Math.random() * 0.7),
                y: oy + playH * (0.1 + Math.random() * 0.7),
                w: Math.random() > 0.5 ? 60 + Math.random() * 30 : WALL_THICK,
                h: Math.random() > 0.5 ? WALL_THICK : 60 + Math.random() * 30,
                color: c,
              });
            }
          }
        }
      } else {
        // Endless procedural: 3 color walls + absorbers + moving
        for (let i = 0; i < 3; i++) {
          const isHoriz = Math.random() > 0.5;
          const wall = {
            x: ox + playW * (0.15 + Math.random() * 0.6),
            y: oy + playH * (0.15 + Math.random() * 0.6),
            w: isHoriz ? 50 + Math.random() * 50 : WALL_THICK,
            h: isHoriz ? WALL_THICK : 50 + Math.random() * 50,
            color: colors[i],
          };
          if (Math.random() < 0.4) {
            wall.moving = true;
            wall.moveAxis = isHoriz ? 'x' : 'y';
            wall.moveRange = 30 + Math.random() * 40;
            wall.moveSpeed = 0.8 + Math.random() * 0.8;
            wall.baseX = wall.x;
            wall.baseY = wall.y;
          }
          walls.push(wall);
        }
        const numAbs = 1 + Math.floor(Math.random() * 3);
        for (let i = 0; i < numAbs; i++) {
          const isHoriz = Math.random() > 0.5;
          walls.push({
            x: ox + playW * (0.1 + Math.random() * 0.7),
            y: oy + playH * (0.1 + Math.random() * 0.7),
            w: isHoriz ? 35 + Math.random() * 40 : WALL_THICK,
            h: isHoriz ? WALL_THICK : 35 + Math.random() * 40,
            color: 'absorber',
          });
        }
      }

      // Shard start: bottom-left area
      const shardStart = {
        x: ox + 30 + Math.random() * 40,
        y: oy + playH * 0.7 + Math.random() * (playH * 0.2),
      };

      // Target: upper-right area, away from start
      const target = {
        x: ox + playW * 0.65 + Math.random() * (playW * 0.25),
        y: oy + playH * 0.1 + Math.random() * (playH * 0.3),
      };

      // Ensure no wall overlaps shard start or target
      for (const wall of walls) {
        // Push walls away from start/target if overlapping
        const distStart = Math.hypot(wall.x + wall.w/2 - shardStart.x, wall.y + wall.h/2 - shardStart.y);
        const distTarget = Math.hypot(wall.x + wall.w/2 - target.x, wall.y + wall.h/2 - target.y);
        if (distStart < 50) { wall.y += 60; }
        if (distTarget < 50) { wall.x -= 60; }
      }

      // Par: base bounces needed (rough estimate)
      const par = Math.max(2, numColorWallsNeeded(lvl) + 1);

      return { walls, shardStart, target, par };
    }

    function numColorWallsNeeded(lvl) {
      if (lvl <= 2) return Math.min(lvl, 2);
      return 3;
    }

    // --- STATE ---
    let shard, trail, walls, target, particles;
    let level, score, bestScore, bounces, phase;
    let aimAngle, aiming, aimStart;
    let hitFreeze, freezeTimer;
    let screenShake, flashTimer, flashColor;
    let levelTimer, celebTimer;
    let shardStart, par;
    let colorsCollected; // { red, blue, green }
    let gameTime;
    let shotsThisLevel;
    let deathTimer;

    function init() {
      level = 0;
      score = 0;
      bestScore = parseInt(localStorage.getItem('glint_best') || '0');
      phase = 'start';
      shard = null;
      trail = [];
      walls = [];
      particles = [];
      target = null;
      aimAngle = 0;
      aiming = false;
      aimStart = null;
      hitFreeze = false;
      freezeTimer = 0;
      screenShake = 0;
      flashTimer = 0;
      flashColor = T.white;
      gameTime = 0;
    }

    function setupLevel(lvl) {
      level = lvl;
      const gen = generateLevel(lvl);
      walls = gen.walls;
      shardStart = gen.shardStart;
      target = gen.target;
      par = gen.par;
      bounces = 0;
      shotsThisLevel = 0;
      colorsCollected = { red: false, blue: false, green: false };
      trail = [];
      particles = [];
      shard = { x: shardStart.x, y: shardStart.y, vx: 0, vy: 0, launched: false, alive: true };
      phase = 'aiming';
      hitFreeze = false;
      freezeTimer = 0;
      flashTimer = 0;
      celebTimer = 0;
    }

    function resetShot() {
      shard = { x: shardStart.x, y: shardStart.y, vx: 0, vy: 0, launched: false, alive: true };
      trail = [];
      bounces = 0;
      colorsCollected = { red: false, blue: false, green: false };
      phase = 'aiming';
    }

    function getShardColor() {
      const r = colorsCollected.red;
      const b = colorsCollected.blue;
      const g = colorsCollected.green;
      if (r && b && g) return T.white;
      if (r && b) return '#c084fc'; // purple
      if (r && g) return '#facc15'; // yellow
      if (b && g) return '#22d3ee'; // cyan
      if (r) return T.red;
      if (b) return T.blue;
      if (g) return T.green;
      return T.white;
    }

    function isWhiteLight() {
      return colorsCollected.red && colorsCollected.blue && colorsCollected.green;
    }

    function colorsNeeded() {
      let n = 0;
      if (!colorsCollected.red) n++;
      if (!colorsCollected.blue) n++;
      if (!colorsCollected.green) n++;
      return n;
    }

    function spawnParticles(x, y, color, count, spdMult) {
      spdMult = spdMult || 1;
      for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const spd = (30 + Math.random() * 80) * spdMult;
        particles.push({
          x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
          life: 0.3 + Math.random() * 0.4, maxLife: 0.3 + Math.random() * 0.4,
          color, size: 2 + Math.random() * 3,
        });
      }
    }

    function spawnRainbow(x, y, count) {
      const colors = [T.red, T.blue, T.green, T.gold, '#c084fc', '#22d3ee', T.white];
      for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const spd = 60 + Math.random() * 120;
        particles.push({
          x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
          life: 0.5 + Math.random() * 0.5, maxLife: 0.5 + Math.random() * 0.5,
          color: colors[i % colors.length], size: 2 + Math.random() * 4,
        });
      }
    }

    // --- COLLISION ---
    function reflectShard(wall) {
      // AABB collision + reflection
      const sx = shard.x, sy = shard.y;
      const wx = wall.x, wy = wall.y, ww = wall.w, wh = wall.h;

      // Find closest point on wall rect
      const cx = Math.max(wx, Math.min(sx, wx + ww));
      const cy = Math.max(wy, Math.min(sy, wy + wh));
      const dx = sx - cx, dy = sy - cy;
      const dist = Math.hypot(dx, dy);

      if (dist > SHARD_R) return false;

      // Determine which face was hit
      const overlapX = SHARD_R - Math.abs(dx);
      const overlapY = SHARD_R - Math.abs(dy);

      if (wall.w > wall.h) {
        // Horizontal wall — reflect Y
        shard.vy = -shard.vy;
        shard.y += (dy > 0 ? 1 : -1) * (SHARD_R - Math.abs(dy) + 1);
      } else {
        // Vertical wall — reflect X
        shard.vx = -shard.vx;
        shard.x += (dx > 0 ? 1 : -1) * (SHARD_R - Math.abs(dx) + 1);
      }

      return true;
    }

    // --- TRAJECTORY PREVIEW ---
    function computeTrajectory(startX, startY, angle, maxBounces) {
      const points = [{ x: startX, y: startY }];
      let x = startX, y = startY;
      let vx = Math.cos(angle) * SHARD_SPEED;
      let vy = Math.sin(angle) * SHARD_SPEED;
      const dt = 0.002;
      let bouncesLeft = maxBounces;

      for (let step = 0; step < 600 && bouncesLeft >= 0; step++) {
        x += vx * dt;
        y += vy * dt;

        // Screen edge bounce
        if (x < SHARD_R) { x = SHARD_R; vx = -vx; bouncesLeft--; points.push({ x, y }); continue; }
        if (x > W - SHARD_R) { x = W - SHARD_R; vx = -vx; bouncesLeft--; points.push({ x, y }); continue; }
        if (y < safeTop + SHARD_R) { y = safeTop + SHARD_R; vy = -vy; bouncesLeft--; points.push({ x, y }); continue; }
        if (y > H - SHARD_R) { y = H - SHARD_R; vy = -vy; bouncesLeft--; points.push({ x, y }); continue; }

        // Wall bounce
        let bounced = false;
        for (const wall of walls) {
          const wx = wall.x, wy = wall.y, ww = wall.w, wh = wall.h;
          const cx = Math.max(wx, Math.min(x, wx + ww));
          const cy = Math.max(wy, Math.min(y, wy + wh));
          const ddx = x - cx, ddy = y - cy;
          if (Math.hypot(ddx, ddy) <= SHARD_R) {
            if (ww > wh) { vy = -vy; y += (ddy > 0 ? 1 : -1) * 2; }
            else { vx = -vx; x += (ddx > 0 ? 1 : -1) * 2; }
            bouncesLeft--;
            points.push({ x, y });
            bounced = true;
            break;
          }
        }
      }

      // Add end point
      if (points.length < 2 || (points[points.length - 1].x !== x || points[points.length - 1].y !== y)) {
        points.push({ x, y });
      }

      return points;
    }

    // --- INPUT ---
    function handleDown(e) {
      e.preventDefault();
      if (phase === 'start') {
        initAudio();
        setupLevel(1);
        return;
      }
      if (phase === 'over') {
        init();
        initAudio();
        setupLevel(1);
        return;
      }
      if (phase === 'cleared') return;
      if (phase === 'aiming') {
        const touch = e.touches ? e.touches[0] : e;
        aiming = true;
        aimStart = { x: touch.clientX, y: touch.clientY };
      }
    }

    function handleMove(e) {
      e.preventDefault();
      if (!aiming) return;
      const touch = e.touches ? e.touches[0] : e;
      const dx = touch.clientX - shard.x;
      const dy = touch.clientY - shard.y;
      aimAngle = Math.atan2(dy, dx);
    }

    function handleUp(e) {
      e.preventDefault();
      if (!aiming) return;
      aiming = false;
      if (phase === 'aiming') {
        // Launch
        shard.vx = Math.cos(aimAngle) * SHARD_SPEED;
        shard.vy = Math.sin(aimAngle) * SHARD_SPEED;
        shard.launched = true;
        phase = 'flying';
        shotsThisLevel++;
        playLaunch();
      }
    }

    canvas.addEventListener('pointerdown', handleDown);
    canvas.addEventListener('pointermove', handleMove);
    canvas.addEventListener('pointerup', handleUp);
    canvas.addEventListener('pointercancel', handleUp);

    // Keyboard
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.code === 'Enter') {
        if (phase === 'start') { initAudio(); setupLevel(1); return; }
        if (phase === 'over') { init(); initAudio(); setupLevel(1); return; }
      }
      if (e.code === 'KeyR' && (phase === 'aiming' || phase === 'flying')) {
        resetShot();
      }
    });

    // --- UPDATE ---
    let lastTime = 0;

    function update(dt) {
      if (phase === 'start' || phase === 'over') return;
      gameTime += dt;

      // Hit freeze
      if (hitFreeze) {
        freezeTimer -= dt;
        if (freezeTimer <= 0) hitFreeze = false;
        return; // freeze everything
      }

      // Moving walls
      for (const wall of walls) {
        if (wall.moving) {
          const offset = Math.sin(gameTime * wall.moveSpeed * Math.PI * 2) * wall.moveRange;
          if (wall.moveAxis === 'x') wall.x = wall.baseX + offset;
          else wall.y = wall.baseY + offset;
        }
      }

      // Shard physics
      if (phase === 'flying' && shard.alive) {
        shard.x += shard.vx * dt;
        shard.y += shard.vy * dt;

        // Trail
        trail.push({ x: shard.x, y: shard.y });
        if (trail.length > TRAIL_MAX) trail.shift();

        // Screen edge bounces
        let edgeBounced = false;
        if (shard.x < SHARD_R) { shard.x = SHARD_R; shard.vx = Math.abs(shard.vx); edgeBounced = true; }
        if (shard.x > W - SHARD_R) { shard.x = W - SHARD_R; shard.vx = -Math.abs(shard.vx); edgeBounced = true; }
        if (shard.y < safeTop + SHARD_R) { shard.y = safeTop + SHARD_R; shard.vy = Math.abs(shard.vy); edgeBounced = true; }
        if (shard.y > H - SHARD_R) { shard.y = H - SHARD_R; shard.vy = -Math.abs(shard.vy); edgeBounced = true; }
        if (edgeBounced) {
          bounces++;
          screenShake = 0.06;
          spawnParticles(shard.x, shard.y, T.muted, 3);
          playBounce('neutral');
        }

        // Wall collisions
        for (const wall of walls) {
          if (reflectShard(wall)) {
            if (wall.color === 'absorber') {
              // Death — slow-mo before game over
              phase = 'dying';
              deathTimer = 0.3;
              spawnParticles(shard.x, shard.y, T.muted, 12);
              playAbsorb();
              screenShake = 0.1;
              return;
            }

            bounces++;
            hitFreeze = true;
            freezeTimer = HIT_FREEZE_MS / 1000;
            screenShake = 0.05;

            if (wall.color === 'red' || wall.color === 'blue' || wall.color === 'green') {
              const wasNew = !colorsCollected[wall.color];
              colorsCollected[wall.color] = true;
              const wallColor = wall.color === 'red' ? T.red : wall.color === 'blue' ? T.blue : T.green;
              spawnParticles(shard.x, shard.y, wallColor, 7);
              playBounce(wall.color);

              // Check if all 3 just collected
              if (wasNew && isWhiteLight()) {
                playChord();
                flashTimer = 0.15;
                flashColor = T.white;
                screenShake = 0.1;
              }
            } else {
              spawnParticles(shard.x, shard.y, T.muted, 4);
              playBounce('neutral');
            }
            break; // one collision per frame
          }
        }

        // Target collision
        if (shard.alive) {
          const tdx = shard.x - target.x;
          const tdy = shard.y - target.y;
          if (Math.hypot(tdx, tdy) < TARGET_R + SHARD_R) {
            if (isWhiteLight()) {
              // SUCCESS
              phase = 'cleared';
              celebTimer = 0;
              // Score: par bonus
              const bounceScore = Math.max(1, (par + 2 - bounces)) * 10;
              const levelBonus = level * 5;
              score += bounceScore + levelBonus;
              spawnRainbow(target.x, target.y, 30);
              playPrismExplode();
              flashTimer = 0.2;
              flashColor = T.white;
              screenShake = 0.15;
            } else {
              // Wrong color — bounce off with buzz
              const tdist = Math.hypot(tdx, tdy);
              const nx = tdx / tdist, ny = tdy / tdist;
              shard.vx = nx * SHARD_SPEED;
              shard.vy = ny * SHARD_SPEED;
              shard.x = target.x + nx * (TARGET_R + SHARD_R + 2);
              shard.y = target.y + ny * (TARGET_R + SHARD_R + 2);
              bounces++;
              playBuzz();
              screenShake = 0.08;
              flashTimer = 0.1;
              flashColor = T.red;
              spawnParticles(target.x, target.y, T.muted, 6);
            }
          }
        }

        // Bounce limit — shot dies
        if (bounces >= BOUNCE_LIMIT && shard.alive) {
          shard.alive = false;
          // Reset shot, not game over
          resetShot();
          playBuzz();
        }
      }

      // Dying slow-mo
      if (phase === 'dying') {
        deathTimer -= dt;
        // Lerp shard color toward gray (handled in draw)
        if (deathTimer <= 0) {
          shard.alive = false;
          phase = 'over';
          if (score >= bestScore) {
            bestScore = score;
            localStorage.setItem('glint_best', bestScore);
          }
        }
        // Still update particles during dying
        for (const p of particles) {
          p.x += p.vx * dt * 0.3; p.y += p.vy * dt * 0.3;
          p.life -= dt;
        }
        particles = particles.filter(p => p.life > 0);
        if (screenShake > 0) screenShake -= dt * 2;
        return;
      }

      // Cleared timer
      if (phase === 'cleared') {
        celebTimer += dt;
        if (celebTimer > 2.2) {
          setupLevel(level + 1);
        }
      }

      // Screen shake decay
      if (screenShake > 0) screenShake -= dt * 2;
      if (flashTimer > 0) flashTimer -= dt;

      // Particles
      for (const p of particles) {
        p.x += p.vx * dt; p.y += p.vy * dt;
        p.vx *= 0.98; p.vy *= 0.98;
        p.life -= dt;
      }
      particles = particles.filter(p => p.life > 0);
    }

    // --- DRAW ---
    function draw() {
      const sx = screenShake > 0 ? (Math.random() - 0.5) * 4 : 0;
      const sy = screenShake > 0 ? (Math.random() - 0.5) * 4 : 0;
      ctx.save();
      ctx.translate(sx, sy);

      ctx.fillStyle = T.bg;
      ctx.fillRect(-10, -10, W + 20, H + 20);

      // Flash
      if (flashTimer > 0) {
        ctx.fillStyle = flashColor;
        ctx.globalAlpha = flashTimer * 3;
        ctx.fillRect(0, 0, W, H);
        ctx.globalAlpha = 1;
      }

      // Walls
      for (const wall of walls) {
        if (wall.color === 'absorber') {
          ctx.fillStyle = T.absorber;
          ctx.strokeStyle = T.muted;
          ctx.lineWidth = 1;
          ctx.fillRect(wall.x, wall.y, wall.w, wall.h);
          ctx.strokeRect(wall.x, wall.y, wall.w, wall.h);
          // Crosshatch to show danger
          ctx.strokeStyle = T.muted;
          ctx.globalAlpha = 0.3;
          const step = 8;
          ctx.beginPath();
          for (let i = 0; i < wall.w + wall.h; i += step) {
            ctx.moveTo(wall.x + Math.min(i, wall.w), wall.y + Math.max(0, i - wall.w));
            ctx.lineTo(wall.x + Math.max(0, i - wall.h), wall.y + Math.min(i, wall.h));
          }
          ctx.stroke();
          ctx.globalAlpha = 1;
        } else {
          const color = wall.color === 'red' ? T.red : wall.color === 'blue' ? T.blue : wall.color === 'green' ? T.green : T.muted;
          ctx.fillStyle = color;
          ctx.shadowColor = color;
          ctx.shadowBlur = 14;
          ctx.fillRect(wall.x, wall.y, wall.w, wall.h);
          ctx.shadowBlur = 0;
          ctx.strokeStyle = T.white;
          ctx.globalAlpha = 0.3;
          ctx.lineWidth = 1;
          ctx.strokeRect(wall.x, wall.y, wall.w, wall.h);
          ctx.globalAlpha = 1;
        }
      }

      // Target (prism)
      if (target) {
        // Rainbow shimmer
        const shimmer = gameTime * 2;
        const pr = TARGET_R + Math.sin(gameTime * 4) * 2; // pulse
        const colors = [T.red, T.gold, T.green, '#22d3ee', T.blue, '#c084fc'];
        for (let i = 0; i < 6; i++) {
          const a = (shimmer + i * Math.PI / 3);
          ctx.fillStyle = colors[i];
          ctx.globalAlpha = 0.15;
          ctx.beginPath();
          ctx.arc(target.x + Math.cos(a) * 4, target.y + Math.sin(a) * 4, pr - 2, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;

        // White border
        ctx.strokeStyle = T.white;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(target.x, target.y, pr, 0, Math.PI * 2);
        ctx.stroke();

        // Diamond shape inside
        ctx.fillStyle = T.white;
        ctx.globalAlpha = 0.2;
        ctx.beginPath();
        ctx.moveTo(target.x, target.y - pr * 0.6);
        ctx.lineTo(target.x + pr * 0.5, target.y);
        ctx.lineTo(target.x, target.y + pr * 0.6);
        ctx.lineTo(target.x - pr * 0.5, target.y);
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      // Trail
      if (trail.length > 1) {
        const color = getShardColor();
        for (let i = 1; i < trail.length; i++) {
          const alpha = 0.3 + (i / trail.length) * 0.5;
          ctx.strokeStyle = color;
          ctx.globalAlpha = alpha;
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.moveTo(trail[i - 1].x, trail[i - 1].y);
          ctx.lineTo(trail[i].x, trail[i].y);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
      }

      // Shard
      if (shard && (shard.alive || phase === 'dying') && phase !== 'start') {
        const color = phase === 'dying' ? T.muted : getShardColor();
        ctx.fillStyle = color;
        ctx.shadowColor = color;
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.arc(shard.x, shard.y, SHARD_R, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Inner glow
        ctx.fillStyle = T.white;
        ctx.globalAlpha = 0.5;
        ctx.beginPath();
        ctx.arc(shard.x - 1, shard.y - 1, SHARD_R * 0.4, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      // Aim line (first bounce preview only)
      if (phase === 'aiming' && aiming) {
        const points = computeTrajectory(shard.x, shard.y, aimAngle, 1);
        ctx.strokeStyle = getShardColor();
        ctx.globalAlpha = 0.5;
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 6]);
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) {
          ctx.lineTo(points[i].x, points[i].y);
        }
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.globalAlpha = 1;
      }

      // Particles
      for (const p of particles) {
        ctx.globalAlpha = p.life / p.maxLife;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1;

      // HUD
      if (phase !== 'start') {
        ctx.fillStyle = T.text;
        ctx.font = 'bold 16px monospace';
        ctx.textAlign = 'left';
        ctx.fillText('LVL ' + level, 12, safeTop + 24);

        ctx.textAlign = 'right';
        ctx.fillText(score, W - 12, safeTop + 24);

        // Color indicators (top center)
        const colorDots = [
          { c: T.red, collected: colorsCollected.red },
          { c: T.blue, collected: colorsCollected.blue },
          { c: T.green, collected: colorsCollected.green },
        ];
        for (let i = 0; i < 3; i++) {
          const dx = W / 2 + (i - 1) * 20;
          const dy = safeTop + 20;
          ctx.fillStyle = colorDots[i].c;
          ctx.globalAlpha = colorDots[i].collected ? 1 : 0.2;
          ctx.beginPath(); ctx.arc(dx, dy, 5, 0, Math.PI * 2); ctx.fill();
          if (colorDots[i].collected) {
            ctx.shadowColor = colorDots[i].c;
            ctx.shadowBlur = 6;
            ctx.beginPath(); ctx.arc(dx, dy, 5, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
          }
          // Label
          const labels = ['R', 'G', 'B'];
          ctx.fillStyle = colorDots[i].c;
          ctx.globalAlpha = colorDots[i].collected ? 0.8 : 0.2;
          ctx.font = '9px monospace';
          ctx.textAlign = 'center';
          ctx.fillText(labels[i], dx, dy + 14);
        }
        ctx.globalAlpha = 1;

        // Bounce count + shot + par
        if (phase === 'flying' || phase === 'cleared') {
          ctx.fillStyle = T.muted;
          ctx.font = '12px monospace';
          ctx.textAlign = 'center';
          ctx.fillText(bounces + ' bounces  PAR ' + par, W / 2, safeTop + 46);
        }
        // Shot counter
        if (phase !== 'start') {
          ctx.fillStyle = T.muted;
          ctx.font = '11px monospace';
          ctx.textAlign = 'left';
          ctx.fillText('SHOT ' + shotsThisLevel, 12, safeTop + 40);
        }
      }

      // Level cleared overlay
      if (phase === 'cleared') {
        const t = Math.min(celebTimer / 0.3, 1);
        const c1 = 1.70158, c3 = c1 + 1;
        const scale = t < 1 ? 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2) : 1;

        ctx.save();
        ctx.translate(W / 2, H / 2 - 20);
        ctx.scale(scale, scale);
        ctx.fillStyle = T.white;
        ctx.font = 'bold 28px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('REFRACTED!', 0, 0);
        ctx.restore();

        // Star rating
        const stars = bounces <= par ? 3 : bounces <= par + 2 ? 2 : 1;
        ctx.fillStyle = T.gold;
        ctx.font = '20px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('★'.repeat(stars) + '☆'.repeat(3 - stars), W / 2, H / 2 + 15);

        ctx.fillStyle = T.muted;
        ctx.font = '12px monospace';
        ctx.fillText(bounces + ' bounces (par ' + par + ')', W / 2, H / 2 + 38);
      }

      // Start screen
      if (phase === 'start') {
        // Large prism above title
        const prismY = H * 0.22;
        const prismR = 40;
        const prColors = [T.red, T.gold, T.green, '#22d3ee', T.blue, '#c084fc'];
        for (let i = 0; i < 6; i++) {
          const a = gameTime * 2 + i * Math.PI / 3;
          ctx.fillStyle = prColors[i];
          ctx.globalAlpha = 0.15;
          ctx.beginPath();
          ctx.arc(W / 2 + Math.cos(a) * 6, prismY + Math.sin(a) * 6, prismR - 4, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
        ctx.strokeStyle = T.white;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(W / 2, prismY, prismR + Math.sin(gameTime * 4) * 2, 0, Math.PI * 2);
        ctx.stroke();
        // Diamond inside
        ctx.fillStyle = T.white;
        ctx.globalAlpha = 0.2;
        ctx.beginPath();
        ctx.moveTo(W / 2, prismY - prismR * 0.5);
        ctx.lineTo(W / 2 + prismR * 0.4, prismY);
        ctx.lineTo(W / 2, prismY + prismR * 0.5);
        ctx.lineTo(W / 2 - prismR * 0.4, prismY);
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 1;

        // Decorative light rays
        ctx.globalAlpha = 0.03;
        for (let i = 0; i < 8; i++) {
          const a = gameTime * 0.3 + i * Math.PI / 4;
          ctx.strokeStyle = [T.red, T.blue, T.green, T.gold][i % 4];
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(W / 2, prismY);
          ctx.lineTo(W / 2 + Math.cos(a) * 200, prismY + Math.sin(a) * 200);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;

        ctx.fillStyle = T.white;
        ctx.font = 'bold 32px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('GLINT', W / 2, H * 0.38);

        ctx.fillStyle = T.muted;
        ctx.font = '13px monospace';
        ctx.fillText('aim the shard of light', W / 2, H * 0.38 + 26);
        ctx.fillText('bounce off colored walls', W / 2, H * 0.38 + 44);
        ctx.fillText('collect all colors → hit the prism', W / 2, H * 0.38 + 62);

        ctx.fillStyle = T.text;
        ctx.font = '15px monospace';
        ctx.fillText('TAP TO START', W / 2, H * 0.58);

        if (bestScore > 0) {
          ctx.fillStyle = T.muted;
          ctx.font = '12px monospace';
          ctx.fillText('BEST: ' + bestScore, W / 2, H * 0.58 + 25);
        }
      }

      // Game over
      if (phase === 'over') {
        ctx.fillStyle = 'rgba(9,9,11,0.85)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = T.muted;
        ctx.font = 'bold 20px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('ABSORBED', W / 2, H * 0.32);
        ctx.fillStyle = T.text;
        ctx.font = 'bold 40px monospace';
        ctx.fillText(score, W / 2, H * 0.32 + 50);
        ctx.font = '13px monospace';
        ctx.fillStyle = T.muted;
        ctx.fillText('Level ' + level, W / 2, H * 0.32 + 72);
        if (score >= bestScore && score > 0) {
          ctx.fillStyle = T.gold;
          ctx.font = '14px monospace';
          ctx.fillText('NEW RECORD', W / 2, H * 0.32 + 92);
        } else {
          ctx.fillStyle = T.muted;
          ctx.font = '12px monospace';
          ctx.fillText('BEST: ' + bestScore, W / 2, H * 0.32 + 92);
        }
        ctx.fillStyle = T.text;
        ctx.font = '15px monospace';
        ctx.fillText('TAP TO RETRY', W / 2, H * 0.6);
      }

      ctx.restore();
    }

    // --- LOOP ---
    function gameLoop(timestamp) {
      const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
      lastTime = timestamp;
      update(dt);
      draw();
      requestAnimationFrame(gameLoop);
    }

    init();
    requestAnimationFrame((t) => { lastTime = t; gameLoop(t); });
  </script>
</body>
</html>
