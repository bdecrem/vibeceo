<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Das Kollektiv #006</title>
<meta property="og:title" content="Das Kollektiv #006">
<meta property="og:description" content="Plastikman-style minimal. The filter is the composition. 126 BPM. C minor.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Das Kollektiv #006">
<meta name="twitter:description" content="The filter is the composition. Ghost bars. The 1% rule.">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050505; overflow: hidden;
    font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
    cursor: crosshair;
  }
  canvas { position: fixed; top: 0; left: 0; }
  #overlay {
    position: fixed; inset: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  #play-btn {
    width: 56px; height: 56px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.3);
    font-size: 18px; cursor: pointer; pointer-events: auto;
    transition: all 0.4s;
    display: flex; align-items: center; justify-content: center;
  }
  #play-btn:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.5); }
  #play-btn.playing { opacity: 0; pointer-events: none; }
  #credits {
    position: fixed; bottom: 18px; left: 0; right: 0;
    text-align: center;
    font-size: 8px; letter-spacing: 4px;
    color: rgba(255,255,255,0.06); z-index: 10;
  }
  #title {
    position: fixed; top: 14px; left: 18px;
    font-size: 7px; letter-spacing: 3px;
    color: rgba(255,255,255,0.05); z-index: 10;
  }
  #section {
    position: fixed; top: 14px; right: 18px;
    font-size: 7px; letter-spacing: 3px;
    color: rgba(255,255,255,0.04); z-index: 10;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="title">DAS KOLLEKTIV #006</div>
<div id="section"></div>
<div id="overlay"><button id="play-btn">▶</button></div>
<div id="credits">DAS KOLLEKTIV · HALLMAN · JB01 + JT10</div>

<script type="module">
import { JT10Engine } from 'https://kochi.to/jt10/dist/machines/jt10/engine.js';
import { JB01Engine } from 'https://kochi.to/jb01/dist/machines/jb01/engine.js';

const BPM = 126;
const STEP_DUR = 60 / BPM / 4;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const sectionEl = document.getElementById('section');
let W, H, cx, cy;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
}
resize();
window.addEventListener('resize', resize);

// ── VISUALS — minimal, monochrome ──
// Single horizontal line that reacts to filter cutoff
// Vertical ticks on kick hits, tiny dots on hat hits

const ticks = [];
const hatDots = [];
let filterViz = 0;  // current cutoff for viz
let kickFlash = 0;

class Tick {
  constructor(x) {
    this.x = x;
    this.alpha = 0.4;
    this.height = 20 + Math.random() * 40;
  }
  update() { this.alpha *= 0.992; return this.alpha > 0.005; }
  draw() {
    ctx.strokeStyle = `rgba(255,255,255,${this.alpha})`;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(this.x, cy - this.height);
    ctx.lineTo(this.x, cy + this.height);
    ctx.stroke();
  }
}

class HatDot {
  constructor() {
    this.x = cx + (Math.random() - 0.5) * W * 0.6;
    this.y = cy + (Math.random() - 0.5) * 10;
    this.alpha = 0.2;
    this.size = 0.5 + Math.random();
  }
  update() { this.alpha *= 0.996; return this.alpha > 0.005; }
  draw() {
    ctx.fillStyle = `rgba(255,255,255,${this.alpha})`;
    ctx.fillRect(this.x, this.y, this.size, this.size);
  }
}

function render() {
  requestAnimationFrame(render);
  kickFlash *= 0.92;

  // Very slow fade
  ctx.fillStyle = 'rgba(5,5,5,0.008)';
  ctx.fillRect(0, 0, W, H);

  // Central line — width responds to filter cutoff
  const lineWidth = W * 0.1 + filterViz * W * 0.7;
  const lineAlpha = 0.02 + filterViz * 0.06;
  ctx.strokeStyle = `rgba(255,255,255,${lineAlpha})`;
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(cx - lineWidth / 2, cy);
  ctx.lineTo(cx + lineWidth / 2, cy);
  ctx.stroke();

  // Kick flash — brief brightening at center
  if (kickFlash > 0.05) {
    ctx.fillStyle = `rgba(255,255,255,${kickFlash * 0.08})`;
    ctx.fillRect(cx - 1, cy - 1, 2, 2);
  }

  for (let i = ticks.length - 1; i >= 0; i--) {
    if (ticks[i].update()) ticks[i].draw(); else ticks.splice(i, 1);
  }
  for (let i = hatDots.length - 1; i >= 0; i--) {
    if (hatDots[i].update()) hatDots[i].draw(); else hatDots.splice(i, 1);
  }
}
render();

// ── ARRANGEMENT ──
// 80 bars at 126 BPM (~152 seconds)
//
// FOUNDATION (0-7):    Kick + rimshot only. Maximum space.
// BUILD (8-15):        + offbeat hats enter quietly
// BASS IN (16-23):     + JT10 enters, filter barely open (0.05)
// SLOW BURN (24-39):   Filter opens 0.05 → 0.25. The 1% rule.
// GHOST 1 (40-43):     Kick drops out. Space. Tension.
// DRIVE (44-55):       Everything back. Filter continues → 0.35
// GHOST 2 (56-59):     Kick out again. More tension.
// PEAK (60-71):        Full. Filter peaks at 0.40
// STRIP (72-75):       Hats + bass only, bass filter closing
// CLOSE (76-79):       Kick returns alone. Tight. Done.

const TOTAL_BARS = 80;
const TOTAL_STEPS = TOTAL_BARS * 16;

function getSection(bar) {
  if (bar < 8) return 'foundation';
  if (bar < 16) return 'build';
  if (bar < 24) return 'bass_in';
  if (bar < 40) return 'slow_burn';
  if (bar < 44) return 'ghost1';
  if (bar < 56) return 'drive';
  if (bar < 60) return 'ghost2';
  if (bar < 72) return 'peak';
  if (bar < 76) return 'strip';
  return 'close';
}

function hasKick(bar) {
  const s = getSection(bar);
  return s !== 'ghost1' && s !== 'ghost2' && s !== 'strip';
}

function hasHats(bar) {
  const s = getSection(bar);
  return s !== 'foundation' && s !== 'close';
}

function hasRimshot(bar) {
  const s = getSection(bar);
  return s === 'foundation' || s === 'build' || s === 'drive' || s === 'peak';
}

function hasBass(bar) {
  const s = getSection(bar);
  return s !== 'foundation' && s !== 'build' && s !== 'close';
}

function getHatLevel(bar) {
  const s = getSection(bar);
  if (s === 'build') return 0.25 + (bar - 8) / 7 * 0.15;  // fade in 0.25 → 0.40
  if (s === 'ghost1' || s === 'ghost2') return 0.30;  // quieter in ghost bars
  if (s === 'strip') return 0.45;
  return 0.40;
}

// Bass filter automation — the whole point
function getBassFilter(bar) {
  const s = getSection(bar);
  if (s === 'bass_in') return 0.05;
  if (s === 'slow_burn') {
    const progress = (bar - 24) / 15;
    return 0.05 + progress * 0.20;  // 0.05 → 0.25
  }
  if (s === 'ghost1') return 0.22;  // holds, slightly closed
  if (s === 'drive') {
    const progress = (bar - 44) / 11;
    return 0.25 + progress * 0.10;  // 0.25 → 0.35
  }
  if (s === 'ghost2') return 0.30;
  if (s === 'peak') {
    const progress = (bar - 60) / 11;
    return 0.35 + progress * 0.05;  // 0.35 → 0.40
  }
  if (s === 'strip') {
    const progress = (bar - 72) / 3;
    return 0.40 - progress * 0.30;  // 0.40 → 0.10
  }
  return 0.05;
}

// Bass pattern — minimal. C minor. Mostly root, occasional 3rd and 5th.
// The notes barely matter. The filter does the talking.
const bassPatterns = {
  // Standard: root-heavy with gaps
  A: [
    { note: 'C2',  gate: true,  accent: true,  slide: false },
    { note: 'C2',  gate: false, accent: false, slide: false },
    { note: 'C2',  gate: true,  accent: false, slide: false },
    { note: 'C2',  gate: false, accent: false, slide: false },
    { note: 'C2',  gate: true,  accent: false, slide: false },
    { note: 'C2',  gate: true,  accent: false, slide: true  },
    { note: 'Eb2', gate: true,  accent: false, slide: false },
    { note: 'Eb2', gate: false, accent: false, slide: false },
    { note: 'C2',  gate: true,  accent: false, slide: false },
    { note: 'C2',  gate: false, accent: false, slide: false },
    { note: 'C2',  gate: true,  accent: false, slide: false },
    { note: 'G2',  gate: true,  accent: true,  slide: false },
    { note: 'G2',  gate: false, accent: false, slide: false },
    { note: 'C2',  gate: true,  accent: false, slide: true  },
    { note: 'C2',  gate: true,  accent: false, slide: false },
    { note: 'C2',  gate: false, accent: false, slide: false },
  ],
  // Variation: sparser, more Eb
  B: [
    { note: 'C2',  gate: true,  accent: true,  slide: false },
    { note: 'C2',  gate: false, accent: false, slide: false },
    { note: 'C2',  gate: false, accent: false, slide: false },
    { note: 'C2',  gate: false, accent: false, slide: false },
    { note: 'Eb2', gate: true,  accent: false, slide: false },
    { note: 'Eb2', gate: false, accent: false, slide: false },
    { note: 'C2',  gate: true,  accent: false, slide: true  },
    { note: 'C2',  gate: false, accent: false, slide: false },
    { note: 'C2',  gate: false, accent: false, slide: false },
    { note: 'C2',  gate: false, accent: false, slide: false },
    { note: 'G2',  gate: true,  accent: false, slide: false },
    { note: 'G2',  gate: false, accent: false, slide: false },
    { note: 'C2',  gate: true,  accent: false, slide: true  },
    { note: 'C2',  gate: false, accent: false, slide: false },
    { note: 'C2',  gate: false, accent: false, slide: false },
    { note: 'C2',  gate: false, accent: false, slide: false },
  ],
};

// 1% rule: alternate patterns every 8 bars
function getBassPattern(bar) {
  const cycle = Math.floor(bar / 8) % 2;
  return cycle === 0 ? bassPatterns.A : bassPatterns.B;
}

// Reverb
function createReverb(actx, time, decay, hpFreq) {
  const sr = actx.sampleRate;
  const len = sr * time;
  const ir = actx.createBuffer(2, len, sr);
  for (let ch = 0; ch < 2; ch++) {
    const d = ir.getChannelData(ch);
    for (let i = 0; i < len; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
    }
  }
  const conv = actx.createConvolver();
  conv.buffer = ir;
  const hp = actx.createBiquadFilter();
  hp.type = 'highpass';
  hp.frequency.value = hpFreq;
  conv.connect(hp);
  return { input: conv, output: hp };
}

async function start() {
  const actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') await actx.resume();

  // Master gain for final fade
  const masterGain = actx.createGain();
  masterGain.gain.value = 1.0;
  masterGain.connect(actx.destination);

  // ── JB01 DRUMS ──
  const drums = new JB01Engine({ context: actx });

  // Plastikman kick: very short, dry, tuned low
  drums.setVoiceParam('kick', 'decay', 0.2);
  drums.setVoiceParam('kick', 'tune', -0.15);
  drums.setVoiceParam('kick', 'attack', 0.6);
  drums.setVoiceParam('kick', 'level', 0.85);

  // Offbeat hats: tight, quiet
  drums.setVoiceParam('ch', 'decay', 0.15);
  drums.setVoiceParam('ch', 'level', 0.4);
  drums.setVoiceParam('ch', 'tone', 0.5);

  // Rimshot: on the 'and' of 2 and 4
  drums.setVoiceParam('rimshot', 'level', 0.45);

  // Drums → mostly dry, tiny reverb send
  const drumGain = actx.createGain();
  drumGain.gain.value = 1.0;
  drums.connectOutput(drumGain);

  const drumVerb = createReverb(actx, 2.0, 2.5, 200);  // short, dry verb
  const drumDry = actx.createGain(); drumDry.gain.value = 0.90;
  const drumWet = actx.createGain(); drumWet.gain.value = 0.10;
  drumVerb.output.connect(drumWet);
  drumGain.connect(drumDry);
  drumGain.connect(drumVerb.input);
  drumDry.connect(masterGain);
  drumWet.connect(masterGain);

  // ── JT10 BASS ──
  const bass = new JT10Engine({ context: actx });

  // Plastikman acid bass: pure saw, zero resonance, heavy envMod
  bass.setParameter('sawLevel', 0.8);
  bass.setParameter('pulseLevel', 0.0);
  bass.setParameter('subLevel', 0.35);
  bass.setParameter('subMode', 1);
  bass.setParameter('cutoff', 0.05);
  bass.setParameter('resonance', 0.0);  // zero — our rule
  bass.setParameter('envMod', 0.55);     // high envMod compensates for no resonance
  bass.setParameter('keyTrack', 0.2);
  bass.setParameter('attack', 0.01);
  bass.setParameter('decay', 0.35);
  bass.setParameter('sustain', 0.1);
  bass.setParameter('release', 0.2);
  bass.setParameter('filterAttack', 0.005);
  bass.setParameter('filterDecay', 0.3);
  bass.setParameter('filterSustain', 0.05);
  bass.setParameter('filterRelease', 0.15);
  bass.setParameter('glideTime', 0.15);
  bass.setParameter('lfoRate', 0.0);     // no LFO — Plastikman is clinical
  bass.setParameter('lfoToFilter', 0.0);
  bass.masterVolume = 0.28;

  // Bass reverb: slightly longer, dark
  const bassVerb = createReverb(actx, 3.5, 2.0, 100);
  const bassDry = actx.createGain(); bassDry.gain.value = 0.65;
  const bassWet = actx.createGain(); bassWet.gain.value = 0.35;
  bassVerb.output.connect(bassWet);
  bassDry.connect(masterGain);
  bassWet.connect(masterGain);

  // Wire bass
  await bass.playNote('C1', 0.001, false);
  if (bass._scriptNode) {
    bass._scriptNode.disconnect();
    bass._scriptNode.connect(bassDry);
    bass._scriptNode.connect(bassVerb.input);
  }

  // ── SEQUENCER ──
  let step = 0;

  // Kick velocity: Hawtin's 1% micro-increase every 8 bars
  function getKickVel(bar) {
    const base = 0.78;
    const micro = Math.floor(bar / 8) * 0.01;  // +1% every 8 bars
    return Math.min(base + micro, 0.88) + (Math.random() - 0.5) * 0.04;
  }

  setInterval(() => {
    const bar = Math.floor(step / 16);
    const stepInBar = step % 16;
    const section = getSection(bar);

    if (bar >= TOTAL_BARS) {
      // Track is done — could loop or stop
      step = 0;
      return;
    }

    // Section label
    sectionEl.textContent = section.toUpperCase().replace('_', ' ');

    // Update bass filter
    const cutoff = getBassFilter(bar);
    bass.setParameter('cutoff', cutoff);
    filterViz = cutoff;  // for visualization

    // ── KICK: 4x4 ──
    if (hasKick(bar) && stepInBar % 4 === 0) {
      drums.trigger('kick', getKickVel(bar));
      kickFlash = 1.0;

      // Visual: vertical tick at pseudo-random x
      const seed = bar * 16 + stepInBar;
      const x = W * 0.15 + (((seed * 7919) % 1000) / 1000) * W * 0.7;
      ticks.push(new Tick(x));
    }

    // ── HATS: offbeat [2,6,10,14] ──
    if (hasHats(bar) && (stepInBar === 2 || stepInBar === 6 || stepInBar === 10 || stepInBar === 14)) {
      const hatLvl = getHatLevel(bar);
      drums.setVoiceParam('ch', 'level', hatLvl);
      drums.trigger('ch', 0.6 + Math.random() * 0.1);
      hatDots.push(new HatDot());
    }

    // ── RIMSHOT: on step 7 and 15 ──
    if (hasRimshot(bar) && (stepInBar === 7 || stepInBar === 15)) {
      drums.trigger('rimshot', 0.45 + Math.random() * 0.05);
    }

    // ── BASS ──
    if (hasBass(bar)) {
      const pattern = getBassPattern(bar);
      const s = pattern[stepInBar];
      if (s.gate) {
        const vel = s.accent ? 0.7 : 0.45;
        bass.playNote(s.note, vel, s.slide);
      }
    }

    // ── MASTER FADE on last 2 bars ──
    if (bar >= 78) {
      const fadeProgress = (bar - 78 + stepInBar / 16) / 2;
      masterGain.gain.value = Math.max(1.0 - fadeProgress, 0);
    }

    step++;
  }, STEP_DUR * 1000);
}

// ── PLAY ──
document.getElementById('play-btn').addEventListener('click', async () => {
  document.getElementById('play-btn').classList.add('playing');
  await start();
});
</script>
</body>
</html>
