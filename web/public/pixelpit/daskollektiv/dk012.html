<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Das Kollektiv #012</title>
<meta property="og:title" content="Das Kollektiv #012">
<meta property="og:description" content="Clinical minimal. 128 BPM. Bone dry. Concrete.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050505; overflow: hidden;
    font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
    cursor: crosshair;
  }
  canvas { position: fixed; top: 0; left: 0; }
  #overlay {
    position: fixed; inset: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  #play-btn {
    width: 56px; height: 56px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.3);
    font-size: 18px; cursor: pointer; pointer-events: auto;
    transition: all 0.4s;
    display: flex; align-items: center; justify-content: center;
  }
  #play-btn:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.5); }
  #play-btn.playing { opacity: 0; pointer-events: none; }
  #credits {
    position: fixed; bottom: 18px; left: 0; right: 0; text-align: center;
    font-size: 8px; letter-spacing: 4px; color: rgba(255,255,255,0.06); z-index: 10;
  }
  #title {
    position: fixed; top: 14px; left: 18px;
    font-size: 7px; letter-spacing: 3px; color: rgba(255,255,255,0.05); z-index: 10;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="title">DAS KOLLEKTIV #012</div>
<div id="overlay"><button id="play-btn">▶</button></div>
<div id="credits">DAS KOLLEKTIV · HALLMAN · CLINICAL MINIMAL</div>

<script type="module">
import { JT10Engine } from 'https://kochi.to/jt10/dist/machines/jt10/engine.js';
import { JT90Engine } from 'https://kochi.to/jt90/dist/machines/jt90/engine.js';

const BPM = 128;
const STEP_DUR = 60 / BPM / 4;
const BARS = 80;
const STEPS = BARS * 16;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cx, cy;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; cx = W/2; cy = H/2; }
resize(); addEventListener('resize', resize);

let kickF = 0, rimF = 0, pingF = 0;
function draw() {
  requestAnimationFrame(draw);
  kickF *= 0.90; rimF *= 0.88; pingF *= 0.85;
  ctx.fillStyle = 'rgba(5,5,5,0.03)';
  ctx.fillRect(0, 0, W, H);
  if (kickF > 0.01) {
    ctx.fillStyle = `rgba(160,160,160,${kickF * 0.04})`;
    ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI*2); ctx.fill();
  }
  if (rimF > 0.01) {
    ctx.strokeStyle = `rgba(200,200,200,${rimF * 0.08})`;
    ctx.lineWidth = 0.5; ctx.beginPath();
    const y = cy + (Math.random()-0.5)*4;
    ctx.moveTo(cx-30, y); ctx.lineTo(cx+30, y); ctx.stroke();
  }
  if (pingF > 0.01) {
    ctx.fillStyle = `rgba(220,220,230,${pingF * 0.06})`;
    ctx.beginPath(); ctx.arc(cx + (Math.random()-0.5)*60, cy + (Math.random()-0.5)*60, 1, 0, Math.PI*2); ctx.fill();
  }
}
draw();

function mp(allV, opts) {
  const pat = {};
  for (const v of allV) {
    pat[v] = Array.from({ length: 16 }, (_, i) => {
      if (v === 'kick' && opts.kick?.includes(i)) return { velocity: 0.9, accent: false };
      if (v === 'rimshot' && opts.rim?.includes(i)) return { velocity: 0.50, accent: false };
      if (v === 'ch' && opts.ch?.includes(i)) return { velocity: opts.chVel || 0.35, accent: false };
      return { velocity: 0, accent: false };
    });
  }
  return pat;
}

function sp(steps) {
  return Array.from({ length: 16 }, (_, i) => ({
    note: 'E3', gate: steps.includes(i), slide: false, accent: (i === steps[0])
  }));
}

async function start() {
  const playBtn = document.getElementById('play-btn');
  playBtn.textContent = '...';
  try {
    const SR = 44100;
    // ── JT90 ──
    const de = new JT90Engine({ bpm: BPM });
    await de.loadSamples('https://kochi.to/jt90/samples');
    de._ensureVoices();
    de.setVoiceParameter('kick', 'decay', 0.18);
    de.setVoiceParameter('kick', 'tune', 0);
    de.setVoiceParameter('kick', 'level', 0.9);
    de.setVoiceParameter('rimshot', 'level', 0.50);
    de.setVoiceParameter('ch', 'level', 0.45);
    de.setVoiceParameter('ch', 'tone', 0.3);
    const allV = ['kick','snare','clap','ch','oh','ride','rimshot','lowtom','midtom','hitom','crash'];

    const drumSecs = [
      { bars: 8, pat: mp(allV, { kick: [0,4,8,12] }) },
      { bars: 8, pat: mp(allV, { kick: [0,4,8,12], rim: [3] }) },
      { bars: 8, pat: mp(allV, { kick: [0,4,8,12], rim: [7] }) },
      { bars: 8, pat: mp(allV, { kick: [0,4,8,12], rim: [3,11] }) },
      { bars: 8, pat: mp(allV, { kick: [0,4,8,12], rim: [3], ch: [2,6,10,14], chVel: 0.15 }) },
      { bars: 8, pat: mp(allV, { kick: [0,4,8,12], rim: [3,7], ch: [2,6,10,14], chVel: 0.25 }) },
      { bars: 8, pat: mp(allV, { kick: [0,4,8,12], rim: [3,9], ch: [2,6,10,14], chVel: 0.25 }) },
      { bars: 8, pat: mp(allV, { rim: [3,9], ch: [2,6,10,14], chVel: 0.20 }) },
      { bars: 8, pat: mp(allV, { kick: [0,4,8,12], rim: [3] }) },
      { bars: 8, pat: mp(allV, { kick: [0,4,8,12] }) },
    ];
    const dBufs = [];
    for (const s of drumSecs) { de.setPattern(s.pat); dBufs.push((await de.renderPattern({ bars: s.bars, bpm: BPM })).getChannelData(0)); }
    const dTotal = dBufs.reduce((a,b) => a+b.length, 0);
    const dData = new Float32Array(dTotal);
    let dOff = 0; for (const b of dBufs) { dData.set(b, dOff); dOff += b.length; }

    // ── JT10 ──
    const se = new JT10Engine({ sampleRate: SR });
    se.setBpm(BPM);
    se.setParameter('sawLevel', 0.5); se.setParameter('pulseLevel', 0.5);
    se.setParameter('pulseWidth', 0.5); se.setParameter('subLevel', 0.3);
    se.setParameter('subMode', 0); se.setParameter('cutoff', 0.5);
    se.setParameter('resonance', 0.3); se.setParameter('envMod', 0.5);
    se.setParameter('keyTrack', 0.5);
    se.setParameter('attack', 0.005); se.setParameter('decay', 0.05);
    se.setParameter('sustain', 0.0); se.setParameter('release', 0.03);
    se.setParameter('glideTime', 0.0); se.masterVolume = 0.8;

    const topSecs = [
      { bars: 8, pat: null },
      { bars: 8, pat: null },
      { bars: 8, pat: sp([0, 10]) },
      { bars: 8, pat: sp([0, 6, 10]) },
      { bars: 8, pat: sp([2, 7, 12]) },
      { bars: 8, pat: sp([0, 3, 6, 10, 13]) },
      { bars: 8, pat: sp([5, 11]) },
      { bars: 8, pat: sp([0]) },
      { bars: 8, pat: sp([2, 8, 14]) },
      { bars: 8, pat: sp([6]) },
    ];
    const sBufs = [];
    for (const s of topSecs) {
      if (!s.pat) { sBufs.push(new Float32Array(Math.ceil(s.bars*16*STEP_DUR*SR))); continue; }
      se.setPattern(s.pat); sBufs.push((await se.renderPattern({ bars: s.bars, sampleRate: SR })).getChannelData(0));
    }
    const sTotal = sBufs.reduce((a,b) => a+b.length, 0);
    const sData = new Float32Array(sTotal);
    let sOff = 0; for (const b of sBufs) { sData.set(b, sOff); sOff += b.length; }

    // ── PLAYBACK ──
    const ac = new AudioContext();
    if (ac.state === 'suspended') await ac.resume();

    const db = ac.createBuffer(1, dData.length, SR);
    db.getChannelData(0).set(dData);
    const ds = ac.createBufferSource(); ds.buffer = db;
    const dg = ac.createGain(); dg.gain.value = 0.75;
    ds.connect(dg); dg.connect(ac.destination);

    const sb = ac.createBuffer(1, sData.length, SR);
    sb.getChannelData(0).set(sData);
    const ss = ac.createBufferSource(); ss.buffer = sb;
    const lp = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 600; lp.Q.value = 1.0;
    const sg = ac.createGain(); sg.gain.value = 0.45;
    ss.connect(lp); lp.connect(sg); sg.connect(ac.destination);

    const fadeS = ac.currentTime + (BARS-4)*16*STEP_DUR;
    const fadeE = ac.currentTime + BARS*16*STEP_DUR;
    dg.gain.setValueAtTime(0.75, fadeS); dg.gain.linearRampToValueAtTime(0, fadeE);
    sg.gain.setValueAtTime(0.45, fadeS); sg.gain.linearRampToValueAtTime(0, fadeE);

    ds.start(0); ss.start(0);
    playBtn.classList.add('playing');

    // ── VISUALS ──
    const topSteps = [
      null, null,
      [0,10], [0,6,10], [2,7,12], [0,3,6,10,13],
      [5,11], [0], [2,8,14], [6]
    ];
    const rimSteps = [
      null, [3], [7], [3,11], [3], [3,7], [3,9], [3,9], [3], null
    ];
    const kickOn = i => !(i >= 7 && i < 8); // section index 7 = no kick

    let step = 0;
    const timer = setInterval(() => {
      const bar = Math.floor(step / 16);
      if (bar >= BARS) { clearInterval(timer); return; }
      const sib = step % 16;
      const sec = Math.floor(bar / 8);

      if (kickOn(sec) && [0,4,8,12].includes(sib)) kickF = 1;
      const rs = rimSteps[sec];
      if (rs && rs.includes(sib)) rimF = 1;
      const ts = topSteps[sec];
      if (ts && ts.includes(sib)) pingF = 1;

      step++;
    }, STEP_DUR * 1000);
  } catch (err) { console.error(err); playBtn.textContent = '▶'; }
}

document.getElementById('play-btn').addEventListener('click', () => start());
</script>
</body>
</html>
