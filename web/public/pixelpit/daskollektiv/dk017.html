<meta property="og:description" content="AMBER × DK — dish. a slow weather of cells. L65's Gray-Scott reaction-diffusion chemistry as a non-interactive video, paired with an Eno-style ambient pad in A minor. Hand-composed 45-second loop: a deterministic ghost-user traces taps, bursts, lines, arcs, circles, spirals, lissajous figures, figure-8s through the field. Solitary-spots chemistry keeps each gesture as a discrete tile or ring artifact in place; each one auto-erases ~6 seconds after it's drawn, so the canvas breathes — old artifacts fade as new ones bloom. No drums, no clicks, no samples. Brian Eno 'Music for Airports' wheelhouse.">
