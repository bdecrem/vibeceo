<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DAS KOLLEKTIV</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⬛</text></svg>">
  <meta name="description" content="hallman x marg">
  <meta property="og:title" content="DAS KOLLEKTIV">
  <meta property="og:description" content="hallman x marg">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://daskollektiv.rip">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Space Mono', monospace;
      cursor: crosshair;
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    .hero {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .title {
      font-size: clamp(36px, 10vw, 80px);
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #fff;
      text-align: center;
      line-height: 1;
    }

    .x {
      font-size: clamp(11px, 2vw, 14px);
      font-weight: 400;
      letter-spacing: 0.5em;
      color: #333;
      margin-top: 20px;
      text-transform: lowercase;
    }

    .bottom {
      position: fixed;
      bottom: 24px;
      left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 1;
    }

    .bottom a, .bottom span {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: #1a1a1a;
      text-decoration: none;
      transition: color 0.5s;
    }

    .bottom a:hover {
      color: #fff;
    }

    /* --- track section --- */

    .content {
      position: relative;
      z-index: 2;
      background: #000;
    }

    .latest {
      padding: 120px 24px 80px;
      max-width: 600px;
      margin: 0 auto;
    }

    .latest-label {
      font-size: 9px;
      letter-spacing: 0.4em;
      color: #333;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .track-id {
      font-size: clamp(28px, 6vw, 48px);
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #fff;
      text-decoration: none;
      display: block;
      transition: color 0.3s;
    }

    .track-id:hover {
      color: #666;
    }

    .track-artists {
      font-size: 10px;
      letter-spacing: 0.3em;
      color: #444;
      margin-top: 12px;
      text-transform: uppercase;
    }

    .track-desc {
      font-size: 12px;
      letter-spacing: 0.05em;
      color: #222;
      margin-top: 16px;
      line-height: 1.6;
    }

    .archive-link {
      display: inline-block;
      margin-top: 60px;
      font-size: 9px;
      letter-spacing: 0.4em;
      color: #222;
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.4s;
    }

    .archive-link:hover {
      color: #fff;
    }

    .footer {
      padding: 80px 24px 32px;
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
    }

    .footer a, .footer span {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: #1a1a1a;
      text-decoration: none;
      transition: color 0.5s;
    }

    .footer a:hover { color: #fff; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="hero">
    <div class="title">Das Kollektiv</div>
    <div class="x">hallman &times; marg</div>
  </div>

  <div class="content">
    <div class="latest">
      <div class="latest-label">latest</div>
      <div id="latest-track"></div>
      <a href="archive.html" class="archive-link" id="archive-link" style="display:none">all releases &rarr;</a>
    </div>
    <div class="footer">
      <span>2026</span>
      <a href="https://x.com/daskollektivrip" target="_blank">@daskollektivrip</a>
    </div>
  </div>

  <script>
    // --- WebGL background ---
    const c = document.getElementById('c');
    const gl = c.getContext('webgl');

    function resize() {
      c.width = window.innerWidth;
      c.height = window.innerHeight;
      gl.viewport(0, 0, c.width, c.height);
    }
    resize();
    window.addEventListener('resize', resize);

    const vert = `
      attribute vec2 p;
      void main() { gl_Position = vec4(p, 0, 1); }
    `;

    const frag = `
      precision highp float;
      uniform float t;
      uniform vec2 r;
      uniform vec2 m;

      float hash(vec2 p) {
        return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
      }

      float noise(vec2 p) {
        vec2 i = floor(p);
        vec2 f = fract(p);
        f = f * f * (3.0 - 2.0 * f);
        return mix(
          mix(hash(i), hash(i + vec2(1, 0)), f.x),
          mix(hash(i + vec2(0, 1)), hash(i + vec2(1, 1)), f.x),
          f.y
        );
      }

      void main() {
        vec2 uv = gl_FragCoord.xy / r;
        vec2 p = (gl_FragCoord.xy - r * 0.5) / min(r.x, r.y);

        float n = 0.0;
        n += noise(p * 3.0 + t * 0.08) * 0.5;
        n += noise(p * 6.0 - t * 0.05) * 0.25;
        n += noise(p * 12.0 + t * 0.03) * 0.125;

        float md = length(p - (m / min(r.x, r.y) - vec2(r.x, r.y) * 0.5 / min(r.x, r.y)));
        n += smoothstep(0.8, 0.0, md) * 0.15;

        float line = smoothstep(0.48, 0.5, n) * smoothstep(0.52, 0.5, n);
        line += smoothstep(0.35, 0.36, n) * smoothstep(0.37, 0.36, n) * 0.3;

        float vig = 1.0 - length(uv - 0.5) * 0.8;

        float v = line * vig * 0.12;
        gl_FragColor = vec4(v, v * 0.95, v * 0.9, 1.0);
      }
    `;

    function compile(src, type) {
      const s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      return s;
    }

    const prog = gl.createProgram();
    gl.attachShader(prog, compile(vert, gl.VERTEX_SHADER));
    gl.attachShader(prog, compile(frag, gl.FRAGMENT_SHADER));
    gl.linkProgram(prog);
    gl.useProgram(prog);

    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);

    const loc = gl.getAttribLocation(prog, 'p');
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

    const tU = gl.getUniformLocation(prog, 't');
    const rU = gl.getUniformLocation(prog, 'r');
    const mU = gl.getUniformLocation(prog, 'm');

    let mx = 0, my = 0;
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

    function draw(t) {
      gl.uniform1f(tU, t * 0.001);
      gl.uniform2f(rU, c.width, c.height);
      gl.uniform2f(mU, mx, c.height - my);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);

    // --- Tracks ---
    fetch('tracks.json')
      .then(r => r.json())
      .then(tracks => {
        if (!tracks.length) return;
        const latest = tracks[0];
        document.getElementById('latest-track').innerHTML =
          `<a href="${latest.url}" class="track-id">${latest.title}</a>` +
          `<div class="track-artists">${latest.artists}</div>` +
          `<div class="track-desc">${latest.description}</div>`;

        if (tracks.length > 1) {
          document.getElementById('archive-link').style.display = '';
        }
      });

    // Hide fixed bottom bar once user scrolls past hero
    const bottomBar = document.querySelector('.bottom');
    if (bottomBar) {
      window.addEventListener('scroll', () => {
        bottomBar.style.opacity = window.scrollY > 100 ? '0' : '1';
        bottomBar.style.transition = 'opacity 0.4s';
      });
    }
  </script>
</body>
</html>
