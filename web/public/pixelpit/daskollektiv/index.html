<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DAS KOLLEKTIV</title>
  <meta name="description" content="hallman x marg">
  <meta property="og:title" content="DAS KOLLEKTIV">
  <meta property="og:description" content="hallman x marg">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://daskollektiv.rip">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Space Mono', monospace;
      height: 100vh;
      overflow: hidden;
      cursor: crosshair;
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    .page {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .title {
      font-size: clamp(36px, 10vw, 80px);
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #fff;
      text-align: center;
      line-height: 1;
    }

    .x {
      font-size: clamp(11px, 2vw, 14px);
      font-weight: 400;
      letter-spacing: 0.5em;
      color: #333;
      margin-top: 20px;
      text-transform: lowercase;
    }

    .bottom {
      position: fixed;
      bottom: 24px;
      left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 1;
    }

    .bottom a, .bottom span {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: #1a1a1a;
      text-decoration: none;
      transition: color 0.5s;
    }

    .bottom a:hover {
      color: #fff;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="page">
    <div class="title">Das Kollektiv</div>
    <div class="x">hallman &times; marg</div>
  </div>

  <div class="bottom">
    <span>2026</span>
    <a href="https://x.com/daskollektivrip" target="_blank">@daskollektivrip</a>
  </div>

  <script>
    const c = document.getElementById('c');
    const gl = c.getContext('webgl');

    function resize() {
      c.width = window.innerWidth;
      c.height = window.innerHeight;
      gl.viewport(0, 0, c.width, c.height);
    }
    resize();
    window.addEventListener('resize', resize);

    const vert = `
      attribute vec2 p;
      void main() { gl_Position = vec4(p, 0, 1); }
    `;

    const frag = `
      precision highp float;
      uniform float t;
      uniform vec2 r;
      uniform vec2 m;

      float hash(vec2 p) {
        return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
      }

      float noise(vec2 p) {
        vec2 i = floor(p);
        vec2 f = fract(p);
        f = f * f * (3.0 - 2.0 * f);
        return mix(
          mix(hash(i), hash(i + vec2(1, 0)), f.x),
          mix(hash(i + vec2(0, 1)), hash(i + vec2(1, 1)), f.x),
          f.y
        );
      }

      void main() {
        vec2 uv = gl_FragCoord.xy / r;
        vec2 p = (gl_FragCoord.xy - r * 0.5) / min(r.x, r.y);

        // Slow warp field
        float n = 0.0;
        n += noise(p * 3.0 + t * 0.08) * 0.5;
        n += noise(p * 6.0 - t * 0.05) * 0.25;
        n += noise(p * 12.0 + t * 0.03) * 0.125;

        // Mouse influence — subtle pull
        float md = length(p - (m / min(r.x, r.y) - vec2(r.x, r.y) * 0.5 / min(r.x, r.y)));
        n += smoothstep(0.8, 0.0, md) * 0.15;

        // Threshold to create structure
        float line = smoothstep(0.48, 0.5, n) * smoothstep(0.52, 0.5, n);
        line += smoothstep(0.35, 0.36, n) * smoothstep(0.37, 0.36, n) * 0.3;

        // Vignette
        float vig = 1.0 - length(uv - 0.5) * 0.8;

        float v = line * vig * 0.12;
        gl_FragColor = vec4(v, v * 0.95, v * 0.9, 1.0);
      }
    `;

    function compile(src, type) {
      const s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      return s;
    }

    const prog = gl.createProgram();
    gl.attachShader(prog, compile(vert, gl.VERTEX_SHADER));
    gl.attachShader(prog, compile(frag, gl.FRAGMENT_SHADER));
    gl.linkProgram(prog);
    gl.useProgram(prog);

    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);

    const loc = gl.getAttribLocation(prog, 'p');
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

    const tU = gl.getUniformLocation(prog, 't');
    const rU = gl.getUniformLocation(prog, 'r');
    const mU = gl.getUniformLocation(prog, 'm');

    let mx = 0, my = 0;
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

    function draw(t) {
      gl.uniform1f(tU, t * 0.001);
      gl.uniform2f(rU, c.width, c.height);
      gl.uniform2f(mU, mx, c.height - my);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      requestAnimationFrame(draw);
    }

    requestAnimationFrame(draw);
  </script>
</body>
</html>
