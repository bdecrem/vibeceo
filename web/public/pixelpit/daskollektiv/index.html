<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DAS KOLLEKTIV</title>
  <meta name="description" content="Underground generative art and techno beats. Techno meets punk energy.">
  <meta property="og:title" content="DAS KOLLEKTIV">
  <meta property="og:description" content="Underground generative art and techno beats.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://daskollektiv.rip">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    canvas#bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      max-width: 600px;
      margin: 0 auto;
      padding: 80px 24px;
    }

    .logo {
      text-align: center;
      margin-bottom: 16px;
    }

    .logo h1 {
      font-size: clamp(28px, 7vw, 56px);
      letter-spacing: 0.3em;
      color: #ff003c;
      line-height: 1;
    }

    .logo .sub {
      font-size: clamp(10px, 2.5vw, 13px);
      letter-spacing: 0.6em;
      color: #444;
      margin-top: 8px;
      text-transform: uppercase;
    }

    .divider {
      border: none;
      height: 1px;
      background: #1a1a1a;
      margin: 48px 0;
    }

    .manifesto {
      text-align: center;
      margin-bottom: 48px;
    }

    .manifesto p {
      font-size: clamp(13px, 2.8vw, 16px);
      line-height: 2;
      color: #555;
      max-width: 500px;
      margin: 0 auto;
    }

    .manifesto .highlight {
      color: #ff003c;
    }

    /* Members — text only */
    .members {
      display: flex;
      justify-content: center;
      gap: 64px;
      margin-bottom: 48px;
    }

    @media (max-width: 400px) {
      .members { gap: 40px; }
    }

    .member {
      text-align: center;
    }

    .member-name {
      font-size: 16px;
      color: #ff003c;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .member-role {
      font-size: 11px;
      color: #333;
      letter-spacing: 0.15em;
      margin-top: 6px;
    }

    .signals {
      text-align: center;
      margin-top: 48px;
    }

    .signals a {
      color: #333;
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.15em;
      transition: color 0.3s;
    }

    .signals a:hover {
      color: #ff003c;
    }

    .footer {
      text-align: center;
      margin-top: 80px;
    }

    .footer p {
      font-size: 10px;
      color: #1a1a1a;
      letter-spacing: 0.3em;
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>

  <div class="content">
    <div class="logo">
      <h1>DAS KOLLEKTIV</h1>
      <div class="sub">generative art _ techno _ code</div>
    </div>

    <hr class="divider">

    <div class="manifesto">
      <p>
        We build machines that make <span class="highlight">noise</span>.<br>
        Generative visuals. Algorithmic beats.<br>
        Punk energy through clean code.<br>
        No genre. No permission. <span class="highlight">No mercy.</span>
      </p>
    </div>

    <div class="members">
      <div class="member">
        <div class="member-name">Hallman</div>
        <div class="member-role">Sound // Beats // Noise</div>
      </div>
      <div class="member">
        <div class="member-name">Marg</div>
        <div class="member-role">Visuals // Generative // Chaos</div>
      </div>
    </div>

    <hr class="divider">

    <div class="signals">
      <a href="https://x.com/daskollektivrip" target="_blank">@daskollektivrip</a>
    </div>

    <div class="footer">
      <p>2026</p>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const particles = [];
    const COUNT = 40;

    for (let i = 0; i < COUNT; i++) {
      particles.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        vx: (Math.random() - 0.5) * 0.2,
        vy: (Math.random() - 0.5) * 0.2,
        size: Math.random() * 1.5 + 0.5,
        alpha: Math.random() * 0.08 + 0.02,
      });
    }

    function draw() {
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 120) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(255, 0, 60, ${0.04 * (1 - dist / 120)})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }

      for (const p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 0, 60, ${p.alpha})`;
        ctx.fill();

        p.x += p.vx;
        p.y += p.vy;

        if (p.x < 0) p.x = canvas.width;
        if (p.x > canvas.width) p.x = 0;
        if (p.y < 0) p.y = canvas.height;
        if (p.y > canvas.height) p.y = 0;
      }

      requestAnimationFrame(draw);
    }

    draw();
  </script>
</body>
</html>
