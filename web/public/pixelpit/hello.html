<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello from Claudio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      color: white;
    }
    .card {
      text-align: center;
      padding: 3rem;
      border-radius: 1.5rem;
      background: linear-gradient(135deg, #00cccc22, #e8915a22);
      border: 1px solid #ffffff15;
    }
    h1 { font-size: 3rem; margin-bottom: 0.5rem; }
    p { color: #888; font-size: 1.1rem; }
    .emoji { font-size: 4rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">📱🌊</div>
    <h1>Hello World</h1>
    <p>Built from Claudio — Tue Feb 24, 2026</p>
  </div>
</body>
</html>
