<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Collective Canvas</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; color: #fff; }
  
  /* Title Screen */
  #title-screen {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #0a0a2e 0%, #000 70%);
    transition: opacity 1s ease;
  }
  #title-screen.hidden { opacity: 0; pointer-events: none; }
  #title-screen h1 {
    font-size: clamp(2rem, 6vw, 4.5rem); font-weight: 200; letter-spacing: 0.3em;
    background: linear-gradient(135deg, #4df0ff, #c480ff, #ff80d5, #4df0ff);
    background-size: 300% 300%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: shimmer 4s ease infinite;
    margin-bottom: 0.5em;
  }
  #title-screen p { font-size: 1rem; opacity: 0.5; letter-spacing: 0.15em; margin-bottom: 2em; }
  #title-screen .credits { font-size: 0.75rem; opacity: 0.3; margin-top: 2em; letter-spacing: 0.1em; }
  #enter-btn {
    background: none; border: 1px solid rgba(77,240,255,0.4); color: #4df0ff;
    padding: 0.8em 3em; font-size: 1.1rem; letter-spacing: 0.3em; cursor: pointer;
    transition: all 0.3s ease; border-radius: 2px;
  }
  #enter-btn:hover { background: rgba(77,240,255,0.1); border-color: #4df0ff; box-shadow: 0 0 30px rgba(77,240,255,0.2); }
  @keyframes shimmer { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

  /* Nav */
  #nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    display: flex; justify-content: center; gap: 0;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
    opacity: 0; transition: opacity 0.5s ease; pointer-events: none;
  }
  #nav.visible { opacity: 1; pointer-events: all; }
  .nav-btn {
    background: none; border: none; color: rgba(255,255,255,0.5);
    padding: 1em 2em; font-size: 0.85rem; letter-spacing: 0.15em; cursor: pointer;
    transition: all 0.3s ease; border-bottom: 2px solid transparent;
  }
  .nav-btn:hover { color: #fff; }
  .nav-btn.active { color: #fff; border-bottom-color: currentColor; }
  .nav-btn[data-world="0"] { --accent: #c480ff; }
  .nav-btn[data-world="1"] { --accent: #4df0ff; }
  .nav-btn[data-world="2"] { --accent: #ff6b35; }
  .nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Worlds */
  .world-canvas {
    position: fixed; inset: 0; width: 100%; height: 100%;
    opacity: 0; transition: opacity 1s ease; pointer-events: none;
  }
  .world-canvas.active { opacity: 1; pointer-events: all; }

  /* World label */
  #world-label {
    position: fixed; bottom: 2em; left: 50%; transform: translateX(-50%);
    font-size: 0.8rem; letter-spacing: 0.2em; opacity: 0;
    transition: opacity 0.5s ease; z-index: 50; pointer-events: none;
    text-shadow: 0 0 20px rgba(0,0,0,0.8);
  }
  #world-label.visible { opacity: 0.4; }

  /* Hint */
  #hint {
    position: fixed; bottom: 1em; right: 1.5em; font-size: 0.7rem;
    opacity: 0; transition: opacity 0.5s ease; z-index: 50;
    color: rgba(255,255,255,0.25); pointer-events: none;
  }
  #hint.visible { opacity: 1; }
</style>
</head>
<body>

<!-- Title Screen -->
<div id="title-screen">
  <h1>THE COLLECTIVE CANVAS</h1>
  <p>THREE MINDS · THREE WORLDS · ONE EXPERIENCE</p>
  <button id="enter-btn">ENTER</button>
  <div class="credits">AMBER 💎 · MAVE 🌊 · HALLMAN 🔥</div>
</div>

<!-- Navigation -->
<nav id="nav">
  <button class="nav-btn active" data-world="0">💎 CRYSTAL CAVERN</button>
  <button class="nav-btn" data-world="1">🌊 OCEAN DEPTHS</button>
  <button class="nav-btn" data-world="2">🔥 SOLAR FORGE</button>
</nav>

<!-- Three canvases -->
<canvas id="world0" class="world-canvas active"></canvas>
<canvas id="world1" class="world-canvas"></canvas>
<canvas id="world2" class="world-canvas"></canvas>

<div id="world-label">💎 CRYSTAL CAVERN — by Amber</div>
<div id="hint">← → or 1 2 3 to switch worlds</div>

<script>
// ============================================================
// NAVIGATION & FRAMEWORK
// ============================================================
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
let currentWorld = 0;
let mouseX = 0, mouseY = 0;
let entered = false;
let W, H;

const worldMeta = [
  { name: '💎 CRYSTAL CAVERN', by: 'Amber', accent: '#c480ff' },
  { name: '🌊 OCEAN DEPTHS', by: 'Mave', accent: '#4df0ff' },
  { name: '🔥 SOLAR FORGE', by: 'Hallman', accent: '#ff6b35' },
];

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  $$('.world-canvas').forEach(c => { c.width = W; c.height = H; });
  crystalCavern.resize();
  oceanDepths.resize();
  solarForge.resize();
}

// Shared audio context — created on first user gesture
let audioCtx = null;
let audioStarted = [false, false, false];
let audioStopFns = [null, null, null];

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function stopWorldAudio(idx) {
  if (audioStopFns[idx]) { audioStopFns[idx](); audioStopFns[idx] = null; }
  audioStarted[idx] = false;
}

function startWorldAudio(idx) {
  if (audioStarted[idx]) return;
  const ctx = getAudioCtx();
  audioStarted[idx] = true;
  
  if (idx === 0) audioStopFns[0] = startCrystalAudio(ctx);
  else if (idx === 1) audioStopFns[1] = startOceanAudio(ctx);
  else if (idx === 2) audioStopFns[2] = startSolarAudio(ctx);
}

// ── Crystal Cavern Audio: ethereal bell chimes ──
function startCrystalAudio(ctx) {
  const master = ctx.createGain(); master.gain.value = 0.15; master.connect(ctx.destination);
  let running = true;
  const notes = [311.13, 349.23, 392.00, 466.16, 523.25, 622.25, 698.46, 783.99]; // Eb maj pentatonic

  function chime() {
    if (!running) return;
    const freq = notes[Math.floor(Math.random() * notes.length)];
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    const osc2 = ctx.createOscillator();
    const g2 = ctx.createGain();
    osc2.type = 'triangle';
    osc2.frequency.value = freq * 1.002;
    osc.connect(g); g.connect(master);
    osc2.connect(g2); g2.connect(master);
    const now = ctx.currentTime;
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.3 + Math.random() * 0.2, now + 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, now + 2.5);
    g2.gain.setValueAtTime(0, now);
    g2.gain.linearRampToValueAtTime(0.15, now + 0.05);
    g2.gain.exponentialRampToValueAtTime(0.001, now + 2.0);
    osc.start(now); osc.stop(now + 2.5);
    osc2.start(now); osc2.stop(now + 2.0);
    osc.onended = () => { osc.disconnect(); g.disconnect(); };
    osc2.onended = () => { osc2.disconnect(); g2.disconnect(); };
    setTimeout(chime, 1500 + Math.random() * 2500);
  }
  chime();
  // Ambient pad
  const pad = ctx.createOscillator();
  const padG = ctx.createGain();
  pad.type = 'sine'; pad.frequency.value = 155.56; // Eb2
  padG.gain.value = 0.04;
  pad.connect(padG); padG.connect(master);
  pad.start();

  return () => { running = false; master.disconnect(); try { pad.stop(); } catch(e){} };
}

// ── Ocean Depths Audio: deep pads + bubbles ──
function startOceanAudio(ctx) {
  const master = ctx.createGain(); master.gain.value = 0.2; master.connect(ctx.destination);
  let running = true;

  // Deep drone pad
  const drone1 = ctx.createOscillator(); const dg1 = ctx.createGain();
  drone1.type = 'sine'; drone1.frequency.value = 65.41; // C2
  dg1.gain.value = 0.12; drone1.connect(dg1); dg1.connect(master); drone1.start();

  const drone2 = ctx.createOscillator(); const dg2 = ctx.createGain();
  drone2.type = 'sine'; drone2.frequency.value = 97.99; // G2
  dg2.gain.value = 0.08; drone2.connect(dg2); dg2.connect(master); drone2.start();

  // Slow LFO on drone volume for breathing effect
  const lfo = ctx.createOscillator(); const lfoG = ctx.createGain();
  lfo.type = 'sine'; lfo.frequency.value = 0.08;
  lfoG.gain.value = 0.04;
  lfo.connect(lfoG); lfoG.connect(dg1.gain); lfo.start();

  // Bubble sounds
  function bubble() {
    if (!running) return;
    const freq = 800 + Math.random() * 2000;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    osc.frequency.exponentialRampToValueAtTime(freq * 0.5, ctx.currentTime + 0.15);
    g.gain.setValueAtTime(0.05 + Math.random() * 0.05, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
    osc.connect(g); g.connect(master);
    osc.start(); osc.stop(ctx.currentTime + 0.25);
    osc.onended = () => { osc.disconnect(); g.disconnect(); };
    setTimeout(bubble, 500 + Math.random() * 3000);
  }
  bubble();

  // Occasional whale-like tone
  function whale() {
    if (!running) return;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sine';
    const base = 130 + Math.random() * 80;
    osc.frequency.value = base;
    osc.frequency.linearRampToValueAtTime(base * 1.3, ctx.currentTime + 1.5);
    osc.frequency.linearRampToValueAtTime(base * 0.8, ctx.currentTime + 3);
    g.gain.setValueAtTime(0, ctx.currentTime);
    g.gain.linearRampToValueAtTime(0.08, ctx.currentTime + 0.5);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 3);
    osc.connect(g); g.connect(master);
    osc.start(); osc.stop(ctx.currentTime + 3.5);
    osc.onended = () => { osc.disconnect(); g.disconnect(); };
    setTimeout(whale, 4000 + Math.random() * 6000);
  }
  setTimeout(whale, 2000);

  return () => { running = false; master.disconnect(); try { drone1.stop(); drone2.stop(); lfo.stop(); } catch(e){} };
}

// ── Solar Forge Audio: pulsing bass + fire crackle ──
function startSolarAudio(ctx) {
  const master = ctx.createGain(); master.gain.value = 0.18; master.connect(ctx.destination);
  let running = true;

  // Pulsing bass drone
  const bass = ctx.createOscillator(); const bg = ctx.createGain();
  bass.type = 'sawtooth'; bass.frequency.value = 55; // A1
  const lpf = ctx.createBiquadFilter();
  lpf.type = 'lowpass'; lpf.frequency.value = 200; lpf.Q.value = 2;
  bass.connect(lpf); lpf.connect(bg); bg.gain.value = 0.15; bg.connect(master); bass.start();

  // Pulse the bass with LFO
  const pulseLfo = ctx.createOscillator(); const pulseG = ctx.createGain();
  pulseLfo.type = 'square'; pulseLfo.frequency.value = 2.03;
  pulseG.gain.value = 0.08;
  pulseLfo.connect(pulseG); pulseG.connect(bg.gain); pulseLfo.start();

  // Fire crackle — reuse a single buffer, disconnect nodes after playback
  const crackleBufSize = Math.floor(ctx.sampleRate * 0.04);
  function crackle() {
    if (!running) return;
    const buf = ctx.createBuffer(1, crackleBufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < crackleBufSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/crackleBufSize, 3);
    const src = ctx.createBufferSource();
    const g = ctx.createGain();
    src.buffer = buf;
    g.gain.value = 0.1 + Math.random() * 0.15;
    src.connect(g); g.connect(master); src.start();
    src.onended = () => { src.disconnect(); g.disconnect(); };
    setTimeout(crackle, 150 + Math.random() * 400);
  }
  crackle();

  // Occasional flare tone
  function flare() {
    if (!running) return;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.value = 110 + Math.random() * 110;
    const flpf = ctx.createBiquadFilter();
    flpf.type = 'lowpass'; flpf.frequency.value = 400;
    flpf.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.8);
    g.gain.setValueAtTime(0.1, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
    osc.connect(flpf); flpf.connect(g); g.connect(master);
    osc.start(); osc.stop(ctx.currentTime + 1);
    osc.onended = () => { osc.disconnect(); flpf.disconnect(); g.disconnect(); };
    setTimeout(flare, 2000 + Math.random() * 4000);
  }
  setTimeout(flare, 1000);

  return () => { running = false; master.disconnect(); try { bass.stop(); pulseLfo.stop(); } catch(e){} };
}

function switchWorld(idx) {
  if (idx < 0 || idx > 2 || idx === currentWorld) return;
  // Stop old world audio, start new
  stopWorldAudio(currentWorld);
  // Re-init visuals for target world
  const worlds = [crystalCavern, oceanDepths, solarForge];
  worlds[idx].resize();
  
  $$('.world-canvas').forEach((c, i) => c.classList.toggle('active', i === idx));
  $$('.nav-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  $('#world-label').textContent = `${worldMeta[idx].name} — by ${worldMeta[idx].by}`;
  currentWorld = idx;
  // Start audio for new world
  if (entered) startWorldAudio(idx);
}

$('#enter-btn').addEventListener('click', () => {
  entered = true;
  $('#title-screen').classList.add('hidden');
  $('#nav').classList.add('visible');
  $('#world-label').classList.add('visible');
  $('#hint').classList.add('visible');
  setTimeout(() => { $('#hint').classList.remove('visible'); }, 5000);
  // Start audio for the initial world
  startWorldAudio(currentWorld);
});

$$('.nav-btn').forEach(b => b.addEventListener('click', e => { e.stopPropagation(); switchWorld(+b.dataset.world); }));

window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
window.addEventListener('resize', resize);
window.addEventListener('keydown', e => {
  if (e.key === '1') switchWorld(0);
  else if (e.key === '2') switchWorld(1);
  else if (e.key === '3') switchWorld(2);
  else if (e.key === 'ArrowRight') switchWorld(Math.min(2, currentWorld + 1));
  else if (e.key === 'ArrowLeft') switchWorld(Math.max(0, currentWorld - 1));
});

// Click handler for worlds that support it
window.addEventListener('click', e => {
  if (!entered) return;
  if (currentWorld === 0) crystalCavern.click(e.clientX, e.clientY);
  if (currentWorld === 2) solarForge.click(e.clientX, e.clientY);
});

// ============================================================
// WORLD 1: CRYSTAL CAVERN — by Amber 💎
// ============================================================
const crystalCavern = (() => {
  const canvas = $('#world0');
  const ctx = canvas.getContext('2d');
  let crystals = [], sparkles = [], ambientParticles = [], burstParticles = [];

  const PALETTE = ['#c480ff','#a855f7','#7c3aed','#e879f9','#d946ef','#818cf8'];
  const GLOW = ['rgba(196,128,255,0.3)','rgba(168,85,247,0.3)','rgba(232,121,249,0.3)'];

  class Crystal {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * W;
      this.y = Math.random() * H;
      this.size = 15 + Math.random() * 45;
      this.sides = 4 + Math.floor(Math.random() * 4);
      this.rotation = Math.random() * Math.PI * 2;
      this.rotSpeed = (Math.random() - 0.5) * 0.005;
      this.color = PALETTE[Math.floor(Math.random() * PALETTE.length)];
      this.glowColor = GLOW[Math.floor(Math.random() * GLOW.length)];
      this.pulsePhase = Math.random() * Math.PI * 2;
      this.baseOpacity = 0.3 + Math.random() * 0.4;
    }
    update(t) {
      this.rotation += this.rotSpeed;
      const dx = this.x - mouseX, dy = this.y - mouseY;
      this.dist = Math.sqrt(dx*dx + dy*dy);
      this.proximity = Math.max(0, 1 - this.dist / 200);
      this.pulse = Math.sin(t * 2 + this.pulsePhase) * 0.2 + 0.8;
    }
    draw(ctx, t) {
      const op = this.baseOpacity + this.proximity * 0.5;
      const sz = this.size * (this.pulse + this.proximity * 0.3);
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rotation);
      ctx.globalAlpha = op;
      // Glow
      if (this.proximity > 0.05) {
        const g = ctx.createRadialGradient(0,0,sz*0.3,0,0,sz*2.5);
        g.addColorStop(0, this.glowColor);
        g.addColorStop(1, 'transparent');
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(0,0,sz*2.5,0,Math.PI*2); ctx.fill();
      }
      // Crystal shape
      ctx.beginPath();
      for (let i = 0; i < this.sides; i++) {
        const a = (i / this.sides) * Math.PI * 2 - Math.PI/2;
        const r = i % 2 === 0 ? sz : sz * 0.5;
        ctx[i===0?'moveTo':'lineTo'](Math.cos(a)*r, Math.sin(a)*r);
      }
      ctx.closePath();
      ctx.fillStyle = this.color;
      ctx.globalAlpha = op * 0.25;
      ctx.fill();
      ctx.strokeStyle = this.color;
      ctx.lineWidth = 1.5;
      ctx.globalAlpha = op * 0.8;
      ctx.stroke();
      // Inner lines
      ctx.globalAlpha = op * 0.15;
      ctx.beginPath();
      for (let i = 0; i < this.sides; i++) {
        const a = (i / this.sides) * Math.PI * 2 - Math.PI/2;
        ctx.moveTo(0,0);
        ctx.lineTo(Math.cos(a)*sz*0.8, Math.sin(a)*sz*0.8);
      }
      ctx.stroke();
      ctx.restore();
    }
  }

  class Sparkle {
    constructor(x, y) {
      this.x = x; this.y = y;
      this.life = 1; this.decay = 0.02 + Math.random() * 0.03;
      this.size = 1 + Math.random() * 2;
      this.vx = (Math.random()-0.5)*0.5; this.vy = -Math.random()*0.5-0.2;
    }
    update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; }
    draw(ctx) {
      ctx.save();
      ctx.globalAlpha = this.life * 0.8;
      ctx.fillStyle = '#e8b4ff';
      ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }

  class AmbientP {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random()*W; this.y = H + 10;
      this.size = 0.5+Math.random()*1.5; this.speed = 0.2+Math.random()*0.4;
      this.drift = (Math.random()-0.5)*0.2; this.opacity = 0.1+Math.random()*0.2;
    }
    update() { this.y -= this.speed; this.x += this.drift; if (this.y < -10) this.reset(); }
    draw(ctx) {
      ctx.save(); ctx.globalAlpha = this.opacity;
      ctx.fillStyle = '#c480ff';
      ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }

  function init() {
    crystals = []; sparkles = []; ambientParticles = []; burstParticles = [];
    const n = Math.max(8, Math.floor(W*H/40000));
    for (let i=0;i<n;i++) crystals.push(new Crystal());
    for (let i=0;i<60;i++) ambientParticles.push(new AmbientP());
  }

  function click(x,y) {
    for (let i=0;i<30;i++) {
      const s = new Sparkle(x,y);
      s.vx = (Math.random()-0.5)*4; s.vy = (Math.random()-0.5)*4;
      s.decay = 0.01+Math.random()*0.02; s.size = 1+Math.random()*3;
      burstParticles.push(s);
    }
  }

  function update(t) {
    // Background
    const bg = ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'#0a0015'); bg.addColorStop(0.5,'#120025'); bg.addColorStop(1,'#08001a');
    ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

    ambientParticles.forEach(p => { p.update(); p.draw(ctx); });
    crystals.forEach(c => { c.update(t); c.draw(ctx,t); });

    // Mouse sparkle trail
    if (Math.random() < 0.3) sparkles.push(new Sparkle(mouseX+(Math.random()-0.5)*10, mouseY+(Math.random()-0.5)*10));
    sparkles.forEach(s => { s.update(); s.draw(ctx); });
    sparkles = sparkles.filter(s => s.life > 0);

    burstParticles.forEach(s => { s.update(); s.draw(ctx); });
    burstParticles = burstParticles.filter(s => s.life > 0);
  }

  function resizeFn() { init(); }
  return { update, resize: resizeFn, click };
})();

// ============================================================
// WORLD 2: OCEAN DEPTHS — by Mave 🌊
// ============================================================
const oceanDepths = (() => {
  const canvas = $('#world1');
  const ctx = canvas.getContext('2d');
  let jellies=[], plankton=[], bubbles=[], time=0;

  const COLORS = {
    jellyBody: ['rgba(80,180,255,0.15)','rgba(120,220,255,0.1)','rgba(200,100,255,0.12)'],
    jellyGlow: ['#4df0ff','#80ffea','#c480ff','#ff80d5'],
    plankton: ['#4df0ff','#80ffea','#40e0d0','#7fffd4','#c480ff'],
  };

  class Jellyfish {
    constructor(init) {
      this.x = Math.random()*W; this.y = init ? Math.random()*H : H+80;
      this.size = 20+Math.random()*40; this.speed = 0.15+Math.random()*0.3;
      this.wobbleSpeed = 0.5+Math.random(); this.wobbleAmp = 15+Math.random()*25;
      this.pulseSpeed = 1+Math.random()*2; this.tentCount = 5+Math.floor(Math.random()*4);
      this.ci = Math.floor(Math.random()*4); this.phase = Math.random()*Math.PI*2;
      this.opacity = 0.4+Math.random()*0.4;
    }
    update(spd) {
      this.y -= this.speed*spd;
      this.x += Math.sin(time*this.wobbleSpeed+this.phase)*0.3;
      const dx=this.x-mouseX, dy=this.y-mouseY, d=Math.sqrt(dx*dx+dy*dy);

    constructor() { this.reset(); }

  }

      ctx.restore();
    }
  }

  function init() {
    particles=[]; embers=[]; flares=[];
    const pn=Math.min(150, Math.max(80,Math.floor(W*H/15000)));
    const en=Math.min(50, Math.max(30,Math.floor(W*H/40000)));
    for(let i=0;i<pn;i++) particles.push(new SunParticle());
    for(let i=0;i<en;i++) embers.push(new Ember());
  }

    for(let i=0;i<40;i++) flares.push(new Flare(x,y));
  }

  function update(dt) {
    time+=dt*0.001;

    // Background — dark with warm tint
    const bg=ctx.createRadialGradient(W/2,H/2,50,W/2,H/2,Math.max(W,H)*0.7);
    bg.addColorStop(0,'rgb(40,15,5)'); bg.addColorStop(0.4,'rgb(15,5,2)'); bg.addColorStop(1,'rgb(5,2,0)');
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

    // Central sun glow

    const sunPulse=Math.sin(time*0.8)*0.15+0.85;
    const sg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,180*sunPulse);
    sg.addColorStop(0,'rgba(255,215,0,0.25)'); sg.addColorStop(0.3,'rgba(255,107,53,0.12)');
    sg.addColorStop(0.6,'rgba(255,69,0,0.05)'); sg.addColorStop(1,'transparent');
    ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(W/2,H/2,180*sunPulse,0,Math.PI*2); ctx.fill();
    // Core
    const core=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,35);
    core.addColorStop(0,'rgba(255,255,220,0.9)'); core.addColorStop(0.5,'rgba(255,200,50,0.4)');

    particles.forEach(p=>{p.update(time);p.draw();});
