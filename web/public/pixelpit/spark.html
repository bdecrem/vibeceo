<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>SPARK</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #09090b; overflow: hidden; touch-action: none; font-family: monospace; }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    let W, H, safeTop = 0;
    function resize() {
      canvas.width = window.innerWidth; canvas.height = window.innerHeight;
      W = canvas.width; H = canvas.height;
      safeTop = parseInt(getComputedStyle(document.documentElement).getPropertyValue('env(safe-area-inset-top)')) || 0;
    }
    resize();
    window.addEventListener('resize', resize);

    // --- INDIE BITE THEME ---
    const T = {
      bg: '#09090b',
      surface: '#18181b',
      border: '#27272a',
      copper: '#d97706',
      copperHi: '#fbbf24',
      bolt: '#60a5fa',
      boltEdge: '#ffffff',
      target: '#22c55e',
      targetGlow: '#4ade80',
      insulator: '#22d3ee',
      white: '#ffffff',
      gold: '#facc15',
      red: '#ef4444',
      muted: '#71717a',
      text: '#ffffff',
    };

    // --- CONSTANTS ---
    const STROKE_W = 6;
    const GRAVITY = 400; // px/s² — gentle drop, predictable landing
    const DROP_DAMPING = 0.3; // bounce factor
    const LIGHTNING_DELAY = 1.5; // seconds after drop settles
    const LIGHTNING_SPEED = 800; // px/s arc travel
    const INK_PX_PER_UNIT = 1; // 1px drawn = 1 ink unit
    const SOURCE_R = 12;
    const TARGET_R = 14;
    const INSULATOR_BORDER = 2;
    const SEGMENT_MIN_LEN = 4; // min distance between stroke points

    // --- AUDIO ---
    let audioCtx;
    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    function unlockAudio() {
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      document.removeEventListener('touchstart', unlockAudio);
      document.removeEventListener('click', unlockAudio);
    }
    document.addEventListener('touchstart', unlockAudio);
    document.addEventListener('click', unlockAudio);

    function playDrawHum(speed) {
      // Continuous hum while drawing — called per-frame, short bursts
      if (!audioCtx) return;
      const freq = 80 + Math.min(speed * 0.3, 200);
      const o = audioCtx.createOscillator(); o.type = 'sawtooth'; o.frequency.value = freq;
      const g = audioCtx.createGain(); g.gain.setValueAtTime(0.03, audioCtx.currentTime);
      g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.05);
      o.connect(g).connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.05);
    }

    function playClang(mass) {
      if (!audioCtx) return;
      const freq = 200 - Math.min(mass * 0.5, 120);
      const o = audioCtx.createOscillator(); o.type = 'triangle'; o.frequency.value = freq;
      const g = audioCtx.createGain(); g.gain.setValueAtTime(0.15, audioCtx.currentTime);
      g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);
      o.connect(g).connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.15);
      // Noise
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.04, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
      const src = audioCtx.createBufferSource(); src.buffer = buf;
      const ng = audioCtx.createGain(); ng.gain.value = 0.1;
      src.connect(ng).connect(audioCtx.destination); src.start();
    }

    function playCrack() {
      if (!audioCtx) return;
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.03, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length) * 0.8;
      const src = audioCtx.createBufferSource(); src.buffer = buf;
      const g = audioCtx.createGain(); g.gain.value = 0.2;
      src.connect(g).connect(audioCtx.destination); src.start();
    }

    function playZap() {
      if (!audioCtx) return;
      // Rising buzz → crack
      const o = audioCtx.createOscillator(); o.type = 'sawtooth';
      o.frequency.setValueAtTime(100, audioCtx.currentTime);
      o.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 0.15);
      const g = audioCtx.createGain(); g.gain.setValueAtTime(0.12, audioCtx.currentTime);
      g.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.1);
      g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
      o.connect(g).connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.2);
    }

    function playSuccess() {
      if (!audioCtx) return;
      [523, 659, 784, 1047].forEach((freq, i) => {
        const t = audioCtx.currentTime + i * 0.08;
        const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.value = freq;
        const g = audioCtx.createGain(); g.gain.setValueAtTime(0.1, t);
        g.gain.linearRampToValueAtTime(0, t + 0.3);
        o.connect(g).connect(audioCtx.destination); o.start(t); o.stop(t + 0.3);
      });
    }

    function playFizzle() {
      if (!audioCtx) return;
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.3, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length) * 0.3;
      const src = audioCtx.createBufferSource(); src.buffer = buf;
      const g = audioCtx.createGain(); g.gain.value = 0.1;
      src.connect(g).connect(audioCtx.destination); src.start();
    }

    // --- PERLIN-ISH NOISE for jagged lightning ---
    function jaggedPath(x1, y1, x2, y2, segments, amplitude) {
      const points = [];
      const dx = x2 - x1, dy = y2 - y1;
      const len = Math.hypot(dx, dy);
      const nx = -dy / len, ny = dx / len; // normal
      for (let i = 0; i <= segments; i++) {
        const t = i / segments;
        const jag = i === 0 || i === segments ? 0 : (Math.random() * 2 - 1) * amplitude;
        points.push({
          x: x1 + dx * t + nx * jag,
          y: y1 + dy * t + ny * jag,
        });
      }
      return points;
    }

    // --- LEVEL DATA ---
    function generateLevel(lvl) {
      const margin = 40;
      const playW = W - margin * 2;
      const playH = H - margin * 2 - safeTop;
      const ox = margin;
      const oy = margin + safeTop;

      // Source: top area
      const source = { x: W / 2, y: oy + 20 };
      // Target: bottom area
      const target = { x: W / 2, y: oy + playH - 20 };

      const insulators = [];
      const platforms = []; // static surfaces to land on

      // Bottom floor (always present)
      platforms.push({ x: ox, y: oy + playH + 10, w: playW, h: 20 });

      if (lvl >= 2) {
        // Offset target from center
        target.x = ox + playW * (0.3 + Math.random() * 0.4);
      }

      if (lvl >= 3) {
        // Add insulators
        const numIns = Math.min(Math.floor((lvl - 2) / 2) + 1, 4);
        for (let i = 0; i < numIns; i++) {
          const iw = 40 + Math.random() * 40;
          const ih = 12;
          const ix = ox + playW * (0.15 + Math.random() * 0.6);
          const iy = oy + playH * (0.25 + i * 0.15 + Math.random() * 0.08);
          insulators.push({ x: ix, y: iy, w: iw, h: ih });
        }
      }

      if (lvl >= 4) {
        // Add platforms (ledges for strokes to land on)
        const numPlat = Math.min(Math.floor((lvl - 3) / 2) + 1, 3);
        for (let i = 0; i < numPlat; i++) {
          const pw = 50 + Math.random() * 40;
          const ph = 8;
          const px = ox + playW * (0.1 + Math.random() * 0.7);
          const py = oy + playH * (0.3 + i * 0.2 + Math.random() * 0.05);
          platforms.push({ x: px, y: py, w: pw, h: ph });
        }
      }

      if (lvl >= 2) {
        // Vary source position too
        source.x = ox + playW * (0.3 + Math.random() * 0.4);
      }

      // Ink limit: generous early, tighter later
      const inkLimit = Math.max(150, 400 - lvl * 20);

      // Par ink (for stars): 60% of limit
      const parInk = Math.floor(inkLimit * 0.6);

      // Ensure no insulator blocks source or target
      for (const ins of insulators) {
        if (Math.abs(ins.x + ins.w / 2 - source.x) < 30 && Math.abs(ins.y - source.y) < 30) ins.y += 40;
        if (Math.abs(ins.x + ins.w / 2 - target.x) < 30 && Math.abs(ins.y - target.y) < 30) ins.y -= 40;
      }

      return { source, target, insulators, platforms, inkLimit, parInk };
    }

    // --- STATE ---
    let source, targetPos, insulators, platforms, inkLimit, parInk;
    let strokes; // array of { points: [{x,y}], vy: number, settled: bool, landedY: number }
    let currentStroke; // points being drawn
    let inkUsed;
    let level, score, bestScore;
    let phase; // 'start', 'drawing', 'dropping', 'waiting', 'arcing', 'cleared', 'failed', 'over'
    let particles;
    let screenShake, flashTimer, flashColor;
    let dropTimer, waitTimer, arcTimer;
    let arcPath; // jagged lightning path for rendering
    let arcProgress; // 0..1 how far along the arc has traveled
    let arcReachedTarget;
    let gameTime;
    let attempts;
    let celebTimer;
    let drawSpeed; // for hum pitch

    function init() {
      level = 0;
      score = 0;
      bestScore = parseInt(localStorage.getItem('spark_best') || '0');
      phase = 'start';
      strokes = [];
      currentStroke = null;
      particles = [];
      screenShake = 0;
      flashTimer = 0;
      flashColor = T.white;
      gameTime = 0;
      attempts = 0;
    }

    function setupLevel(lvl) {
      level = lvl;
      const gen = generateLevel(lvl);
      source = gen.source;
      targetPos = gen.target;
      insulators = gen.insulators;
      platforms = gen.platforms;
      inkLimit = gen.inkLimit;
      parInk = gen.parInk;
      strokes = [];
      currentStroke = null;
      inkUsed = 0;
      particles = [];
      phase = 'drawing';
      dropTimer = 0;
      waitTimer = 0;
      arcTimer = 0;
      arcPath = null;
      arcProgress = 0;
      arcReachedTarget = false;
      celebTimer = 0;
      attempts = 0;
      drawSpeed = 0;
    }

    function retryLevel() {
      attempts++;
      strokes = [];
      currentStroke = null;
      inkUsed = 0;
      particles = [];
      phase = 'drawing';
      dropTimer = 0;
      waitTimer = 0;
      arcTimer = 0;
      arcPath = null;
      arcProgress = 0;
      arcReachedTarget = false;
      drawSpeed = 0;
    }

    // --- STROKE LENGTH ---
    function strokeLength(points) {
      let len = 0;
      for (let i = 1; i < points.length; i++) {
        len += Math.hypot(points[i].x - points[i - 1].x, points[i].y - points[i - 1].y);
      }
      return len;
    }

    // --- COLLISION: point vs rect ---
    function pointInRect(px, py, rect) {
      return px >= rect.x && px <= rect.x + rect.w && py >= rect.y && py <= rect.y + rect.h;
    }

    // --- COLLISION: segment vs rect ---
    function segmentIntersectsRect(x1, y1, x2, y2, rect) {
      // Check if line segment intersects rectangle
      const left = rect.x, right = rect.x + rect.w, top = rect.y, bottom = rect.y + rect.h;
      // Quick: if both points inside, it's inside
      if (x1 >= left && x1 <= right && y1 >= top && y1 <= bottom) return true;
      if (x2 >= left && x2 <= right && y2 >= top && y2 <= bottom) return true;
      // Check segment vs rect edges (simplified)
      return lineIntersectsLine(x1, y1, x2, y2, left, top, right, top) ||
             lineIntersectsLine(x1, y1, x2, y2, left, bottom, right, bottom) ||
             lineIntersectsLine(x1, y1, x2, y2, left, top, left, bottom) ||
             lineIntersectsLine(x1, y1, x2, y2, right, top, right, bottom);
    }

    function lineIntersectsLine(x1, y1, x2, y2, x3, y3, x4, y4) {
      const d = (x2 - x1) * (y4 - y3) - (y2 - y1) * (x4 - x3);
      if (Math.abs(d) < 0.001) return false;
      const t = ((x3 - x1) * (y4 - y3) - (y3 - y1) * (x4 - x3)) / d;
      const u = ((x3 - x1) * (y2 - y1) - (y3 - y1) * (x2 - x1)) / d;
      return t >= 0 && t <= 1 && u >= 0 && u <= 1;
    }

    // --- GRAVITY DROP ---
    function dropStrokes(dt) {
      let allSettled = true;
      for (const stroke of strokes) {
        if (stroke.settled) continue;
        allSettled = false;

        stroke.vy += GRAVITY * dt;
        const dy = stroke.vy * dt;

        // Move all points down
        let landed = false;
        let landY = H + 100;

        // Check each point for landing on platforms/insulators/floor
        for (const pt of stroke.points) {
          const newY = pt.y + dy;
          // Check platforms
          for (const plat of platforms) {
            if (pt.x >= plat.x && pt.x <= plat.x + plat.w) {
              if (pt.y <= plat.y && newY >= plat.y) {
                landY = Math.min(landY, plat.y);
                landed = true;
              }
            }
          }
          // Check insulators (can land ON them)
          for (const ins of insulators) {
            if (pt.x >= ins.x && pt.x <= ins.x + ins.w) {
              if (pt.y <= ins.y && newY >= ins.y) {
                landY = Math.min(landY, ins.y);
                landed = true;
              }
            }
          }
        }

        if (landed) {
          // Snap to land position
          const lowestPt = Math.max(...stroke.points.map(p => p.y));
          const offset = landY - lowestPt;
          for (const pt of stroke.points) pt.y += offset;
          stroke.vy = 0;
          stroke.settled = true;
          playClang(stroke.points.length);
          screenShake = 0.04;
        } else {
          for (const pt of stroke.points) pt.y += dy;
          // Off screen = settled (lost)
          if (stroke.points[0].y > H + 50) stroke.settled = true;
        }
      }
      return allSettled;
    }

    // --- ELECTRICITY PATHFINDING ---
    // Find if there's a conductive path from source to target through drawn strokes
    function findElectricPath() {
      // Build a graph: source → nearby stroke points → connected stroke points → target
      const CONNECT_DIST = 25; // max gap electricity can arc across

      // Collect all stroke segment endpoints
      const nodes = [{ x: source.x, y: source.y, type: 'source' }];
      const strokeNodes = [];

      for (const stroke of strokes) {
        if (!stroke.settled) continue;
        for (let i = 0; i < stroke.points.length; i++) {
          const idx = nodes.length;
          nodes.push({ x: stroke.points[i].x, y: stroke.points[i].y, type: 'stroke', strokeIdx: strokes.indexOf(stroke), ptIdx: i });
          strokeNodes.push(idx);
        }
      }

      const targetIdx = nodes.length;
      nodes.push({ x: targetPos.x, y: targetPos.y, type: 'target' });

      // Build adjacency
      const adj = Array.from({ length: nodes.length }, () => []);

      // Connect consecutive points in same stroke
      let ni = 1;
      for (const stroke of strokes) {
        if (!stroke.settled) continue;
        for (let i = 0; i < stroke.points.length - 1; i++) {
          // Check if segment passes through an insulator
          const p1 = stroke.points[i], p2 = stroke.points[i + 1];
          let blocked = false;
          for (const ins of insulators) {
            if (segmentIntersectsRect(p1.x, p1.y, p2.x, p2.y, ins)) {
              blocked = true;
              break;
            }
          }
          if (!blocked) {
            adj[ni + i].push(ni + i + 1);
            adj[ni + i + 1].push(ni + i);
          }
        }
        ni += stroke.points.length;
      }

      // Connect nearby nodes (cross-stroke connections + source/target connections)
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          if (nodes[i].type === 'stroke' && nodes[j].type === 'stroke' &&
              nodes[i].strokeIdx === nodes[j].strokeIdx) continue; // already connected above
          const d = Math.hypot(nodes[i].x - nodes[j].x, nodes[i].y - nodes[j].y);
          if (d <= CONNECT_DIST) {
            // Check insulator blocking
            let blocked = false;
            for (const ins of insulators) {
              if (segmentIntersectsRect(nodes[i].x, nodes[i].y, nodes[j].x, nodes[j].y, ins)) {
                blocked = true;
                break;
              }
            }
            if (!blocked) {
              adj[i].push(j);
              adj[j].push(i);
            }
          }
        }
      }

      // BFS from source (node 0) to target (targetIdx)
      const visited = new Set();
      const parent = new Map();
      const queue = [0];
      visited.add(0);

      while (queue.length > 0) {
        const cur = queue.shift();
        if (cur === targetIdx) {
          // Reconstruct path
          const path = [];
          let n = targetIdx;
          while (n !== undefined) {
            path.unshift(nodes[n]);
            n = parent.get(n);
          }
          return path;
        }
        for (const next of adj[cur]) {
          if (!visited.has(next)) {
            visited.add(next);
            parent.set(next, cur);
            queue.push(next);
          }
        }
      }

      return null; // no path
    }

    function buildArcPath(path) {
      // Convert path nodes to jagged lightning segments
      const jagPoints = [];
      for (let i = 0; i < path.length - 1; i++) {
        const p1 = path[i], p2 = path[i + 1];
        const dist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
        const segs = Math.max(3, Math.floor(dist / 8));
        const amp = Math.min(dist * 0.15, 12);
        const jag = jaggedPath(p1.x, p1.y, p2.x, p2.y, segs, amp);
        if (i > 0) jag.shift(); // avoid duplicate points
        jagPoints.push(...jag);
      }
      return jagPoints;
    }

    // --- GHOST PREVIEW: show where strokes will land ---
    function computeGhostOffset(stroke) {
      // Find the lowest landing point for this stroke
      let minDrop = Infinity;
      for (const pt of stroke.points) {
        // Check platforms
        for (const plat of platforms) {
          if (pt.x >= plat.x && pt.x <= plat.x + plat.w && plat.y > pt.y) {
            minDrop = Math.min(minDrop, plat.y - pt.y);
          }
        }
        // Check insulators
        for (const ins of insulators) {
          if (pt.x >= ins.x && pt.x <= ins.x + ins.w && ins.y > pt.y) {
            minDrop = Math.min(minDrop, ins.y - pt.y);
          }
        }
      }
      // Snap to lowest point in stroke
      const lowestPt = Math.max(...stroke.points.map(p => p.y));
      if (minDrop === Infinity) {
        // Would fall off screen — show ghost at bottom
        return H - 20 - lowestPt;
      }
      // Offset so lowest point touches the surface
      return minDrop - (lowestPt - Math.min(...stroke.points.map(p => p.y)));
    }

    // --- PARTICLES ---
    function spawnParticles(x, y, color, count, spdMult) {
      spdMult = spdMult || 1;
      for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const spd = (30 + Math.random() * 80) * spdMult;
        particles.push({
          x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
          life: 0.3 + Math.random() * 0.3, maxLife: 0.3 + Math.random() * 0.3,
          color, size: 1 + Math.random() * 3,
        });
      }
    }

    // --- INPUT ---
    function handleDown(e) {
      e.preventDefault();
      const touch = e.touches ? e.touches[0] : e;
      const tx = touch.clientX, ty = touch.clientY;

      if (phase === 'start') {
        initAudio();
        setupLevel(1);
        return;
      }
      if (phase === 'over') {
        init();
        initAudio();
        setupLevel(1);
        return;
      }
      if (phase === 'failed') {
        retryLevel();
        return;
      }
      if (phase === 'cleared') return;

      // Retry button tap
      if (phase === 'drawing' && tx < 90 && ty > H - 40) {
        retryLevel();
        return;
      }

      // Zap button tap (launch lightning manually)
      if (phase === 'drawing' && tx > W - 70 && ty > H - 40) {
        if (strokes.length > 0) {
          phase = 'dropping';
          dropTimer = 0;
          for (const stroke of strokes) {
            stroke.vy = 0;
            stroke.settled = false;
          }
        }
        return;
      }

      if (phase === 'drawing') {
        // Check if drawing inside insulator — don't allow
        for (const ins of insulators) {
          if (pointInRect(tx, ty, ins)) return;
        }
        currentStroke = [{ x: tx, y: ty }];
      }
    }

    function handleMove(e) {
      e.preventDefault();
      if (!currentStroke || phase !== 'drawing') return;
      const touch = e.touches ? e.touches[0] : e;
      const tx = touch.clientX, ty = touch.clientY;

      const last = currentStroke[currentStroke.length - 1];
      const dist = Math.hypot(tx - last.x, ty - last.y);

      if (dist >= SEGMENT_MIN_LEN) {
        // Check ink limit
        if (inkUsed + dist > inkLimit) return; // out of ink

        // Check if new segment passes through insulator
        for (const ins of insulators) {
          if (segmentIntersectsRect(last.x, last.y, tx, ty, ins)) return;
        }

        currentStroke.push({ x: tx, y: ty });
        inkUsed += dist;
        drawSpeed = dist;

        // Draw hum (occasional, not every frame)
        if (currentStroke.length % 3 === 0) playDrawHum(dist);
      }
    }

    function handleUp(e) {
      e.preventDefault();
      if (!currentStroke || phase !== 'drawing') return;

      if (currentStroke.length >= 2) {
        strokes.push({
          points: [...currentStroke],
          vy: 0,
          settled: false,
        });
      }
      currentStroke = null;
      drawSpeed = 0;
    }

    canvas.addEventListener('pointerdown', handleDown);
    canvas.addEventListener('pointermove', handleMove);
    canvas.addEventListener('pointerup', handleUp);
    canvas.addEventListener('pointercancel', handleUp);

    // Keyboard
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.code === 'Enter') {
        if (phase === 'start') { initAudio(); setupLevel(1); return; }
        if (phase === 'over') { init(); initAudio(); setupLevel(1); return; }
        if (phase === 'failed') { retryLevel(); return; }
        if (phase === 'drawing' && strokes.length > 0) {
          phase = 'dropping';
          dropTimer = 0;
          for (const stroke of strokes) { stroke.vy = 0; stroke.settled = false; }
        }
      }
      if (e.code === 'KeyR' && phase === 'drawing') retryLevel();
    });

    // --- UPDATE ---
    let lastTime = 0;

    function update(dt) {
      if (phase === 'start' || phase === 'over') { gameTime += dt; return; }
      gameTime += dt;

      // Dropping phase
      if (phase === 'dropping') {
        dropTimer += dt;
        const allSettled = dropStrokes(dt);
        if (allSettled || dropTimer > 1.0) {
          // Force settle
          for (const stroke of strokes) stroke.settled = true;
          phase = 'waiting';
          waitTimer = 0;
        }
      }

      // Waiting phase (pause before lightning)
      if (phase === 'waiting') {
        waitTimer += dt;
        if (waitTimer >= LIGHTNING_DELAY) {
          // Fire lightning
          const path = findElectricPath();
          if (path) {
            arcPath = buildArcPath(path);
            arcProgress = 0;
            arcReachedTarget = false;
            phase = 'arcing';
            arcTimer = 0;
            playCrack();
          } else {
            // No path — fizzle
            phase = 'failed';
            spawnParticles(source.x, source.y, T.bolt, 8);
            playFizzle();
          }
        }
      }

      // Arcing phase
      if (phase === 'arcing') {
        arcTimer += dt;
        // Arc travels along path
        const totalLen = arcPathLength();
        arcProgress = Math.min(1, arcTimer * LIGHTNING_SPEED / totalLen);

        if (arcProgress >= 1 && !arcReachedTarget) {
          arcReachedTarget = true;
          // SUCCESS
          phase = 'cleared';
          celebTimer = 0;
          // Score
          const stars = inkUsed <= parInk ? 3 : inkUsed <= inkLimit * 0.85 ? 2 : 1;
          const levelScore = level * 10 + stars * 5;
          score += levelScore;
          flashTimer = 0.15;
          flashColor = T.white;
          screenShake = 0.1;
          spawnParticles(targetPos.x, targetPos.y, T.target, 15, 1.5);
          spawnParticles(targetPos.x, targetPos.y, T.bolt, 10);
          playZap();
          setTimeout(() => playSuccess(), 100);
        }
      }

      // Cleared
      if (phase === 'cleared') {
        celebTimer += dt;
        if (celebTimer > 2.2) {
          setupLevel(level + 1);
        }
      }

      // Screen shake / flash decay
      if (screenShake > 0) screenShake -= dt * 2;
      if (flashTimer > 0) flashTimer -= dt;

      // Particles
      for (const p of particles) {
        p.x += p.vx * dt; p.y += p.vy * dt;
        p.vx *= 0.97; p.vy *= 0.97;
        p.life -= dt;
      }
      particles = particles.filter(p => p.life > 0);
    }

    function arcPathLength() {
      if (!arcPath || arcPath.length < 2) return 1;
      let len = 0;
      for (let i = 1; i < arcPath.length; i++) {
        len += Math.hypot(arcPath[i].x - arcPath[i - 1].x, arcPath[i].y - arcPath[i - 1].y);
      }
      return Math.max(len, 1);
    }

    // --- DRAW ---
    function draw() {
      const sx = screenShake > 0 ? (Math.random() - 0.5) * 4 : 0;
      const sy = screenShake > 0 ? (Math.random() - 0.5) * 4 : 0;
      ctx.save();
      ctx.translate(sx, sy);

      ctx.fillStyle = T.bg;
      ctx.fillRect(-10, -10, W + 20, H + 20);

      // Flash
      if (flashTimer > 0) {
        ctx.fillStyle = flashColor;
        ctx.globalAlpha = flashTimer * 3;
        ctx.fillRect(0, 0, W, H);
        ctx.globalAlpha = 1;
      }

      // Platforms (subtle)
      for (const plat of platforms) {
        if (plat.y > H) continue; // floor is hidden
        ctx.fillStyle = T.surface;
        ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
        ctx.strokeStyle = T.border;
        ctx.lineWidth = 1;
        ctx.strokeRect(plat.x, plat.y, plat.w, plat.h);
      }

      // Insulators
      for (const ins of insulators) {
        ctx.fillStyle = 'rgba(34,211,238,0.08)';
        ctx.fillRect(ins.x, ins.y, ins.w, ins.h);
        ctx.strokeStyle = T.insulator;
        ctx.lineWidth = INSULATOR_BORDER;
        ctx.strokeRect(ins.x, ins.y, ins.w, ins.h);
        // Label
        ctx.fillStyle = T.insulator;
        ctx.font = '8px monospace';
        ctx.textAlign = 'center';
        ctx.globalAlpha = 0.6;
        ctx.fillText('INS', ins.x + ins.w / 2, ins.y + ins.h / 2 + 3);
        ctx.globalAlpha = 1;
      }

      // Source (lightning origin)
      ctx.fillStyle = T.bolt;
      ctx.shadowColor = T.bolt;
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.arc(source.x, source.y, SOURCE_R, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      // Lightning bolt icon
      ctx.fillStyle = T.white;
      ctx.font = 'bold 12px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('⚡', source.x, source.y + 4);

      // Target (ground rod)
      const targetPulse = Math.sin(gameTime * 3) * 0.3 + 0.7;
      ctx.fillStyle = T.target;
      ctx.shadowColor = T.target;
      ctx.shadowBlur = 10 * targetPulse;
      ctx.beginPath();
      ctx.arc(targetPos.x, targetPos.y, TARGET_R, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      // Ground symbol
      ctx.strokeStyle = T.white;
      ctx.lineWidth = 2;
      const gx = targetPos.x, gy = targetPos.y;
      ctx.beginPath();
      ctx.moveTo(gx, gy - 5); ctx.lineTo(gx, gy + 2);
      ctx.moveTo(gx - 6, gy + 2); ctx.lineTo(gx + 6, gy + 2);
      ctx.moveTo(gx - 4, gy + 5); ctx.lineTo(gx + 4, gy + 5);
      ctx.moveTo(gx - 2, gy + 8); ctx.lineTo(gx + 2, gy + 8);
      ctx.stroke();

      // Drawn strokes (copper)
      for (const stroke of strokes) {
        if (stroke.points.length < 2) continue;
        ctx.strokeStyle = T.copper;
        ctx.lineWidth = STROKE_W;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.shadowColor = T.copperHi;
        ctx.shadowBlur = 4;
        ctx.beginPath();
        ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
        for (let i = 1; i < stroke.points.length; i++) {
          ctx.lineTo(stroke.points[i].x, stroke.points[i].y);
        }
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Highlight edge
        ctx.strokeStyle = T.copperHi;
        ctx.lineWidth = 1;
        ctx.globalAlpha = 0.4;
        ctx.beginPath();
        ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
        for (let i = 1; i < stroke.points.length; i++) {
          ctx.lineTo(stroke.points[i].x, stroke.points[i].y);
        }
        ctx.stroke();
        ctx.globalAlpha = 1;
      }

      // Ghost preview (show where strokes will land)
      if (phase === 'drawing') {
        for (const stroke of strokes) {
          if (stroke.points.length < 2) continue;
          const offset = computeGhostOffset(stroke);
          if (offset < 2) continue; // already at landing pos
          ctx.strokeStyle = T.copper;
          ctx.lineWidth = STROKE_W;
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';
          ctx.globalAlpha = 0.15;
          ctx.setLineDash([4, 6]);
          ctx.beginPath();
          ctx.moveTo(stroke.points[0].x, stroke.points[0].y + offset);
          for (let i = 1; i < stroke.points.length; i++) {
            ctx.lineTo(stroke.points[i].x, stroke.points[i].y + offset);
          }
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.globalAlpha = 1;
        }
      }

      // Current stroke being drawn
      if (currentStroke && currentStroke.length >= 2) {
        ctx.strokeStyle = T.copperHi;
        ctx.lineWidth = STROKE_W;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.globalAlpha = 0.7;
        ctx.beginPath();
        ctx.moveTo(currentStroke[0].x, currentStroke[0].y);
        for (let i = 1; i < currentStroke.length; i++) {
          ctx.lineTo(currentStroke[i].x, currentStroke[i].y);
        }
        ctx.stroke();
        ctx.globalAlpha = 1;
      }

      // Lightning arc
      if (phase === 'arcing' && arcPath && arcPath.length >= 2) {
        const drawTo = Math.floor(arcProgress * (arcPath.length - 1));

        // Glow
        ctx.strokeStyle = T.bolt;
        ctx.lineWidth = 4;
        ctx.shadowColor = T.bolt;
        ctx.shadowBlur = 16;
        ctx.globalAlpha = 0.6;
        ctx.beginPath();
        ctx.moveTo(arcPath[0].x, arcPath[0].y);
        for (let i = 1; i <= drawTo; i++) {
          ctx.lineTo(arcPath[i].x, arcPath[i].y);
        }
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Core
        ctx.strokeStyle = T.boltEdge;
        ctx.lineWidth = 2;
        ctx.globalAlpha = 0.9;
        ctx.beginPath();
        ctx.moveTo(arcPath[0].x, arcPath[0].y);
        for (let i = 1; i <= drawTo; i++) {
          ctx.lineTo(arcPath[i].x, arcPath[i].y);
        }
        ctx.stroke();
        ctx.globalAlpha = 1;

        // Spark at tip
        if (drawTo > 0 && drawTo < arcPath.length) {
          const tip = arcPath[drawTo];
          ctx.fillStyle = T.white;
          ctx.shadowColor = T.bolt;
          ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.arc(tip.x, tip.y, 3, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
          // Tiny sparks
          if (Math.random() < 0.3) {
            spawnParticles(tip.x, tip.y, T.bolt, 1, 0.5);
          }
        }
      }

      // Particles
      for (const p of particles) {
        ctx.globalAlpha = p.life / p.maxLife;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1;

      // HUD
      if (phase !== 'start') {
        ctx.fillStyle = T.text;
        ctx.font = 'bold 16px monospace';
        ctx.textAlign = 'left';
        ctx.fillText('LVL ' + level, 12, safeTop + 24);

        ctx.textAlign = 'right';
        ctx.fillText(score, W - 12, safeTop + 24);

        // Ink meter
        const inkPct = Math.min(inkUsed / inkLimit, 1);
        const meterW = 100;
        const meterH = 6;
        const meterX = W / 2 - meterW / 2;
        const meterY = safeTop + 16;
        ctx.fillStyle = T.border;
        ctx.fillRect(meterX, meterY, meterW, meterH);
        ctx.fillStyle = inkPct < 0.6 ? T.copper : inkPct < 0.85 ? T.gold : T.red;
        ctx.fillRect(meterX, meterY, meterW * inkPct, meterH);
        ctx.strokeStyle = T.muted;
        ctx.lineWidth = 1;
        ctx.strokeRect(meterX, meterY, meterW, meterH);
        // Par mark
        const parMark = parInk / inkLimit;
        ctx.strokeStyle = T.target;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(meterX + meterW * parMark, meterY - 2);
        ctx.lineTo(meterX + meterW * parMark, meterY + meterH + 2);
        ctx.stroke();

        ctx.fillStyle = T.muted;
        ctx.font = '10px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('INK', W / 2, meterY + meterH + 12);

        // Buttons (drawing phase)
        if (phase === 'drawing') {
          ctx.fillStyle = T.muted;
          ctx.globalAlpha = 0.5;
          ctx.font = '12px monospace';
          ctx.textAlign = 'left';
          ctx.fillText('↺ RETRY', 12, H - 16);
          ctx.textAlign = 'right';
          ctx.fillText('ZAP ⚡', W - 12, H - 16);
          ctx.globalAlpha = 1;
        }
      }

      // Cleared overlay
      if (phase === 'cleared') {
        const t = Math.min(celebTimer / 0.3, 1);
        const c1 = 1.70158, c3 = c1 + 1;
        const scale = t < 1 ? 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2) : 1;

        ctx.save();
        ctx.translate(W / 2, H / 2 - 20);
        ctx.scale(scale, scale);
        ctx.fillStyle = T.target;
        ctx.font = 'bold 28px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('CONNECTED!', 0, 0);
        ctx.restore();

        // Stars
        const stars = inkUsed <= parInk ? 3 : inkUsed <= inkLimit * 0.85 ? 2 : 1;
        ctx.fillStyle = T.gold;
        ctx.font = '20px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('★'.repeat(stars) + '☆'.repeat(3 - stars), W / 2, H / 2 + 15);

        ctx.fillStyle = T.muted;
        ctx.font = '12px monospace';
        ctx.fillText(Math.floor(inkUsed) + ' ink (par ' + parInk + ')', W / 2, H / 2 + 38);
      }

      // Failed overlay
      if (phase === 'failed') {
        ctx.fillStyle = 'rgba(9,9,11,0.7)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = T.red;
        ctx.font = 'bold 20px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('NO PATH', W / 2, H / 2 - 10);
        ctx.fillStyle = T.muted;
        ctx.font = '13px monospace';
        ctx.fillText('TAP TO RETRY', W / 2, H / 2 + 20);
      }

      // Game over (shouldn't normally happen — infinite retries, but just in case)
      if (phase === 'over') {
        ctx.fillStyle = 'rgba(9,9,11,0.85)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = T.muted;
        ctx.font = 'bold 20px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('SHORTED', W / 2, H * 0.32);
        ctx.fillStyle = T.text;
        ctx.font = 'bold 40px monospace';
        ctx.fillText(score, W / 2, H * 0.32 + 50);
        ctx.font = '13px monospace';
        ctx.fillStyle = T.muted;
        ctx.fillText('Level ' + level, W / 2, H * 0.32 + 72);
        if (score >= bestScore && score > 0) {
          ctx.fillStyle = T.gold;
          ctx.font = '14px monospace';
          ctx.fillText('NEW RECORD', W / 2, H * 0.32 + 92);
        } else {
          ctx.fillStyle = T.muted;
          ctx.font = '12px monospace';
          ctx.fillText('BEST: ' + bestScore, W / 2, H * 0.32 + 92);
        }
        ctx.fillStyle = T.text;
        ctx.font = '15px monospace';
        ctx.fillText('TAP TO RETRY', W / 2, H * 0.6);
      }

      // Start screen
      if (phase === 'start') {
        // Lightning bolt decoration
        ctx.strokeStyle = T.bolt;
        ctx.lineWidth = 3;
        ctx.shadowColor = T.bolt;
        ctx.shadowBlur = 12;
        ctx.globalAlpha = 0.5;
        const bx = W / 2, by = H * 0.2;
        ctx.beginPath();
        ctx.moveTo(bx - 8, by - 20);
        ctx.lineTo(bx + 4, by - 2);
        ctx.lineTo(bx - 4, by + 2);
        ctx.lineTo(bx + 8, by + 20);
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;

        ctx.fillStyle = T.bolt;
        ctx.font = 'bold 32px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('SPARK', W / 2, H * 0.35);

        ctx.fillStyle = T.muted;
        ctx.font = '13px monospace';
        ctx.fillText('draw conductive paths', W / 2, H * 0.35 + 26);
        ctx.fillText('route electricity to the target', W / 2, H * 0.35 + 44);
        ctx.fillText('less ink = more stars', W / 2, H * 0.35 + 62);

        ctx.fillStyle = T.text;
        ctx.font = '15px monospace';
        ctx.fillText('TAP TO START', W / 2, H * 0.55);

        if (bestScore > 0) {
          ctx.fillStyle = T.muted;
          ctx.font = '12px monospace';
          ctx.fillText('BEST: ' + bestScore, W / 2, H * 0.55 + 25);
        }
      }

      ctx.restore();
    }

    // --- LOOP ---
    function gameLoop(timestamp) {
      const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
      lastTime = timestamp;
      update(dt);
      draw();
      requestAnimationFrame(gameLoop);
    }

    init();
    requestAnimationFrame((t) => { lastTime = t; gameLoop(t); });
  </script>
</body>
</html>
