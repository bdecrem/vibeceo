<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Das Kollektiv - Drift</title>
<meta property="og:title" content="Das Kollektiv - Drift">
<meta property="og:description" content="JT10 arpeggio dissolves into reverb. Notes thin out. The gaps become the music.">
<meta property="og:image" content="https://kochi.to/viz/pulse-grid-og.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Das Kollektiv - Drift">
<meta name="twitter:description" content="JT10 arpeggio dissolves into reverb. Notes thin out. The gaps become the music.">
<meta name="twitter:image" content="https://kochi.to/viz/pulse-grid-og.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #030305; overflow: hidden;
    font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
    cursor: crosshair;
  }
  canvas { position: fixed; top: 0; left: 0; }
  #overlay {
    position: fixed; inset: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  #play-btn {
    width: 56px; height: 56px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.3);
    font-size: 18px; cursor: pointer; pointer-events: auto;
    transition: all 0.4s;
    display: flex; align-items: center; justify-content: center;
  }
  #play-btn:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.5); }
  #play-btn.playing { opacity: 0; pointer-events: none; }
  #credits {
    position: fixed; bottom: 18px; left: 0; right: 0;
    text-align: center;
    font-size: 8px; letter-spacing: 4px;
    color: rgba(255,255,255,0.06); z-index: 10;
  }
  #title {
    position: fixed; top: 14px; left: 18px;
    font-size: 7px; letter-spacing: 3px;
    color: rgba(255,255,255,0.05); z-index: 10;
  }
  #section {
    position: fixed; top: 14px; right: 18px;
    font-size: 7px; letter-spacing: 3px;
    color: rgba(255,255,255,0.04); z-index: 10;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="title">DRIFT</div>
<div id="section"></div>
<div id="overlay"><button id="play-btn">▶</button></div>
<div id="credits">DAS KOLLEKTIV · HALLMAN · JT10</div>

<script type="module">
import { JT10Engine } from '/jt10/dist/machines/jt10/engine.js';
import { JB01Engine } from '/jb01/dist/machines/jb01/engine.js';

const BPM = 118;
const STEP_DUR = 60 / BPM / 4;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const sectionEl = document.getElementById('section');
let W, H, cx, cy;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
}
resize();
window.addEventListener('resize', resize);

// ── VISUAL ELEMENTS ──

const rings = [];
const dots = [];
let vizBrightness = 1.0;  // master brightness multiplier for fade-to-black

class SquareRing {
  constructor(size, thickness, brightness, isAccent = false) {
    this.size = size;
    this.thickness = thickness;
    this.brightness = brightness;
    this.alpha = isAccent ? 0.5 : 0.2;
    this.born = performance.now();
    this.isAccent = isAccent;
    this.expandRate = isAccent ? 40 : 25;
    this.maxSize = Math.max(W, H) * 1.3;
  }
  update() {
    this.size += this.expandRate * (1/60);
    this.alpha *= 0.997;
    return this.alpha > 0.002 && this.size < this.maxSize;
  }
  draw() {
    const c = Math.floor(255 * this.brightness * vizBrightness);
    ctx.strokeStyle = `rgba(${c},${c},${c},${this.alpha * vizBrightness})`;
    ctx.lineWidth = this.thickness;
    const half = this.size / 2;
    ctx.strokeRect(cx - half, cy - half, this.size, this.size);
  }
}

class ScatterDot {
  constructor(x, y, size, brightness) {
    this.x = x; this.y = y; this.size = size;
    this.brightness = brightness; this.alpha = 0.35;
    this.born = performance.now();
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = (Math.random() - 0.5) * 0.3;
  }
  update() {
    this.alpha *= 0.998;
    this.x += this.vx;
    this.y += this.vy;
    return this.alpha > 0.003;
  }
  draw() {
    const c = Math.floor(255 * this.brightness * vizBrightness);
    ctx.fillStyle = `rgba(${c},${c},${c},${this.alpha * vizBrightness})`;
    ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
  }
}

let centerPulse = 0;
let centerBlink = 0;  // for the lone blinking dot in drift

function render() {
  requestAnimationFrame(render);
  centerPulse *= 0.95;

  // Fade rate adapts to section — faster fade during drift
  const fadeAlpha = vizBrightness < 0.3 ? 0.025 : 0.004;
  ctx.fillStyle = `rgba(3,3,5,${fadeAlpha})`;
  ctx.fillRect(0, 0, W, H);

  for (let i = rings.length - 1; i >= 0; i--) {
    if (rings[i].update()) { rings[i].draw(); } else { rings.splice(i, 1); }
  }
  for (let i = dots.length - 1; i >= 0; i--) {
    if (dots[i].update()) { dots[i].draw(); } else { dots.splice(i, 1); }
  }

  // Center dot — during drift, just a lone blinking pixel
  if (vizBrightness < 0.3) {
    // Drift mode: slow breathing dot
    centerBlink += 0.02;
    const blinkAlpha = 0.05 + 0.08 * Math.sin(centerBlink);
    ctx.fillStyle = `rgba(255,255,255,${blinkAlpha})`;
    ctx.fillRect(cx - 1, cy - 1, 2, 2);
  } else if (centerPulse > 0.03) {
    ctx.fillStyle = `rgba(255,255,255,${centerPulse * 0.4 * vizBrightness})`;
    const size = 2 + centerPulse * 6;
    ctx.fillRect(cx - size/2, cy - size/2, size, size);
  }
}
render();

// ── JT10 ENGINE ──

let engine = null;
let kickEngine = null;
let kickGain = null;  // separate gain for kick fade-out
let dryGain = null;
let wetGain = null;

// ── A NATURAL MINOR SCALE: A B C D E F G ──
// Base arpeggio: A C E (i III V)
// Variations throw in: D (4th), G (7th), B (2nd), or octave shifts
// One note substitution every 4 bars after bar 8

const arpBase = [
  { note: 'A2',  gate: true,  accent: false, slide: false },
  { note: 'A2',  gate: false, accent: false, slide: false },
  { note: 'C3',  gate: true,  accent: false, slide: true  },
  { note: 'E3',  gate: true,  accent: true,  slide: false },
  { note: 'E3',  gate: false, accent: false, slide: false },
  { note: 'C3',  gate: true,  accent: false, slide: false },
  { note: 'A2',  gate: true,  accent: false, slide: true  },
  { note: 'A2',  gate: false, accent: false, slide: false },
  { note: 'A2',  gate: true,  accent: false, slide: false },
  { note: 'C3',  gate: true,  accent: false, slide: false },
  { note: 'E3',  gate: true,  accent: false, slide: true  },
  { note: 'A3',  gate: true,  accent: true,  slide: false },
  { note: 'A3',  gate: false, accent: false, slide: false },
  { note: 'E3',  gate: true,  accent: false, slide: true  },
  { note: 'C3',  gate: true,  accent: false, slide: false },
  { note: 'A2',  gate: true,  accent: false, slide: false },
];

// Subtle note variations — one substitution per 4-bar block
// These feel natural in Am: the 5th (E), 4th (D), 7th (G), 2nd (B)
const variations = [
  null,                                         // bars 1-4: pure
  null,                                         // bars 5-8: pure
  { step: 11, note: 'G3', slide: true },        // bars 9-12: 7th replaces octave peak
  null,                                         // bars 13-16: back to pure
  { step: 5,  note: 'D3', slide: false },       // bars 17-20: 4th in the descent
  null,                                         // bars 21-24: pure
  { step: 3,  note: 'E2', slide: false },       // bars 25-28: low 5th instead of high — darker
  { step: 11, note: 'B3', slide: true },        // bars 29-32: 2nd at the top — tension
  { step: 9,  note: 'D3', slide: true },        // bars 33-36: 4th sliding up
  null,                                         // bars 37-40: pure (dissolving, keep it simple)
  { step: 3,  note: 'G3', slide: false },       // bars 41-44: 7th in sparse drift — haunting
  null,                                         // bars 45-48: pure
  { step: 14, note: 'D3', slide: true },        // bars 49-52: 4th near the end
  null,                                         // bars 53-56: pure
  { step: 11, note: 'G3', slide: true },        // bars 57-60: 7th on return
  null,                                         // bars 61-64: pure — resolve home
  null,                                         // bars 65-68: kick section, keep pure
  { step: 5,  note: 'D3', slide: false },       // bars 69-72: 4th with kick
  null,                                         // bars 73-76: fadeout
  null,                                         // bars 77-80: silent
];

function getArpForBar(bar) {
  const blockIndex = Math.floor(bar / 4);
  const variation = variations[blockIndex] || null;

  if (!variation) return arpBase;

  // Deep copy and substitute one note
  const arp = arpBase.map(s => ({ ...s }));
  arp[variation.step].note = variation.note;
  if (variation.slide !== undefined) arp[variation.step].slide = variation.slide;
  return arp;
}

// ── ARRANGEMENT ──
// 80 bars total (~162 seconds at 118 BPM)
//
// RISE (bars 0-15):      Full arp, filter opens, reverb builds
// PEAK (bars 16-23):     Full arp, full brightness
// DISSOLVE (bars 24-39): Notes thin out
// DRIFT (bars 40-55):    Sparse, near-black
// RETURN (bars 56-63):   Notes come back + kick intro at bar 57
//                        Bars 57-58: double-hit kick (beat 1 + 16th after) only
//                        Bar 59+: regular 4x4 kick
// KICK (bars 64-70):     Full 4x4 kick + full arp
// FADEOUT (bars 71-73):  Everything fades to zero over ~5 seconds
// SILENT (bars 74-79):   No audio, visualizer keeps running ~10 seconds
const TOTAL_STEPS = 80 * 16;

function getSection(step) {
  const bar = Math.floor(step / 16);
  if (bar < 16) return 'rise';
  if (bar < 24) return 'peak';
  if (bar < 40) return 'dissolve';
  if (bar < 56) return 'drift';
  if (bar < 64) return 'return';
  if (bar < 71) return 'kick';
  if (bar < 74) return 'fadeout';
  return 'silent';
}

function getNoteProbability(step) {
  const bar = Math.floor(step / 16);
  const section = getSection(step);
  if (section === 'rise') return 1.0;
  if (section === 'peak') return 1.0;
  if (section === 'dissolve') {
    const progress = (bar - 24) / 15;
    return 1.0 - progress * 0.88;
  }
  if (section === 'drift') return 0.12;
  if (section === 'return') {
    const progress = (bar - 56) / 7;
    return 0.12 + progress * 0.88;
  }
  if (section === 'kick') return 1.0;
  if (section === 'fadeout') return 1.0;  // still playing, master gain handles fade
  if (section === 'silent') return 0;
  return 1.0;
}

function getCutoff(step) {
  const bar = Math.floor(step / 16);
  const section = getSection(step);
  if (section === 'rise') return 0.03 + (bar / 15) * 0.32;
  if (section === 'peak') return 0.35;
  if (section === 'dissolve') {
    const progress = (bar - 24) / 15;
    return 0.35 - progress * 0.20;
  }
  if (section === 'drift') return 0.15;
  if (section === 'return') {
    const progress = (bar - 56) / 7;
    return 0.15 + progress * 0.20;
  }
  if (section === 'kick') return 0.35;
  if (section === 'fadeout') return 0.30;
  if (section === 'silent') return 0.15;
  return 0.35;
}

// Reverb wet/dry automation
// Starts dry-ish, builds over first 16 bars, then section-dependent
function getReverbMix(step) {
  const bar = Math.floor(step / 16);
  const section = getSection(step);

  if (section === 'rise') {
    // Build reverb over bars 1-16: starts almost dry, ends at normal wet
    const progress = bar / 15;
    return { wet: 0.10 + progress * 0.55, dry: 0.80 - progress * 0.40 };
  }
  if (section === 'peak') return { wet: 0.65, dry: 0.40 };
  if (section === 'dissolve') {
    // Push wetter as notes thin
    const progress = (bar - 24) / 15;
    return { wet: 0.65 + progress * 0.25, dry: 0.40 - progress * 0.20 };
  }
  if (section === 'drift') return { wet: 0.90, dry: 0.20 };
  if (section === 'return') {
    const progress = (bar - 56) / 7;
    return { wet: 0.90 - progress * 0.25, dry: 0.20 + progress * 0.20 };
  }
  if (section === 'kick') return { wet: 0.45, dry: 0.55 };  // drier for kick clarity
  if (section === 'fadeout') return { wet: 0.60, dry: 0.40 };
  if (section === 'silent') return { wet: 0, dry: 0 };
  return { wet: 0.65, dry: 0.40 };
}

// Visual brightness automation
function getVizBrightness(step) {
  const section = getSection(step);
  const bar = Math.floor(step / 16);
  if (section === 'rise') return 0.3 + (bar / 15) * 0.7;
  if (section === 'peak') return 1.0;
  if (section === 'dissolve') {
    const progress = (bar - 24) / 15;
    return 1.0 - progress * 0.85;  // fade to near-black
  }
  if (section === 'drift') return 0.08;  // almost black — lone dot only
  if (section === 'return') {
    const progress = (bar - 56) / 7;
    return 0.08 + progress * 0.92;
  }
  if (section === 'kick') return 1.0;
  if (section === 'fadeout') {
    const progress = (bar - 71) / 2;  // faster visual fade
    return Math.max(1.0 - progress * 0.85, 0.08);
  }
  if (section === 'silent') return 0.06;  // just the breathing dot
  return 1.0;
}

async function start() {
  engine = new JT10Engine();

  if (!engine.context) {
    engine.context = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (engine.context.state === 'suspended') {
    await engine.context.resume();
  }

  // Sound design
  engine.setParameter('sawLevel', 0.6);
  engine.setParameter('pulseLevel', 0.15);
  engine.setParameter('pulseWidth', 0.4);
  engine.setParameter('subLevel', 0.3);
  engine.setParameter('subMode', 1);

  engine.setParameter('cutoff', 0.03);
  engine.setParameter('resonance', 0.0);
  engine.setParameter('envMod', 0.4);
  engine.setParameter('keyTrack', 0.3);

  engine.setParameter('attack', 0.08);
  engine.setParameter('decay', 0.55);
  engine.setParameter('sustain', 0.45);
  engine.setParameter('release', 0.5);

  engine.setParameter('filterAttack', 0.1);
  engine.setParameter('filterDecay', 0.5);
  engine.setParameter('filterSustain', 0.2);
  engine.setParameter('filterRelease', 0.4);

  engine.setParameter('glideTime', 0.3);

  engine.setParameter('lfoRate', 0.08);
  engine.setParameter('lfoToFilter', 0.06);

  engine.masterVolume = 0.3;

  // ── REVERB ──
  const actx = engine.context;
  const sr = actx.sampleRate;
  const reverbTime = 6.0;
  const irLength = sr * reverbTime;
  const irBuffer = actx.createBuffer(2, irLength, sr);
  for (let ch = 0; ch < 2; ch++) {
    const data = irBuffer.getChannelData(ch);
    for (let i = 0; i < irLength; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / irLength, 1.8);
    }
  }
  const convolver = actx.createConvolver();
  convolver.buffer = irBuffer;

  dryGain = actx.createGain();
  wetGain = actx.createGain();
  // Start almost dry — reverb builds over first 16 bars
  dryGain.gain.value = 0.80;
  wetGain.gain.value = 0.10;

  const reverbHP = actx.createBiquadFilter();
  reverbHP.type = 'highpass';
  reverbHP.frequency.value = 100;

  convolver.connect(reverbHP);
  reverbHP.connect(wetGain);
  dryGain.connect(actx.destination);
  wetGain.connect(actx.destination);

  await engine.playNote('A1', 0.001, false);
  if (engine._scriptNode) {
    engine._scriptNode.disconnect();
    engine._scriptNode.connect(dryGain);
    engine._scriptNode.connect(convolver);
  }

  // ── JB01 KICK ──
  kickEngine = new JB01Engine({ context: engine.context });
  // Tight kick — short decay, slightly detuned down
  kickEngine.setVoiceParam('kick', 'decay', 0.3);   // tight
  kickEngine.setVoiceParam('kick', 'tune', -0.2);
  kickEngine.setVoiceParam('kick', 'attack', 0.6);
  kickEngine.setVoiceParam('kick', 'level', 0.75);

  // Master gain for final fade-out
  const masterGain = engine.context.createGain();
  masterGain.gain.value = 1.0;

  // Rewire dry and wet through master
  dryGain.disconnect();
  wetGain.disconnect();
  dryGain.connect(masterGain);
  wetGain.connect(masterGain);
  masterGain.connect(engine.context.destination);

  // Kick gets its own gain node for level control
  kickGain = engine.context.createGain();
  kickGain.gain.value = 0;  // starts silent
  kickEngine.connectOutput(kickGain);
  // Kick goes mostly dry — just a touch of reverb, through master
  const kickDry = engine.context.createGain();
  kickDry.gain.value = 0.85;
  kickGain.connect(kickDry);
  kickGain.connect(convolver);  // tiny bit of reverb on kick
  kickDry.connect(masterGain);

  // ── SEQUENCER ──
  let step = 0;

  setInterval(() => {
    const bar = Math.floor(step / 16);
    const stepInBar = step % 16;
    const section = getSection(step);
    const prob = getNoteProbability(step);
    const cutoff = getCutoff(step);

    // Update filter
    engine.setParameter('cutoff', cutoff);

    // Reverb automation
    const mix = getReverbMix(step);
    wetGain.gain.value = mix.wet;
    dryGain.gain.value = mix.dry;

    // Visual brightness
    vizBrightness = getVizBrightness(step);

    // Section label
    sectionEl.textContent = section.toUpperCase();

    // ── MASTER FADE ──
    // Fade everything to zero over bars 71-73 (~5 seconds)
    if (section === 'fadeout') {
      const fadeProgress = (bar - 71 + stepInBar / 16) / 3;  // 3 bars ≈ 6 sec
      masterGain.gain.value = Math.max(1.0 - fadeProgress, 0);
    } else if (section === 'silent') {
      masterGain.gain.value = 0;
    }

    // ── KICK ──
    // Bar 57-58: double-hit intro (beat 1 + the 16th right after)
    // Bar 59-70: regular 4x4
    // Bar 71+: kicks stop (master fade handles the rest)
    const kickActive = bar >= 57 && bar < 71;
    if (kickActive) {
      const isIntro = bar < 59;
      let shouldKick = false;

      if (isIntro) {
        // Double hit: step 0 and step 1 only — boom-boom, once per bar
        shouldKick = stepInBar === 0 || stepInBar === 1;
        kickGain.gain.value = 0.316;  // -10dB
      } else {
        // Regular 4x4
        shouldKick = stepInBar % 4 === 0;
        kickGain.gain.value = 0.316;  // -10dB
      }

      if (shouldKick) {
        const kickVel = 0.8 + (Math.random() - 0.5) * 0.06;
        kickEngine.trigger('kick', kickVel);
      }
    }

    // Get the arp pattern for this bar (with possible variation)
    const arp = getArpForBar(bar);
    const s = arp[stepInBar];

    // Note trigger with probability
    const shouldPlay = s.gate && Math.random() < prob;

    if (shouldPlay) {
      const vel = s.accent ? 0.85 : 0.55;
      engine.playNote(s.note, vel, s.slide);

      // Visual: ring (only if brightness allows)
      if (vizBrightness > 0.05) {
        const brightness = 0.2 + cutoff * 1.2;
        const size = s.accent ? 30 + cutoff * 80 : 15 + cutoff * 50;
        rings.push(new SquareRing(size, s.accent ? 1.5 : 0.8, brightness, s.accent));

        if (s.slide) {
          const count = 2 + Math.floor(cutoff * 8);
          const spread = 30 + cutoff * 150;
          for (let i = 0; i < count; i++) {
            const angle = (i / count) * Math.PI * 2 + Math.random() * 1.0;
            const dist = spread + (Math.random() - 0.5) * 50;
            dots.push(new ScatterDot(
              cx + Math.cos(angle) * dist,
              cy + Math.sin(angle) * dist,
              1 + Math.random() * 2,
              brightness * 0.4
            ));
          }
        }
      }

      centerPulse = s.accent ? 0.9 : 0.5;
    }

    step++;
    if (step >= TOTAL_STEPS) step = 0;

  }, STEP_DUR * 1000);
}

// ── PLAY BUTTON ──
document.getElementById('play-btn').addEventListener('click', async () => {
  document.getElementById('play-btn').classList.add('playing');
  await start();
});
</script>
</body>
</html>
