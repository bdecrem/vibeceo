<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hallman — Nine Hundred</title>
<meta property="og:title" content="Hallman — Nine Hundred">
<meta property="og:description" content="A 909 and nothing else. One decay knob. Nine hundred ways to say the same thing differently.">
<meta property="og:image" content="https://kochi.to/hallman/sick-og.png">
<meta property="og:url" content="https://kochi.to/hallman/sick.html">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Hallman — Nine Hundred">

<meta name="twitter:image" content="https://kochi.to/hallman/sick-og.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050505; overflow: hidden;
    font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
    cursor: crosshair;
  }
  canvas { position: fixed; top: 0; left: 0; }

  #overlay {
    position: fixed; inset: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  #play-btn {
    width: 56px; height: 56px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.3);
    font-size: 18px; cursor: pointer; pointer-events: auto;
    transition: all 0.4s;
    display: flex; align-items: center; justify-content: center;
  }
  #play-btn:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.5); }
  #play-btn.playing { opacity: 0; pointer-events: none; }

  #hud {
    position: fixed; bottom: 24px; left: 0; right: 0;
    z-index: 10; pointer-events: none;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .section-label {
    font-size: 9px; letter-spacing: 6px; color: rgba(255,255,255,0.0);
    transition: color 1.5s ease;
  }
  .section-label.visible { color: rgba(255,255,255,0.12); }
  .bar-count {
    font-size: 8px; letter-spacing: 3px; color: rgba(255,255,255,0.06);
  }
  #credits {
    position: fixed; top: 14px; right: 18px;
    font-size: 7px; letter-spacing: 3px;
    color: rgba(255,255,255,0.05); z-index: 10;
  }
  #title-card {
    position: fixed; top: 14px; left: 18px;
    font-size: 7px; letter-spacing: 3px;
    color: rgba(255,255,255,0.05); z-index: 10;
  }

  /* Decay readout — ghost number */
  #decay-readout {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, calc(-50% + 40px));
    font-size: 10px; letter-spacing: 8px;
    color: rgba(255,255,255,0.0);
    z-index: 10; pointer-events: none;
    transition: color 0.15s;
    font-variant-numeric: tabular-nums;
  }

  #restart-zone {
    position: fixed; inset: 0; z-index: 9;
    cursor: pointer; display: none;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="overlay">
  <button id="play-btn">▶</button>
</div>

<div id="decay-readout"></div>

<div id="hud">
  <div class="section-label" id="section-label"></div>
  <div class="bar-count" id="bar-count"></div>
</div>

<div id="title-card">NINE HUNDRED</div>
<div id="credits">HALLMAN · JT90 · DITHER · AMBER</div>
<div id="restart-zone"></div>

<script type="module">
import { JT90Engine } from '/jt90/dist/machines/jt90/engine.js';

// ══════════════════════════════════════════
// NINE HUNDRED — a 909 and nothing else
// ══════════════════════════════════════════
// The machine teaches you to listen.
// One decay knob on closed hats. That's the whole composition.
//
// Visual concept (Dither): one horizontal line. That's it.
// Decay drives the line's displacement. Monochrome.
// The ONLY color is amber — and only on rimshot.

const BPM = 126;
const STEP_DUR = 60 / BPM / 4;

// ══════════════════════════════════════════
// ARRANGEMENT (Hallman)
// ══════════════════════════════════════════

const sections = [
  // ACT I: BARE (bars 1-8)
  {
    bars: 4, label: '', energy: 0.05,
    voices: { kick: [0,4,8,12], ch: [0,2,4,6,8,10,12,14] },
    auto: {
      'ch.decay': [0.15, 0.15, 0.15, 0.15, 0.15, 0.15, 0.15, 0.15,
                   0.15, 0.15, 0.15, 0.15, 0.15, 0.15, 0.15, 0.15],
    }
  },
  {
    bars: 4, label: '', energy: 0.08,
    voices: { kick: [0,4,8,12], ch: [0,2,4,6,8,10,12,14] },
    auto: {
      'ch.decay': [0.12, 0.14, 0.16, 0.18, 0.20, 0.22, 0.24, 0.26,
                   0.28, 0.26, 0.24, 0.22, 0.20, 0.18, 0.16, 0.14],
    }
  },

  // ACT II: OPEN (bars 9-16)
  {
    bars: 4, label: 'OPEN', energy: 0.15,
    voices: { kick: [0,4,8,12], ch: [0,2,4,6,8,10,12,14], oh: [6,14] },
    auto: {
      'ch.decay': [0.10, 0.20, 0.12, 0.25, 0.10, 0.30, 0.15, 0.35,
                   0.12, 0.28, 0.10, 0.32, 0.14, 0.25, 0.10, 0.20],
    }
  },
  {
    bars: 4, label: '', energy: 0.22,
    voices: { kick: [0,4,8,12], ch: [0,2,4,6,8,10,12,14], oh: [6,14] },
    auto: {
      'ch.decay': [0.08, 0.35, 0.10, 0.40, 0.06, 0.45, 0.12, 0.50,
                   0.08, 0.42, 0.06, 0.48, 0.10, 0.38, 0.08, 0.30],
    }
  },

  // ACT III: BREATHE (bars 17-24)
  {
    bars: 4, label: 'BREATHE', energy: 0.35,
    voices: { kick: [0,4,8,12], ch: [0,2,4,6,8,10,12,14], oh: [6,14] },
    auto: {
      'ch.decay': [0.05, 0.55, 0.08, 0.60, 0.05, 0.65, 0.10, 0.70,
                   0.05, 0.60, 0.08, 0.65, 0.05, 0.55, 0.08, 0.50],
    }
  },
  {
    bars: 4, label: '', energy: 0.45,
    voices: { kick: [0,4,8,12], ch: [0,2,4,6,8,10,12,14], oh: [6,14] },
    auto: {
      'ch.decay': [0.04, 0.70, 0.06, 0.75, 0.04, 0.80, 0.08, 0.85,
                   0.04, 0.75, 0.06, 0.80, 0.04, 0.70, 0.06, 0.65],
    }
  },

  // ACT IV: RIMSHOT (bars 25-28)
  {
    bars: 4, label: 'RIMSHOT', energy: 0.6,
    voices: { kick: [0,4,8,12], ch: [0,2,4,6,8,10,12,14], oh: [6,14], rimshot: [4,12] },
    auto: {
      'ch.decay': [0.03, 0.90, 0.05, 0.85, 0.03, 0.92, 0.06, 0.88,
                   0.03, 0.90, 0.05, 0.86, 0.03, 0.88, 0.05, 0.82],
    }
  },

  // ACT V: THE VOID (bars 29-30)
  {
    bars: 2, label: 'VOID', energy: 0.15,
    voices: { ch: [0,2,4,6,8,10,12,14], oh: [6,14] },
    auto: {
      'ch.decay': [0.60, 0.55, 0.50, 0.45, 0.40, 0.35, 0.30, 0.25,
                   0.20, 0.18, 0.16, 0.14, 0.12, 0.10, 0.08, 0.06],
    }
  },

  // ACT VI: RETURN (bars 31-36)
  {
    bars: 2, label: 'RETURN', energy: 0.3,
    voices: { kick: [0,4,8,12], ch: [0,2,4,6,8,10,12,14], oh: [6,14] },
    auto: {
      'ch.decay': [0.10, 0.15, 0.12, 0.18, 0.14, 0.20, 0.16, 0.22,
                   0.18, 0.24, 0.20, 0.28, 0.22, 0.30, 0.25, 0.35],
    }
  },
  {
    bars: 4, label: '', energy: 0.5,
    voices: { kick: [0,4,8,12], ch: [0,2,4,6,8,10,12,14], oh: [6,14], rimshot: [4,12] },
    auto: {
      'ch.decay': [0.04, 0.85, 0.06, 0.80, 0.04, 0.88, 0.08, 0.82,
                   0.04, 0.85, 0.06, 0.78, 0.04, 0.82, 0.06, 0.75],
    }
  },

  // ACT VII: FADE (bars 37-40)
  {
    bars: 4, label: 'FADE', energy: 0.08,
    voices: { kick: [0,4,8,12], ch: [0,2,4,6,8,10,12,14] },
    auto: {
      'ch.decay': [0.30, 0.28, 0.26, 0.24, 0.22, 0.20, 0.18, 0.16,
                   0.14, 0.13, 0.12, 0.11, 0.10, 0.10, 0.10, 0.10],
    }
  },
];

const totalBars = sections.reduce((s, sec) => s + sec.bars, 0);

// ══════════════════════════════════════════
// CANVAS
// ══════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cx, cy;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
}
resize();
window.addEventListener('resize', resize);

// ══════════════════════════════════════════
// VISUAL STATE
// ══════════════════════════════════════════

const V = {
  decay: 0.15,
  smoothDecay: 0.15,
  energy: 0.05,
  targetEnergy: 0.05,
  kickHit: 0,
  rimHit: 0,       // the ONE color moment
  ohHit: 0,
  chHit: 0,
  playing: false,
  step: 0,
  globalStep: 0,
  noKick: false,
  sectionLabel: '',
  bar: 0,
};

// History: store last 128 decay values to draw the line as a waveform
const HISTORY_LEN = 128;
const decayHistory = new Float32Array(HISTORY_LEN);
let historyIdx = 0;

// ══════════════════════════════════════════
// THE LINE
// ══════════════════════════════════════════
// One horizontal line across the screen.
// Each point's Y-displacement = that moment's decay value.
// The line IS the music. Nothing else.

function drawTheLine() {
  const energy = V.energy;
  const baseAlpha = 0.12 + energy * 0.25;

  // The line spans the full width
  // Each segment maps to a history entry
  const segW = W / HISTORY_LEN;

  // White line — #e0e0e0 at base
  const r = 224, g = 224, b = 224;

  // Main trace
  ctx.beginPath();
  for (let i = 0; i < HISTORY_LEN; i++) {
    // Read from history ring buffer
    const idx = (historyIdx + i) % HISTORY_LEN;
    const d = decayHistory[idx];

    const x = i * segW;
    // Displacement: decay 0 = flat at center, decay 1 = full swing
    // Alternate positive/negative for waveform feel
    const swing = d * d * H * 0.35; // quadratic — subtle at low, dramatic at high
    const phase = Math.sin(i * 0.15 + V.globalStep * 0.08);
    const y = cy + phase * swing;

    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.strokeStyle = `rgba(${r},${g},${b},${baseAlpha})`;
  ctx.lineWidth = 0.8 + energy * 0.7;
  ctx.stroke();

  // Subtle glow duplicate — wider, fainter
  ctx.strokeStyle = `rgba(${r},${g},${b},${baseAlpha * 0.15})`;
  ctx.lineWidth = 3 + energy * 4;
  ctx.stroke();
}

// ══════════════════════════════════════════
// KICK: subtle vertical displacement pulse
// ══════════════════════════════════════════
// The line jumps slightly on each kick. Not a separate element —
// just the existing line getting nudged.
let kickDisplace = 0;

// ══════════════════════════════════════════
// RIMSHOT: THE ONE COLOR
// ══════════════════════════════════════════
// Amber. Only on rimshot. The only non-white element in the piece.
// A horizontal slash that appears and fades. Lightning in a calm sky.

function drawRimshotFlash() {
  if (V.rimHit < 0.005) return;

  // Amber: rgb(255, 180, 80)
  const alpha = V.rimHit * 0.5;
  const spread = W * (0.3 + V.rimHit * 0.7);

  // The amber line — same Y as center, cuts across
  ctx.beginPath();
  ctx.moveTo(cx - spread / 2, cy);
  ctx.lineTo(cx + spread / 2, cy);
  ctx.strokeStyle = `rgba(255,180,80,${alpha})`;
  ctx.lineWidth = 1;
  ctx.stroke();

  // Warm glow
  ctx.strokeStyle = `rgba(255,160,60,${alpha * 0.25})`;
  ctx.lineWidth = 8 + V.rimHit * 16;
  ctx.stroke();

  // Full-screen amber wash — barely there
  const washAlpha = V.rimHit * 0.03;
  ctx.fillStyle = `rgba(255,180,80,${washAlpha})`;
  ctx.fillRect(0, 0, W, H);
}

// ══════════════════════════════════════════
// OH: the line exhales — brief widening of the glow
// ══════════════════════════════════════════
function drawOHBreath() {
  if (V.ohHit < 0.01) return;
  // Redraw the line path with extra glow width
  const segW = W / HISTORY_LEN;
  ctx.beginPath();
  for (let i = 0; i < HISTORY_LEN; i++) {
    const idx = (historyIdx + i) % HISTORY_LEN;
    const d = decayHistory[idx];
    const x = i * segW;
    const swing = d * d * H * 0.35;
    const phase = Math.sin(i * 0.15 + V.globalStep * 0.08);
    const y = cy + phase * swing;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.strokeStyle = `rgba(200,200,210,${V.ohHit * 0.04})`;
  ctx.lineWidth = 10 + V.ohHit * 20;
  ctx.stroke();
}

// ══════════════════════════════════════════
// VOID EMBERS: when kick disappears, faint dots drift from the line
// ══════════════════════════════════════════
const embers = [];
class Ember {
  constructor() {
    this.x = Math.random() * W;
    this.y = cy + (Math.random() - 0.5) * 20;
    this.vy = -(0.15 + Math.random() * 0.4);
    this.vx = (Math.random() - 0.5) * 0.2;
    this.life = 1;
    this.size = 0.5 + Math.random() * 1;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.life -= 0.006;
    return this.life > 0;
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180,180,190,${this.life * 0.1})`;
    ctx.fill();
  }
}

// ══════════════════════════════════════════
// STEP POSITION MARKER
// ══════════════════════════════════════════
// A single faint vertical hairline showing current position on the line

function drawPositionMarker() {
  const x = ((V.globalStep % HISTORY_LEN) / HISTORY_LEN) * W;
  const alpha = 0.03 + V.energy * 0.04;
  ctx.beginPath();
  ctx.moveTo(x, cy - 30);
  ctx.lineTo(x, cy + 30);
  ctx.strokeStyle = `rgba(224,224,224,${alpha})`;
  ctx.lineWidth = 0.5;
  ctx.stroke();
}

// ══════════════════════════════════════════
// RENDER LOOP
// ══════════════════════════════════════════
let frame = 0;
const decayReadout = document.getElementById('decay-readout');
const sectionLabelEl = document.getElementById('section-label');

function render() {
  requestAnimationFrame(render);
  frame++;

  // Smooth
  V.energy += (V.targetEnergy - V.energy) * 0.02;
  V.smoothDecay += (V.decay - V.smoothDecay) * 0.25;

  // Decay impulses
  V.kickHit *= 0.88;
  V.rimHit *= 0.82;
  V.ohHit *= 0.93;
  V.chHit *= 0.88;
  kickDisplace *= 0.85;

  // ── BACKGROUND: near-black, slow fade ──
  // In the void, fade slower — let traces linger
  const fade = V.noKick ? 0.02 : 0.04;
  ctx.fillStyle = `rgba(5,5,5,${fade})`;
  ctx.fillRect(0, 0, W, H);

  if (!V.playing) {
    // Idle: a single flat line, barely visible, breathing
    const breath = Math.sin(frame * 0.006) * 0.5 + 0.5;
    const alpha = 0.02 + breath * 0.02;
    ctx.beginPath();
    ctx.moveTo(W * 0.3, cy);
    ctx.lineTo(W * 0.7, cy);
    ctx.strokeStyle = `rgba(200,200,200,${alpha})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
    return;
  }

  // ═══ LAYERS ═══

  // 1. OH breath glow (behind the line)
  drawOHBreath();

  // 2. THE LINE — the only visual that matters
  drawTheLine();

  // 3. Position marker
  drawPositionMarker();

  // 4. Void embers
  if (V.noKick && frame % 5 === 0) embers.push(new Ember());
  for (let i = embers.length - 1; i >= 0; i--) {
    embers[i].draw();
    if (!embers[i].update()) embers.splice(i, 1);
  }

  // 5. Rimshot flash — THE color moment (on top of everything)
  drawRimshotFlash();

  // Decay readout
  const dPct = Math.round(V.decay * 100);
  const readoutAlpha = 0.03 + V.energy * 0.04;
  decayReadout.style.color = `rgba(255,255,255,${readoutAlpha})`;
  decayReadout.textContent = String(dPct).padStart(3, ' ');
}

render();

// ══════════════════════════════════════════
// PLAYBACK ENGINE — Pre-rendered (Hallman)
// ══════════════════════════════════════════
// Renders all audio offline, then plays back via AudioBufferSourceNode.
// Zero main-thread audio processing — visuals get 100% of the frame budget.

let playing = false;
let activeSource = null;
let stepTimer = null;

// Convert section voice format {kick:[0,4,8,12]} to JT90 pattern format
function sectionToPattern(voices) {
  const pattern = {};
  for (const [voiceId, steps] of Object.entries(voices)) {
    pattern[voiceId] = Array.from({ length: 16 }, (_, i) => ({
      velocity: steps.includes(i) ? (voiceId === 'rimshot' ? 0.7 : 0.85) : 0,
      accent: false,
    }));
  }
  return pattern;
}

async function start() {
  const playBtn = document.getElementById('play-btn');
  playBtn.textContent = '...';

  try {
    // Create engine and render offline
    const engine = new JT90Engine({ bpm: BPM });
    await engine.loadSamples('/jt90/samples');

    // Apply voice parameters
    engine._ensureVoices();
    engine.setVoiceParameter('kick', 'decay', 0.4);
    engine.setVoiceParameter('kick', 'tune', -300);
    engine.setVoiceParameter('kick', 'level', 0.8);
    engine.setVoiceParameter('ch', 'level', 0.7);
    engine.setVoiceParameter('ch', 'tone', 0.4);
    engine.setVoiceParameter('oh', 'decay', 0.6);
    engine.setVoiceParameter('oh', 'level', 0.5);
    engine.setVoiceParameter('rimshot', 'decay', 0.15);
    engine.setVoiceParameter('rimshot', 'level', 0.45);
    engine.setVoiceParameter('rimshot', 'tune', -700);

    // Pre-render each section
    const sectionBuffers = [];
    for (const section of sections) {
      engine.setPattern(sectionToPattern(section.voices));
      const buffer = await engine.renderPattern({
        bars: section.bars,
        bpm: BPM,
        automation: section.auto,
      });
      sectionBuffers.push(buffer);
    }

    // Concatenate into one buffer
    const totalLength = sectionBuffers.reduce((sum, b) => sum + b.length, 0);
    const audioCtx = new AudioContext();
    const fullBuffer = audioCtx.createBuffer(1, totalLength, sectionBuffers[0].sampleRate);
    const channel = fullBuffer.getChannelData(0);
    let offset = 0;
    for (const buf of sectionBuffers) {
      channel.set(buf.getChannelData(0), offset);
      offset += buf.length;
    }

    if (audioCtx.state === 'suspended') await audioCtx.resume();

    // Play via AudioBufferSourceNode — audio thread handles everything
    const source = audioCtx.createBufferSource();
    source.buffer = fullBuffer;
    source.connect(audioCtx.destination);
    source.start();
    activeSource = source;

    // Reset visual state
    V.decay = 0.15; V.smoothDecay = 0.15;
    V.playing = true; V.globalStep = 0;
    decayHistory.fill(0);
    historyIdx = 0;
    embers.length = 0;
    playing = true;

    playBtn.classList.add('playing');
    document.getElementById('restart-zone').style.display = 'none';

    // Step timer drives visuals — no audio work, just data
    const stepMs = STEP_DUR * 1000;
    let step = 0;
    let sectionIdx = 0;
    let sectionStart = 0;
    let currentBar = 0;

    stepTimer = setInterval(() => {
      // Advance section
      while (sectionIdx < sections.length - 1 &&
             step >= sectionStart + sections[sectionIdx].bars * 16) {
        sectionStart += sections[sectionIdx].bars * 16;
        sectionIdx++;
      }

      const section = sections[sectionIdx];
      const stepInPattern = step % 16;
      currentBar = Math.floor(step / 16);

      // Decay value from automation
      const autoDecay = section.auto?.['ch.decay'];
      const decayVal = autoDecay ? autoDecay[stepInPattern] : 0.15;

      // Update visual state
      V.decay = decayVal;
      V.step = stepInPattern;
      V.globalStep++;
      V.noKick = !section.voices.kick || section.voices.kick.length === 0;
      V.targetEnergy = section.energy;

      // Push decay into history
      decayHistory[historyIdx] = decayVal;
      historyIdx = (historyIdx + 1) % HISTORY_LEN;

      // Hit triggers
      if (section.voices.kick?.includes(stepInPattern)) {
        V.kickHit = 1;
        kickDisplace = 4 + V.energy * 8;
      }
      if (section.voices.rimshot?.includes(stepInPattern)) V.rimHit = 1;
      if (section.voices.oh?.includes(stepInPattern)) V.ohHit = 1;
      if (section.voices.ch?.includes(stepInPattern)) V.chHit = 1;

      // Section label
      if (section.label && section.label !== V.sectionLabel) {
        sectionLabelEl.textContent = section.label;
        sectionLabelEl.classList.add('visible');
        setTimeout(() => sectionLabelEl.classList.remove('visible'), 3000);
      }
      V.sectionLabel = section.label;

      // HUD
      document.getElementById('bar-count').textContent =
        `${currentBar + 1} / ${totalBars}`;

      step++;
    }, stepMs);

    source.onended = () => stop();

  } catch (err) {
    console.error(err);
    playBtn.textContent = '▶';
  }
}

function stop() {
  playing = false; V.playing = false; V.targetEnergy = 0;
  if (stepTimer) { clearInterval(stepTimer); stepTimer = null; }
  if (activeSource) { try { activeSource.stop(); } catch(e) {} activeSource = null; }
  document.getElementById('play-btn').classList.remove('playing');
  document.getElementById('play-btn').textContent = '▶';
  sectionLabelEl.textContent = '';
  sectionLabelEl.classList.remove('visible');
  document.getElementById('bar-count').textContent = '';
  decayReadout.style.color = 'rgba(255,255,255,0)';
  document.getElementById('restart-zone').style.display = 'block';
}

document.getElementById('play-btn').addEventListener('click', () => {
  if (playing) stop(); else start();
});
document.getElementById('restart-zone').addEventListener('click', () => {
  start();
});
</script>
</body>
</html>
