<script type="module">
import { JT90Engine } from '/jt90/dist/machines/jt90/engine.js';

// ══════════════════════════════════════════
// NINE HUNDRED — a 909 and nothing else
// ══════════════════════════════════════════
// The machine teaches you to listen.
// One decay knob on closed hats. That's the whole composition.

const BPM = 126;
const STEP_DUR = 60 / BPM / 4;

// ══════════════════════════════════════════
// ARRANGEMENT
// ══════════════════════════════════════════
// The track is about patience and subtlety.
// Bar 1-8: kick + hats, decay ramp already moving
// Bar 9-16: open hats enter — trained ears notice
// Bar 17-24: decay gets more extreme, pattern breathes
// Bar 25-28: rimshot appears — two hits — feels like an event
// Bar 29-30: THE VOID — kick disappears, only hats remain
// Bar 31-36: kick returns — you hear everything differently now
// Bar 37-40: fade — decay narrows to nothing

// CH decay automation per section (0-1 engine scale)
// These are the 16 steps of the hat pattern. The decay value IS the music.

const sections = [
  // ── ACT I: BARE (bars 1-8) — kick and hats, decay ramp barely visible ──
  {
    bars: 4, label: '', energy: 0.05,
    voices: { kick: [0,4,8,12], ch: [0,2,4,6,8,10,12,14] },
    auto: {
      'ch.decay': [0.15, 0.15, 0.15, 0.15, 0.15, 0.15, 0.15, 0.15,
                   0.15, 0.15, 0.15, 0.15, 0.15, 0.15, 0.15, 0.15],
    }
  },
  {
    bars: 4, label: '', energy: 0.08,
    voices: { kick: [0,4,8,12], ch: [0,2,4,6,8,10,12,14] },
    auto: {
      'ch.decay': [0.12, 0.14, 0.16, 0.18, 0.20, 0.22, 0.24, 0.26,
                   0.28, 0.26, 0.24, 0.22, 0.20, 0.18, 0.16, 0.14],
    }
  },

  // ── ACT II: OPEN (bars 9-16) — open hats enter, decay starts swinging ──
  {
    bars: 4, label: 'OPEN', energy: 0.15,
    voices: { kick: [0,4,8,12], ch: [0,2,4,6,8,10,12,14], oh: [6,14] },
    auto: {
      'ch.decay': [0.10, 0.20, 0.12, 0.25, 0.10, 0.30, 0.15, 0.35,
                   0.12, 0.28, 0.10, 0.32, 0.14, 0.25, 0.10, 0.20],
    }
  },
  {
    bars: 4, label: '', energy: 0.22,
    voices: { kick: [0,4,8,12], ch: [0,2,4,6,8,10,12,14], oh: [6,14] },
    auto: {
      'ch.decay': [0.08, 0.35, 0.10, 0.40, 0.06, 0.45, 0.12, 0.50,
                   0.08, 0.42, 0.06, 0.48, 0.10, 0.38, 0.08, 0.30],
    }
  },

  // ── ACT III: BREATHE (bars 17-24) — decay gets wider, pattern breathes ──
  {
    bars: 4, label: 'BREATHE', energy: 0.35,
    voices: { kick: [0,4,8,12], ch: [0,2,4,6,8,10,12,14], oh: [6,14] },
    auto: {
      'ch.decay': [0.05, 0.55, 0.08, 0.60, 0.05, 0.65, 0.10, 0.70,
                   0.05, 0.60, 0.08, 0.65, 0.05, 0.55, 0.08, 0.50],
    }
  },
  {
    bars: 4, label: '', energy: 0.45,
    voices: { kick: [0,4,8,12], ch: [0,2,4,6,8,10,12,14], oh: [6,14] },
    auto: {
      'ch.decay': [0.04, 0.70, 0.06, 0.75, 0.04, 0.80, 0.08, 0.85,
                   0.04, 0.75, 0.06, 0.80, 0.04, 0.70, 0.06, 0.65],
    }
  },

  // ── ACT IV: RIMSHOT (bars 25-28) — two rimshot hits, maximum contrast ──
  {
    bars: 4, label: 'RIMSHOT', energy: 0.6,
    voices: { kick: [0,4,8,12], ch: [0,2,4,6,8,10,12,14], oh: [6,14], rimshot: [4,12] },
    auto: {
      'ch.decay': [0.03, 0.90, 0.05, 0.85, 0.03, 0.92, 0.06, 0.88,
                   0.03, 0.90, 0.05, 0.86, 0.03, 0.88, 0.05, 0.82],
    }
  },

  // ── ACT V: THE VOID (bars 29-30) — kick disappears ──
  {
    bars: 2, label: 'VOID', energy: 0.15,
    voices: { ch: [0,2,4,6,8,10,12,14], oh: [6,14] },
    auto: {
      'ch.decay': [0.60, 0.55, 0.50, 0.45, 0.40, 0.35, 0.30, 0.25,
                   0.20, 0.18, 0.16, 0.14, 0.12, 0.10, 0.08, 0.06],
    }
  },

  // ── ACT VI: RETURN (bars 31-36) — kick returns, everything sounds different ──
  {
    bars: 2, label: 'RETURN', energy: 0.3,
    voices: { kick: [0,4,8,12], ch: [0,2,4,6,8,10,12,14], oh: [6,14] },
    auto: {
      'ch.decay': [0.10, 0.15, 0.12, 0.18, 0.14, 0.20, 0.16, 0.22,
                   0.18, 0.24, 0.20, 0.28, 0.22, 0.30, 0.25, 0.35],
    }
  },
  {
    bars: 4, label: '', energy: 0.5,
    voices: { kick: [0,4,8,12], ch: [0,2,4,6,8,10,12,14], oh: [6,14], rimshot: [4,12] },
    auto: {
      'ch.decay': [0.04, 0.85, 0.06, 0.80, 0.04, 0.88, 0.08, 0.82,
                   0.04, 0.85, 0.06, 0.78, 0.04, 0.82, 0.06, 0.75],
    }
  },

  // ── ACT VII: FADE (bars 37-40) — decay narrows, silence approaches ──
  {
    bars: 4, label: 'FADE', energy: 0.08,
    voices: { kick: [0,4,8,12], ch: [0,2,4,6,8,10,12,14] },
    auto: {
      'ch.decay': [0.30, 0.28, 0.26, 0.24, 0.22, 0.20, 0.18, 0.16,
                   0.14, 0.13, 0.12, 0.11, 0.10, 0.10, 0.10, 0.10],
    }
  },
];

const totalBars = sections.reduce((s, sec) => s + sec.bars, 0);

// ══════════════════════════════════════════
// CANVAS
// ══════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cx, cy;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
}
resize();
window.addEventListener('resize', resize);

// ══════════════════════════════════════════
// VISUAL STATE
// ══════════════════════════════════════════
// This viz is about RESTRAINT. The less there is, the more you see.
// Everything maps to one parameter: hat decay.

const V = {
  decay: 0.15,       // current hat decay (0-1)
  smoothDecay: 0.15,
  prevDecay: 0.15,
  energy: 0.05,
  targetEnergy: 0.05,
  kickHit: 0,
  rimHit: 0,
  ohHit: 0,
  chHit: 0,
  playing: false,
  step: 0,
  globalStep: 0,
  noKick: false,
  sectionLabel: '',
  bar: 0,
};

// ══════════════════════════════════════════
// COLOR: monochrome with warmth
// ══════════════════════════════════════════
// Low decay = cool grey. High decay = warm white-amber.
// The color shift is so subtle you barely notice — until you do.

function decayToRGB(d, brightness = 1) {
  // d: 0-1 decay value
  // 0 = dim cool grey (140, 140, 150)
  // 0.5 = neutral white (200, 195, 190)
  // 1 = warm amber-white (255, 230, 200)
  const b = brightness;
  let r, g, bl;
  if (d < 0.5) {
    const t = d * 2;
    r = (100 + t * 100) * b;
    g = (100 + t * 95) * b;
    bl = (110 + t * 80) * b;
  } else {
    const t = (d - 0.5) * 2;
    r = (200 + t * 55) * b;
    g = (195 - t * 10) * b;  // slightly less green at top
    bl = (190 - t * 40) * b; // less blue = warmer
  }
  return [Math.min(255, Math.floor(r)), Math.min(255, Math.floor(g)), Math.min(255, Math.floor(bl))];
}

// ══════════════════════════════════════════
// GEOMETRY: minimal, decay-driven
// ══════════════════════════════════════════

// ── 1. CENTER CIRCLE: decay controls radius ──
// The one visual that's always there. A single circle, breathing with decay.
function drawBreathCircle() {
  const d = V.smoothDecay;
  const [r, g, b] = decayToRGB(d);
  const energy = V.energy;

  // Radius: small at low decay, large at high
  const minR = 8;
  const maxR = Math.min(W, H) * 0.3;
  const radius = minR + d * d * (maxR - minR); // quadratic — subtle at low, dramatic at high

  // Alpha: always faint, slightly stronger with energy
  const alpha = 0.015 + energy * 0.03 + d * 0.02;

  // Soft glow
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
  grad.addColorStop(0, `rgba(${r},${g},${b},${alpha * 2})`);
  grad.addColorStop(0.5, `rgba(${r},${g},${b},${alpha})`);
  grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.fill();

  // Thin ring at the edge
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(${r},${g},${b},${alpha * 1.5})`;
  ctx.lineWidth = 0.5;
  ctx.stroke();
}

// ── 2. STEP TICKS: 16 marks around the circle ──
// Each tick's length = that step's decay value. You SEE the pattern.
const stepDecays = new Float32Array(16); // stores last-played decay per step

function drawStepTicks() {
  const [r, g, b] = decayToRGB(V.smoothDecay);
  const energy = V.energy;
  const baseRadius = 8 + V.smoothDecay * V.smoothDecay * Math.min(W, H) * 0.3;

  for (let i = 0; i < 16; i++) {
    const angle = (i / 16) * Math.PI * 2 - Math.PI / 2; // 12 o'clock start
    const d = stepDecays[i];
    const tickLen = 4 + d * 60; // short tick at 0, long at 1
    const isCurrent = i === V.step;

    const x1 = cx + Math.cos(angle) * (baseRadius + 6);
    const y1 = cy + Math.sin(angle) * (baseRadius + 6);
    const x2 = cx + Math.cos(angle) * (baseRadius + 6 + tickLen);
    const y2 = cy + Math.sin(angle) * (baseRadius + 6 + tickLen);

    const alpha = isCurrent ? (0.15 + energy * 0.3) : (0.02 + d * 0.06);

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
    ctx.lineWidth = isCurrent ? 1.5 : 0.5;
    ctx.stroke();

    // Current step: small dot at end
    if (isCurrent) {
      ctx.beginPath();
      ctx.arc(x2, y2, 1.5 + d * 2, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${r},${g},${b},${alpha * 0.8})`;
      ctx.fill();
    }
  }
}

// ── 3. KICK PULSE: subtle expansion of the center ──
function drawKickPulse() {
  if (V.kickHit < 0.01) return;
  const [r, g, b] = decayToRGB(V.smoothDecay, 0.6);
  const radius = V.kickHit * 60;
  const alpha = V.kickHit * 0.06;
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
  ctx.lineWidth = 1 + V.kickHit * 2;
  ctx.stroke();
}

// ── 4. RIMSHOT FLASH: a single horizontal line across the screen ──
// It appears so rarely that when it does, it's an EVENT.
function drawRimshotLine() {
  if (V.rimHit < 0.01) return;
  const [r, g, b] = decayToRGB(0.8, 1.2); // always warm
  const alpha = V.rimHit * 0.35;
  const spread = W * V.rimHit;
  ctx.beginPath();
  ctx.moveTo(cx - spread / 2, cy);
  ctx.lineTo(cx + spread / 2, cy);
  ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
  ctx.lineWidth = 1;
  ctx.stroke();
  // Glow
  ctx.strokeStyle = `rgba(${r},${g},${b},${alpha * 0.3})`;
  ctx.lineWidth = 6;
  ctx.stroke();
}

// ── 5. OH HALO: soft expanding ring, infrequent ──
const ohRings = [];
class OHRing {
  constructor() {
    this.r = 20;
    this.maxR = 80 + Math.random() * 120;
    this.life = 1;
  }
  update() {
    this.r += (this.maxR - this.r) * 0.03;
    this.life *= 0.975;
    return this.life > 0.01;
  }
  draw() {
    const [r, g, b] = decayToRGB(V.smoothDecay, 0.5);
    ctx.beginPath();
    ctx.arc(cx, cy, this.r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(${r},${g},${b},${this.life * 0.08})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
}

// ── 6. VOID EMBERS: when kick disappears, faint particles drift up ──
const embers = [];
class Ember {
  constructor() {
    this.x = cx + (Math.random() - 0.5) * 100;
    this.y = cy + 30;
    this.vy = -(0.2 + Math.random() * 0.6);
    this.vx = (Math.random() - 0.5) * 0.3;
    this.life = 1;
    this.size = 0.5 + Math.random() * 1.5;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.life -= 0.008;
    return this.life > 0;
  }
  draw() {
    const [r, g, b] = decayToRGB(V.smoothDecay, 0.4);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r},${g},${b},${this.life * 0.15})`;
    ctx.fill();
  }
}

// ══════════════════════════════════════════
// STEP DOTS HUD
// ══════════════════════════════════════════
const railEl = document.getElementById('step-rail');
for (let i = 0; i < 16; i++) {
  const s = document.createElement('div');
  s.className = 's';
  railEl.appendChild(s);
}
const stepDots = railEl.querySelectorAll('.s');

function updateDots(stepIdx) {
  const d = V.decay;
  const [r, g, bl] = decayToRGB(d);
  stepDots.forEach((dot, i) => {
    if (i === stepIdx) {
      const size = 4 + d * 8;
      const alpha = 0.2 + d * 0.5;
      dot.style.width = size + 'px';
      dot.style.height = size + 'px';
      dot.style.background = `rgba(${r},${g},${bl},${alpha})`;
      dot.style.boxShadow = d > 0.3 ? `0 0 ${4 + d * 8}px rgba(${r},${g},${bl},${alpha * 0.4})` : 'none';
    } else {
      dot.style.width = '6px';
      dot.style.height = '6px';
      dot.style.background = 'rgba(255,255,255,0.02)';
      dot.style.boxShadow = 'none';
    }
  });
}

// ══════════════════════════════════════════
// RENDER LOOP
// ══════════════════════════════════════════
let frame = 0;
const decayReadout = document.getElementById('decay-readout');
const sectionLabelEl = document.getElementById('section-label');

function render() {
  requestAnimationFrame(render);
  frame++;

  // Smooth
  V.energy += (V.targetEnergy - V.energy) * 0.02;
  V.smoothDecay += (V.decay - V.smoothDecay) * 0.25;

  // Decay impulses
  V.kickHit *= 0.9;
  V.rimHit *= 0.85;
  V.ohHit *= 0.94;
  V.chHit *= 0.9;

  // ── BACKGROUND: near-black, very slow fade ──
  const fade = V.noKick ? 0.025 : 0.05;
  ctx.fillStyle = `rgba(5,5,5,${fade})`;
  ctx.fillRect(0, 0, W, H);

  if (!V.playing) {
    // Idle: barely-there breathing dot
    const breath = Math.sin(frame * 0.008) * 0.5 + 0.5;
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 30);
    grad.addColorStop(0, `rgba(150,145,140,${0.01 + breath * 0.015})`);
    grad.addColorStop(1, 'rgba(150,145,140,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(cx - 30, cy - 30, 60, 60);
    return;
  }

  // ═══ LAYERS (back to front) ═══

  // 1. Center breath circle
  drawBreathCircle();

  // 2. Step ticks around circle
  drawStepTicks();

  // 3. Kick pulse
  drawKickPulse();

  // 4. OH rings
  for (let i = ohRings.length - 1; i >= 0; i--) {
    ohRings[i].draw();
    if (!ohRings[i].update()) ohRings.splice(i, 1);
  }

  // 5. Void embers
  if (V.noKick && frame % 4 === 0) {
    embers.push(new Ember());
  }
  for (let i = embers.length - 1; i >= 0; i--) {
    embers[i].draw();
    if (!embers[i].update()) embers.splice(i, 1);
  }

  // 6. Rimshot line (on top — it's rare and sacred)
  drawRimshotLine();

  // Decay readout — ghost of the number, barely visible
  const dPct = Math.round(V.decay * 100);
  const readoutAlpha = 0.04 + V.energy * 0.06;
  decayReadout.style.color = `rgba(255,255,255,${readoutAlpha})`;
  decayReadout.textContent = String(dPct).padStart(3, ' ');
}

render();

// ══════════════════════════════════════════
// PLAYBACK ENGINE
// ══════════════════════════════════════════
let engine = null;
let playing = false;
let nextStepTime = 0;
let currentStep = 0;
let currentSectionIdx = 0;
let currentBar = 0;
let schedulerTimer = null;

const SCHEDULE_AHEAD = 0.1;
const LOOKAHEAD = 25;

function getSection() { return sections[currentSectionIdx]; }

function scheduleStep(time) {
  const section = getSection();
  const stepInPattern = currentStep % 16;

  // Apply hat decay automation
  const autoDecay = section.auto?.['ch.decay'];
  const decayVal = autoDecay ? autoDecay[stepInPattern] : 0.15;

  // Schedule triggers
  const delay = Math.max(0, (time - engine.context.currentTime) * 1000);

  // Set decay before triggering
  setTimeout(() => {
    // Set hat decay
    engine.setVoiceParameter('ch', 'decay', decayVal);

    // Trigger voices
    const voices = section.voices;
    for (const [voiceId, steps] of Object.entries(voices)) {
      if (steps.includes(stepInPattern)) {
        engine.trigger(voiceId, voiceId === 'rimshot' ? 0.7 : 1.0);
      }
    }

    // Update visual state
    V.decay = decayVal;
    V.step = stepInPattern;
    V.globalStep++;
    V.noKick = !voices.kick || voices.kick.length === 0;
    V.targetEnergy = section.energy;
    stepDecays[stepInPattern] = decayVal;

    // Hits
    if (voices.kick?.includes(stepInPattern)) V.kickHit = 1;
    if (voices.rimshot?.includes(stepInPattern)) V.rimHit = 1;
    if (voices.oh?.includes(stepInPattern)) V.ohHit = 1;
    if (voices.ch?.includes(stepInPattern)) V.chHit = 1;
    if (voices.oh?.includes(stepInPattern)) ohRings.push(new OHRing());

    // Section label — fade in on change, then fade out
    if (section.label && section.label !== V.sectionLabel) {
      sectionLabelEl.textContent = section.label;
      sectionLabelEl.classList.add('visible');
      setTimeout(() => sectionLabelEl.classList.remove('visible'), 3000);
    }
    V.sectionLabel = section.label;

    // HUD
    updateDots(stepInPattern);
    document.getElementById('bar-count').textContent =
      `${currentBar + 1} / ${totalBars}`;
  }, delay);
}

function advanceStep() {
  currentStep++;
  if (currentStep % 16 === 0) {
    currentBar++;
    let barsBeforeSection = 0;
    for (let i = 0; i < currentSectionIdx; i++) barsBeforeSection += sections[i].bars;
    if (currentBar - barsBeforeSection >= getSection().bars) {
      currentSectionIdx++;
      if (currentSectionIdx >= sections.length) { stop(); return false; }
    }
  }
  return true;
}

function scheduler() {
  while (nextStepTime < engine.context.currentTime + SCHEDULE_AHEAD) {
    scheduleStep(nextStepTime);
    nextStepTime += STEP_DUR;
    if (!advanceStep()) return;
  }
  schedulerTimer = setTimeout(scheduler, LOOKAHEAD);
}

async function start() {
  if (!engine) {
    const audioCtx = new AudioContext({ sampleRate: 44100 });
    engine = new JT90Engine({ context: audioCtx, bpm: BPM });
    await engine.loadSamples('/jt90/samples');
    engine._ensureVoices();

    // Connect audio output
    const bufferSize = 1024;
    const scriptNode = audioCtx.createScriptProcessor(bufferSize, 0, 2);
    const VOICE_IDS = ['kick', 'snare', 'clap', 'rimshot', 'ch', 'oh', 'ltom', 'mtom', 'htom', 'crash', 'ride'];
    scriptNode.onaudioprocess = (event) => {
      const outputL = event.outputBuffer.getChannelData(0);
      const outputR = event.outputBuffer.getChannelData(1);
      for (let i = 0; i < outputL.length; i++) {
        let sample = 0;
        for (const vid of VOICE_IDS) {
          const voice = engine._voices[vid];
          if (voice && voice.isActive()) {
            sample += voice.processSample();
          }
        }
        // Soft limit
        sample = Math.tanh(sample * 0.7) / Math.tanh(0.7);
        sample *= engine.masterVolume;
        outputL[i] = sample;
        outputR[i] = sample;
      }
    };
    scriptNode.connect(audioCtx.destination);

    // Set initial voice params
    engine.setVoiceParameter('kick', 'decay', 0.4);
    engine.setVoiceParameter('kick', 'tune', -300); // cents: -3 semitones
    engine.setVoiceParameter('kick', 'level', 0.8);
    engine.setVoiceParameter('ch', 'level', 0.7);
    engine.setVoiceParameter('ch', 'tone', 0.4);
    engine.setVoiceParameter('oh', 'decay', 0.6);
    engine.setVoiceParameter('oh', 'level', 0.5);
    engine.setVoiceParameter('rimshot', 'decay', 0.15);
    engine.setVoiceParameter('rimshot', 'level', 0.45);
    engine.setVoiceParameter('rimshot', 'tune', -700); // low rimshot
  }

  if (engine.context.state === 'suspended') await engine.context.resume();

  // Reset state
  currentStep = 0; currentSectionIdx = 0; currentBar = 0;
  V.decay = 0.15; V.smoothDecay = 0.15; V.prevDecay = 0.15;
  V.playing = true; V.globalStep = 0;
  stepDecays.fill(0);
  kickWavesArr?.splice(0);
  ohRings.length = 0;
  embers.length = 0;

  nextStepTime = engine.context.currentTime + 0.05;
  playing = true;
  document.getElementById('play-btn').classList.add('playing');
  document.getElementById('restart-zone').style.display = 'none';
  scheduler();
}

function stop() {
  playing = false; V.playing = false; V.targetEnergy = 0;
  if (schedulerTimer) clearTimeout(schedulerTimer);
  document.getElementById('play-btn').classList.remove('playing');
  sectionLabelEl.textContent = '';
  sectionLabelEl.classList.remove('visible');
  document.getElementById('bar-count').textContent = '';
  decayReadout.style.color = 'rgba(255,255,255,0)';
  document.getElementById('restart-zone').style.display = 'block';
  stepDots.forEach(d => {
    d.style.width = '6px'; d.style.height = '6px';
    d.style.background = 'rgba(255,255,255,0.02)';
    d.style.boxShadow = 'none';
  });
}

document.getElementById('play-btn').addEventListener('click', () => {
  if (playing) stop(); else start();
});
document.getElementById('restart-zone').addEventListener('click', () => {
  start();
});
</script>
</body>
