name: Validate

on:
  pull_request:
    paths:
      - 'web/**'
      - 'sms-bot/**'
      - 'scripts/**'
      - 'CLAUDE.md'
      - 'MISTAKES.md'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check architecture isolation
        run: node sms-bot/scripts/validate-architecture.cjs

      - name: Check middleware route coverage
        run: node scripts/check-middleware-routes.cjs

      - name: Check OG image exports
        run: node scripts/check-og-images.cjs

  build-web:
    runs-on: ubuntu-latest
    needs: validate
    # Only build if web files changed (the paths filter above catches this,
    # but also skip if only sms-bot/ or scripts/ changed)
    if: |
      contains(join(github.event.pull_request.labels.*.name, ','), 'web') ||
      true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: cd web && npm ci

      - name: Build Next.js
        run: cd web && npx next build
